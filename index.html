<!doctype html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- عنوان النظام المحاسبي -->
    <title>الدفتر الذهبي - نظام الأخوة ERP المحاسبي</title>    

    <!-- إضافة خطوط احترافية تدعم العربية (Cairo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
      /* تنسيق أولي لمنع وميض الشاشة قبل تحميل الرياكت */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Cairo', sans-serif;
        background-color: #f4f7f6;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <!-- هذا الـ Div هو الذي سيتم حقن جميع صفحات النظام (الكروت، الفواتير، التقارير) داخله -->
    <div id="root"></div>

    <!-- ملف التشغيل الرئيسي للنظام -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- تحليلات النظام (اختياري) -->
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
