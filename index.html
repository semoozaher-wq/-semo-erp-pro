<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام GOLDEN ERP المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        [data-theme="dark"] { --primary: #f8fafc; --accent: #60a5fa; --bg: #020617; --card: #1e293b; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .wrapper { display: flex; }
        .sidebar { width: 260px; background: var(--primary); color: white; position: fixed; right: 0; height: 100vh; padding: 20px; z-index: 1000; }
        .main { flex: 1; margin-right: 260px; padding: 25px; min-height: 100vh; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { padding: 10px 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; }
        .btn-p { background: var(--accent); color: white; } .btn-d { background: var(--danger); color: white; } .btn-s { background: var(--success); color: white; }
        input, select { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; width: 100%; margin-top: 5px; background: var(--card); color: var(--text); }
        .search-box { margin-bottom: 15px; position: relative; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f1f5f9; padding: 12px; font-size: 13px; color: #64748b; text-align: center; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg); width: 95%; max-width: 600px; border-radius: 25px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .admin-only { display: none; } /* سيتم إظهارها برمجياً للمدير فقط */
        @media (max-width: 768px) { .sidebar { width: 0; padding: 0; overflow: hidden; } .main { margin-right: 0; } }
    </style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:var(--primary); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:90%; max-width:400px; text-align:center;">
        <h2 style="color:var(--accent); margin-bottom:20px;">نظام الحماية والوصول</h2>
        <input type="password" id="pass" placeholder="كلمة المرور">
        <select id="role"><option value="admin">مدير النظام (كامل الصلاحيات)</option><option value="staff">موظف (مبيعات فقط)</option></select>
        <button class="btn btn-p" style="width:100%; margin-top:20px; justify-content:center;" onclick="app.login()">تسجيل الدخول</button>
    </div>
</div>

<div class="wrapper" id="appUI" style="display:none;">
    <aside class="sidebar">
        <h2 style="text-align:center; padding:10px; color:var(--accent);">GOLDEN ERP</h2>
        <nav id="sidebarNav">
            <div class="nav-item active" onclick="app.route('dash', this)"><i class="fas fa-chart-pie"></i> الرئيسية</div>
            <div class="nav-item" onclick="app.route('pos', this)"><i class="fas fa-shopping-cart"></i> المبيعات</div>
            <div class="nav-item admin-only" id="nav-stock" onclick="app.route('stock', this)"><i class="fas fa-boxes"></i> المخزن</div>
            <div class="nav-item admin-only" id="nav-ledger" onclick="app.route('ledger', this)"><i class="fas fa-users"></i> العملاء والموردين</div>
            <div class="nav-item" onclick="app.route('exp', this)"><i class="fas fa-wallet"></i> المصاريف</div>
            <div class="nav-item" onclick="app.route('returns', this)"><i class="fas fa-undo"></i> المرتجعات</div>
            <div class="nav-item" onclick="app.toggleTheme()"><i class="fas fa-adjust"></i> الوضع الليلي</div>
            <div class="nav-item" onclick="location.reload()" style="color:var(--danger); margin-top:20px;"><i class="fas fa-power-off"></i> خروج</div>
        </nav>
    </aside>
    <main class="main" id="view"></main>
</div>

<div id="modal" class="modal"><div class="modal-content" id="m-body"></div></div>

<script>
// تهيئة Firebase - استخدم بياناتك هنا
const firebaseConfig = { databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const app = {
    role: 'staff',
    data: { products: [], sales: [], contacts: [], expenses: [], returns: [] },
    cart: [],

    init() {
        db.ref('erp_complete_data').on('value', snap => {
            this.data = snap.val() || { products: [], sales: [], contacts: [], expenses: [], returns: [] };
            if(document.getElementById('appUI').style.display === 'flex') this.route('dash');
        });
    },

    login() {
        this.role = document.getElementById('role').value;
        const pass = document.getElementById('pass').value;
        if(pass === "123") { // كلمة مرور بسيطة للاختبار
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appUI').style.display = 'flex';
            if(this.role === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
            }
            this.route('dash');
        } else { alert("كلمة المرور خاطئة!"); }
    },

    save() { db.ref('erp_complete_data').set(this.data); },

    route(p, el) {
        if(el) { document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
        const v = document.getElementById('view');
        if(p==='dash') v.innerHTML = this.renderDash();
        if(p==='pos') v.innerHTML = this.renderPOS();
        if(p==='stock') v.innerHTML = this.renderStock();
        if(p==='ledger') v.innerHTML = this.renderLedger();
        if(p==='exp') v.innerHTML = this.renderExp();
        if(p==='returns') v.innerHTML = this.renderReturns();
    },

    // --- الرئيسية والإحصائيات ---
    renderDash() {
        const s = this.data.sales?.reduce((a,b)=>a+Number(b.total), 0) || 0;
        const e = this.data.expenses?.reduce((a,b)=>a+Number(b.amount), 0) || 0;
        const r = this.data.returns?.reduce((a,b)=>a+Number(b.total), 0) || 0;
        return `
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:20px;">
                <div class="card" style="background:var(--accent); color:white;"><h4>إجمالي المبيعات</h4><h2>${s} ج.م</h2></div>
                <div class="card" style="background:var(--danger); color:white;"><h4>المصاريف والمرتجع</h4><h2>${e + r} ج.م</h2></div>
                <div class="card" style="background:var(--success); color:white;"><h4>صافي الربح الفعلي</h4><h2>${s - e - r} ج.م</h2></div>
            </div>
            <div class="card" style="margin-top:20px;">
                <div style="display:flex; justify-content:space-between;">
                    <h3>📊 آخر العمليات</h3>
                    <button class="btn btn-s" onclick="app.exportToExcel('sales')"><i class="fas fa-file-excel"></i> تصدير المبيعات</button>
                </div>
                <table><thead><tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>إجراء</th></tr></thead>
                <tbody>${this.data.sales?.slice(0,5).map(x=>`<tr><td>${x.date}</td><td>بيع</td><td>${x.total}</td><td><button class="btn btn-p" onclick="app.printInvoice('${x.id}')">الفاتورة</button></td></tr>`).join('') || 'لا توجد بيانات'}</tbody></table>
            </div>`;
    },

    // --- نظام المبيعات (POS) ---
    renderPOS() {
        return `
            <div style="display:grid; grid-template-columns: 1fr 380px; gap:20px;">
                <div class="card">
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="ابحث عن منتج بالاسم..." onkeyup="app.searchP(this.value)"></div>
                    <div id="pos-items" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:12px;">
                        ${this.renderPOSItems(this.data.products)}
                    </div>
                </div>
                <div class="card">
                    <h3>سلة المشتريات</h3>
                    <select id="sale-cust"><option value="كاش">عميل نقدي</option>${this.data.contacts?.filter(c=>c.type==='عميل').map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
                    <div id="cart-list" style="min-height:200px; border-bottom:1px dashed #ccc; margin-top:10px;"></div>
                    <h3 style="padding:15px 0;">الإجمالي: <span id="cart-total">0</span> ج.م</h3>
                    <button class="btn btn-p" style="width:100%; height:55px;" onclick="app.checkout()">إتمام و طباعة QR 🖨️</button>
                </div>
            </div>`;
    },

    renderPOSItems(items) {
        return items?.filter(p=>p.qty>0).map(p=>`<div class="card" style="text-align:center; padding:10px; cursor:pointer;" onclick="app.addToCart('${p.id}')"><b>${p.name}</b><br><span style="color:var(--accent)">${p.price} ج.م</span><br><small>متاح: ${p.qty}</small></div>`).join('') || 'المخزن فارغ';
    },

    searchP(val) {
        const filtered = this.data.products.filter(p => p.name.includes(val));
        document.getElementById('pos-items').innerHTML = this.renderPOSItems(filtered);
    },

    addToCart(id) {
        const p = this.data.products.find(x=>x.id==id);
        const inCart = this.cart.find(x=>x.id==id);
        if(inCart) { if(inCart.count < p.qty) inCart.count++; else alert("الكمية غير كافية!"); } 
        else { this.cart.push({...p, count: 1}); }
        this.updateCart();
    },

    updateCart() {
        const area = document.getElementById('cart-list');
        area.innerHTML = this.cart.map((it, i)=>`<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <span>${it.name}</span>
            <div style="display:flex; align-items:center; gap:5px;">
                <button onclick="app.changeQty(${i}, -1)" style="width:25px;">-</button>
                <span>${it.count}</span>
                <button onclick="app.changeQty(${i}, 1)" style="width:25px;">+</button>
            </div>
            <b>${it.price * it.count} <i class="fas fa-trash" onclick="app.cart.splice(${i},1); app.updateCart();" style="color:red; cursor:pointer;"></i></b>
        </div>`).join('');
        document.getElementById('cart-total').innerText = this.cart.reduce((a,b)=>a+(b.price*b.count),0);
    },

    changeQty(i, val) {
        const it = this.cart[i];
        const p = this.data.products.find(x=>x.id == it.id);
        if(val === 1 && it.count < p.qty) it.count++;
        else if(val === -1 && it.count > 1) it.count--;
        this.updateCart();
    },

    checkout() {
        if(this.cart.length === 0) return;
        const total = this.cart.reduce((a,b)=>a+(b.price*b.count),0);
        const cid = document.getElementById('sale-cust').value;
        
        this.cart.forEach(it => { this.data.products.find(x=>x.id==it.id).qty -= it.count; });
        if(cid !== 'كاش') { this.data.contacts.find(x=>x.id==cid).balance += total; }
        
        const invId = Date.now();
        this.data.sales.unshift({ id: invId, total, date: new Date().toLocaleString(), items: [...this.cart], customer: cid });
        this.save();
        this.printInvoice(invId);
        this.cart = []; this.updateCart();
    },

    // --- إدارة المخزن (تعديل وبحث) ---
    renderStock() {
        return `
            <div class="card">
                <h3>📦 إدارة المخزون</h3>
                <div style="display:grid; grid-template-columns: 2fr 1fr 1fr auto; gap:10px; margin-top:10px;">
                    <input id="pn" placeholder="اسم المنتج">
                    <input id="pp" type="number" placeholder="السعر">
                    <input id="pq" type="number" placeholder="الكمية">
                    <button class="btn btn-p" onclick="app.addProduct()">إضافة للمخزن</button>
                </div>
            </div>
            <div class="card">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="بحث في المخزن..." onkeyup="app.searchStock(this.value)"></div>
                <table id="stock-table"><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>إجراءات</th></tr></thead>
                <tbody>${this.renderStockRows(this.data.products)}</tbody></table>
            </div>`;
    },

    renderStockRows(items) {
        return items?.map(p=>`<tr>
            <td>${p.name}</td><td>${p.price}</td><td>${p.qty}</td>
            <td>
                <button class="btn btn-s" onclick="app.editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
                <button class="btn btn-d" onclick="app.confirmDel('p', '${p.id}')"><i class="fas fa-trash"></i></button>
            </td></tr>`).join('') || '';
    },

    searchStock(val) {
        const filtered = this.data.products.filter(p => p.name.includes(val));
        document.querySelector('#stock-table tbody').innerHTML = this.renderStockRows(filtered);
    },

    editProduct(id) {
        const p = this.data.products.find(x=>x.id == id);
        const newPrice = prompt("أدخل السعر الجديد:", p.price);
        const newQty = prompt("أدخل الكمية الجديدة:", p.qty);
        if(newPrice && newQty) {
            p.price = Number(newPrice);
            p.qty = Number(newQty);
            this.save();
            alert("تم التعديل بنجاح");
        }
    },

    // --- إدارة الحسابات (عملاء وموردين) ---
    renderLedger() {
        return `
            <div class="card">
                <h3>👥 الحسابات والديون</h3>
                <div style="display:grid; grid-template-columns: 2fr 1fr auto; gap:10px; margin:10px 0;">
                    <input id="cn" placeholder="اسم العميل أو المورد">
                    <select id="ct"><option value="عميل">عميل</option><option value="مورد">مورد</option></select>
                    <button class="btn btn-p" onclick="app.addContact()">إضافة</button>
                </div>
            </div>
            <div class="card">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="بحث عن عميل..." onkeyup="app.searchLedger(this.value)"></div>
                <table id="ledger-table"><thead><tr><th>الاسم</th><th>النوع</th><th>الرصيد</th><th>إجراء</th></tr></thead>
                <tbody>${this.renderLedgerRows(this.data.contacts)}</tbody></table>
            </div>`;
    },

    renderLedgerRows(items) {
        return items?.map(c=>`<tr>
            <td>${c.name}</td><td>${c.type}</td><td style="color:${c.balance>0?'red':'green'}">${c.balance}</td>
            <td>
                <button class="btn btn-p" onclick="app.editContact('${c.id}')"><i class="fas fa-edit"></i></button>
                <button class="btn btn-s" onclick="app.payDebt('${c.id}')">تسديد</button>
                <button class="btn btn-d" onclick="app.confirmDel('c', '${c.id}')"><i class="fas fa-trash"></i></button>
            </td></tr>`).join('') || '';
    },

    searchLedger(val) {
        const filtered = this.data.contacts.filter(c => c.name.includes(val));
        document.querySelector('#ledger-table tbody').innerHTML = this.renderLedgerRows(filtered);
    },

    editContact(id) {
        const c = this.data.contacts.find(x=>x.id == id);
        const newName = prompt("تعديل الاسم:", c.name);
        if(newName) { c.name = newName; this.save(); }
    },

    payDebt(id) {
        const c = this.data.contacts.find(x=>x.id == id);
        const amt = prompt(`أدخل المبلغ المسدد لـ ${c.name}:`);
        if(amt) { c.balance -= Number(amt); this.save(); }
    },

    // --- المصاريف والمرتجعات ---
    renderExp() {
        return `
            <div class="card"><h3>💸 المصاريف</h3>
                <input id="en" placeholder="البيان"><input id="ea" type="number" placeholder="المبلغ">
                <button class="btn btn-d" style="width:100%; margin-top:10px;" onclick="app.addExp()">حفظ المصروف</button>
            </div>
            <div class="card"><table><thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th>حذف</th></tr></thead>
            <tbody>${this.data.expenses?.map((x,i)=>`<tr><td>${x.date}</td><td>${x.note}</td><td>${x.amount}</td><td><button class="btn btn-d" onclick="app.confirmDel('e', ${i})">X</button></td></tr>`).join('') || ''}</tbody></table></div>`;
    },

    renderReturns() {
        return `
            <div class="card"><h3>↩️ المرتجعات</h3>
                <input id="ri" placeholder="رقم الفاتورة"><input id="ra" type="number" placeholder="المبلغ">
                <button class="btn btn-w" style="width:100%; margin-top:10px; background:var(--warning); color:white;" onclick="app.addRet()">تأكيد المرتجع</button>
            </div>
            <div class="card"><table><thead><tr><th>التاريخ</th><th>الفاتورة</th><th>المبلغ</th><th>حذف</th></tr></thead>
            <tbody>${this.data.returns?.map((x,i)=>`<tr><td>${x.date}</td><td>${x.invId}</td><td>${x.total}</td><td><button class="btn btn-d" onclick="app.confirmDel('r', ${i})">X</button></td></tr>`).join('') || ''}</tbody></table></div>`;
    },

    // --- وظائف مساعدة (حذف، طباعة، إكسل) ---
    confirmDel(type, id) {
        if(confirm("هل أنت متأكد من عملية الحذف؟ لا يمكن التراجع!")) {
            if(type==='p') this.data.products = this.data.products.filter(x=>x.id != id);
            if(type==='c') this.data.contacts = this.data.contacts.filter(x=>x.id != id);
            if(type==='e') this.data.expenses.splice(id, 1);
            if(type==='r') this.data.returns.splice(id, 1);
            this.save();
        }
    },

    exportToExcel(type) {
        const list = type === 'sales' ? this.data.sales : this.data.expenses;
        const ws = XLSX.utils.json_to_sheet(list);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Reports");
        XLSX.writeFile(wb, `${type}_report.xlsx`);
    },

    printInvoice(id) {
        const inv = this.data.sales.find(x=>x.id == id);
        const m = document.getElementById('modal');
        document.getElementById('m-body').innerHTML = `
            <div id="p-area" style="text-align:center;">
                <h2>GOLDEN ERP</h2><p>فاتورة بيع #${inv.id}</p><hr>
                <table>${inv.items.map(i=>`<tr><td>${i.name}</td><td>${i.count}</td><td>${i.price*i.count}</td></tr>`).join('')}</table>
                <hr><h3>المجموع: ${inv.total} ج.م</h3>
                <div id="qr" style="display:flex; justify-content:center; margin:15px;"></div>
            </div>
            <button class="btn btn-p no-print" style="width:100%" onclick="window.print()">طباعة الفاتورة 🖨️</button>
            <button class="btn btn-d no-print" style="width:100%; margin-top:10px;" onclick="m.style.display='none'">إغلاق</button>`;
        new QRCode(document.getElementById("qr"), { text: `INV-${inv.id}`, width: 120, height: 120 });
        m.style.display = 'flex';
    },

    addProduct() {
        const n=document.getElementById('pn').value, p=document.getElementById('pp').value, q=document.getElementById('pq').value;
        if(n&&p&&q){this.data.products.push({id:Date.now(), name:n, price:Number(p), qty:Number(q)}); this.save();}},
    addContact() {
        const n=document.getElementById('cn').value, t=document.getElementById('ct').value;
        if(n){this.data.contacts.push({id:Date.now(), name:n, type:t, balance:0}); this.save();}},
    addExp() {
        const n=document.getElementById('en').value, a=document.getElementById('ea').value;
        if(n&&a){this.data.expenses.unshift({note:n, amount:Number(a), date:new Date().toLocaleDateString()}); this.save();}},
    addRet() {
        const i=document.getElementById('ri').value, a=document.getElementById('ra').value;
        if(i&&a){this.data.returns.unshift({invId:i, total:Number(a), date:new Date().toLocaleString()}); this.save();}},
    toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
};

app.init();
</script>
</body>
</html>
