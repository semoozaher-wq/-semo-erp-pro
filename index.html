<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | دخول</title>
    <style>
        /* --- CSS Styles --- */
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            transition: background 0.3s ease;
        }

        .card { 
            background: #1e293b; 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 350px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid #334155; 
            transition: background-color 0.3s ease, color 0.3s ease; 
            position: relative;
        }

        body.light-mode {
            background: #f1f5f9;
            color: #1e293b;
        }
        body.light-mode .card {
            background: #ffffff;
            color: #1e293b;
            border-color: #e2e8f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        body.light-mode input {
            background: #f8fafc;
            color: #334155;
            border-color: #cbd5e1;
        }
        body.light-mode .link, body.light-mode .forgot-password {
            color: #64748b;
        }

        h1 { 
            color: #3b82f6; 
            margin-bottom: 10px; 
            font-size: 28px; 
            letter-spacing: 1px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            outline: none; 
            font-size: 16px; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            font-size: 18px;
            background: none;
            border: none;
            outline: none;
            padding: 0;
        }
        .toggle-password:hover { color: #3b82f6; }

        .btn { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            border: none; 
            color: white; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 16px; 
            transition: background 0.3s ease;
        }
        .btn:hover { background: #2563eb; }
        .btn-green { background: #10b981 !important; }
        .btn-green:hover { background: #059669 !important; }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .link, .forgot-password { 
            color: #94a3b8; 
            cursor: pointer; 
            display: block; 
            margin-top: 15px; 
            font-size: 14px; 
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .link:hover, .forgot-password:hover { color: #3b82f6; text-decoration: underline; }

        .mode-toggle { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: none; 
            border: none; 
            color: #94a3b8; 
            font-size: 24px; 
            cursor: pointer; 
            transition: color 0.3s ease;
        }
        .mode-toggle:hover { color: #3b82f6; }

        .hidden { display: none; }

        /* حقل الكود */
        .otp-input { 
            text-align: center; 
            font-size: 24px; 
            font-weight: bold; 
            letter-spacing: 20px; 
            margin-bottom: 20px; 
            background: #0f172a; 
            color: white; 
            border: 2px dashed #3b82f6; 
            width: 100%; 
            padding: 10px 0; 
            border-radius: 10px; 
            margin-top: 10px; 
            transition: all 0.3s ease;
        }
        .otp-input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }

        /* تنبيهات */
        .notification { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            padding: 12px 24px; 
            border-radius: 12px; 
            z-index: 1000; 
            font-weight: bold;
            animation: slideDown 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .notification.success { 
            background: #10b981; 
            color: white; 
        }
        .notification.error { 
            background: #ef4444; 
            color: white; 
        }

        /* مؤشر تحميل */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <button class="mode-toggle" onclick="toggleMode()">🌙</button>
        
        <div class="logo">SEMO</div>
        <h1>SEMO ERP</h1>

        <!-- واجهة تسجيل الدخول -->
        <div id="login-box">
            <input type="email" id="l-id" placeholder="البريد الإلكتروني">
            <div style="position: relative;">
                <input type="password" id="l-p" placeholder="كلمة المرور">
                <button class="toggle-password" type="button" onclick="togglePassword('l-p')">👁️</button>
            </div>
            <button class="btn" id="login-btn" onclick="login()">دخول</button>
            <span class="link" onclick="toggle()">تأسيس حساب جديد</span>
            <a href="#" class="forgot-password" onclick="forgotPassword()">نسيت كلمة المرور؟</a>
        </div>

        <!-- واجهة إنشاء حساب جديد -->
        <div id="signup-box" class="hidden">
            <input type="email" id="s-e" placeholder="البريد الإلكتروني">
            <input type="tel" id="s-ph" placeholder="رقم الهاتف">
            <div style="position: relative;">
                <input type="password" id="s-p" placeholder="كلمة المرور">
                <button class="toggle-password" type="button" onclick="togglePassword('s-p')">👁️</button>
            </div>
            <button class="btn btn-green" id="signup-btn" onclick="signup()">إنشاء حساب</button>
            <span class="link" onclick="toggle()">العودة لتسجيل الدخول</span>
        </div>

        <!-- واجهة تأكيد الكود (محاكاة) -->
        <div id="otp-box" class="hidden">
            <h3>أدخل كود التحقق</h3>
            <input type="text" id="otp-input" class="otp-input" placeholder="000000">
            <button class="btn" onclick="verifyOtp()">تأكيد الكود</button>
            <span class="link" onclick="resendOtp()">إعادة إرسال الكود</span>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 15px;">*تم إرسال كود التحقق إلى: <span id="otp-email"></span></p>
        </div>
    </div>

    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // --- إعدادات Firebase (مصححة) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
            authDomain: "my-pos-system-11dee.firebaseapp.com",
            databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
            projectId: "my-pos-system-11dee",
            storageBucket: "my-pos-system-11dee.firebasestorage.app", // ✅ تم التصحيح
            messagingSenderId: "565195477080",
            appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
        };

        // تهيئة Firebase
        let auth, db;
        let currentNotification = null;

        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            console.log("✅ Firebase initialized successfully");
        } catch (error) {
            console.error("❌ Firebase initialization error:", error);
            showNotification('❌ خطأ في الاتصال بـ Firebase', 'error');
        }

        // --- دوال الواجهة (UI) ---
        function toggleMode() {
            const body = document.body;
            const btn = document.querySelector('.mode-toggle');
            body.classList.toggle('light-mode');
            btn.textContent = body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        function toggle() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('signup-box').classList.toggle('hidden');
            document.getElementById('otp-box').classList.add('hidden');
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const btn = input.parentElement.querySelector('.toggle-password');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        function showNotification(message, type) {
            // إزالة الإشعار السابق إذا وجد
            if (currentNotification) {
                currentNotification.remove();
            }
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            currentNotification = notification;
            
            setTimeout(() => {
                if (notification) {
                    notification.style.opacity = '0';
                    setTimeout(() => notification.remove(), 300);
                    if (currentNotification === notification) currentNotification = null;
                }
            }, 4000);
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            
            if (isLoading) {
                btn.disabled = true;
                const originalText = btn.textContent;
                btn.setAttribute('data-original', originalText);
                btn.innerHTML = '<span class="spinner"></span> جاري المعالجة...';
            } else {
                btn.disabled = false;
                const originalText = btn.getAttribute('data-original');
                if (originalText) {
                    btn.textContent = originalText;
                } else {
                    btn.textContent = btnId === 'login-btn' ? 'دخول' : 'إنشاء حساب';
                }
            }
        }

        // --- دوال Firebase ---

        // 1. إنشاء حساب جديد
        function signup() {
            const email = document.getElementById('s-e').value.trim();
            const phone = document.getElementById('s-ph').value.trim();
            const password = document.getElementById('s-p').value;

            if (!email || !phone || !password) {
                showNotification('⚠️ يرجى ملء جميع الحقول', 'error');
                return;
            }
            if (password.length < 6) {
                showNotification('⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }

            setLoading('signup-btn', true);

            // إنشاء مستخدم في Firebase Auth
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    // حفظ بيانات إضافية في Firestore
                    return db.collection('users').doc(user.uid).set({
                        email: email,
                        phone: phone,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        role: 'user'
                    });
                })
                .then(() => {
                    showNotification('✅ تم إنشاء الحساب بنجاح!', 'success');
                    
                    // إرسال بريد تحقق
                    if (auth.currentUser) {
                        auth.currentUser.sendEmailVerification()
                            .then(() => {
                                showNotification('📧 تم إرسال رابط التحقق إلى بريدك', 'success');
                            })
                            .catch((error) => console.error("Error sending verification:", error));
                    }
                    
                    // إظهار واجهة الكود (محاكاة)
                    document.getElementById('otp-email').textContent = email;
                    document.getElementById('login-box').classList.add('hidden');
                    document.getElementById('signup-box').classList.add('hidden');
                    document.getElementById('otp-box').classList.remove('hidden');
                    
                    // توليد كود تجريبي (للتجربة فقط)
                    const otp = Math.floor(100000 + Math.random() * 900000);
                    localStorage.setItem('mock_otp', otp);
                    showNotification(`✨ كود التحقق التجريبي: ${otp}`, 'success');
                })
                .catch((error) => {
                    let message = error.message;
                    if (error.code === 'auth/email-already-in-use') {
                        message = 'البريد الإلكتروني مستخدم بالفعل';
                    }
                    showNotification(`❌ ${message}`, 'error');
                })
                .finally(() => setLoading('signup-btn', false));
        }

        // 2. تسجيل الدخول
        function login() {
            const email = document.getElementById('l-id').value.trim();
            const password = document.getElementById('l-p').value;

            if (!email || !password) {
                showNotification('⚠️ يرجى ملء جميع الحقول', 'error');
                return;
            }

            setLoading('login-btn', true);

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // التحقق من أن البريد تم التحقق منه (اختياري - يمكن تعطيله للتجربة)
                    if (!user.emailVerified) {
                        showNotification('⚠️ يرجى التحقق من بريدك الإلكتروني أولاً', 'error');
                        auth.signOut();
                        setLoading('login-btn', false);
                        return;
                    }

                    showNotification(`✅ مرحباً بك، ${user.email}!`, 'success');
                    
                    // حفظ حالة الدخول في التخزين المحلي
                    localStorage.setItem('semo_logged_in', 'true');
                    localStorage.setItem('semo_user_email', user.email);
                    
                    // توجيه المستخدم إلى لوحة التحكم
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                })
                .catch((error) => {
                    let message = error.message;
                    if (error.code === 'auth/wrong-password') message = 'كلمة المرور غير صحيحة';
                    if (error.code === 'auth/user-not-found') message = 'المستخدم غير موجود';
                    if (error.code === 'auth/too-many-requests') message = 'محاولات كثيرة، حاول لاحقاً';
                    if (error.code === 'auth/invalid-email') message = 'البريد الإلكتروني غير صحيح';
                    
                    showNotification(`❌ ${message}`, 'error');
                })
                .finally(() => setLoading('login-btn', false));
        }

        // 3. التحقق من الكود (محاكاة)
        function verifyOtp() {
            const enteredOtp = document.getElementById('otp-input').value;
            const storedOtp = localStorage.getItem('mock_otp');

            if (!enteredOtp) {
                showNotification('⚠️ يرجى إدخال الكود', 'error');
                return;
            }

            if (enteredOtp == storedOtp) {
                showNotification('✅ تم تأكيد الكود بنجاح!', 'success');
                localStorage.removeItem('mock_otp');
                
                // إرسال بريد التحقق الفعلي من Firebase (إذا لم يتم إرساله سابقاً)
                if (auth.currentUser && !auth.currentUser.emailVerified) {
                    auth.currentUser.sendEmailVerification().then(() => {
                        showNotification('📧 تم إرسال رابط التحقق الفعلي إلى بريدك', 'success');
                    }).catch(console.error);
                }
                
                // العودة لشاشة الدخول بعد ثانيتين
                setTimeout(() => {
                    toggle();
                    document.getElementById('otp-input').value = '';
                }, 2000);
            } else {
                showNotification('❌ الكود غير صحيح، حاول مرة أخرى', 'error');
            }
        }

        // 4. إعادة إرسال الكود
        function resendOtp() {
            const newOtp = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('mock_otp', newOtp);
            showNotification(`✅ تم إرسال كود جديد: ${newOtp}`, 'success');
        }

        // 5. نسيت كلمة المرور
        function forgotPassword() {
            const email = document.getElementById('l-id').value.trim();
            
            if (!email || !email.includes('@')) {
                showNotification('⚠️ يرجى إدخال بريد إلكتروني صحيح', 'error');
                return;
            }

            // مؤقت بسيط
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'جاري الإرسال...';
            btn.style.pointerEvents = 'none';

            auth.sendPasswordResetEmail(email)
                .then(() => {
                    showNotification(`📧 تم إرسال رابط استعادة كلمة المرور إلى: ${email}`, 'success');
                })
                .catch((error) => {
                    let message = error.message;
                    if (error.code === 'auth/user-not-found') message = 'لا يوجد مستخدم بهذا البريد';
                    showNotification(`❌ ${message}`, 'error');
                })
                .finally(() => {
                    btn.textContent = originalText;
                    btn.style.pointerEvents = 'auto';
                });
        }

        // 6. التحقق من حالة المستخدم عند التحميل
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log('✅ المستخدم مسجل دخول حالياً:', user.email);
                // إذا كان هناك مستخدم مسجل دخول وكان في صفحة الدخول، نوجهه للوحة التحكم
                if (window.location.pathname.includes('index.html') || window.location.pathname === '/' || window.location.pathname === '') {
                    window.location.href = 'dashboard.html';
                }
            } else {
                console.log('ℹ️ لا يوجد مستخدم مسجل دخول');
            }
        });

        // إضافة مستخدم تجريبي للتسهيل (اختياري)
        // يمكن إلغاء التعليق عن الكود التالي لإنشاء مستخدم تجريبي
        /*
        (async () => {
            try {
                const testEmail = 'test@test.com';
                const testPass = '123456';
                const existingUser = await auth.fetchSignInMethodsForEmail(testEmail);
                if (existingUser.length === 0) {
                    await auth.createUserWithEmailAndPassword(testEmail, testPass);
                    console.log('✅ تم إنشاء مستخدم تجريبي: test@test.com / 123456');
                }
            } catch(e) { console.log('مستخدم تجريبي موجود مسبقاً أو خطأ:', e.message); }
        })();
        */
    </script>
</body>
</html>
