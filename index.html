<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO ERP PRO - نظام متكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --card-light: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            direction: rtl;
            font-size: 14px;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--card);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            padding: 1.5rem 1rem;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: -4px 0 20px rgba(0,0,0,0.3);
            border-left: 1px solid var(--border);
        }

        .sidebar-header {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            padding-right: 0.5rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-item {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .menu-item:hover, .menu-item.active {
            background: var(--primary);
            color: white;
            transform: translateX(-4px);
        }

        /* Main Content */
        .main-content {
            margin-right: 280px;
            padding: 1.5rem;
            min-height: 100vh;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            border-radius: 1.25rem;
            padding: 1.25rem;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border);
        }
        .stat-card:hover { transform: translateY(-4px); background: var(--card-light); }

        .stat-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.8rem; font-weight: 800; }

        .card-box {
            background: var(--card);
            border-radius: 1.25rem;
            padding: 1.5rem;
            margin-bottom: 1.8rem;
            border: 1px solid var(--border);
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px; }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px 10px; text-align: right; border-bottom: 1px solid var(--border); }
        .data-table tr { cursor: pointer; transition: 0.1s; }
        .data-table tr:hover { background: rgba(59,130,246,0.1); }

        .badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge-success { background: rgba(16,185,129,0.2); color: #34d399; }
        .badge-warning { background: rgba(245,158,11,0.2); color: #fbbf24; }

        /* Login Page Styles */
        .login-container { width: 100%; max-width: 450px; margin: auto; padding: 20px; }
        .login-card {
            background: rgba(30, 41, 59, 0.95);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(59,130,246,0.3);
        }
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            color: white;
            font-size: 16px;
        }
        .input-group input:focus { outline: none; border-color: #3b82f6; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .demo-accounts { margin-top: 32px; padding-top: 24px; border-top: 1px solid #334155; }
        .account-card {
            background: #0f172a;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #334155;
        }
        .account-card:hover { background: #1e293b; border-color: #3b82f6; }
        .error-message {
            background: rgba(239,68,68,0.2);
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(100%); width: 260px; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .menu-mobile-btn { display: flex; position: fixed; bottom: 20px; left: 20px; background: var(--primary); padding: 12px; border-radius: 40px; z-index: 200; cursor: pointer; }
        }
        .menu-mobile-btn { display: none; }
        .flex-center { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
    </style>
</head>
<body id="appBody"></body>
<script>
    // ------------------- BASE DATA & HELPERS -------------------
    let db = {
        inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
        sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
        clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
        expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
        revenues: JSON.parse(localStorage.getItem('semo_revenues')) || [],
        settings: JSON.parse(localStorage.getItem('semo_settings')) || { currencySymbol: 'د.ل' }
    };

    function saveAll() {
        localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
        localStorage.setItem('semo_sales', JSON.stringify(db.sales));
        localStorage.setItem('semo_clients', JSON.stringify(db.clients));
        localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
        localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
        localStorage.setItem('semo_settings', JSON.stringify(db.settings));
    }

    function todayISO() {
        let d = new Date();
        return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
    }

    function formatCurrency(value) { return (value || 0).toLocaleString() + ' ' + db.settings.currencySymbol; }
    function showNotification(msg, type = 'success') {
        let div = document.createElement('div');
        div.style.cssText = `position:fixed; bottom:25px; left:25px; background:${type === 'success' ? '#10b981' : '#ef4444'}; color:white; padding:12px 24px; border-radius:40px; z-index:1200; font-weight:600;`;
        div.innerHTML = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2800);
    }

    function totalSales() { return db.sales.reduce((s,i) => s + (i.total || 0), 0); }
    function totalExpenses() { return db.expenses.reduce((s,i) => s + (i.amount || 0), 0); }
    function totalRevenues() { return db.revenues.reduce((s,i) => s + (i.amount || 0), 0); }
    function netProfit() { return totalSales() - totalExpenses() + totalRevenues(); }
    function getLowStockCount() { return db.inventory.filter(i => (i.qty || 0) <= 5).length; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; return '&gt;';}); }

    // Global chart variable
    let currentChart = null;

    // ------------------- MODAL FUNCTIONS -------------------
    function openModal(content) { 
        let modal = document.getElementById('detailsModal');
        if(modal) {
            document.getElementById('modalContentInner').innerHTML = content; 
            modal.classList.add('show'); 
        }
    }
    function closeModal() { 
        let modal = document.getElementById('detailsModal');
        if(modal) modal.classList.remove('show'); 
    }

    function showSaleDetails(id) {
        let sale = db.sales.find(s => s.id === id);
        if(!sale) return;
        let remaining = (sale.total||0) - (sale.paid||0);
        let modalHtml = `<h2 style="color:#3b82f6">🧾 فاتورة #${sale.id}</h2><hr>
        <div><strong>التاريخ:</strong> ${sale.dateISO || sale.date}</div>
        <div><strong>العميل:</strong> ${escapeHtml(sale.clientName)}</div>
        <div><strong>الإجمالي:</strong> ${formatCurrency(sale.total)}</div>
        <div><strong>المدفوع:</strong> ${formatCurrency(sale.paid||0)}</div>
        <div><strong>المتبقي:</strong> ${formatCurrency(remaining)}</div>
        <div><strong>الحالة:</strong> <span class="badge ${sale.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${sale.status}</span></div>
        <hr><button class="btn btn-primary" onclick="closeModal()">إغلاق</button>`;
        openModal(modalHtml);
    }

    // ------------------- RENDER FUNCTIONS (ERP) -------------------
    function renderDashboard() {
        let lowStock = getLowStockCount();
        let monthlyData = Array(12).fill(0);
        db.sales.forEach(sale => {
            if (sale.dateISO) {
                let parts = sale.dateISO.split('-');
                if (parts.length === 3) { let m = parseInt(parts[1]) - 1; if (m >= 0 && m < 12) monthlyData[m] += sale.total || 0; }
            }
        });
        let html = `<div class="stats-grid">
            <div class="stat-card" onclick="switchPage('sales')"><div class="stat-title">💰 المبيعات</div><div class="stat-value">${formatCurrency(totalSales())}</div></div>
            <div class="stat-card" onclick="switchPage('expenses_rev')"><div class="stat-title">💸 المصروفات</div><div class="stat-value">${formatCurrency(totalExpenses())}</div></div>
            <div class="stat-card" onclick="switchPage('expenses_rev')"><div class="stat-title">📈 الإيرادات</div><div class="stat-value">${formatCurrency(totalRevenues())}</div></div>
            <div class="stat-card" onclick="switchPage('reports')"><div class="stat-title">📊 صافي الربح</div><div class="stat-value" style="color:${netProfit()>=0?'#34d399':'#f87171'}">${formatCurrency(netProfit())}</div></div>
            <div class="stat-card" onclick="switchPage('inventory')"><div class="stat-title">📦 المنتجات</div><div class="stat-value">${db.inventory.length}</div></div>
            <div class="stat-card" onclick="switchPage('inventory')"><div class="stat-title">⚠️ منخفضة</div><div class="stat-value" style="color:${lowStock>0?'#fbbf24':'#34d399'}">${lowStock}</div></div>
            <div class="stat-card" onclick="switchPage('clients')"><div class="stat-title">👥 العملاء</div><div class="stat-value">${db.clients.length}</div></div>
        </div>
        <div class="card-box"><div class="card-header"><h3>📈 المبيعات الشهرية</h3></div><canvas id="monthlyChartCanvas" height="180"></canvas></div>
        <div class="card-box"><div class="card-header"><h3>📋 آخر المبيعات</h3><button class="btn btn-primary" onclick="switchPage('sales')">عرض الكل</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><table><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th></tr></thead><tbody id="recentSalesTbody"></tbody>}</div></div>`;
        document.getElementById('pageContent').innerHTML = html;
        
        // رسم المخطط البياني مع التحقق من وجود العنصر
        let canvas = document.getElementById('monthlyChartCanvas');
        if(canvas) {
            let ctx = canvas.getContext('2d');
            if(currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'bar', 
                data: { labels: ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'],
                datasets: [{ label: 'المبيعات', data: monthlyData, backgroundColor: '#3b82f6', borderRadius: 8 }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }
        
        let recent = [...db.sales].sort((a,b)=>(b.dateISO||'').localeCompare(a.dateISO||'')).slice(0,5);
        let tbody = document.getElementById('recentSalesTbody');
        if(tbody) {
            tbody.innerHTML = recent.map(s => `<tr onclick="showSaleDetails(${s.id})"><tr><td>${s.dateISO || s.date || '-'}</td><td><strong>${escapeHtml(s.clientName)}</strong></td><td>${formatCurrency(s.total)}</td><td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status || 'آجل'}</span></td></tr>`).join('');
        }
    }

    function renderInventory() {
        let html = `<div class="card-box"><div class="card-header"><h3>📦 المخزون</h3><button class="btn btn-success" onclick="addSampleProduct()">➕ إضافة منتج</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>ID</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>القيمة</th><th>الحالة</th></tr></thead><tbody>`;
        db.inventory.forEach(p => { let totalVal = (p.qty||0)*(p.price||0); let status = (p.qty<=5) ? '<span class="badge badge-warning">منخفض</span>' : '<span class="badge badge-success">متوفر</span>';
        html += `<tr><td>${p.id}</td><td>${escapeHtml(p.name)}</td><td>${p.qty}</td><td>${formatCurrency(p.price)}</td><td>${formatCurrency(totalVal)}</td><td>${status}</td></tr>`; });
        html += `</tbody>}</div></div>`;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function addSampleProduct() { let newId = Date.now(); db.inventory.push({ id: newId, name: 'منتج جديد', qty: 20, price: 450 }); saveAll(); showNotification('✅ تمت الإضافة'); renderInventory(); }

    function renderSales() {
        let html = `<div class="card-box"><div class="card-header"><h3>🛒 المبيعات</h3><button class="btn btn-success" onclick="quickAddSale()">➕ فاتورة سريعة</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>رقم</th><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>المدفوع</th><th>الحالة</th></tr></thead><tbody>`;
        db.sales.forEach(s => { html += `<tr onclick="showSaleDetails(${s.id})"><td>${s.id}</td><td>${s.dateISO || s.date}</td><td>${escapeHtml(s.clientName)}</td><td>${formatCurrency(s.total)}</td><td>${formatCurrency(s.paid||0)}</td><td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status}</span></td></tr>`; });
        html += `</tbody>}</div></div>`;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function quickAddSale() { let newId = Date.now(); let dummy = db.clients[0]?.name || 'عميل جديد'; db.sales.push({ id: newId, clientName: dummy, total: 2750, paid: 1000, status: 'آجل', dateISO: todayISO() }); saveAll(); showNotification('تمت إضافة فاتورة'); renderSales(); }

    function renderClients() {
        let html = `<div class="card-box"><div class="card-header"><h3>👥 العملاء</h3><button class="btn btn-success" onclick="addClientPrompt()">➕ عميل جديد</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>ID</th><th>الاسم</th><th>الهاتف</th></tr></thead><tbody>`;
        db.clients.forEach(c => { html += `<tr><td>${c.id}</td><td>${escapeHtml(c.name)}</td><td>${c.phone || '-'}</td></tr>`; });
        html += `</tbody>}</div></div>`;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function addClientPrompt() { let name = prompt('اسم العميل'); if(name) { let phone = prompt('الهاتف') || ''; db.clients.push({ id: Date.now(), name, phone }); saveAll(); showNotification(`تم إضافة ${name}`); renderClients(); } }

    function renderExpensesRevenues() {
        let html = `<div class="card-box"><h3>💸 المصروفات</h3><button class="btn btn-primary" onclick="addExpense()">إضافة مصروف</button><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>النوع</th><th>المبلغ</th><th>التاريخ</th></tr></thead><tbody>`;
        db.expenses.forEach(e => { html += `<tr><td>${escapeHtml(e.type)}</td><td>${formatCurrency(e.amount)}</td><td>${e.date || todayISO()}</td></tr>`; });
        html += `</tbody>}</div><div class="stat-value mt-2">الإجمالي: ${formatCurrency(totalExpenses())}</div></div>
        <div class="card-box"><h3>📈 الإيرادات</h3><button class="btn btn-success" onclick="addRevenue()">إضافة إيراد</button><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>النوع</th><th>المبلغ</th><th>التاريخ</th></tr></thead><tbody>`;
        db.revenues.forEach(r => { html += `<tr><td>${escapeHtml(r.type)}</td><td>${formatCurrency(r.amount)}</td><td>${r.date || todayISO()}</td></tr>`; });
        html += `</tbody>}</div><div class="stat-value">الإجمالي: ${formatCurrency(totalRevenues())}</div></div>`;
        document.getElementById('pageContent').innerHTML = html;
    }
    
    function addExpense() { let type = prompt('نوع المصروف'); if(!type) return; let amt = parseFloat(prompt('المبلغ')); if(isNaN(amt)) return; db.expenses.push({ id: Date.now(), type, amount: amt, date: todayISO() }); saveAll(); showNotification('تمت الإضافة'); renderExpensesRevenues(); }
    function addRevenue() { let type = prompt('نوع الإيراد'); if(!type) return; let amt = parseFloat(prompt('المبلغ')); if(isNaN(amt)) return; db.revenues.push({ id: Date.now(), type, amount: amt, date: todayISO() }); saveAll(); showNotification('تمت الإضافة'); renderExpensesRevenues(); }

    function renderReports() { document.getElementById('pageContent').innerHTML = `<div class="card-box"><h3>📊 التقرير المالي</h3><div>المبيعات: ${formatCurrency(totalSales())}</div><div>المصروفات: ${formatCurrency(totalExpenses())}</div><div>الإيرادات: ${formatCurrency(totalRevenues())}</div><div style="font-size:1.8rem;margin:15px 0">صافي الربح: ${formatCurrency(netProfit())}</div><button class="btn btn-primary" onclick="renderReports()">تحديث</button></div>`; }

    function switchPage(page) {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        let activeMenu = document.querySelector(`.menu-item[data-page="${page}"]`);
        if(activeMenu) activeMenu.classList.add('active');
        if(page === 'dashboard') renderDashboard();
        else if(page === 'inventory') renderInventory();
        else if(page === 'sales') renderSales();
        else if(page === 'clients') renderClients();
        else if(page === 'expenses_rev') renderExpensesRevenues();
        else if(page === 'reports') renderReports();
        else if(page === 'logout') logoutSystem();
    }

    function logoutSystem() { localStorage.removeItem('semo_logged_in'); location.reload(); }

    // ------------------- LOGIN SYSTEM -------------------
    const USERS_DB = [
        { email: "test@example.com", password: "123456", name: "مستخدم تجريبي", role: "user" },
        { email: "admin@semo.com", password: "admin123", name: "مدير النظام", role: "admin" },
        { email: "sem0o.zaher@gmail.com", password: "zaher2024", name: "المهندس زاهر", role: "admin" }
    ];

    function renderLoginPage() {
        document.getElementById('appBody').innerHTML = `<div class="flex-center"><div class="login-container"><div class="login-card"><div class="logo" style="text-align:center"><h1>🏢 SEMO ERP PRO</h1><p>النظام المتكامل لإدارة المؤسسات</p></div>
        <div class="error-message" id="errorMessageLogin">❌ بيانات غير صحيحة</div>
        <div class="input-group"><label>📧 البريد الإلكتروني</label><input type="email" id="loginEmail" placeholder="example@company.com"></div>
        <div class="input-group"><label>🔒 كلمة المرور</label><input type="password" id="loginPassword" placeholder="••••••••" onkeypress="if(event.key === 'Enter') attemptLogin()"></div>
        <button class="btn-login" onclick="attemptLogin()">▶ دخول إلى النظام</button>
        <div class="demo-accounts"><h4>📋 حسابات تجريبية للدخول المباشر:</h4>
        <div class="account-card" onclick="fillCred('test@example.com','123456')"><div class="account-email">📧 test@example.com</div><div class="account-pass">🔑 كلمة المرور: 123456</div></div>
        <div class="account-card" onclick="fillCred('admin@semo.com','admin123')"><div class="account-email">📧 admin@semo.com</div><div class="account-pass">🔑 كلمة المرور: admin123</div></div>
        <div class="account-card" onclick="fillCred('sem0o.zaher@gmail.com','zaher2024')"><div class="account-email">📧 sem0o.zaher@gmail.com</div><div class="account-pass">🔑 كلمة المرور: zaher2024</div></div>
        </div></div></div></div>`;
        
        window.attemptLogin = function() {
            let email = document.getElementById('loginEmail').value.trim();
            let pwd = document.getElementById('loginPassword').value.trim();
            let user = USERS_DB.find(u => u.email === email && u.password === pwd);
            if(user) {
                localStorage.setItem('semo_logged_in', 'true');
                localStorage.setItem('semo_user', user.name);
                location.reload();
            } else {
                let errDiv = document.getElementById('errorMessageLogin');
                errDiv.style.display = 'block';
                setTimeout(() => errDiv.style.display = 'none', 2000);
            }
        };
        window.fillCred = function(email, pwd) {
