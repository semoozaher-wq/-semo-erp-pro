<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | النظام المؤسسي المتكامل</title>
    <!-- مكتبة الأيقونات -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- مكتبة الرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- مكتبة التصدير إلى Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #3b82f6; --primary-hover: #2563eb;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --text-muted: #94a3b8;
            --border: #334155; --glass: rgba(30, 41, 59, 0.95);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* تنسيقات عامة */
        .hidden { display: none !important; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        /* صفحة تسجيل الدخول */
        #login-view { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #0f172a, #1e293b); }
        .login-card { background: var(--glass); padding: 40px; border-radius: 20px; width: 400px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo-area { margin-bottom: 30px; color: var(--primary); font-size: 32px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* التخطيط الرئيسي (Layout) */
        #app-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; padding: 20px; }
        .sidebar-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .menu-item { padding: 12px 15px; margin: 5px 0; border-radius: 10px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .menu-item:hover, .menu-item.active { background: var(--primary); color: white; transform: translateX(-5px); }
        .menu-item i { font-size: 20px; }
        
        .main-content { margin-right: 260px; flex: 1; padding: 30px; width: calc(100% - 260px); }
        
        /* الرأس (Header) */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--card); padding: 15px 25px; border-radius: 15px; border: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* البطاقات والإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: var(--primary); }
        .stat-value { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .stat-icon { position: absolute; left: 20px; top: 20px; font-size: 32px; opacity: 0.2; }
        
        /* الجداول */
        .table-container { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; min-width: 800px; }
        .data-table th, .data-table td { padding: 15px; text-align: right; border-bottom: 1px solid var(--border); }
        .data-table th { color: var(--text-muted); font-size: 13px; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }

        /* الرسوم البيانية */
        .chart-container { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); height: 400px; margin-bottom: 30px; }
        
        /* التنبيهات (Toasts) */
        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 1000; }
        .toast { background: var(--card); color: white; padding: 15px 20px; margin-top: 10px; border-radius: 10px; border-right: 4px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; transform: translateX(-100%); animation: slideIn 0.3s forwards; }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        .toast.warning { border-color: var(--warning); }
        @keyframes slideIn { to { transform: translateX(0); } }
        
        /* المودال (Modal) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: all; }
        .modal-content { background: var(--card); width: 500px; padding: 30px; border-radius: 20px; border: 1px solid var(--border); transform: scale(0.9); transition: 0.3s; }
        .modal.active .modal-content { transform: scale(1); }

        /* إخفاء الأرقام (Secure Mode) */
        .blur-text { filter: blur(5px); user-select: none; cursor: help; position: relative; }
        .blur-text:hover { filter: blur(0); }
        .blur-text::after { content: '👁️'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; opacity: 0; }
        .blur-text:hover::after { opacity: 1; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px; }
            .sidebar h2, .menu-item span, .top-bar h1 { display: none; }
            .menu-item { justify-content: center; }
            .main-content { margin-right: 70px; width: calc(100% - 70px); }
        }
    </style>
</head>
<body>

    <!-- حاوية التنبيهات -->
    <div id="toast-container"></div>

    <!-- صفحة تسجيل الدخول -->
    <div id="login-view">
        <div class="login-card">
            <div class="logo-area"><i class="ph ph-cube"></i> SEMO ERP</div>
            <h2 style="margin-bottom: 20px;">تسجيل الدخول</h2>
            <input type="text" id="login-user" placeholder="اسم المستخدم (admin / manager / sales)" style="margin-bottom: 15px;">
            <input type="password" id="login-pass" placeholder="كلمة المرور (1234)" style="margin-bottom: 20px;">
            <button class="btn btn-primary" style="width: 100%;" onclick="handleLogin()">دخول <i class="ph ph-arrow-left"></i></button>
            <p style="margin-top: 15px; color: var(--text-muted); font-size: 13px;">
                جرب: <b>admin</b> (كامل الصلاحيات) أو <b>sales</b> (موظف مبيعات)
            </p>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="app-layout" class="hidden">
        <!-- القائمة الجانبية -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="ph ph-cube" style="font-size: 32px; color: var(--primary);"></i>
                <h3 style="margin: 10px 0 0;">SEMO ERP</h3>
            </div>
            <div class="menu-item active" onclick="navigate('dashboard')"><i class="ph ph-squares-four"></i> <span>الرئيسية</span></div>
            <div class="menu-item" onclick="navigate('sales')"><i class="ph ph-shopping-cart"></i> <span>المبيعات</span></div>
            <div class="menu-item" onclick="navigate('inventory')"><i class="ph ph-package"></i> <span>المخزن</span></div>
            <div class="menu-item" onclick="navigate('users')"><i class="ph ph-users"></i> <span>الموظفين</span></div>
            <div class="menu-item" onclick="navigate('audit')"><i class="ph ph-shield-check"></i> <span>سجل العمليات</span></div>
            <div class="menu-item" onclick="navigate('settings')"><i class="ph ph-gear"></i> <span>الإعدادات</span></div>
            
            <button class="btn btn-danger" style="margin-top: auto; width: 100%;" onclick="handleLogout()"><i class="ph ph-sign-out"></i> <span>خروج</span></button>
        </div>

        <!-- المحتوى -->
        <div class="main-content">
            <!-- الشريط العلوي -->
            <div class="top-bar">
                <div>
                    <h1 id="page-title" style="margin: 0;">لوحة التحكم</h1>
                    <span id="date-display" style="color: var(--text-muted); font-size: 14px;"></span>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <button class="btn btn-outline" onclick="toggleSecureMode()" id="secure-btn" title="إخفاء الأرقام"><i class="ph ph-eye-slash"></i></button>
                    <button class="btn btn-outline" onclick="exportData()" title="تصدير Excel"><i class="ph ph-download-simple"></i></button>
                    <button class="btn btn-outline" onclick="backupData()" title="نسخ احتياطي"><i class="ph ph-hard-drives"></i></button>
                    <button class="btn btn-outline" onclick="restoreData()" title="استعادة"><i class="ph ph-upload-simple"></i></button>
                    <div class="user-info">
                        <div class="avatar" id="user-avatar">A</div>
                        <div>
                            <div id="user-name" style="font-weight: bold;">المدير</div>
                            <div id="user-role" style="font-size: 12px; color: var(--text-muted);">مسؤول النظام</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- صفحة: الرئيسية (Dashboard) -->
            <div id="page-dashboard" class="page-view">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="ph ph-currency-dollar stat-icon"></i>
                        <h3>إجمالي المبيعات</h3>
                        <div class="stat-value blur-text" id="total-sales">0 ج.م</div>
                    </div>
                    <div
