<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP PRO - النظام المحاسبي الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --p: #3b82f6;
            --s: #10b981;
            --d: #ef4444;
            --w: #f59e0b;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f8fafc;
            --b: #334155;
        }
        body {
            background: var(--bg);
            color: var(--t);
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            min-height: 100vh;
        }
        
        /* Login Page */
        .login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }
        .login-card input, .login-card select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
        }
        .login-card button {
            width: 100%;
            padding: 15px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-error {
            color: #f87171;
            margin-top: 15px;
            display: none;
        }
        
        /* App Container */
        .app {
            display: none;
        }
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #1e293b;
            padding: 25px 20px;
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid #334155;
            z-index: 100;
        }
        .sidebar h2 {
            text-align: center;
            color: #3b82f6;
            margin-bottom: 25px;
            font-weight: 800;
        }
        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #0f172a;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .user-info h4 {
            font-size: 14px;
            margin-bottom: 4px;
        }
        .user-info p {
            font-size: 11px;
            color: #94a3b8;
        }
        .menu-group {
            margin-bottom: 20px;
        }
        .menu-title {
            font-size: 11px;
            color: #3b82f6;
            margin-bottom: 10px;
            font-weight: bold;
            padding-right: 10px;
        }
        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            font-size: 14px;
        }
        .menu-item:hover, .menu-item.active {
            background: #3b82f6;
            transform: translateX(-5px);
        }
        
        /* Main Content */
        .main-content {
            margin-right: 280px;
            padding: 30px;
            width: calc(100% - 280px);
        }
        
        /* Top Bar */
        .top-bar {
            background: #1e293b;
            padding: 15px 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #334155;
        }
        .top-bar h2 {
            font-size: 22px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border-right: 4px solid #3b82f6;
            cursor: pointer;
            transition: 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card h3 {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }
        
        /* Cards and Tables */
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        th {
            color: #3b82f6;
            font-weight: 600;
        }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-warning { background: #f59e0b; color: #1e293b; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
        }
        
        /* Badge */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .badge-warning {
            background: rgba(245,158,11,0.2);
            color: #fbbf24;
        }
        .badge-success {
            background: rgba(16,185,129,0.2);
            color: #34d399;
        }
        
        /* Search Input */
        .search-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            border-radius: 10px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 15px 10px;
            }
            .sidebar h2, .menu-item span, .user-info, .menu-title {
                display: none;
            }
            .main-content {
                margin-right: 70px;
                padding: 15px;
                width: calc(100% - 70px);
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media print {
            .sidebar, .btn, .no-print {
                display: none !important;
            }
            .main-content {
                margin: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="login-page">
    <div class="login-card">
        <div style="font-size: 60px;">📊</div>
        <h1 style="color: #3b82f6; margin: 20px 0;">SEMO ERP PRO</h1>
        <select id="currencySelect">
            <option value="EGP">🇪🇬 جنيه مصري (ج.م)</option>
            <option value="LYD">🇱🇾 دينار ليبي (د.ل)</option>
        </select>
        <input type="text" id="loginUser" placeholder="👤 اسم المستخدم">
        <input type="password" id="loginPass" placeholder="🔒 كلمة المرور">
        <button onclick="doLogin()">🚪 دخول</button>
        <div id="loginError" class="login-error"></div>
        <div style="margin-top: 20px; font-size: 12px; opacity: 0.7;">admin / admin123</div>
    </div>
</div>

<!-- App -->
<div id="app" class="app">
    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <h2>SEMO</h2>
            <div class="user-card">
                <div class="user-avatar">👑</div>
                <div class="user-info">
                    <h4 id="userName">مدير النظام</h4>
                    <p id="userRole">مدير عام</p>
                </div>
            </div>
            <div class="menu-group">
                <div class="menu-title">الرئيسية</div>
                <div class="menu-item active" onclick="switchPage('dashboard', this)">🏠 <span>لوحة التحكم</span></div>
            </div>
            <div class="menu-group">
                <div class="menu-title">المخازن</div>
                <div class="menu-item" onclick="switchPage('inventory', this)">📦 <span>المخزون</span></div>
                <div class="menu-item" onclick="switchPage('sales', this)">🛒 <span>المبيعات</span></div>
                <div class="menu-item" onclick="switchPage('purchases', this)">📥 <span>المشتريات</span></div>
            </div>
            <div class="menu-group">
                <div class="menu-title">المالية</div>
                <div class="menu-item" onclick="switchPage('expenses', this)">💸 <span>المصروفات</span></div>
                <div class="menu-item" onclick="switchPage('revenues', this)">💰 <span>الإيرادات</span></div>
                <div class="menu-item" onclick="switchPage('debts', this)">⏳ <span>الديون</span></div>
            </div>
            <div class="menu-group">
                <div class="menu-title">جهات الاتصال</div>
                <div class="menu-item" onclick="switchPage('clients', this)">👥 <span>العملاء</span></div>
                <div class="menu-item" onclick="switchPage('suppliers', this)">🏭 <span>الموردين</span></div>
            </div>
            <div class="menu-group">
                <div class="menu-title">النظام</div>
                <div class="menu-item" onclick="toggleTheme()">🌓 <span>الوضع ليلي/نهاري</span></div>
                <div class="menu-item" onclick="exportData()">💾 <span>نسخة احتياطية</span></div>
                <div class="menu-item" onclick="logout()">🚪 <span>تسجيل خروج</span></div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="top-bar no-print">
                <h2 id="pageTitle">🏠 لوحة التحكم</h2>
                <button class="btn btn-primary" onclick="switchPage('sales')">➕ فاتورة جديدة</button>
            </div>
            <div id="pageContent"></div>
        </div>
    </div>
</div>

<div id="modal" class="modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
// ========== العملة ==========
let currencySymbol = 'ج.م';
let users = [
    { username: "admin", password: "admin123", name: "مدير النظام", role: "مدير عام" }
];

function formatMoney(amount) {
    return (amount || 0).toLocaleString() + ' ' + currencySymbol;
}

function setCurrency() {
    let select = document.getElementById('currencySelect');
    if(select) {
        currencySymbol = select.value === 'EGP' ? 'ج.م' : 'د.ل';
    }
}

// ========== قاعدة البيانات ==========
let db = {
    inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
    sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
    purchases: JSON.parse(localStorage.getItem('semo_purchases')) || [],
    clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
    suppliers: JSON.parse(localStorage.getItem('semo_suppliers')) || [],
    expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
    revenues: JSON.parse(localStorage.getItem('semo_revenues')) || []
};

function saveAll() {
    localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
    localStorage.setItem('semo_sales', JSON.stringify(db.sales));
    localStorage.setItem('semo_purchases', JSON.stringify(db.purchases));
    localStorage.setItem('semo_clients', JSON.stringify(db.clients));
    localStorage.setItem('semo_suppliers', JSON.stringify(db.suppliers));
    localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
    localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
}

function today() {
    return new Date().toLocaleDateString('ar-EG');
}

// ========== بيانات تجريبية ==========
function initDemoData() {
    if(db.inventory.length === 0) {
        db.inventory = [
            {id:1, name:'مكتب خشبي', cost:500, price:800, qty:15},
            {id:2, name:'كرسي دوار', cost:300, price:550, qty:25},
            {id:3, name:'طابعة HP', cost:1200, price:1800, qty:5},
            {id:4, name:'شاشة 24 بوصة', cost:2000, price:3200, qty:8},
            {id:5, name:'ماوس لاسلكي', cost:50, price:120, qty:40},
            {id:6, name:'لوحة مفاتيح', cost:80, price:200, qty:35}
        ];
        db.clients = [
            {id:101, name:'شركة الأهرام', phone:'01001112223'},
            {id:102, name:'مؤسسة النور', phone:'01002223334'},
            {id:103, name:'شركة الاتحاد', phone:'01003334445'},
            {id:104, name:'محل الرحاب', phone:'01004445556'}
        ];
        db.suppliers = [
            {id:201, name:'معرض القاهرة للأثاث', phone:'01555556667'},
            {id:202, name:'شركة التقنية الحديثة', phone:'01556667778'}
        ];
        db.expenses = [
            {id:301, date:today(), name:'إيجار المحل', amount:5000},
            {id:302, date:today(), name:'فواتير كهرباء', amount:800},
            {id:303, date:today(), name:'رواتب موظفين', amount:7500}
        ];
        db.revenues = [
            {id:401, date:today(), name:'إيرادات خدمات', amount:2500}
        ];
        let d = today();
        db.sales = [
            {id:501, date:d, product:'مكتب خشبي', client:'شركة الأهرام', qty:2, total:1600, profit:600, status:'مدفوع', paid:1600},
            {id:502, date:d, product:'طابعة HP', client:'مؤسسة النور', qty:1, total:1800, profit:600, status:'آجل', paid:0},
            {id:503, date:d, product:'شاشة 24 بوصة', client:'شركة الأهرام', qty:1, total:3200, profit:1200, status:'مدفوع', paid:3200},
            {id:504, date:d, product:'كرسي دوار', client:'محل الرحاب', qty:4, total:2200, profit:1000, status:'آجل', paid:0}
        ];
        db.purchases = [
            {id:601, date:today(), supplier:'معرض القاهرة للأثاث', product:'مكتب خشبي', qty:10, price:1800, total:18000}
        ];
        saveAll();
    }
}

// ========== تسجيل الدخول ==========
function doLogin() {
    let username = document.getElementById('loginUser').value;
    let password = document.getElementById('loginPass').value;
    let errorDiv = document.getElementById('loginError');
    
    let user = users.find(u => u.username === username && u.password === password);
    
    if(user) {
        setCurrency();
        localStorage.setItem('semo_logged', 'true');
        localStorage.setItem('semo_user', JSON.stringify(user));
        localStorage.setItem('semo_currency', currencySymbol);
        
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('userName').innerHTML = user.name;
        document.getElementById('userRole').innerHTML = user.role;
        
        initDemoData();
        renderDashboard();
    } else {
        errorDiv.style.display = 'block';
        errorDiv.innerHTML = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
    }
}

function logout() {
    localStorage.removeItem('semo_logged');
    localStorage.removeItem('semo_user');
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
}

let savedCurrency = localStorage.getItem('semo_currency');
if(savedCurrency === 'ج.م') currencySymbol = 'ج.م';
else if(savedCurrency === 'د.ل') currencySymbol = 'د.ل';

if(localStorage.getItem('semo_logged') === 'true') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    let user = JSON.parse(localStorage.getItem('semo_user'));
    if(user) {
        document.getElementById('userName').innerHTML = user.name;
        document.getElementById('userRole').innerHTML = user.role;
    }
    initDemoData();
    renderDashboard();
}

function toggleTheme() {
    document.body.classList.toggle('light-mode');
}

// ========== التنقل ==========
function switchPage(page, el) {
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
    if(el) el.classList.add('active');
    
    const titles = {
        dashboard: '🏠 لوحة التحكم',
        inventory: '📦 إدارة المخزون',
        sales: '🛒 المبيعات والفواتير',
        purchases: '📥 المشتريات',
        clients: '👥 العملاء',
        suppliers: '🏭 الموردين',
        expenses: '💸 المصروفات',
        revenues: '💰 الإيرادات',
        debts: '⏳ الديون المستحقة'
    };
    document.getElementById('pageTitle').innerHTML = titles[page] || 'لوحة التحكم';
    
    if(page === 'dashboard') renderDashboard();
    else if(page === 'inventory') renderInventory();
    else if(page === 'sales') renderSales();
    else if(page === 'purchases') renderPurchases();
    else if(page === 'clients') renderClients();
    else if(page === 'suppliers') renderSuppliers();
    else if(page === 'expenses') renderExpenses();
    else if(page === 'revenues') renderRevenues();
    else if(page === 'debts') renderDebts();
}

// ========== 1. Dashboard ==========
function renderDashboard() {
    let totalSales = db.sales.reduce((a,b)=>a+(b.total||0), 0);
    let totalExpenses = db.expenses.reduce((a,b)=>a+(b.amount||0), 0);
    let totalRevenues = db.revenues.reduce((a,b)=>a+(b.amount||0), 0);
    let profit = totalSales - totalExpenses + totalRevenues;
    let lowStock = db.inventory.filter(i=>i.qty <= 5).length;
    
    document.getElementById('pageContent').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card" onclick="switchPage('sales')"><h3>💰 إجمالي المبيعات</h3><div class="stat-value">${formatMoney(totalSales)}</div></div>
            <div class="stat-card" onclick="switchPage('expenses')" style="border-color:#ef4444"><h3>💸 المصروفات</h3><div class="stat-value">${formatMoney(totalExpenses)}</div></div>
            <div class="stat-card" onclick="switchPage('revenues')" style="border-color:#10b981"><h3>💰 الإيرادات</h3><div class="stat-value">${formatMoney(totalRevenues)}</div></div>
            <div class="stat-card" onclick="switchPage('sales')" style="border-color:#10b981"><h3>📈 صافي الربح</h3><div class="stat-value" style="color:${profit>=0?'#10b981':'#ef4444'}">${formatMoney(profit)}</div></div>
            <div class="stat-card" onclick="switchPage('inventory')"><h3>📦 عدد المنتجات</h3><div class="stat-value">${db.inventory.length}</div></div>
            <div class="stat-card" onclick="switchPage('inventory')" style="border-color:#f59e0b"><h3>⚠️ منتجات منخفضة</h3><div class="stat-value">${lowStock}</div></div>
            <div class="stat-card" onclick="switchPage('clients')"><h3>👥 العملاء</h3><div class="stat-value">${db.clients.length}</div></div>
        </div>
        <div class="card"><h3>📊 حركة المبيعات</h3><canvas id="mainChart" height="100"></canvas></div>
        <div class="card"><h3>📋 آخر المبيعات</h3><div class="table-wrapper"><table class="data-table"><thead><tr><th>التاريخ</th><th>المنتج</th><th>العميل</th><th>الكمية</th><th>المبلغ</th><th>الحالة</th></tr></thead>
        <tbody>${db.sales.slice().reverse().slice(0,5).map(s=>`<tr><td style="text-align:center">${s.date}</td><td style="text-align:center">${s.product}</td><td style="text-align:center">${s.client}</td><td style="text-align:center">${s.qty}</td><td style="text-align:center">${formatMoney(s.total)}</td><td style="text-align:center"><span class="badge ${s.status==='مدفوع'?'badge-success':'badge-warning'}">${s.status}</span></td></tr>`).join('')}</tbody></table></div></div>
    `;
    
    new Chart(document.getElementById('mainChart'), {
        type: 'line',
        data: {
            labels: db.sales.map(s=>s.date).slice(-7),
            datasets: [{label:'المبيعات', data:db.sales.map(s=>s.total).slice(-7), borderColor:'#3b82f6', tension:0.3}]
        }
    });
}

// ========== 2. Inventory ==========
function renderInventory() {
    document.getElementById('pageContent').innerHTML = `
        <div class="card">
            <div class="card-header">
                <h2>📦 إدارة المخزون</h2>
                <button class="btn btn-primary" onclick="openProductModal()">+ منتج جديد</button>
            </div>
            <input type="text" id="searchInventory" class="search-input" placeholder="🔍 بحث في المنتجات..." onkeyup="filterInventory()">
            <div class="table-wrapper">
                <table id="inventoryTable">
                    <thead><tr><th>#</th><th>المنتج</th><th>سعر الشراء</th><th>سعر البيع</th><th>الكمية</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                    <tbody id="inventoryList"></tbody>
                </table>
            </div>
        </div>
    `;
    refreshInventory();
}

function refreshInventory() {
    let search = document.getElementById('searchInventory')?.value.toLowerCase() || '';
    let filtered = db.inventory.filter(i => i.name.toLowerCase().includes(search));
    document.getElementById('inventoryList').innerHTML = filtered.map((i, idx) => `
        <tr>
            <td style="text-align:center">${idx+1}</td>
            <td style="text-align:center"><strong>${i.name}</strong></td>
            <td style="text-align:center">${formatMoney(i.cost)}</td>
            <td style="text-align:center">${formatMoney(i.price)}</td>
            <td style="text-align:center" class="${i.qty<=5?'badge-warning':''}">${i.qty}</td>
            <td style="text-align:center">${i.qty<=5?'⚠️ منخفض':'متوفر'}</td>
            <td style="text-align:center">
                <button class="btn btn-primary" style="padding:5px 10px" onclick="editProduct(${i.id})">✏️</button>
                <button class="btn btn-danger" style="padding:5px 10px" onclick="deleteProduct(${i.id})">🗑️</button>
            </td>
        </tr>
    `).join('');
}

function filterInventory() { refreshInventory(); }

function openProductModal(id=null) {
    let p = id ? db.inventory.find(x=>x.id==id) : {name:'', cost:0, price:0, qty:0};
    document.getElementById('modalBody').innerHTML = `
        <h3>${id?'✏️ تعديل منتج':'➕ إضافة منتج'}</h3>
        <input type="text" id="prodName" value="${p.name}" placeholder="اسم المنتج">
        <input type="number" id="prodCost" value="${p.cost}" placeholder="سعر الشراء (${currencySymbol})">
        <input type="number" id="prodPrice" value="${p.price}" placeholder="سعر البيع (${currencySymbol})">
        <input type="number" id="prodQty" value="${p.qty}" placeholder="الكمية">
        <button class="btn btn-success" style="width:100%; margin-top:10px" onclick="saveProduct(${id})">💾 حفظ</button>
    `;
    document.getElementById('modal').classList.add('show');
}

function saveProduct(id) {
    let name = document.getElementById('prodName').value;
    if(!name) { alert('❌ يرجى كتابة اسم المنتج'); return; }
    
    let newProduct = {
        id: id || Date.now(),
        name: name,
        cost: parseFloat(document.getElementById('prodCost').value) || 0,
        price: parseFloat(document.getElementById('prodPrice').value) || 0,
        qty: parseInt(document.getElementById('prodQty').value) || 0
    };
    
    if(id) {
        let idx = db.inventory.findIndex(x=>x.id==id);
        db.inventory[idx] = newProduct;
    } else {
        db.inventory.push(newProduct);
    }
    saveAll();
    closeModal();
    renderInventory();
    alert(`✅ ${id?'تم التعديل':'تمت الإضافة'} بنجاح`);
}

function editProduct(id) { openProductModal(id); }
function deleteProduct(id) {
    if(confirm('⚠️ هل أنت متأكد من حذف هذا المنتج؟')) {
        db.inventory = db.inventory.filter(p=>p.id!==id);
        saveAll();
        renderInventory();
        alert('🗑️ تم الحذف');
    }
}

                </table>
            </div>
        </div>
    `;
}

function doSale() {
    let productId = parseInt(document.getElementById('saleProduct').value);
    let product = db.inventory.find(p=>p.id===productId);
    let qty = parseInt(document.getElementById('saleQty').value);
    
    if(product && product.qty >= qty) {
        product.qty -= qty;
        let sale = {
            id: Date.now(),
            date: today(),
            product: product.name,
            client: document.getElementById('saleClient').value,
            qty: qty,
            total: qty * product.price,
            profit: qty * (product.price - product.cost),
            status: document.getElementById('saleStatus').value,
            paid: document.getElementById('saleStatus').value === 'مدفوع' ? qty * product.price : 0
        };
        db.sales.push(sale);
        saveAll();
        renderSales();
        alert(`✅ تم البيع بنجاح\nالمنتج: ${product.name}\nالكمية: ${qty}\nالإجمالي: ${formatMoney(qty * product.price)}`);
        printSaleInvoice(sale.id);
    } else {
        alert(`❌ الكمية غير كافية\nالمتوفر: ${product?.qty || 0}`);
    }
}

}

function doPurchase() {
    let productId = parseInt(document.getElementById('purchaseProduct').value);
    let product = db.inventory.find(p=>p.id===productId);
    let qty = parseInt(document.getElementById('purchaseQty').value);
    let price = parseFloat(document.getElementById('purchasePrice').value);
    
    if(product && qty > 0) {
        product.qty += qty;
        if(price > 0) product.cost = price;
        
        db.purchases.push({
            id: Date.now(),
            date: today(),
            product: product.name,
            qty: qty,
            supplier: document.getElementById('purchaseSupplier').value,
            price: price || product.cost,
            total: qty * (price || product.cost)
        });
        saveAll();
        renderPurchases();
        alert(`✅ تم توريد ${qty} من ${product.name} بنجاح`);
    } else {
        alert('❌ يرجى إدخال كمية صحيحة');
    }
}

function renderDebts() {
    let debts = db.sales.filter(s=>s.status === 'آجل');
    let totalDebts = debts.reduce((a,b)=>a+(b.total - (b.paid||0)), 0);
    document.getElementById('pageContent').innerHTML = `
        <div class="card">
            <h2>⏳ الديون المستحقة <span style="color:#ef4444; font-size:16px;">(الإجمالي: ${formatMoney(totalDebts)})</span></h2>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead><tr><th>#</th><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>المبلغ</th><th>المدفوع</th><th>المتبقي</th><th>تحصيل</th></tr></thead>
                    <tbody>${debts.map((s,idx)=>`</td><td style="text-align:center">${idx+1}</td><td style="text-align:center">${s.date}</td><td style="text-align:center">${s.client}</td><td style="text-align:center">${s.product}</td><td style="text-align:center">${formatMoney(s.total)}</td><td style="text-align:center">${formatMoney(s.paid||0)}</td><td style="text-align:center" style="color:#ef4444">${formatMoney(s.total - (s.paid||0))}</td><td style="text-align:center"><button class="btn btn-success" style="padding:5px 10px" onclick="collectDebt(${s.id})">💰 تحصيل</button></td></tr>`).join('')}</tbody>
                </table>
            </div>
        </div>
    `;
}

function collectDebt(id) {
    let sale = db.sales.find(s=>s.id===id);
    if(sale) {
        let remaining = sale.total - (sale.paid || 0);
        let amount = parseFloat(prompt(`المبلغ المراد تحصيله من ${sale.client}\nالمتبقي: ${formatMoney(remaining)}`, remaining));
        if(!isNaN(amount) && amount > 0) {
            sale.paid = (sale.paid || 0) + amount;
            if(sale.paid >= sale.total) sale.status = 'مدفوع';
            saveAll();
            renderDebts();
            renderDashboard();
            alert(`✅ تم تحصيل ${formatMoney(amount)} من ${sale.client}`);
        }
    }
}

function exportData() {
    let exportData = {
        inventory: db.inventory,
        sales: db.sales,
        purchases: db.purchases,
        clients: db.clients,
        suppliers: db.suppliers,
        expenses: db.expenses,
        revenues: db.revenues,
        exportedAt: new Date().toLocaleString('ar-EG')
    };
    let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
    let a = document.createElement('a');
    a.href = dataStr;
    a.download = `SEMO_ERP_Backup_${new Date().toLocaleDateString('ar-EG').replace(/\//g, '-')}.json`;
    a.click();
    alert('✅ تم تصدير النسخة الاحتياطية بنجاح');
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

// ========== تشغيل التطبيق ==========
if(localStorage.getItem('semo_logged') === 'true') {
    renderDashboard();
}
</script>
