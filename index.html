<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | الدخول الذكي</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --main: #3b82f6; --bg: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .card { background: rgba(255,255,255,0.05); padding: 35px; border-radius: 25px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--main); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { color: var(--main); font-size: 0.85rem; cursor: pointer; margin-top: 15px; display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color:var(--main); margin-bottom: 20px;">SEMO ERP</h1>
        
        <div id="login-view">
            <input type="text" id="log-id" placeholder="الإيميل أو رقم الهاتف">
            <input type="password" id="log-pass" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول النظام</button>
            <span class="link" onclick="toggle()">تأسيس حساب جديد</span>
        </div>

        <div id="signup-view" class="hidden">
            <input type="email" id="sign-email" placeholder="البريد الإلكتروني">
            <input type="text" id="sign-phone" placeholder="رقم الهاتف (بدون +)">
            <input type="password" id="sign-pass" placeholder="كلمة المرور">
            <button class="btn" style="background:#10b981" onclick="signup()">إنشاء الحساب والربط ✅</button>
            <span class="link" onclick="toggle()">العودة للدخول</span>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyC2EVpNEG9XjcPEelUA8lkIUcUceN6Oh0k",
            authDomain: "://firebaseapp.com",
            projectId: "my-pos-system-33831",
            databaseURL: "https://firebaseio.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(config);

        const db = firebase.database();
        const auth = firebase.auth();

        function toggle() {
            document.getElementById('login-view').classList.toggle('hidden');
            document.getElementById('signup-view').classList.toggle('hidden');
        }

        // دالة التسجيل التي تربط الهاتف بالإيميل
        function signup() {
            const e = document.getElementById('sign-email').value, 
                  p = document.getElementById('sign-pass').value,
                  ph = document.getElementById('sign-phone').value.replace('+', '').trim();
            
            if(!e || !p || !ph) return alert("أكمل البيانات");

            auth.createUserWithEmailAndPassword(e, p).then((user) => {
                // أهم خطوة: حفظ الرقم في قاعدة البيانات وربطه بالإيميل
                db.ref('users_map/' + ph).set({ email: e }).then(() => {
                    alert("تم التسجيل وربط الهاتف بنجاح!");
                    window.location.href = "dashboard.html";
                });
            }).catch(err => alert("خطأ في التسجيل: " + err.message));
        }

        function login() {
            let id = document.getElementById('log-id').value.replace('+', '').trim();
            const p = document.getElementById('log-pass').value;

            if(id.includes('@')) {
                performAuth(id, p);
            } else {
                // البحث عن الإيميل المرتبط برقم الهاتف في قاعدة البيانات
                db.ref('users_map/' + id).once('value', s => {
                    if(s.exists()) {
                        performAuth(s.val().email, p);
                    } else {
                        alert("رقم الهاتف هذا غير مسجل أو لم يتم ربطه عند التسجيل");
                    }
                });
            }
        }

        function performAuth(email, pass) {
            auth.signInWithEmailAndPassword(email, pass)
            .then(() => window.location.href = "dashboard.html")
            .catch(() => alert("كلمة المرور أو الحساب غير صحيح"));
        }
    </script>
</body>
</html>
