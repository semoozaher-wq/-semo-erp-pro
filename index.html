<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO AI ERP - النظام المحاسبي الذكي المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --info: #8b5cf6; --bg: #0f172a; --bg-light: #1e293b;
            --card: #1e293b; --card-light: #334155; --text: #f1f5f9; --text-muted: #94a3b8;
            --border: #334155; --sidebar-width: 280px; --header-height: 60px;
        }
        body { background: var(--bg); color: var(--text); direction: rtl; font-size: 14px; overflow-x: hidden; }
        .top-header { position: fixed; top: 0; right: 0; left: 0; height: var(--header-height); background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 99; }
        .header-logo { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
        .header-controls { display: flex; gap: 15px; align-items: center; }
        .view-toggle { display: flex; background: var(--bg-light); border-radius: 40px; overflow: hidden; border: 1px solid var(--border); }
        .view-toggle-btn { padding: 8px 16px; cursor: pointer; background: transparent; border: none; color: var(--text-muted); font-size: 0.85rem; }
        .view-toggle-btn.active { background: var(--primary); color: white; }
        .notification-bell { position: relative; cursor: pointer; background: var(--bg-light); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .notification-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; font-size: 10px; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
        .sidebar { width: var(--sidebar-width); background: var(--card); position: fixed; right: 0; top: var(--header-height); height: calc(100vh - var(--header-height)); padding: 1.5rem 1rem; overflow-y: auto; z-index: 100; transition: transform 0.3s ease; box-shadow: -4px 0 20px rgba(0,0,0,0.3); border-left: 1px solid var(--border); }
        .menu-item { padding: 12px 16px; margin: 6px 0; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 500; transition: all 0.2s; color: var(--text-muted); }
        .menu-item:hover, .menu-item.active { background: var(--primary); color: white; transform: translateX(-4px); }
        .menu-item i { width: 24px; }
        .main-content { margin-right: var(--sidebar-width); margin-top: var(--header-height); padding: 20px; min-height: calc(100vh - var(--header-height)); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.25rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card); border-radius: 1rem; padding: 1.2rem; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); border-right: 4px solid var(--primary); }
        .stat-card:hover { transform: translateY(-3px); background: var(--card-light); }
        .stat-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.8rem; font-weight: 800; }
        .card-box { background: var(--card); border-radius: 1rem; padding: 1.2rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px; }
        .btn { padding: 8px 18px; border: none; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: var(--info); color: white; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border); }
        .data-table th { color: var(--text-muted); font-weight: 600; font-size: 0.75rem; }
        .data-table tr { cursor: pointer; transition: background 0.1s; }
        .data-table tr:hover { background: rgba(59,130,246,0.1); }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: rgba(16,185,129,0.2); color: #34d399; }
        .badge-warning { background: rgba(245,158,11,0.2); color: #fbbf24; }
        .badge-info { background: rgba(139,92,246,0.2); color: #a78bfa; }
        .badge-danger { background: rgba(239,68,68,0.2); color: #f87171; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); border-radius: 1rem; max-width: 550px; width: 90%; padding: 1.5rem; border: 1px solid var(--border); max-height: 80vh; overflow-y: auto; }
        body.mobile-view .sidebar { transform: translateX(100%); }
        body.mobile-view .main-content { margin-right: 0; }
        body.mobile-view .sidebar.open { transform: translateX(0); }
        .menu-mobile-btn { display: none; position: fixed; bottom: 20px; left: 20px; background: var(--primary); padding: 12px; border-radius: 40px; z-index: 200; cursor: pointer; }
        body.mobile-view .menu-mobile-btn { display: flex; align-items: center; justify-content: center; }
        @media (max-width: 768px) { body:not(.mobile-view) .sidebar { width: 80px; } body:not(.mobile-view) .sidebar .menu-item span:not(i) { display: none; } body:not(.mobile-view) .main-content { margin-right: 80px; } }
        .profit-positive { color: #34d399; }
        .profit-negative { color: #f87171; }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
        .ai-insight { background: linear-gradient(135deg, var(--info), var(--primary)); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="header-logo"><i class="fas fa-microchip"></i> SEMO AI ERP</div>
        <div class="header-controls">
            <div class="date-display" id="currentDate"></div>
            <div class="view-toggle" id="viewToggle">
                <button class="view-toggle-btn" data-view="desktop"><i class="fas fa-desktop"></i> كمبيوتر</button>
                <button class="view-toggle-btn" data-view="mobile"><i class="fas fa-mobile-alt"></i> جوال</button>
            </div>
            <div class="notification-bell" id="notificationBell"><i class="fas fa-bell"></i><span class="notification-badge" id="notificationCount">0</span></div>
        </div>
    </div>
    <div class="sidebar" id="sidebar">
        <div class="menu-item active" data-page="dashboard"><i class="fas fa-chart-line"></i> <span>الرئيسية</span></div>
        <div class="menu-item" data-page="inventory"><i class="fas fa-boxes"></i> <span>المخزون</span></div>
        <div class="menu-item" data-page="suppliers"><i class="fas fa-truck"></i> <span>الموردين</span></div>
        <div class="menu-item" data-page="purchases"><i class="fas fa-shopping-cart"></i> <span>المشتريات</span></div>
        <div class="menu-item" data-page="sales"><i class="fas fa-tag"></i> <span>المبيعات</span></div>
        <div class="menu-item" data-page="accounting"><i class="fas fa-book"></i> <span>دفتر الأستاذ</span></div>
        <div class="menu-item" data-page="trial_balance"><i class="fas fa-scale-balanced"></i> <span>ميزان المراجعة</span></div>
        <div class="menu-item" data-page="clients"><i class="fas fa-users"></i> <span>العملاء</span></div>
        <div class="menu-item" data-page="expenses_rev"><i class="fas fa-coins"></i> <span>المصروفات والإيرادات</span></div>
        <div class="menu-item" data-page="reports"><i class="fas fa-chart-pie"></i> <span>التقارير</span></div>
        <div class="menu-item" data-page="ai_analytics"><i class="fas fa-robot"></i> <span>التحليلات الذكية</span></div>
        <div class="menu-item" data-page="logout"><i class="fas fa-sign-out-alt"></i> <span>خروج</span></div>
    </div>
    <div class="menu-mobile-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
    <div class="main-content" id="mainContent"><div id="pageContent"></div></div>
    <div id="detailsModal" class="modal" onclick="if(event.target===this) closeModal()"><div class="modal-content" id="modalContentInner"></div></div>

<script>
    // ========== قاعدة البيانات المتكاملة ==========
    let db = {
        inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
        sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
        clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
        suppliers: JSON.parse(localStorage.getItem('semo_suppliers')) || [],
        purchases: JSON.parse(localStorage.getItem('semo_purchases')) || [],
        expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
        revenues: JSON.parse(localStorage.getItem('semo_revenues')) || [],
        journalEntries: JSON.parse(localStorage.getItem('semo_journal')) || [],
        settings: JSON.parse(localStorage.getItem('semo_settings')) || { currencySymbol: 'ريال', nextInvoiceId: 1000, nextPurchaseId: 2000 }
    };
    let charts = [], currentPage = 'dashboard', notifications = [];

    function saveAll() {
        localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
        localStorage.setItem('semo_sales', JSON.stringify(db.sales));
        localStorage.setItem('semo_clients', JSON.stringify(db.clients));
        localStorage.setItem('semo_suppliers', JSON.stringify(db.suppliers));
        localStorage.setItem('semo_purchases', JSON.stringify(db.purchases));
        localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
        localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
        localStorage.setItem('semo_journal', JSON.stringify(db.journalEntries));
        localStorage.setItem('semo_settings', JSON.stringify(db.settings));
    }
    function todayISO() { let d = new Date(); return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`; }
    function formatCurrency(v) { return (v||0).toLocaleString() + ' ' + db.settings.currencySymbol; }
    function showNotification(msg, type='success') {
        let d=document.createElement('div'); d.style.cssText=`position:fixed; bottom:25px; left:25px; background:${type==='success'?'#10b981':type==='error'?'#ef4444':'#f59e0b'}; color:white; padding:12px 24px; border-radius:40px; z-index:1200; font-weight:600;`;
        d.innerHTML=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),2800);
        notifications.unshift({msg,type,date:new Date().toLocaleString()}); if(notifications.length>10) notifications.pop(); updateNotificationBadge();
    }
    function updateNotificationBadge() { document.getElementById('notificationCount').innerText = notifications.length; }
    function showNotifications() { if(notifications.length===0){ showNotification('لا توجد إشعارات','info'); return; } let html='<h3>📢 الإشعارات</h3><hr>'; notifications.forEach(n=>{ html+=`<div style="padding:8px 0; border-bottom:1px solid #334155;"><div>${n.msg}</div><small>${n.date}</small></div>`; }); openModal(html); }
    function addJournalEntry(desc, debit, credit, amt, ref=null) { let e={id:Date.now(), date:todayISO(), description:desc, debitAccount:debit, creditAccount:credit, amount:amt, referenceId:ref}; db.journalEntries.push(e); saveAll(); return e; }
    function totalSales() { return db.sales.reduce((s,i)=>s+(i.total||0),0); }
    function totalPurchases() { return db.purchases.reduce((s,i)=>s+(i.total||0),0); }
    function totalExpenses() { return db.expenses.reduce((s,i)=>s+(i.amount||0),0); }
    function totalRevenues() { return db.revenues.reduce((s,i)=>s+(i.amount||0),0); }
    function netProfit() { return totalSales() - totalPurchases() - totalExpenses() + totalRevenues(); }
    function inventoryValue() { return db.inventory.reduce((s,i)=>s+((i.qty||0)*(i.costPrice||0)),0); }
    function getLowStockCount() { return db.inventory.filter(i=>(i.qty||0)<=5).length; }
    function destroyCharts() { charts.forEach(c=>{ if(c&&c.destroy) c.destroy(); }); charts=[]; }
    function updateDate() { document.getElementById('currentDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${new Date().toLocaleDateString('ar-EG')}`; }
    setInterval(updateDate,1000); updateDate();

    // ========== تحليلات ذكاء اصطناعي ==========
    function getAIAnalytics() {
        let insights = [];
        let salesTotal = totalSales(), profit = netProfit(), invVal = inventoryValue();
        if(profit < 0) insights.push({type:'danger', icon:'⚠️', text:`خسارة حالية: ${formatCurrency(Math.abs(profit))}. راجع أسعار البيع أو قلل المشتريات والمصروفات.`});
        else if(profit < 5000) insights.push({type:'warning', icon:'📉', text:`الربح منخفض (${formatCurrency(profit)}). زود هامش الربح أو قلل التكاليف.`});
        else insights.push({type:'success', icon:'🎉', text:`أداء ممتاز! الربح الحالي ${formatCurrency(profit)}. استمر بهذا المستوى.`});
        if(getLowStockCount() > 0) insights.push({type:'warning', icon:'📦', text:`${getLowStockCount()} منتج (منتجات) منخفض المخزون. أعد الطلب قريباً.`});
        if(db.sales.length === 0) insights.push({type:'info', icon:'💡', text:`لا توجد مبيعات بعد. أضف أول فاتورة مبيعات للبدء.`});
        let bestProduct = db.sales.reduce((best, s)=>{ let q = s.qty||0; if(q > (best.qty||0)) return {name:s.productName,qty:q}; return best; }, {name:'لا يوجد',qty:0});
        if(bestProduct.name !== 'لا يوجد') insights.push({type:'info', icon:'🏆', text:`المنتج الأكثر مبيعاً: ${bestProduct.name} (${bestProduct.qty} قطعة)`});
        let avgSale = salesTotal / (db.sales.length||1);
        insights.push({type:'info', icon:'📊', text:`متوسط قيمة الفاتورة: ${formatCurrency(avgSale)}`});
        let totalDebt = db.sales.filter(s=>s.status!=='مدفوع').reduce((sum,s)=>sum+((s.total||0)-(s.paid||0)),0);
        if(totalDebt > 0) insights.push({type:'warning', icon:'💰', text:`مستحقات العملاء: ${formatCurrency(totalDebt)}. يوصى بمتابعة التحصيل.`});
        let totalSupplierDebt = db.purchases.filter(p=>p.status!=='مدفوع').reduce((sum,p)=>sum+((p.total||0)-(p.paid||0)),0);
        if(totalSupplierDebt > 0) insights.push({type:'warning', icon:'🏭', text:`مستحقات للموردين: ${formatCurrency(totalSupplierDebt)}. يوصى بتسوية المستحقات.`});
        return insights;
    }

    // ========== عرض اللوحة الرئيسية ==========
    function renderDashboard() {
        let monthlyData=Array(12).fill(0);
        db.sales.forEach(s=>{ if(s.dateISO){ let m=parseInt(s.dateISO.split('-')[1])-1; if(m>=0&&m<12) monthlyData[m]+=s.total||0; } });
        let insights = getAIAnalytics();
        let html = `<div class="stats-grid">
            <div class="stat-card" onclick="switchPage('sales')"><div class="stat-title"><i class="fas fa-chart-line"></i> إجمالي المبيعات</div><div class="stat-value">${formatCurrency(totalSales())}</div></div>
            <div class="stat-card" onclick="switchPage('purchases')"><div class="stat-title"><i class="fas fa-truck"></i> إجمالي المشتريات</div><div class="stat-value">${formatCurrency(totalPurchases())}</div></div>
            <div class="stat-card" onclick="switchPage('expenses_rev')"><div class="stat-title"><i class="fas fa-money-bill-wave"></i> المصروفات</div><div class="stat-value">${formatCurrency(totalExpenses())}</div></div>
            <div class="stat-card" onclick="switchPage('expenses_rev')"><div class="stat-title"><i class="fas fa-hand-holding-usd"></i> الإيرادات</div><div class="stat-value">${formatCurrency(totalRevenues())}</div></div>
            <div class="stat-card" onclick="switchPage('accounting')"><div class="stat-title"><i class="fas fa-chart-simple"></i> صافي الربح</div><div class="stat-value ${netProfit()>=0?'profit-positive':'profit-negative'}">${formatCurrency(netProfit())}</div></div>
            <div class="stat-card" onclick="switchPage('inventory')"><div class="stat-title"><i class="fas fa-boxes"></i> قيمة المخزون</div><div class="stat-value">${formatCurrency(inventoryValue())}</div></div>
            <div class="stat-card" onclick="switchPage('suppliers')"><div class="stat-title"><i class="fas fa-truck"></i> الموردين</div><div class="stat-value">${db.suppliers.length}</div></div>
            <div class="stat-card" onclick="switchPage('clients')"><div class="stat-title"><i class="fas fa-user-friends"></i> العملاء</div><div class="stat-value">${db.clients.length}</div></div>
        </div>
        <div class="card-box"><div class="card-header"><h3><i class="fas fa-microchip"></i> 🤖 تحليلات الذكاء الاصطناعي</h3></div>
        <div id="aiInsightsContainer">${insights.map(i=>`<div class="ai-insight"><i class="fas ${i.icon==='⚠️'?'fa-exclamation-triangle':i.icon==='📉'?'fa-chart-line':'fa-info-circle'}"></i> ${i.text}</div>`).join('')}</div></div>
        <div class="card-box"><div class="card-header"><h3><i class="fas fa-chart-bar"></i> المبيعات الشهرية</h3></div><canvas id="monthlyChart" height="160"></canvas></div>
        <div class="card-box"><div class="card-header"><h3><i class="fas fa-receipt"></i> آخر المبيعات</h3><button class="btn btn-primary" onclick="switchPage('sales')">عرض الكل</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>المبلغ</th><th>الحالة</th></thead><tbody id="recentSales"></tbody>茶</div></div>`;
        document.getElementById('pageContent').innerHTML = html;
        let ctx = document.getElementById('monthlyChart').getContext('2d');
        let chart = new Chart(ctx, { type:'line', data:{ labels:['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'], datasets:[{ label:'المبيعات', data:monthlyData, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.1)', fill:true, tension:0.4 }] }, options:{ responsive:true } });
        charts.push(chart);
        let recent = [...db.sales].sort((a,b)=>b.dateISO.localeCompare(a.dateISO)).slice(0,5);
        document.getElementById('recentSales').innerHTML = recent.map(s=>`<tr onclick="showSaleDetails(${s.id})"><td>${s.dateISO}</td><td>${s.clientName}</td><td>${s.productName||'—'}</td><td>${formatCurrency(s.total)}</td><td><span class="badge ${s.status==='مدفوع'?'badge-success':'badge-warning'}">${s.status}</span></td></tr>`).join('');
    }

    function renderSuppliers() {
        let html = `<div class="card-box"><div class="card-header"><h3><i class="fas fa-truck"></i> الموردين</h3><button class="btn btn-success" onclick="addSupplier()"><i class="fas fa-plus"></i> مورد جديد</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><th>ID</th><th>الاسم</th><th>الهاتف</th><th>العنوان</th><th>إجمالي المشتريات</th><th>المدفوع</th><th>المتبقي</th><th></th></thead><tbody>`;
        db.suppliers.forEach(sup=>{ let purchases=db.purchases.filter(p=>p.supplierId===sup.id); let totalPurch=purchases.reduce((s,p)=>s+(p.total||0),0); let paid=purchases.reduce((s,p)=>s+(p.paid||0),0); let rem=totalPurch-paid; html+=`<tr><td>${sup.id}</td><td><strong>${sup.name}</strong></td><td>${sup.phone||'—'}</td><td>${sup.address||'—'}</td><td>${formatCurrency(totalPurch)}</td><td>${formatCurrency(paid)}</td><td class="${rem>0?'profit-negative':'profit-positive'}">${formatCurrency(rem)}</td><td><button class="btn btn-primary" onclick="recordPaymentToSupplier(${sup.id})">تسديد</button></td></tr>`; });
        html+=`</tbody></table></div></div>`; document.getElementById('pageContent').innerHTML=html;
    }
    function renderPurchases() {
        let html = `<div class="card-box"><div class="card-header"><h3><i class="fas fa-shopping-cart"></i> المشتريات من الموردين</h3><button class="btn btn-success" onclick="addPurchase()"><i class="fas fa-plus"></i> فاتورة شراء</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><th>رقم</th><th>التاريخ</th><th>المورد</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>المدفوع</th><th>الحالة</th></thead><tbody>`;
        db.purchases.forEach(p=>{ let sup=db.suppliers.find(s=>s.id===p.supplierId); html+=`<tr onclick="showPurchaseDetails(${p.id})"><td>${p.id}</td><td>${p.dateISO}</td><td>${sup?sup.name:'—'}</td><td>${p.productName}</td><td>${p.qty}</td><td>${formatCurrency(p.total)}</td><td>${formatCurrency(p.paid||0)}</td><td><span class="badge ${p.status==='مدفوع'?'badge-success':'badge-warning'}">${p.status}</span></td></tr>`; });
        html+=`</tbody></table></div></div>`; document.getElementById('pageContent').innerHTML=html;
    }
    function renderInventory() {
        let html = `<div class="card-box"><div class="card-header"><h3><i class="fas fa-boxes"></i> المخزون</h3><button class="btn btn-success" onclick="addProduct()"><i class="fas fa-plus"></i> منتج جديد</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><th>#</th><th>المنتج</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>القيمة</th><th>المورد</th><th>الحالة</th></thead><tbody>`;
        db.inventory.forEach(p=>{ let totalVal=(p.qty||0)*(p.costPrice||0); let sup=db.suppliers.find(s=>s.id===p.supplierId); html+=`<tr><td>${p.id}</td><td><strong>${p.name}</strong></td><td>${p.qty}</td><td>${formatCurrency(p.costPrice||0)}</td><td>${formatCurrency(p.sellPrice||0)}</td><td>${formatCurrency(totalVal)}</td><td>${sup?sup.name:'—'}</td><td><span class="badge ${p.qty<=5?'badge-warning':'badge-success'}">${p.qty<=5?'مخزون منخفض':'متوفر'}</span></td></tr>`; });
        html+=`</tbody></table></div></div>`; document.getElementById('pageContent').innerHTML=html;
    }
    function renderSales() {
        let html = `<div class="card-box"><div class="card-header"><h3><i class="fas fa-tag"></i> فواتير المبيعات</h3><button class="btn btn-success" onclick="quickAddSale()"><i class="fas fa-plus"></i> فاتورة جديدة</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><th>رقم</th><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>الكمية</th><th>المبلغ</th><th>المدفوع</th><th>الحالة</th></thead><tbody>`;
        db.sales.forEach(s=>{ html+=`<tr onclick="showSaleDetails(${s.id})"><td>${s.id}</td><td>${s.dateISO}</td><td>${s.clientName}</td><td>${s.productName||'—'}</td><td>${s.qty||'—'}</td><td>${formatCurrency(s.total)}</td><td>${formatCurrency(s.paid||0)}</td><td><span class="badge ${s.status==='مدفوع'?'badge-success':'badge-warning'}">${s.status}</span></td></tr>`; });
        html+=`</tbody></table></div></div>`; document.getElementById('pageContent').innerHTML=html;
    }
    function renderAccounting() {
        let entries=[...db.journalEntries].reverse();
        let html=`<div class="card-box"><div class="card-header"><h3><i class="fas fa-book"></i> دفتر الأستاذ</h3></div><div style="overflow-x:auto"><table class="data-table"><thead><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th><th>المبلغ</th></thead><tbody>`;
        entries.forEach(e=>{ html+=`<tr><td>${e.date}</td><td>${e.description}</td><td>${e.debitAccount}</td><td>${e.creditAccount}</td><td>${formatCurrency(e.amount)}</td></tr>`; });
        html+=`</tbody></table></div></div>`; document.getElementById('pageContent').innerHTML=html;
    }
    function renderTrialBalance() {
        let balances={};
        db.journalEntries.forEach(e=>{ balances[e.debitAccount]=(balances[e.debitAccount]||0)+e.amount; balances[e.creditAccount]=(balances[e.creditAccount]||0)-e.amount; });
        let totalDebit=0,totalCredit=0,html=`<div class="card-box"><h3>ميزان المراجعة</h3><div style="overflow-x:auto"><table class="data-table"><thead><th>الحساب</th><th>مدين</th><th>دائن</th></thead><tbody>`;
        for(let [acc,bal] of Object.entries(balances)){ if(bal>0){ totalDebit+=bal; html+=`<tr><td>${acc}</td><td>${formatCurrency(bal)}</td><td>---</td></tr>`; } else if(bal<0){ let abs=-bal; totalCredit+=abs; html+=`<tr><td>${acc}</td><td>---</td><td>${formatCurrency(abs)}</td></tr>`; } }
        html+=`<tr style="background:var(--primary-dark);font-weight:bold"><td>الإجمالي</td><td>${formatCurrency(totalDebit)}</td><td>${formatCurrency(totalCredit)}</td></tr></tbody></table></div>${Math.abs(totalDebit-totalCredit)<1?'<div style="margin-top:15px;color:#34d399">✓ الميزان متوازن</div>':'<div style="margin-top:15px;color:#ef4444">✗ الميزان غير متوازن</div>'}</div>`;
        document.getElementById('pageContent').innerHTML=html;
    }
    function renderClients() {
        let html=`<div class="card-box"><div class="card-header"><h3><i class="fas fa-users"></i> العملاء</h3><button class="btn btn-success" onclick="addClient()"><i class="fas fa-plus"></i> عميل جديد</button></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><th>ID</th><th>الاسم</th><th>الهاتف</th><th>إجمالي المشتريات</th></thead><tbody>`;
        db.clients.forEach(c=>{ let totalPurchases=db.sales.filter(s=>s.clientName===c.name).reduce((sum,s)=>sum+(s.total||0),0); html+=`<tr><td>${c.id}</td><td>${c.name}</td><td>${c.phone||'—'}</td><td>${formatCurrency(totalPurchases)}</td></tr>`; });
        html+=`</tbody></table></div></div>`; document.getElementById('pageContent').innerHTML=html;
    }
    function renderExpensesRevenues() {
        let html=`<div class="card-box"><h3>المصروفات</h3><button class="btn btn-primary" onclick="addExpense()">+ إضافة مصروف</button><div style="overflow-x:auto"><table class="data-table"><thead><th>النوع</th><th>المبلغ</th><th>التاريخ</th></thead><tbody>`;
        db.expenses.forEach(e=>{ html+=`<tr><td>${e.type}</td><td>${formatCurrency(e.amount)}</td><td>${e.date}</td></tr>`; });
        html+=`</tbody></table><div>الإجمالي: ${formatCurrency(totalExpenses())}</div></div></div>
        <div class="card-box"><h3>الإيرادات</h3><button class="btn btn-success" onclick="addRevenue()">+ إضافة إيراد</button><div style="overflow-x:auto"><table class="data-table"><thead><th>النوع</th><th>المبلغ</th><th>التاريخ</th></thead><tbody>`;
        db.revenues.forEach(r=>{ html+=`<tr><td>${r.type}</td><td>${formatCurrency(r.amount)}</td><td>${r.date}</td></tr>`; });
        html+=`</tbody></table><div>الإجمالي: ${formatCurrency(totalRevenues())}</div></div></div>`;
        document.getElementById('pageContent').innerHTML=html;
    }
    function renderReports() {
        let html=`<div class="card-box"><h3>قائمة الدخل</h3><div>المبيعات: ${formatCurrency(totalSales())}</div><div>المشتريات: ${formatCurrency(totalPurchases())}</div><div>المصروفات: ${formatCurrency(totalExpenses())}</div><div>الإيرادات: ${formatCurrency(totalRevenues())}</div><hr><div style="font-size:1.5rem">صافي الربح: ${formatCurrency(netProfit())}</div></div>
        <div class="card-box"><h3>التحليل المالي</h3><canvas id="profitChart" height="200"></canvas></div>`;
        document.getElementById('pageContent').innerHTML=html;
        let ctx=document.getElementById('profitChart').getContext('2d');
        let chart=new Chart(ctx,{ type:'doughnut', data:{ labels:['المبيعات','المشتريات','المصروفات','الإيرادات'], datasets:[{ data:[totalSales(),totalPurchases(),totalExpenses(),totalRevenues()], backgroundColor:['#3b82f6','#f59e0b','#ef4444','#10b981'] }] }, options:{ responsive:true } });
        charts.push(chart);
    }
    function renderAIAnalytics() {
        let insights=getAIAnalytics();
        let forecast=`<div class="card-box"><h3><i class="fas fa-chart-line"></i> توقعات الذكاء الاصطناعي</h3>`;
        let avgDaily=totalSales()/30; forecast+=`<p>📈 متوسط المبيعات اليومية: ${formatCurrency(avgDaily)}</p><p>📅 توقعات المبيعات الشهر القادم: ${formatCurrency(avgDaily*30)}</p>`;
        if(getLowStockCount()>0) forecast+=`<p class="badge-warning" style="padding:8px;">⚠️ يوصى بإعادة طلب ${getLowStockCount()} منتج.</p>`;
        forecast+=`</div><div class="card-box"><h3>🤖 توصيات ذكية</h3>${insights.map(i=>`<div class="ai-insight">${i.text}</div>`).join('')}</div>`;
        document.getElementById('pageContent').innerHTML=forecast;
    }

    // ========== العمليات (CRUD) ==========
    function addSupplier(){ let n=prompt('اسم المورد:'); if(!n) return; let p=prompt('الهاتف:')||''; let a=prompt('العنوان:')||''; db.suppliers.push({id:Date.now(),name:n,phone:p,address:a}); saveAll(); showNotification(`✅ تم إضافة ${n}`); renderSuppliers(); }
    function addProduct(){ let n=prompt('اسم المنتج:'); if(!n) return; let cp=parseFloat(prompt('سعر الشراء:'))||0; let sp=parseFloat(prompt('سعر البيع:'))||0; let qty=parseInt(prompt('الكمية:'))||0; let supId=null; if(db.suppliers.length>0&&confirm('ربط بمورد؟')){ let lst=db.suppliers.map((s,i)=>`${i+1}. ${s.name}`).join('\n'); let idx=prompt(`اختر رقم المورد:\n${lst}`); if(idx&&db.suppliers[parseInt(idx)-1]) supId=db.suppliers[parseInt(idx)-1].id; } db.inventory.push({id:Date.now(),name:n,qty,costPrice:cp,sellPrice:sp, supplierId:supId}); saveAll(); showNotification(`✅ تم إضافة ${n}`); renderInventory(); }
    function addPurchase(){ if(db.suppliers.length===0){ showNotification('⚠️ أضف مورد أولاً','error'); return; } let lst=db.suppliers.map((s,i)=>`${i+1}. ${s.name}`).join('\n'); let idx=prompt(`المورد:\n${lst}`); if(!idx) return; let sup=db.suppliers[parseInt(idx)-1]; if(!sup) return; let pn=prompt('اسم المنتج:'); if(!pn) return; let qty=parseInt(prompt('الكمية:')); if(isNaN(qty)) return; let price=parseFloat(prompt('سعر الوحدة:')); if(isNaN(price)) return; let total=qty*price; let paid=parseFloat(prompt('المدفوع:','0'))||0; let status=paid>=total?'مدفوع':'آجل'; let newId=db.settings.nextPurchaseId++; db.purchases.push({id:newId, supplierId:sup.id, supplierName:sup.name, productName:pn, qty, price, total, paid, status, dateISO:todayISO()}); let existing=db.inventory.find(p=>p.name===pn); if(existing){ existing.qty+=qty; existing.costPrice=price; } else { db.inventory.push({id:Date.now(), name:pn, qty, costPrice:price, sellPrice:price*1.3, supplierId:sup.id}); } addJournalEntry(`فاتورة شراء #${newId} من ${sup.name}`,'المخزون','الموردين',total); saveAll(); showNotification(`✅ تم تسجيل فاتورة شراء ${formatCurrency(total)}`); renderPurchases(); }
    function recordPaymentToSupplier(supId){ let sup=db.suppliers.find(s=>s.id===supId); if(!sup) return; let amt=parseFloat(prompt('المبلغ المراد تسديده:')); if(isNaN(amt)||amt<=0) return; let unpaid=db.purchases.filter(p=>p.supplierId===supId&&p.status!=='مدفوع'); let rem=amt; for(let pu of unpaid){ let due=pu.total-pu.paid; if(rem>=due){ pu.paid=pu.total; pu.status='مدفوع'; rem-=due; } else { pu.paid+=rem; rem=0; break; } } addJournalEntry(`تسديد ${formatCurrency(amt)} للمورد ${sup.name}`,'الموردين','النقدية',amt); saveAll(); showNotification(`✅ تم تسديد ${formatCurrency(amt)}`); renderSuppliers(); }
    function addClient(){ let n=prompt('اسم العميل:'); if(!n) return; let p=prompt('الهاتف:')||''; db.clients.push({id:Date.now(),name:n,phone:p}); saveAll(); showNotification(`✅ تم إضافة ${n}`); renderClients(); }
    function quickAddSale(){ if(db.inventory.length===0){ showNotification('⚠️ لا توجد منتجات','error'); return; } let lst=db.inventory.map((p,i)=>`${i+1}. ${p.name} (${p.qty}) - ${formatCurrency(p.sellPrice||p.costPrice*1.3)}`).join('\n'); let idx=prompt(`المنتج:\n${lst}`); if(!idx) return; let prod=db.inventory[parseInt(idx)-1]; if(!prod) return; let qty=parseInt(prompt(`الكمية المتاحة: ${prod.qty}`)); if(isNaN(qty)||qty>prod.qty){ showNotification('⚠️ كمية غير متوفرة','error'); return; } let total=qty*(prod.sellPrice||prod.costPrice*1.3); let paid=parseFloat(prompt('المدفوع:','0'))||0; let cName=prompt('اسم العميل:','عميل نقدي'); let newId=db.settings.nextInvoiceId++; prod.qty-=qty; db.sales.push({id:newId, clientName:cName||'عميل نقدي', productName:prod.name, qty, price:prod.sellPrice||prod.costPrice*1.3, total, paid, status:paid>=total?'مدفوع':'آجل', dateISO:todayISO()}); addJournalEntry(`فاتورة مبيعات #${newId}`,(paid>=total?'النقدية':'العملاء'),'المبيعات',total); saveAll(); showNotification(`✅ تمت الفاتورة ${formatCurrency(total)}`); renderSales(); }
    function addExpense(){ let t=prompt('نوع المصروف:'); if(!t) return; let a=parseFloat(prompt('المبلغ:')); if(isNaN(a)) return; db.expenses.push({id:Date.now(),type:t,amount:a,date:todayISO()}); addJournalEntry(`مصروف ${t}`,'المصروفات','النقدية',a); saveAll(); showNotification(`✅ تم إضافة مصروف ${formatCurrency(a)}`); renderExpensesRevenues(); }
    function addRevenue(){ let t=prompt('نوع الإيراد:'); if(!t) return; let a=parseFloat(prompt('المبلغ:')); if(isNaN(a)) return; db.revenues.push({id:Date.now(),type:t,amount:a,date:todayISO()}); addJournalEntry(`إيراد ${t}`,'النقدية','الإيرادات',a); saveAll(); showNotification(`✅ تم إضافة إيراد ${formatCurrency(a)}`); renderExpensesRevenues(); }
    function showSaleDetails(id){ let s=db.sales.find(s=>s.id===id); if(!s) return; let rem=(s.total||0)-(s.paid||0); let html=`<h2>فاتورة #${s.id}</h2><hr><div><strong>التاريخ:</strong> ${s.dateISO}</div><div><strong>العميل:</strong> ${s.clientName}</div><div><strong>المنتج:</strong> ${s.productName}</div><div><strong>الكمية:</strong> ${s.qty}</div><div><strong>المبلغ:</strong> ${formatCurrency(s.total)}</div><div><strong>المدفوع:</strong> ${formatCurrency(s.paid||0)}</div><div><strong>المتبقي:</strong> ${formatCurrency(rem)}</div><div><strong>الحالة:</strong> <span class="badge ${s.status==='مدفوع'?'badge-success':'badge-warning'}">${s.status}</span></div><hr><button class="btn btn-primary" onclick="closeModal()">إغلاق</button>`; openModal(html); }
    function showPurchaseDetails(id){ let p=db.purchases.find(p=>p.id===id); if(!p) return; let rem=(p.total||0)-(p.paid||0); let html=`<h2>فاتورة شراء #${p.id}</h2><hr><div><strong>التاريخ:</strong> ${p.dateISO}</div><div><strong>المورد:</strong> ${p.supplierName}</div><div><strong>المنتج:</strong> ${p.productName}</div><div><strong>الكمية:</strong> ${p.qty}</div><div><strong>السعر:</strong> ${formatCurrency(p.price)}</div><div><strong>الإجمالي:</strong> ${formatCurrency(p.total)}</div><div><strong>المدفوع:</strong> ${formatCurrency(p.paid||0)}</div><div><strong>المتبقي:</strong> ${formatCurrency(rem)}</div><div><strong>الحالة:</strong> <span class="badge ${p.status==='مدفوع'?'badge-success':'badge-warning'}">${p.status}</span></div><hr><button class="btn btn-primary" onclick="closeModal()">إغلاق</button>`; openModal(html); }

    function switchPage(pageId){ currentPage=pageId; document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active')); let act=document.querySelector(`.menu-item[data-page="${pageId}"]`); if(act) act.classList.add('active'); destroyCharts(); if(pageId==='dashboard') renderDashboard(); else if(pageId==='inventory') renderInventory(); else if(pageId==='suppliers') renderSuppliers(); else if(pageId==='purchases') renderPurchases(); else if(pageId==='sales') renderSales(); else if(pageId==='accounting') renderAccounting(); else if(pageId==='trial_balance') renderTrialBalance(); else if(pageId==='clients') renderClients(); else if(pageId==='expenses_rev') renderExpensesRevenues(); else if(pageId==='reports') renderReports(); else if(pageId==='ai_analytics') renderAIAnalytics(); else if(pageId==='logout') { if(confirm('تسجيل الخروج؟')) localStorage.clear(); location.reload(); } }
    function openModal(html){ document.getElementById('modalContentInner').innerHTML=html; document.getElementById('detailsModal').classList.add('show'); }
    function closeModal(){ document.getElementById('detailsModal').classList.remove('show'); }

    let currentView=localStorage.getItem('viewMode')||'desktop';
    function setViewMode(mode){ currentView=mode; localStorage.setItem('viewMode',mode); if(mode==='mobile') document.body.classList.add('mobile-view'); else document.body.classList.remove('mobile-view'); document.querySelectorAll('.view-toggle-btn').forEach(btn=>{ if(btn.dataset.view===mode) btn.classList.add('active'); else btn.classList.remove('active'); }); }

    function initDemoData(){
        if(db.inventory.length===0){
            db.suppliers=[{id:5001,name:' العالمية للتوريدات',phone:'0501234567',address:'الرياض'},{id:5002,name:'مؤسسة الأهرام',phone:'0507654321',address:'جدة'}];
            db.inventory=[{id:101,name:'مكتب خشبي',qty:20,costPrice:1500,sellPrice:2200,supplierId:5001},{id:102,name:'كرسي دوار',qty:35,costPrice:500,sellPrice:850,supplierId:5001},{id:103,name:'طابعة HP',qty:12,costPrice:2200,sellPrice:3200,supplierId:5002},{id:104,name:'شاشة 24 بوصة',qty:8,costPrice:2000,sellPrice:3000,supplierId:5002}];
            db.clients=[{id:201,name:'شركة الأهرام',phone:'0512345678'},{id:202,name:'مؤسسة النور',phone:'0587654321'},{id:203,name:'الشركة الحديثة',phone:'0511122233'}];
            db.purchases=[{id:3001,supplierId:5001,supplierName:' العالمية للتوريدات',productName:'مكتب خشبي',qty:15,price:1500,total:22500,paid:22500,status:'مدفوع',dateISO:todayISO()},{id:3002,supplierId:5002,supplierName:'مؤسسة الأهرام',productName:'طابعة HP',qty:8,price:2200,total:17600,paid:10000,status:'آجل',dateISO:todayISO()}];
            db.sales=[{id:4001,clientName:'شركة الأهرام',productName:'مكتب خشبي',qty:3,price:2200,total:6600,paid:6600,status:'مدفوع',dateISO:todayISO()},{id:4002,clientName:'مؤسسة النور',productName:'طابعة HP',qty:2,price:3200,total:6400,paid:3000,status:'آجل',dateISO:todayISO()},{id:4003,clientName:'الشركة الحديثة',productName:'كرسي دوار',qty:5,price:850,total:4250,paid:4250,status:'مدفوع',dateISO:todayISO()}];
            db.expenses=[{id:6001,type:'إيجار',amount:5000,date:todayISO()},{id:6002,type:'رواتب',amount:8000,date:todayISO()}];
            db.revenues=[{id:7001,type:‘خدمات استشارية’,amount:3000,date:todayISO()}];
            db.journalEntries=[
                {id:8001,date:todayISO(),description:‘فاتورة شراء #3001’,debitAccount:‘المخزون’,creditAccount:‘الموردين’,amount:22500},
                {id:8002,date:todayISO(),description:‘فاتورة مبيعات #4001’,debitAccount:‘النقدية’,creditAccount:‘المبيعات’,amount:6600},
                {id:8003,date:todayISO(),description:‘مصروف إيجار’,debitAccount:‘المصروفات’,creditAccount:‘النقدية’,amount:5000}
            ];
            saveAll(); showNotification(‘✅ تم تحميل بيانات متوازنة مع تحليلات ذكاء اصطناعي’);
        }
    }

    document.querySelectorAll(‘.menu-item’).forEach(el=>{ el.addEventListener(‘click’,()=>switchPage(el.dataset.page)); });
    document.getElementById(‘mobileMenuBtn’)?.addEventListener(‘click’,()=>document.getElementById(‘sidebar’).classList.toggle(‘open’));
    document.getElementById(‘notificationBell’)?.addEventListener(‘click’,()=>showNotifications());
    document.querySelectorAll(‘.view-toggle-btn’).forEach(btn=>{ btn.addEventListener(‘click’,()=>setViewMode(btn.dataset.view)); });
    initDemoData(); setViewMode(currentView); switchPage(‘dashboard’);
</script>
</body>
