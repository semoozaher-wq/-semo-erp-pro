<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP - النسخة المصححة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root { --p: #3b82f6; --s: #10b981; --d: #ef4444; --w: #f59e0b; --bg: #0f172a; --c: #1e293b; --t: #f8fafc; --b: #334155; }
        .light { --bg: #f1f5f9; --c: #ffffff; --t: #1e293b; --b: #e2e8f0; }
        body { background: var(--bg); color: var(--t); transition: 0.3s; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--c); padding: 20px; border-left: 1px solid var(--b); position: fixed; height: 100vh; right: 0; overflow-y: auto; }
        .main { margin-right: 260px; padding: 30px; width: calc(100% - 260px); }
        .menu-item { padding: 12px; margin: 5px 0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: var(--p); color: white; }
        .menu-title { font-size: 11px; color: var(--p); margin: 15px 0 5px; }
        .card { background: var(--c); padding: 20px; border-radius: 20px; border: 1px solid var(--b); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat { background: var(--c); padding: 20px; border-radius: 18px; border-right: 5px solid var(--p); cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--b); }
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--s); color: white; }
        .btn-d { background: var(--d); color: white; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--b); color: var(--t); border-radius: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--c); padding: 30px; border-radius: 25px; width: 95%; max-width: 500px; }
        .badge-w { background: rgba(245,158,11,0.2); color: var(--w); padding: 4px 10px; border-radius: 8px; }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: var(--bg); border-radius: 12px; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span { display: none; } .main { margin-right: 70px; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2 style="text-align:center; color:var(--p);">SEMO</h2>
        <div class="menu-title">المخازن</div>
        <div class="menu-item active" onclick="sp('inv')">📦 <span>المخزون</span></div>
        <div class="menu-item" onclick="sp('sales')">🛒 <span>المبيعات</span></div>
        <div class="menu-title">المالية</div>
        <div class="menu-item" onclick="sp('exp')">💸 <span>المصروفات</span></div>
        <div class="menu-title">جهات</div>
        <div class="menu-item" onclick="sp('cli')">👥 <span>العملاء</span></div>
    </div>

    <div class="main">
        <div id="content"></div>
    </div>
</div>

<div id="modal" class="modal" onclick="if(event.target===this)cm()">
    <div class="modal-content" id="mBody"></div>
</div>

<script>
// ========== قاعدة البيانات ==========
let db = {
    inv: JSON.parse(localStorage.getItem('erp_inv')) || [],
    sales: JSON.parse(localStorage.getItem('erp_sales')) || [],
    exp: JSON.parse(localStorage.getItem('erp_exp')) || [],
    cli: JSON.parse(localStorage.getItem('erp_cli')) || []
};

const save = () => {
    localStorage.setItem('erp_inv', JSON.stringify(db.inv));
    localStorage.setItem('erp_sales', JSON.stringify(db.sales));
    localStorage.setItem('erp_exp', JSON.stringify(db.exp));
    localStorage.setItem('erp_cli', JSON.stringify(db.cli));
};

const v = (id) => document.getElementById(id).value;
const f = (id) => parseFloat(document.getElementById(id).value) || 0;
const om = () => document.getElementById('modal').classList.add('show');
const cm = () => document.getElementById('modal').classList.remove('show');

// ========== بيانات تجريبية ==========
function initData() {
    if(db.inv.length === 0) {
        db.inv = [
            {id:1, n:'مكتب خشبي', c:500, p:800, q:15},
            {id:2, n:'كرسي دوار', c:300, p:550, q:25}
        ];
        db.cli = [
            {id:101, n:'شركة الأهرام', p:'01001112223'}
        ];
        save();
    }
}

// ========== التنقل ==========
function sp(page) {
    if(page === 'inv') renderInv();
    else if(page === 'sales') renderSales();
    else if(page === 'exp') renderExp();
    else if(page === 'cli') renderCli();
}

// ========== المخزون (المصحح) ==========
function renderInv() {
    document.getElementById('content').innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h2>📦 المخزون</h2>
            <button class="btn btn-p" onclick="openAddProduct()">+ إضافة منتج</button>
        </div>
        <div class="card">
            <input type="text" id="searchInv" placeholder="🔍 بحث..." onkeyup="filterInv()">
            <table id="invTable">
                <thead><tr><th>المنتج</th><th>سعر الشراء</th><th>سعر البيع</th><th>الكمية</th><th>إجراءات</th></tr></thead>
                <tbody id="invBody"></tbody>
            </table>
        </div>
    `;
    refreshInv();
}

function refreshInv() {
    let search = document.getElementById('searchInv')?.value.toLowerCase() || '';
    let filtered = db.inv.filter(i => i.n.toLowerCase().includes(search));
    document.getElementById('invBody').innerHTML = filtered.map(i => `
        <tr>
            <td>${i.n}</td>
            <td>${i.c} ج.م</td>
            <td>${i.p} ج.م</td>
            <td class="${i.q <= 5 ? 'badge-w' : ''}">${i.q}</td>
            <td>
                <button class="btn btn-p" style="padding:5px" onclick="editProduct(${i.id})">✏️</button>
                <button class="btn btn-d" style="padding:5px" onclick="deleteProduct(${i.id})">🗑️</button>
            </td>
        </td>
    `).join('');
}

// ✅ دالة إضافة منتج - دي اللي كانت ناقصة!!!
window.openAddProduct = function() {
    document.getElementById('mBody').innerHTML = `
        <h3>➕ إضافة منتج جديد</h3>
        <input type="text" id="prodName" placeholder="اسم المنتج" autocomplete="off">
        <input type="number" id="prodCost" placeholder="سعر الشراء (التكلفة)">
        <input type="number" id="prodPrice" placeholder="سعر البيع">
        <input type="number" id="prodQty" placeholder="الكمية">
        <button class="btn btn-s" style="width:100%; margin-top:10px" onclick="saveProduct()">💾 حفظ المنتج</button>
    `;
    om();
};

// ✅ حفظ المنتج
window.saveProduct = function() {
    let name = document.getElementById('prodName').value;
    let cost = parseFloat(document.getElementById('prodCost').value);
    let price = parseFloat(document.getElementById('prodPrice').value);
    let qty = parseInt(document.getElementById('prodQty').value);
    
    if(!name || name === '') {
        alert('❌ يرجى كتابة اسم المنتج أولاً!');
        return;
    }
    
    if(isNaN(cost)) cost = 0;
    if(isNaN(price)) price = 0;
    if(isNaN(qty)) qty = 0;
    
    db.inv.push({
        id: Date.now(),
        n: name,
        c: cost,
        p: price,
        q: qty
    });
    
    save();
    cm();
    renderInv();
    alert(`✅ تم إضافة المنتج: ${name}`);
};

// تعديل منتج
window.editProduct = function(id) {
    let p = db.inv.find(x => x.id === id);
    if(!p) return;
    document.getElementById('mBody').innerHTML = `
        <h3>✏️ تعديل منتج</h3>
        <input type="text" id="prodName" value="${p.n}" placeholder="اسم المنتج">
        <input type="number" id="prodCost" value="${p.c}" placeholder="سعر الشراء">
        <input type="number" id="prodPrice" value="${p.p}" placeholder="سعر البيع">
        <input type="number" id="prodQty" value="${p.q}" placeholder="الكمية">
        <button class="btn btn-s" style="width:100%" onclick="updateProduct(${id})">💾 تحديث</button>
    `;
    om();
};

window.updateProduct = function(id) {
    let idx = db.inv.findIndex(x => x.id === id);
    if(idx !== -1) {
        db.inv[idx] = {
            id: id,
            n: document.getElementById('prodName').value,
            c: parseFloat(document.getElementById('prodCost').value) || 0,
            p: parseFloat(document.getElementById('prodPrice').value) || 0,
            q: parseInt(document.getElementById('prodQty').value) || 0
        };
        save();
        cm();
        renderInv();
        alert('✅ تم التعديل');
    }
};

window.deleteProduct = function(id) {
    if(confirm('⚠️ هل أنت متأكد من حذف هذا المنتج؟')) {
        db.inv = db.inv.filter(x => x.id !== id);
        save();
        renderInv();
        alert('🗑️ تم حذف المنتج');
    }
};

window.filterInv = function() {
    refreshInv();
};

// ========== المبيعات ==========
function renderSales() {
    document.getElementById('content').innerHTML = `
        <h2>🛒 المبيعات</h2>
        <div class="card">
            <select id="saleProduct">
                ${db.inv.map(i => `<option value="${i.id}">${i.n} (متوفر: ${i.q}) - ${i.p} ج.م</option>`)}
            </select>
            <select id="saleClient">
                ${db.cli.map(c => `<option value="${c.n}">${c.n}</option>`)}
                <option value="زبون نقدي">زبون نقدي</option>
            </select>
            <input type="number" id="saleQty" value="1" placeholder="الكمية">
            <select id="saleStatus">
                <option value="مدفوع">✅ مدفوع</option>
                <option value="آجل">⏳ آجل (دين)</option>
            </select>
            <button class="btn btn-s" style="width:100%" onclick="doSale()">💰 إتمام البيع</button>
        </div>
        <div id="invoiceArea"></div>
    `;
}

window.doSale = function() {
    let productId = parseInt(document.getElementById('saleProduct').value);
    let product = db.inv.find(i => i.id === productId);
    let qty = parseInt(document.getElementById('saleQty').value);
    
    if(!product) {
        alert('❌ المنتج غير موجود');
        return;
    }
    
    if(product.q < qty) {
        alert(`❌ الكمية غير كافية! المتوفر: ${product.q}`);
        return;
    }
    
    product.q -= qty;
    
    let sale = {
        id: Date.now(),
        date: new Date().toLocaleDateString('ar-EG'),
        product: product.n,
        client: document.getElementById('saleClient').value,
        qty: qty,
        price: product.p,
        total: qty * product.p,
        profit: qty * (product.p - product.c),
        status: document.getElementById('saleStatus').value
    };
    
    db.sales.push(sale);
    save();
    
    document.getElementById('invoiceArea').innerHTML = `
        <div class="card" style="border:2px dashed var(--p); text-align:center">
            <h2>🧾 فاتورة #${sale.id}</h2>
            <p>📅 ${sale.date} | 👤 ${sale.client}</p>
            <hr>
            <table style="margin:10px auto; width:80%">
                <tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
                <tr><td>${sale.product}</td><td>${sale.qty}</td><td>${sale.price}</td><td>${sale.total} ج.م</td></tr>
            </table>
            <h3>💰 المطلوب: ${sale.total} ج.م (${sale.status})</h3>
            <button class="btn btn-p" onclick="window.print()">🖨️ طباعة</button>
        </div>
    `;
    
    renderSales();
    alert(`✅ تم بيع ${sale.qty} من ${sale.product}`);
};

// ========== المصروفات ==========
function renderExp() {
    let total = db.exp.reduce((a,b) => a + (b.amt || 0), 0);
    document.getElementById('content').innerHTML = `
        <div style="display:flex; justify-content:space-between">
            <h2>💸 المصروفات (الإجمالي: ${total} ج.م)</h2>
            <button class="btn btn-d" onclick="openAddExp()">+ إضافة</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th></thead>
                <tbody>
                    ${db.exp.map(e => `<tr><td>${e.d}</td><td>${e.n}</td><td>${e.amt} ج.م</td></tr>`).join('')}
                </tbody>
            </table>
        </div>
    `;
}

window.openAddExp = function() {
    document.getElementById('mBody').innerHTML = `
        <h3>➕ إضافة مصروف</h3>
        <input type="text" id="expName" placeholder="البيان (كهرباء، إيجار...)">
        <input type="number" id="expAmount" placeholder="المبلغ">
        <button class="btn btn-d" style="width:100%" onclick="addExpense()">💾 حفظ</button>
    `;
    om();
};

window.addExpense = function() {
    let name = document.getElementById('expName').value;
    let amount = parseFloat(document.getElementById('expAmount').value);
    if(!name) { alert('❌ اكتب البيان'); return; }
    if(isNaN(amount)) { alert('❌ اكتب المبلغ'); return; }
    db.exp.push({
        id: Date.now(),
        d: new Date().toLocaleDateString('ar-EG'),
        n: name,
        amt: amount
    });
    save();
    cm();
    renderExp();
    alert('✅ تم إضافة المصروف');
};

// ========== العملاء ==========
function renderCli() {
    document.getElementById('content').innerHTML = `
        <div style="display:flex; justify-content:space-between">
            <h2>👥 العملاء</h2>
            <button class="btn btn-p" onclick="openAddClient()">+ عميل جديد</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>الاسم</th><th>الهاتف</th><th></th></thead>
                <tbody>
                    ${db.cli.map(c => `<tr><td>${c.n}</td><td>${c.p}</td><td><button class="btn btn-d" style="padding:5px" onclick="deleteClient(${c.id})">🗑️</button></td></tr>`).join('')}
                </tbody>
            </tr>
        </div>
    `;
}

window.openAddClient = function() {
    document.getElementById('mBody').innerHTML = `
        <h3>➕ عميل جديد</h3>
        <input type="text" id="clientName" placeholder="الاسم">
        <input type="text" id="clientPhone" placeholder="رقم الهاتف">
        <button class="btn btn-s" style="width:100%" onclick="addClient()">💾 حفظ</button>
    `;
    om();
};

window.addClient = function() {
    let name = document.getElementById('clientName').value;
    let phone = document.getElementById('clientPhone').value;
    if(!name) { alert('❌ اكتب اسم العميل'); return; }
    db.cli.push({id: Date.now(), n: name, p: phone || '-'});
    save();
    cm();
    renderCli();
    alert(`✅ تم إضافة العميل: ${name}`);
};

window.deleteClient = function(id) {
    if(confirm('⚠️ حذف العميل؟')) {
        db.cli = db.cli.filter(c => c.id !== id);
        save();
        renderCli();
    }
};

// ========== بدء التشغيل ==========
initData();
renderInv();
</script>
</body>
</html>
