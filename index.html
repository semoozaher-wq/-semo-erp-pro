<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | تسجيل الدخول</title>
    <!-- مكتبات Firebase الأساسية فقط -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --main: #3b82f6; --bg: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .login-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--main); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { color: var(--main); font-size: 0.8rem; cursor: pointer; margin-top: 15px; display: block; text-decoration: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 style="color:var(--main); margin-bottom: 20px;">SEMO ERP</h1>
        
        <div id="login-form">
            <input type="text" id="log-id" placeholder="الإيميل أو رقم الهاتف">
            <input type="password" id="log-pass" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول</button>
            <span class="link" onclick="toggleView()">ليس لديك حساب؟ سجل الآن</span>
        </div>

        <div id="signup-form" class="hidden">
            <input type="email" id="sign-email" placeholder="البريد الإلكتروني">
            <input type="text" id="sign-phone" placeholder="رقم الهاتف (مثال: 091...)">
            <input type="password" id="sign-pass" placeholder="كلمة المرور">
            <button class="btn" style="background:#10b981" onclick="signup()">إنشاء حساب</button>
            <span class="link" onclick="toggleView()">العودة للدخول</span>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const config = {
            apiKey: "AIzaSyC2EVpNEG9XjcPEelUA8lkIUcUceN6Oh0k",
            authDomain: "://firebaseapp.com",
            projectId: "semo-erp-pro13",
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(config);

        function toggleView() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
        }

        function signup() {
            const e = document.getElementById('sign-email').value, 
                  p = document.getElementById('sign-pass').value,
                  ph = document.getElementById('sign-phone').value;
            if(!e || !p || !ph) return alert("أكمل البيانات");

            firebase.auth().createUserWithEmailAndPassword(e, p).then(u => {
                firebase.database().ref('users_map/' + ph).set({ email: e });
                window.location.href = "dashboard.html";
            }).catch(err => alert(err.message));
        }

        function login() {
            const id = document.getElementById('log-id').value, p = document.getElementById('log-pass').value;
            if(id.includes('@')) {
                auth(id, p);
            } else {
                firebase.database().ref('users_map/' + id).once('value', s => {
                    if(s.exists()) auth(s.val().email, p);
                    else alert("البيانات غير صحيحة");
                });
            }
        }

        function auth(e, p) {
            firebase.auth().signInWithEmailAndPassword(e, p)
            .then(() => window.location.href = "dashboard.html")
            .catch(err => alert("خطأ في الدخول"));
        }
    </script>
</body>
</html>
