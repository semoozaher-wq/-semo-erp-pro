<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SIMO ERP - نظام متكامل مع Firebase</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        :root{--primary:#2563eb;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--border:#e2e8f0;}
        body{background:var(--bg);color:var(--text);direction:rtl;font-size:14px;}
        .login-container{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);}
        .login-box{background:white;padding:40px;border-radius:30px;width:380px;text-align:center;}
        .login-box input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px;}
        .btn-primary{background:var(--primary);color:white;border:none;padding:12px;border-radius:10px;width:100%;cursor:pointer;font-weight:bold;}
        .switch-auth{margin-top:15px;color:#666;cursor:pointer;}
        .switch-auth span{color:var(--primary);font-weight:bold;}
        .top-header{background:white;padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
        .header-logo{font-size:1.2rem;font-weight:800;color:var(--primary);}
        .currency-selector{background:var(--bg);border:1px solid var(--border);padding:6px 12px;border-radius:40px;cursor:pointer;}
        .user-info{display:flex;align-items:center;gap:12px;background:var(--bg);padding:4px 15px;border-radius:40px;}
        .logout-btn{background:var(--danger);border:none;padding:5px 12px;border-radius:40px;color:white;cursor:pointer;}
        .menu-icons{display:flex;justify-content:space-around;background:white;padding:10px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
        .icon-item{text-align:center;cursor:pointer;padding:6px 12px;border-radius:12px;transition:0.2s;}
        .icon-item:hover{background:var(--bg);transform:translateY(-3px);}
        .icon-circle{width:45px;height:45px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 5px auto;color:white;font-size:18px;}
        .icon-item span{font-size:11px;color:var(--text-muted);}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;padding:15px;}
        .stat-card{background:white;border-radius:16px;padding:1rem;cursor:pointer;transition:0.2s;border:1px solid var(--border);text-align:center;}
        .stat-card:hover{transform:translateY(-3px);box-shadow:0 10px 25px -5px rgba(0,0,0,0.1);}
        .stat-value{font-size:22px;font-weight:800;}
        .stat-label{font-size:12px;color:var(--text-muted);margin-top:5px;}
        .card-box{background:white;border-radius:16px;padding:15px;margin-bottom:15px;border:1px solid var(--border);}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
        .btn{padding:6px 16px;border-radius:40px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-size:12px;}
        .btn-success{background:var(--success);color:white;}
        .btn-danger{background:var(--danger);color:white;}
        .data-table{width:100%;border-collapse:collapse;}
        .data-table th,.data-table td{padding:10px 6px;text-align:right;border-bottom:1px solid var(--border);font-size:13px;}
        .badge{padding:3px 10px;border-radius:30px;font-size:11px;font-weight:600;}
        .badge-success{background:#d1fae5;color:#059669;}
        .badge-warning{background:#fed7aa;color:#c2410c;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;}
        .modal.show{display:flex;}
        .modal-content{background:white;border-radius:20px;max-width:550px;width:90%;padding:20px;max-height:85vh;overflow-y:auto;}
        .invoice-details{background:#f8fafc;padding:12px;border-radius:12px;margin:10px 0;}
        .invoice-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #ddd;}
        .share-buttons{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
        .share-btn{background:var(--primary);color:white;border:none;padding:6px 12px;border-radius:40px;cursor:pointer;font-size:11px;}
        .share-btn.whatsapp{background:#25D366;}
        .ai-insight{background:linear-gradient(135deg,#8b5cf6,#2563eb);color:white;border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;}
        .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
        input,select{width:100%;padding:8px;margin:5px 0;border:1px solid var(--border);border-radius:8px;}
        .profit-positive{color:#10b981;}
        .profit-negative{color:#ef4444;}
        .flex-between{display:flex;justify-content:space-between;align-items:center;}
        .page-section{display:none;padding:15px;animation:fadeIn 0.3s;}
        .page-section.active{display:block;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        @media(max-width:768px){.stats-grid{gap:8px;padding:10px;}.stat-value{font-size:18px;}}
        .online-dot{width:10px;height:10px;background:#10b981;border-radius:50%;display:inline-block;margin-left:5px;animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
    </style>
</head>
<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2><i class="fas fa-crown"></i> SIMO ERP</h2>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="اسم المستخدم" value="admin">
            <input type="password" id="loginPassword" placeholder="كلمة المرور" value="admin123">
            <button class="btn-primary" onclick="doLogin()">دخول</button>
            <div class="switch-auth" onclick="showRegister()">ليس لديك حساب؟ <span>سجل الآن</span></div>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="text" id="regUsername" placeholder="اسم المستخدم">
            <input type="password" id="regPassword" placeholder="كلمة المرور">
            <button class="btn-primary" style="background: var(--success);" onclick="doRegister()">تسجيل</button>
            <div class="switch-auth" onclick="showLogin()">لديك حساب؟ <span>دخول</span></div>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="top-header">
        <div class="header-logo"><i class="fas fa-cloud-upload-alt"></i> SIMO ERP (متصل بالسحابة)</div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <span class="online-dot" id="onlineDot"></span>
            <span id="onlineStatus" style="font-size:11px;">متصل</span>
            <select id="currencySelector" class="currency-selector" onchange="changeCurrency()">
                <option value="SAR">🇸🇦 ريال سعودي</option>
                <option value="LYD">🇱🇾 دينار ليبي</option>
                <option value="USD">🇺🇸 دولار</option>
                <option value="EUR">🇪🇺 يورو</option>
                <option value="EGP">🇪🇬 جنيه</option>
            </select>
            <div class="user-info">
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>
    </div>
    <div class="menu-icons">
        <div class="icon-item" onclick="switchPage('dashboard')"><div class="icon-circle"><i class="fas fa-home"></i></div><span>الرئيسية</span></div>
        <div class="icon-item" onclick="switchPage('inventory')"><div class="icon-circle"><i class="fas fa-boxes"></i></div><span>المخزون</span></div>
        <div class="icon-item" onclick="switchPage('suppliers')"><div class="icon-circle"><i class="fas fa-truck"></i></div><span>الموردين</span></div>
        <div class="icon-item" onclick="switchPage('sales')"><div class="icon-circle"><i class="fas fa-tag"></i></div><span>المبيعات</span></div>
        <div class="icon-item" onclick="switchPage('clients')"><div class="icon-circle"><i class="fas fa-users"></i></div><span>العملاء</span></div>
        <div class="icon-item" onclick="switchPage('ai_analytics')"><div class="icon-circle"><i class="fas fa-robot"></i></div><span>الذكاء الاصطناعي</span></div>
        <div class="icon-item" onclick="switchPage('reports')"><div class="icon-circle"><i class="fas fa-chart-pie"></i></div><span>التقارير</span></div>
    </div>
    <div id="pageContent"></div>
</div>
<div id="detailsModal" class="modal" onclick="if(event.target===this) closeModal()"><div class="modal-content" id="modalContentInner"></div></div>

<script>
// ==================== Firebase Config ====================
const firebaseConfig = {
    apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
    authDomain: "my-pos-system-11dee.firebaseapp.com",
    databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
    projectId: "my-pos-system-11dee",
    storageBucket: "my-pos-system-11dee.firebasestorage.app",
    messagingSenderId: "565195477080",
    appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// ==================== العملات ====================
let currencies = {
    SAR: { name: 'ريال سعودي', symbol: 'ر.س', rate: 1 },
    LYD: { name: 'دينار ليبي', symbol: 'ل.د', rate: 0.78 },
    USD: { name: 'دولار', symbol: '$', rate: 3.75 },
    EUR: { name: 'يورو', symbol: '€', rate: 4.1 },
    EGP: { name: 'جنيه', symbol: 'ج.م', rate: 0.12 }
};
let currentCurrency = localStorage.getItem('simo_currency') || 'LYD';
let isOnline = navigator.onLine;
let currentUser = null;
let charts = [];

// ==================== قاعدة البيانات المحلية ====================
let db = {
    inventory: JSON.parse(localStorage.getItem('simo_inventory')) || [
        { id: 1, name: 'مكتب خشبي', qty: 20, costPrice: 1500, sellPrice: 2500 },
        { id: 2, name: 'كرسي دوار', qty: 35, costPrice: 500, sellPrice: 900 },
        { id: 3, name: 'طابعة HP', qty: 12, costPrice: 2200, sellPrice: 3500 }
    ],
    sales: JSON.parse(localStorage.getItem('simo_sales')) || [
        { id: 1001, clientName: 'شركة الأهرام', productName: 'مكتب خشبي', qty: 2, price: 2500, total: 5000, paid: 5000, status: 'مدفوع', dateISO: '2026-04-30' },
        { id: 1002, clientName: 'مؤسسة النور', productName: 'طابعة HP', qty: 1, price: 3500, total: 3500, paid: 2000, status: 'آجل', dateISO: '2026-04-30' }
    ],
    clients: JSON.parse(localStorage.getItem('simo_clients')) || [
        { id: 1, name: 'شركة الأهرام', phone: '0512345678', address: 'الرياض' },
        { id: 2, name: 'مؤسسة النور', phone: '0587654321', address: 'جدة' }
    ],
    suppliers: JSON.parse(localStorage.getItem('simo_suppliers')) || [
        { id: 1, name: 'العالمية للتوريدات', phone: '0555555555', address: 'الرياض' }
    ],
    users: JSON.parse(localStorage.getItem('simo_users')) || [
        { id: 1, name: 'المدير العام', username: 'admin', password: 'admin123', role: 'admin' }
    ]
};

// ==================== المزامنة مع Firebase ====================
function syncToFirebase() {
    if(!isOnline) return;
    database.ref('erp_data').set({
        inventory: db.inventory,
        sales: db.sales,
        clients: db.clients,
        suppliers: db.suppliers,
        lastSync: new Date().toISOString()
    }).then(() => {
        document.getElementById('onlineDot').style.background = '#10b981';
        document.getElementById('onlineStatus').innerText = 'متصل ومزامن';
    }).catch(() => {});
}

function loadFromFirebase() {
    if(!isOnline) return;
    database.ref('erp_data').once('value').then((snapshot) => {
        const data = snapshot.val();
        if(data) {
            if(data.inventory) db.inventory = data.inventory;
            if(data.sales) db.sales = data.sales;
            if(data.clients) db.clients = data.clients;
            if(data.suppliers) db.suppliers = data.suppliers;
            saveToLocal();
            showNotification('تم تحميل البيانات من السحابة', 'success');
            renderDashboard();
        }
    }).catch(() => {});
}

function saveToLocal() {
    localStorage.setItem('simo_inventory', JSON.stringify(db.inventory));
    localStorage.setItem('simo_sales', JSON.stringify(db.sales));
    localStorage.setItem('simo_clients', JSON.stringify(db.clients));
    localStorage.setItem('simo_suppliers', JSON.stringify(db.suppliers));
    localStorage.setItem('simo_users', JSON.stringify(db.users));
}
function saveAll() { saveToLocal(); syncToFirebase(); }

// ==================== دوال مساعدة ====================
function formatCurrency(amount) {
    let currency = currencies[currentCurrency];
    return (amount * currency.rate).toLocaleString() + ' ' + currency.symbol;
}
function showNotification(msg, type = 'success') {
    let div = document.createElement('div');
    div.style.cssText = `position:fixed; bottom:20px; left:20px; background:${type === 'success' ? '#10b981' : '#ef4444'}; color:white; padding:10px 20px; border-radius:40px; z-index:1200; font-weight:bold;`;
    div.innerHTML = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2500);
}
function todayISO() { let d = new Date(); return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`; }
function totalSales() { return db.sales.reduce((s,i) => s + i.total, 0); }
function totalPurchases() { return 0; }
function totalExpenses() { return 0; }
function totalRevenues() { return 0; }
function netProfit() { return totalSales(); }
function inventoryValue() { return db.inventory.reduce((s,i) => s + (i.qty * i.costPrice), 0); }
function getLowStockCount() { return db.inventory.filter(i => i.qty <= 5).length; }
function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

// ==================== المصادقة ====================
function showRegister() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; }
function showLogin() { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; }
function doLogin() {
    let username = document.getElementById('loginUsername').value;
    let password = document.getElementById('loginPassword').value;
    let user = db.users.find(u => u.username === username && u.password === password);
    if(user) {
        currentUser = user;
        localStorage.setItem('simo_current_user', JSON.stringify(user));
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userName').innerText = user.name;
        showNotification(`مرحباً ${user.name}`);
        loadFromFirebase();
        switchPage('dashboard');
    } else { showNotification('خطأ في البيانات', 'error'); }
}
function doRegister() {
    let name = document.getElementById('regName').value;
    let username = document.getElementById('regUsername').value;
    let password = document.getElementById('regPassword').value;
    if(!name || !username || !password) { showNotification('جميع الحقول مطلوبة', 'error'); return; }
    if(db.users.find(u => u.username === username)) { showNotification('اسم المستخدم موجود', 'error'); return; }
    db.users.push({ id: Date.now(), name, username, password, role: 'user' });
    saveAll();
    showNotification('تم التسجيل بنجاح');
    showLogin();
}
function logout() {
    currentUser = null;
    localStorage.removeItem('simo_current_user');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    showNotification('تم تسجيل الخروج');
}
function changeCurrency() {
    let select = document.getElementById('currencySelector');
    currentCurrency = select.value;
    localStorage.setItem('simo_currency', currentCurrency);
    renderDashboard();
}

// ==================== عرض الفاتورة ====================
function viewInvoiceDetails(id) {
    let sale = db.sales.find(s => s.id === id);
    if(!sale) return;
    let remaining = sale.total - sale.paid;
    let html = `
        <h2 style="color:var(--primary);">🧾 فاتورة #${sale.id}</h2>
        <div class="invoice-details">
            <div class="invoice-row"><span><strong>التاريخ:</strong></span><span>${sale.dateISO}</span></div>
            <div class="invoice-row"><span><strong>العميل:</strong></span><span>${sale.clientName}</span></div>
            <div class="invoice-row"><span><strong>المنتج:</strong></span><span>${sale.productName}</span></div>
            <div class="invoice-row"><span><strong>الكمية:</strong></span><span>${sale.qty}</span></div>
            <div class="invoice-row"><span><strong>السعر:</strong></span><span>${formatCurrency(sale.price)}</span></div>
            <div class="invoice-row"><span><strong>الإجمالي:</strong></span><span>${formatCurrency(sale.total)}</span></div>
            <div class="invoice-row"><span><strong>المدفوع:</strong></span><span>${formatCurrency(sale.paid)}</span></div>
            <div class="invoice-row"><span><strong>المتبقي:</strong></span><span>${formatCurrency(remaining)}</span></div>
            <div class="invoice-row"><span><strong>الحالة:</strong></span><span class="badge ${sale.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${sale.status}</span></div>
        </div>
        <div class="share-buttons">
            <button class="share-btn whatsapp" onclick="shareViaWhatsApp(${sale.id})"><i class="fab fa-whatsapp"></i> واتساب</button>
            <button class="share-btn" onclick="printInvoice(${sale.id})"><i class="fas fa-print"></i> طباعة</button>
            <button class="share-btn" style="background:#10b981;" onclick="recordPayment(${sale.id})"><i class="fas fa-money-bill-wave"></i> تسديد</button>
            <button class="share-btn" style="background:#6b7280;" onclick="closeModal()">إغلاق</button>
        </div>
    `;
    openModal(html);
}
function printInvoice(id) {
    let sale = db.sales.find(s => s.id === id);
    if(!sale) return;
    let win = window.open('', '_blank');
    win.document.write(`<html><head><title>فاتورة #${sale.id}</title><style>body{font-family:Cairo;padding:20px;direction:rtl;}</style></head><body><div style="max-width:400px;margin:auto;border:1px solid #ddd;padding:20px;border-radius:10px"><h2>فاتورة #${sale.id}</h2><p><strong>التاريخ:</strong> ${sale.dateISO}</p><p><strong>العميل:</strong> ${sale.clientName}</p><p><strong>المنتج:</strong> ${sale.productName}</p><p><strong>الكمية:</strong> ${sale.qty}</p><p><strong>الإجمالي:</strong> ${formatCurrency(sale.total)}</p><p><strong>الحالة:</strong> ${sale.status}</p><hr><p style="text-align:center">شكراً لتعاملكم</p></div></body></html>`);
    win.print();
}
function shareViaWhatsApp(id) {
    let sale = db.sales.find(s => s.id === id);
    if(sale) window.open(`https://wa.me/?text=فاتورة%20#${sale.id}%0Aالعميل:${sale.clientName}%0Aالإجمالي:${formatCurrency(sale.total)}`, '_blank');
}
function recordPayment(id) {
    let sale = db.sales.find(s => s.id === id);
    if(!sale) return;
    let remaining = sale.total - sale.paid;
    let amount = parseFloat(prompt(`المتبقي: ${formatCurrency(remaining)}\nأدخل المبلغ:`, remaining));
    if(isNaN(amount) || amount <= 0) return;
    sale.paid += amount;
    sale.status = sale.paid >= sale.total ? 'مدفوع' : 'آجل';
    saveAll();
    showNotification(`تم تسديد ${formatCurrency(amount)}`);
    closeModal();
    renderSales();
}
function openModal(html) { document.getElementById('modalContentInner').innerHTML = html; document.getElementById('detailsModal').classList.add('show'); }
function closeModal() { document.getElementById('detailsModal').classList.remove('show'); }

// ==================== عرض الصفحات ====================
function renderDashboard() {
    let html = `<div class="stats-grid">
        <div class="stat-card" onclick="switchPage('sales')"><div class="stat-value">${formatCurrency(totalSales())}</div><div class="stat-label">💰 المبيعات</div></div>
        <div class="stat-card"><div class="stat-value">${formatCurrency(inventoryValue())}</div><div class="stat-label">📦 قيمة المخزون</div></div>
        <div class="stat-card" onclick="switchPage('reports')"><div class="stat-value ${netProfit()>=0?'profit-positive':'profit-negative'}">${formatCurrency(netProfit())}</div><div class="stat-label">📈 صافي الربح</div></div>
        <div class="stat-card" onclick="switchPage('inventory')"><div class="stat-value">${getLowStockCount()}</div><div class="stat-label">⚠️ منتجات منخفضة</div></div>
        <div class="stat-card" onclick="switchPage('clients')"><div class="stat-value">${db.clients.length}</div><div class="stat-label">👥 العملاء</div></div>
        <div class="stat-card" onclick="switchPage('suppliers')"><div class="stat-value">${db.suppliers.length}</div><div class="stat-label">🚚 الموردين</div></div>
    </div>
    <div class="card-box"><div class="card-header"><h3>📋 آخر المبيعات</h3><button class="btn-success" onclick="switchPage('sales')">عرض الكل</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>المبلغ</th><th>الحالة</th></thead><tbody id="recentSales"></tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
    let recent = [...db.sales].slice(0,5);
    document.getElementById('recentSales').innerHTML = recent.map(s => `<tr onclick="viewInvoiceDetails(${s.id})"><td>${s.dateISO}</td><td>${s.clientName}</td><td>${s.productName}</td><td>${formatCurrency(s.total)}</td><td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status}</span></td></tr>`).join('');
}
function renderInventory() {
    let html = `<div class="card-box"><div class="card-header"><h3>📦 المخزون</h3><button class="btn-success" onclick="addProduct()">+ منتج</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>المنتج</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>القيمة</th><th></th></thead><tbody>${db.inventory.map(p => `<tr><td><strong>${p.name}</strong></td><td>${p.qty}</td><td>${formatCurrency(p.costPrice)}</td><td>${formatCurrency(p.sellPrice)}</td><td>${formatCurrency(p.qty * p.costPrice)}</td>}<button class="btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}
function addProduct() {
    let name = prompt('اسم المنتج:'); if(!name) return;
    let qty = parseInt(prompt('الكمية:')) || 0;
    let cost = parseFloat(prompt('سعر الشراء:')) || 0;
    let sell = parseFloat(prompt('سعر البيع:')) || 0;
    db.inventory.push({ id: Date.now(), name, qty, costPrice: cost, sellPrice: sell });
    saveAll();
    showNotification(`تم إضافة ${name}`);
    renderInventory();
}
function deleteProduct(id) { if(confirm('حذف المنتج؟')) { db.inventory = db.inventory.filter(p => p.id !== id); saveAll(); showNotification('تم الحذف'); renderInventory(); } }
function renderSuppliers() {
    let html = `<div class="card-box"><div class="card-header"><h3>🚚 الموردين</h3><button class="btn-success" onclick="addSupplier()">+ مورد</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>الاسم</th><th>الهاتف</th><th>العنوان</th></thead><tbody>${db.suppliers.map(s => `<tr><td><strong>${s.name}</strong></td><td>${s.phone||'-'}</td><td>${s.address||'-'}</td></tr>`).join('')}</tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}
function addSupplier() { let name=prompt('اسم المورد:');if(!name)return; db.suppliers.push({id:Date.now(),name,phone:prompt('الهاتف:')||'',address:prompt('العنوان:')||''}); saveAll(); showNotification(`تم إضافة ${name}`); renderSuppliers(); }
function renderSales() {
    let html = `<div class="card-box"><div class="card-header"><h3>💰 المبيعات</h3><button class="btn-success" onclick="addSale()">+ فاتورة</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>الكمية</th><th>المبلغ</th><th>الحالة</th></thead><tbody>${db.sales.map(s => `<tr onclick="viewInvoiceDetails(${s.id})"><td>${s.dateISO}</td><td>${s.clientName}</td><td>${s.productName}</td><td>${s.qty}</td><td>${formatCurrency(s.total)}</td><td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status}</span></td></tr>`).join('')}</tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}
function addSale() {
    if(db.inventory.length===0){showNotification('لا توجد منتجات','error');return;}
    let p=db.inventory[0];
    let qty=parseInt(prompt(`الكمية المتاحة: ${p.qty}`))||1;
    if(qty>p.qty){showNotification('كمية غير متوفرة','error');return;}
    let total=qty*p.sellPrice;
    let paid=parseFloat(prompt('المدفوع:',total))||0;
    let clientName=prompt('اسم العميل:','عميل نقدي');
    let newId=Date.now();
    p.qty-=qty;
    db.sales.push({id:newId,clientName:clientName||'عميل نقدي',productName:p.name,qty,price:p.sellPrice,total,paid,status:paid>=total?'مدفوع':'آجل',dateISO:todayISO()});
    saveAll();
    showNotification(`تمت فاتورة ${formatCurrency(total)}`);
    renderSales();
}
function renderClients() {
    let html = `<div class="card-box"><div class="card-header"><h3>👥 العملاء</h3><button class="btn-success" onclick="addClient()">+ عميل</button></div><div style="overflow-x:auto"><table class="data-table"><thead><th>الاسم</th><th>الهاتف</th><th>العنوان</th><th>إجمالي المشتريات</th></thead><tbody>${db.clients.map(c => `<tr><td><strong>${c.name}</strong></td><td>${c.phone||'-'}</td><td>${c.address||'-'}</td><td>${formatCurrency(db.sales.filter(s=>s.clientName===c.name).reduce((sum,s)=>sum+s.total,0))}</td></tr>`).join('')}</tbody></div></div>`;
    document.getElementById('pageContent').innerHTML = html;
}
function addClient() { let name=prompt('اسم العميل:');if(!name)return; db.clients.push({id:Date.now(),name,phone:prompt('الهاتف:')||'',address:prompt('العنوان:')||''}); saveAll(); showNotification(`تم إضافة ${name}`); renderClients(); }
function renderReports() {
    let html = `<div class="card-box"><div class="card-header"><h3>📊 قائمة الدخل</h3></div><div class="flex-between"><span>المبيعات:</span><span class="profit-positive">${formatCurrency(totalSales())}</span></div><hr><div class="flex-between"><strong>صافي الربح:</strong><strong class="${netProfit()>=0?'profit-positive':'profit-negative'}">${formatCurrency(netProfit())}</strong></div><div style="margin-top:15px;"><canvas id="profitChart" height="200"></canvas></div>`;
    document.getElementById('pageContent').innerHTML = html;
    let ctx = document.getElementById('profitChart')?.getContext('2d');
    if(ctx) charts.push(new Chart(ctx, { type: 'doughnut', data: { labels: ['المبيعات'], datasets: [{ data: [totalSales()], backgroundColor: ['#3b82f6'] }] }, options: { responsive: true } }));
}
function renderAIAnalytics() {
    let insights = [`💰 إجمالي المبيعات: ${formatCurrency(totalSales())}`,`📈 صافي الربح: ${formatCurrency(netProfit())}`,
        `📦 منتجات منخفضة المخزون: ${getLowStockCount()}`,`🏆 عدد العملاء: ${db.clients.length}`,`🚚 عدد الموردين: ${db.suppliers.length}`,
        `🔮 توقعات الشهر القادم: ${formatCurrency((totalSales()/30)*33)}`];
    let html = `<div class="card-box"><div class="card-header"><h3>🤖 تحليلات الذكاء الاصطناعي</h3></div>${insights.map(i=>`<div class="ai-insight" onclick="speakText('${i}')">${i}</div>`).join('')}</div>`;
    document.getElementById('pageContent').innerHTML = html;
}
function speakText(t){if('speechSynthesis' in window){let u=new SpeechSynthesisUtterance(t);u.lang='ar-SA';window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}}
function switchPage(p){destroyCharts();if(p==='dashboard')renderDashboard();else if(p==='inventory')renderInventory();else if(p==='suppliers')renderSuppliers();else if(p==='sales')renderSales();else if(p==='clients')renderClients();else if(p==='reports')renderReports();else if(p==='ai_analytics')renderAIAnalytics();}
document.getElementById('currencySelector').value=currentCurrency;
window.addEventListener('online',()=>{isOnline=true;syncToFirebase();showNotification('✅ تم الاتصال بالإنترنت، جاري المزامنة');});
window.addEventListener('offline',()=>{isOnline=false;showNotification('⚠️ انقطع الاتصال بالإنترنت، سيتم الحفظ محلياً','warning');});
if(localStorage.getItem('simo_current_user')){currentUser=JSON.parse(localStorage.getItem('simo_current_user'));document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';document.getElementById('userName').innerText=currentUser.name;loadFromFirebase();switchPage('dashboard');}
</script>
</body>
</html>
