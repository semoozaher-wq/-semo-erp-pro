<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN ERP PRO V16</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #1e293b; --accent: #3b82f6; --success: #10b981; 
            --danger: #ef4444; --warning: #f59e0b; --bg: #f8fafc; --card: #ffffff; --text: #1e293b;
        }
        [data-theme="dark"] {
            --primary: #0f172a; --bg: #020617; --card: #1e293b; --text: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }

        /* Layout */
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { 
            width: 260px; background: var(--primary); color: white; padding: 20px; 
            position: fixed; right: 0; height: 100vh; transition: 0.3s; z-index: 1000; 
        }
        .main-content { flex: 1; margin-right: 260px; padding: 25px; transition: 0.3s; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(100%); width: 260px; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .menu-toggle { display: flex !important; }
        }

        .menu-toggle {
            position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px;
            background: var(--accent); color: white; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* UI Components */
        .nav-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 15px; 
            border-radius: 10px; cursor: pointer; color: #94a3b8; margin-bottom: 8px; transition: 0.3s; 
        }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }
        
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        
        .stat-box { padding: 20px; border-radius: 15px; color: white; position: relative; }
        .btn { 
            padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; 
            font-weight: 600; display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-google { background: #white; color: #444; border: 1px solid #ddd; margin-top: 10px; width: 100%; justify-content: center; }

        input, select { 
            padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; 
            width: 100%; background: var(--card); color: var(--text); margin-bottom: 10px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; background: #f1f5f9; text-align: center; font-size: 13px; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }

        /* Auth Screen */
        .auth-overlay { 
            position: fixed; inset: 0; background: #0f172a; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .auth-box { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }

        /* POS Layout */
        .pos-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 768px) { .pos-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-theme="light">

<div id="authContainer" class="auth-overlay">
    <div class="auth-box">
        <h1 style="color:var(--accent); font-weight:900;">GOLDEN ERP</h1>
        <p style="margin-bottom:20px; color:#64748b;">نظام المحاسبة السحابي المتكامل</p>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button class="btn btn-primary" style="width:100%;" onclick="erp.handleEmailAuth()">دخول / تسجيل</button>
        <button class="btn btn-google" onclick="erp.handleGoogleAuth()">
            <img src="https://lh3.googleusercontent.com/COxitqgJr1sICpeS6DOf6j0pSBySCSSc_S4V4pQU0V78sXvSUIonpE6qZ_pSSh9U9tM" width="18"> الدخول عبر جوجل
        </button>
    </div>
</div>

<div id="appInterface" class="wrapper" style="display:none;">
    <div class="menu-toggle" onclick="erp.toggleSidebar()"><i class="fas fa-bars"></i></div>
    
    <aside class="sidebar" id="sidebar">
        <h2 style="text-align:center; margin-bottom:30px;"><i class="fas fa-crown"></i> GOLDEN V16</h2>
        <nav>
            <div class="nav-item active" onclick="erp.route('dash', this)"><i class="fas fa-home"></i> الرئيسية</div>
            <div class="nav-item" onclick="erp.route('pos', this)"><i class="fas fa-cash-register"></i> نقطة البيع</div>
            <div class="nav-item" onclick="erp.route('stock', this)"><i class="fas fa-boxes"></i> المخازن</div>
            <div class="nav-item" onclick="erp.route('contacts', this)"><i class="fas fa-users"></i> العملاء والموردين</div>
            <div class="nav-item" onclick="erp.route('ledger', this)"><i class="fas fa-book"></i> القيود المحاسبية</div>
            <div class="nav-item" onclick="erp.route('reports', this)"><i class="fas fa-file-invoice-dollar"></i> التقارير المالية</div>
            <div class="nav-item" onclick="erp.toggleTheme()" style="margin-top:20px;"><i class="fas fa-moon"></i> الوضع الليلي</div>
            <div class="nav-item" onclick="erp.logout()" style="color:var(--danger);"><i class="fas fa-sign-out-alt"></i> خروج</div>
        </nav>
    </aside>

    <main class="main-content" id="mainView"></main>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
    authDomain: "my-pos-system-11dee.firebaseapp.com",
    databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
    projectId: "my-pos-system-11dee",
    storageBucket: "my-pos-system-11dee.firebasestorage.app",
    messagingSenderId: "565195477080",
    appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
};
firebase.initializeApp(firebaseConfig);

const erp = {
    db: null, user: null,
    data: { products: [], sales: [], journal: [], contacts: [], settings: {} },
    cart: [],

    init() {
        firebase.auth().onAuthStateChanged(u => {
            if(u) {
                this.user = u;
                this.db = firebase.database().ref(`users/${u.uid}`);
                this.sync();
            } else {
                document.getElementById('authContainer').style.display = 'flex';
                document.getElementById('appInterface').style.display = 'none';
            }
        });
    },

    // Auth Actions
    async handleEmailAuth() {
        const e = document.getElementById('loginEmail').value, p = document.getElementById('loginPass').value;
        try { await firebase.auth().signInWithEmailAndPassword(e, p); }
        catch { await firebase.auth().createUserWithEmailAndPassword(e, p); }
    },

    async handleGoogleAuth() {
        const provider = new firebase.auth.GoogleAuthProvider();
        await firebase.auth().signInWithPopup(provider);
    },

    sync() {
        this.db.on('value', snap => {
            const val = snap.val() || {};
            this.data = {
                products: val.products || [],
                sales: val.sales || [],
                journal: val.journal || [],
                contacts: val.contacts || [],
                expenses: val.expenses || []
            };
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appInterface').style.display = 'flex';
            this.route('dash');
        });
    },

    save() { this.db.update(this.data); },

    // Routing & Views
    route(page, el) {
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if(window.innerWidth < 992) this.toggleSidebar();
        }
        const view = document.getElementById('mainView');
        
        switch(page) {
            case 'dash': view.innerHTML = this.viewDash(); this.renderChart(); break;
            case 'pos': view.innerHTML = this.viewPOS(); break;
            case 'stock': view.innerHTML = this.viewStock(); break;
            case 'contacts': view.innerHTML = this.viewContacts(); break;
            case 'ledger': view.innerHTML = this.viewLedger(); break;
            case 'reports': view.innerHTML = this.viewReports(); break;
        }
    },

    // --- View Components ---
    viewDash() {
        const sales = this.data.sales.reduce((a,b)=> a+b.total, 0);
        const stockVal = this.data.products.reduce((a,b)=> a+(b.price*b.qty), 0);
        return `
            <div class="grid">
                <div class="stat-box" style="background:var(--accent)"><h3>المبيعات</h3><h2>${sales} ج.م</h2></div>
                <div class="stat-box" style="background:var(--success)"><h3>قيمة المخزن</h3><h2>${stockVal} ج.م</h2></div>
                <div class="stat-box" style="background:var(--warning)"><h3>العملاء</h3><h2>${this.data.contacts.filter(c=>c.type==='عميل').length}</h2></div>
            </div>
            <div class="card" style="margin-top:20px;">
                <h3><i class="fas fa-chart-line"></i> نشاط المبيعات</h3>
                <canvas id="salesChart" height="100"></canvas>
            </div>
        `;
    },

    viewPOS() {
        return `
            <div class="pos-container">
                <div class="card">
                    <input type="text" placeholder="🔍 بحث سريع عن منتج..." oninput="erp.filterPOS(this.value)">
                    <div class="grid" id="posGrid" style="grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));">
                        ${this.data.products.map(p => `
                            <div class="card" style="cursor:pointer; text-align:center; border:1px solid #eee;" onclick="erp.addToCart('${p.id}')">
                                <strong>${p.name}</strong><br><span style="color:var(--accent)">${p.price} ج.م</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="card">
                    <h3>🛒 الفاتورة</h3>
                    <div id="cartItems" style="min-height:200px; margin:15px 0;"></div>
                    <select id="saleCustomer"><option>عميل نقدي</option>${this.data.contacts.filter(c=>c.type==='عميل').map(c=>`<option>${c.name}</option>`)}</select>
                    <h2 id="cartTotal" style="text-align:center; margin-bottom:15px;">0.00 ج.م</h2>
                    <button class="btn btn-primary" style="width:100%;" onclick="erp.checkout()">إتمام و طباعة</button>
                </div>
            </div>
        `;
    },

    // --- Core Logic ---
    addToCart(id) {
        const p = this.data.products.find(x => x.id === id);
        if(p.qty <= 0) return alert('نفذت الكمية!');
        const item = this.cart.find(x => x.id === id);
        if(item) item.q++; else this.cart.push({...p, q:1});
        this.updateCartUI();
    },

    updateCartUI() {
        const area = document.getElementById('cartItems');
        let total = 0;
        area.innerHTML = this.cart.map(i => {
            total += i.price * i.q;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.name} x${i.q}</span><span>${i.price*i.q}</span></div>`;
        }).join('');
        document.getElementById('cartTotal').innerText = total + " ج.م";
    },

    checkout() {
        if(this.cart.length === 0) return;
        const total = this.cart.reduce((a,b)=>a+(b.price*b.q),0);
        const sale = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            items: [...this.cart],
            total: total,
            customer: document.getElementById('saleCustomer').value
        };

        // المحاسبة: قيد مزدوج (من حـ/ الصندوق إلى حـ/ المبيعات)
        this.addJournalEntry(sale.date, "مبيعات فاتورة رقم " + sale.id, total, "الصندوق", "المبيعات");

        // تحديث المخزن
        this.cart.forEach(item => {
            const p = this.data.products.find(x => x.id === item.id);
            if(p) p.qty -= item.q;
        });

        this.data.sales.push(sale);
        this.save();
        this.printInvoice(sale);
        this.cart = [];
        this.route('pos');
    },

    addJournalEntry(date, desc, amount, debit, credit) {
        this.data.journal.push({ date, desc, amount, debit, credit });
    },

    viewLedger() {
        return `
            <div class="card">
                <h3>دفتر اليومية (قيد مزدوج)</h3>
                <table>
                    <thead><tr><th>التاريخ</th><th>البيان</th><th>مدين (+)</th><th>دائن (-)</th><th>المبلغ</th></tr></thead>
                    <tbody>${this.data.journal.map(j => `<tr><td>${j.date}</td><td>${j.desc}</td><td>${j.debit}</td><td>${j.credit}</td><td>${j.amount}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    },

    viewStock() {
        return `
            <div class="card">
                <h3>إدارة الأصناف</h3>
                <div class="grid" style="margin-bottom:15px;">
                    <input id="newPName" placeholder="اسم الصنف">
                    <input id="newPPrice" type="number" placeholder="سعر البيع">
                    <input id="newPQty" type="number" placeholder="الكمية">
                    <button class="btn btn-primary" onclick="erp.addProduct()">إضافة</button>
                </div>
                <table>
                    <thead><tr><th>الصنف</th><th>السعر</th><th>المخزون</th><th>القيمة</th></tr></thead>
                    <tbody>${this.data.products.map(p => `<tr><td>${p.name}</td><td>${p.price}</td><td>${p.qty}</td><td>${p.price*p.qty}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    },

    addProduct() {
        const name = document.getElementById('newPName').value;
        const price = Number(document.getElementById('newPPrice').value);
        const qty = Number(document.getElementById('newPQty').value);
        if(!name || !price) return;
        this.data.products.push({ id: Date.now().toString(), name, price, qty });
        this.save();
        this.route('stock');
    },

    viewContacts() {
        return `
            <div class="card">
                <h3>العملاء والموردين</h3>
                <div class="grid">
                    <input id="cName" placeholder="الاسم">
                    <select id="cType"><option>عميل</option><option>مورد</option></select>
                    <button class="btn btn-primary" onclick="erp.addContact()">حفظ</button>
                </div>
                <div class="grid" style="margin-top:20px;">
                    ${this.data.contacts.map(c => `<div class="card"><strong>${c.name}</strong><br><small>${c.type}</small></div>`).join('')}
                </div>
            </div>
        `;
    },

    addContact() {
        const name = document.getElementById('cName').value;
        const type = document.getElementById('cType').value;
        this.data.contacts.push({ name, type });
        this.save();
        this.route('contacts');
    },

    printInvoice(sale) {
        const win = window.open('', '', 'width=800,height=600');
        win.document.write(`
            <html dir="rtl">
            <head><title>فاتورة ${sale.id}</title><style>body{font-family:Cairo; padding:20px; text-align:center;}</style></head>
            <body>
                <h1>GOLDEN ERP</h1>
                <p>تاريخ: ${sale.date}</p>
                <p>العميل: ${sale.customer}</p>
                <hr>
                <table style="width:100%">
                    ${sale.items.map(i=>`<tr><td>${i.name}</td><td>${i.q}</td><td>${i.price*i.q}</td></tr>`).join('')}
                </table>
                <hr>
                <h3>الإجمالي: ${sale.total} ج.م</h3>
                <img src="https://api.qrserver.com/v1/create-qr-code/?data=SALE_${sale.id}">
                <script>setTimeout(()=> { window.print(); window.close(); }, 500)<\/script>
            </body></html>
        `);
    },

    renderChart() {
        const ctx = document.getElementById('salesChart');
        if(!ctx) return;
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: this.data.sales.slice(-7).map(s => s.date.split(',')[0]),
                datasets: [{ label: 'المبيعات', data: this.data.sales.slice(-7).map(s => s.total), borderColor: '#3b82f6', fill: true }]
            }
        });
    },

    toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); },
    toggleTheme() { 
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    },
    logout() { firebase.auth().signOut(); }
};

erp.init();
</script>
</body>
</html>
