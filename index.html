<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO ERP | المحاسبة المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#3b82f6;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--bg:#0f172a;--card:#1e293b;--text:#f8fafc;--border:#334155}
        body.light{--bg:#f1f5f9;--card:#ffffff;--text:#1e293b;--border:#e2e8f0}
        body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;transition:0.3s}
        
        /* شاشة الدخول */
        .login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0f172a,#1e1b4b);z-index:2000;display:flex;justify-content:center;align-items:center}
        .login-card{background:#1e293b;padding:40px;border-radius:30px;width:90%;max-width:400px;text-align:center;border:1px solid #334155}
        .login-card input{width:100%;padding:15px;margin:10px 0;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:12px;font-size:16px}
        .login-card button{width:100%;padding:15px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}
        .login-error{background:rgba(239,68,68,0.2);color:#f87171;padding:12px;border-radius:10px;margin-top:15px;display:none}
        
        /* النظام */
        .app{display:none}
        .sidebar{width:260px;background:#1e293b;padding:20px;border-left:1px solid #334155;position:fixed;right:0;top:0;height:100vh;overflow-y:auto}
        .main{margin-right:260px;padding:30px}
        .menu-item{padding:12px;margin:5px 0;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px}
        .menu-item:hover,.menu-item.active{background:#3b82f6;color:#fff}
        .card{background:#1e293b;padding:20px;border-radius:20px;border:1px solid #334155;margin-bottom:20px}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:25px}
        .stat-card{background:#1e293b;padding:20px;border-radius:18px;border-right:5px solid #3b82f6;cursor:pointer}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{padding:12px;text-align:right;border-bottom:1px solid #334155}
        .btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-weight:bold}
        .btn-p{background:#3b82f6;color:#fff}
        .btn-s{background:#10b981;color:#fff}
        .btn-d{background:#ef4444;color:#fff}
        input,select{width:100%;padding:12px;margin:8px 0;background:#0f172a;border:1px solid #334155;color:#fff;border-radius:10px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center}
        .modal.show{display:flex}
        .modal-content{background:#1e293b;padding:30px;border-radius:25px;width:95%;max-width:500px}
        .badge-w{background:rgba(245,158,11,0.2);color:#f59e0b;padding:4px 10px;border-radius:8px}
        @media(max-width:768px){.sidebar{width:70px}.sidebar span{display:none}.main{margin-right:70px}}
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div style="font-size:60px;">📊</div>
        <h1 style="color:#3b82f6;margin:20px 0">SEMO ERP</h1>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button onclick="doLogin()">دخول</button>
        <div id="loginError" class="login-error"></div>
        <div style="margin-top:20px;font-size:12px">admin / admin123</div>
    </div>
</div>

<!-- النظام -->
<div id="appSystem" class="app">
    <div style="display:flex">
        <div class="sidebar">
            <h2 style="text-align:center;color:#3b82f6;margin-bottom:20px">SEMO</h2>
            <div class="menu-item active" onclick="switchPage('dash',this)">🏠 <span>الرئيسية</span></div>
            <div class="menu-item" onclick="switchPage('inv',this)">📦 <span>المخزون</span></div>
            <div class="menu-item" onclick="switchPage('sales',this)">🛒 <span>المبيعات</span></div>
            <div class="menu-item" onclick="switchPage('exp',this)">💸 <span>المصروفات</span></div>
            <div class="menu-item" onclick="switchPage('users',this)">👥 <span>العملاء</span></div>
            <div class="menu-item" onclick="logout()">🚪 <span>خروج</span></div>
        </div>
        <div class="main">
            <div id="pageContent"></div>
        </div>
    </div>
</div>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
// ========== قاعدة البيانات ==========
let db = {
    products: JSON.parse(localStorage.getItem('semo_products')) || [],
    sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
    expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
    clients: JSON.parse(localStorage.getItem('semo_clients')) || []
};

function saveData() {
    localStorage.setItem('semo_products', JSON.stringify(db.products));
    localStorage.setItem('semo_sales', JSON.stringify(db.sales));
    localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
    localStorage.setItem('semo_clients', JSON.stringify(db.clients));
}

// تهيئة بيانات تجريبية
if(db.products.length === 0) {
    db.products = [
        {id:1, name:'مكتب خشبي', cost:500, price:800, qty:15},
        {id:2, name:'كرسي دوار', cost:300, price:550, qty:25},
        {id:3, name:'طابعة HP', cost:1200, price:1800, qty:5},
        {id:4, name:'شاشة 24 بوصة', cost:2000, price:3200, qty:8}
    ];
    db.clients = [
        {id:101, name:'شركة الأهرام', phone:'01001112223'},
        {id:102, name:'مؤسسة النور', phone:'01002223334'}
    ];
    saveData();
}

// ========== تسجيل الدخول ==========
function doLogin() {
    let user = document.getElementById('loginUser').value;
    let pass = document.getElementById('loginPass').value;
    
    if(user === 'admin' && pass === 'admin123') {
        localStorage.setItem('semo_logged', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appSystem').style.display = 'block';
        renderDashboard();
    } else {
        let err = document.getElementById('loginError');
        err.style.display = 'block';
        err.innerHTML = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
    }
}

function logout() {
    localStorage.removeItem('semo_logged');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appSystem').style.display = 'none';
}

// التحقق من تسجيل الدخول عند فتح الصفحة
if(localStorage.getItem('semo_logged') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appSystem').style.display = 'block';
    renderDashboard();
}

// ========== التنقل ==========
function switchPage(page, el) {
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
    if(el) el.classList.add('active');
    if(page === 'dash') renderDashboard();
    else if(page === 'inv') renderInventory();
    else if(page === 'sales') renderSales();
    else if(page === 'exp') renderExpenses();
    else if(page === 'users') renderClients();
}

// ========== الرئيسية ==========
function renderDashboard() {
    let totalSales = db.sales.reduce((a,b)=>a+b.total,0);
    let totalExp = db.expenses.reduce((a,b)=>a+b.amount,0);
    let profit = totalSales - totalExp;
    let lowStock = db.products.filter(p=>p.qty<=5).length;
    
    document.getElementById('pageContent').innerHTML = `
        <div class="grid">
            <div class="stat-card" onclick="switchPage('sales')"><h3>💰 المبيعات</h3><div style="font-size:24px">${totalSales.toLocaleString()} ج.م</div></div>
            <div class="stat-card" onclick="switchPage('exp')" style="border-color:#ef4444"><h3>💸 المصروفات</h3><div style="font-size:24px">${totalExp.toLocaleString()} ج.م</div></div>
            <div class="stat-card" onclick="switchPage('sales')" style="border-color:#10b981"><h3>📈 صافي الربح</h3><div style="font-size:24px;color:#10b981">${profit.toLocaleString()} ج.م</div></div>
            <div class="stat-card" onclick="switchPage('inv')" style="border-color:#f59e0b"><h3>📦 المنتجات</h3><div style="font-size:24px">${db.products.length}</div></div>
            <div class="stat-card" onclick="switchPage('inv')" style="border-color:#f59e0b"><h3>⚠️ منتجات منخفضة</h3><div style="font-size:24px">${lowStock}</div></div>
        </div>
        <div class="card"><h3>📋 آخر المبيعات</h3><table style="width:100%"><thead><tr><th>التاريخ</th><th>المنتج</th><th>العميل</th><th>المبلغ</th></tr></thead>
        <tbody>${db.sales.slice(-5).reverse().map(s=>`<tr><td>${s.date}</td><td>${s.product}</td><td>${s.client}</td><td>${s.total.toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table></div>
    `;
}

// ========== المخزون ==========
function renderInventory() {
    document.getElementById('pageContent').innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:15px"><h2>📦 المخزون</h2><button class="btn btn-p" onclick="openProductModal()">+ منتج جديد</button></div>
        <div class="card"><input type="text" id="searchProd" placeholder="🔍 بحث..." onkeyup="filterProducts()" style="margin-bottom:15px">
        <table id="prodTable"><thead><tr><th>المنتج</th><th>سعر الشراء</th><th>سعر البيع</th><th>الكمية</th><th></th><tr></thead>
        <tbody id="prodList"></tbody></table></div>`;
    refreshProducts();
}

function refreshProducts() {
    let search = document.getElementById('searchProd')?.value.toLowerCase() || '';
    let filtered = db.products.filter(p=>p.name.toLowerCase().includes(search));
    document.getElementById('prodList').innerHTML = filtered.map(p => `
        <tr>
            <td>${p.name}</td>
            <td>${p.cost} ج.م</td>
            <td>${p.price} ج.م</td>
            <td class="${p.qty<=5?'badge-w':''}">${p.qty}</td>
            <td><button class="btn btn-p" style="padding:5px" onclick="editProduct(${p.id})">✏️</button>
                <button class="btn btn-d" style="padding:5px" onclick="deleteProduct(${p.id})">🗑️</button>
            </td>
        </tr>`).join('');
}

function openProductModal(id=null) {
    let p = id ? db.products.find(x=>x.id==id) : {name:'', cost:0, price:0, qty:0};
    document.getElementById('modalBody').innerHTML = `
        <h3>${id?'✏️ تعديل':'➕ إضافة'} منتج</h3>
        <input id="prodName" value="${p.name}" placeholder="اسم المنتج">
        <input id="prodCost" type="number" value="${p.cost}" placeholder="سعر الشراء">
        <input id="prodPrice" type="number" value="${p.price}" placeholder="سعر البيع">
        <input id="prodQty" type="number" value="${p.qty}" placeholder="الكمية">
        <button class="btn btn-s" style="width:100%" onclick="saveProduct(${id})">💾 حفظ</button>
    `;
    document.getElementById('modal').classList.add('show');
}

function saveProduct(id) {
    let name = document.getElementById('prodName').value;
    if(!name) { alert('❌ اكتب اسم المنتج'); return; }
    let newProd = {
        id: id || Date.now(),
        name: name,
        cost: parseFloat(document.getElementById('prodCost').value) || 0,
        price: parseFloat(document.getElementById('prodPrice').value) || 0,
        qty: parseInt(document.getElementById('prodQty').value) || 0
    };
    if(id) {
        let idx = db.products.findIndex(x=>x.id==id);
        db.products[idx] = newProd;
    } else {
        db.products.push(newProd);
    }
    saveData();
    closeModal();
    renderInventory();
}

function editProduct(id) { openProductModal(id); }
function deleteProduct(id) {
    if(confirm('⚠️ حذف المنتج؟')) {
        db.products = db.products.filter(p=>p.id!==id);
        saveData();
        renderInventory();
    }
}
function filterProducts() { refreshProducts(); }

// ========== المبيعات ==========
function renderSales() {
    document.getElementById('pageContent').innerHTML = `
        <h2>🛒 المبيعات</h2>
        <div class="card">
            <select id="saleProduct">${db.products.map(p=>`<option value="${p.id}">${p.name} (${p.qty}) - ${p.price} ج.م</option>`)}</select>
            <select id="saleClient">${db.clients.map(c=>`<option value="${c.name}">${c.name}</option>`)}<option>زبون نقدي</option></select>
            <input id="saleQty" type="number" value="1" placeholder="الكمية">
            <button class="btn btn-s" style="width:100%" onclick="doSale()">💰 إتمام البيع</button>
        </div>
        <div class="card"><h3>سجل الفواتير</h3><table><thead><tr><th>التاريخ</th><th>المنتج</th><th>العميل</th><th>الكمية</th><th>الإجمالي</th></tr></thead>
        <tbody>${db.sales.slice().reverse().map(s=>`<tr><td>${s.date}</td><td>${s.product}</td><td>${s.client}</td><td>${s.qty}</td><td>${s.total.toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table></div>
    `;
}

function doSale() {
    let productId = parseInt(document.getElementById('saleProduct').value);
    let product = db.products.find(p=>p.id===productId);
    let qty = parseInt(document.getElementById('saleQty').value);
    if(product && product.qty >= qty) {
        product.qty -= qty;
        let sale = {
            id: Date.now(),
            date: new Date().toLocaleDateString('ar-EG'),
            product: product.name,
            client: document.getElementById('saleClient').value,
            qty: qty,
            total: qty * product.price
        };
        db.sales.push(sale);
        saveData();
        renderSales();
        alert(`✅ تم بيع ${qty} من ${product.name}`);
    } else {
        alert('❌ الكمية غير كافية');
    }
}

// ========== المصروفات ==========
function renderExpenses() {
    let total = db.expenses.reduce((a,b)=>a+b.amount,0);
    document.getElementById('pageContent').innerHTML = `
        <div style="display:flex;justify-content:space-between"><h2>💸 المصروفات (${total.toLocaleString()} ج.م)</h2><button class="btn btn-d" onclick="openExpModal()">+ مصروف</button></div>
        <div class="card"><table><thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th></th></tr></thead>
        <tbody>${db.expenses.map(e=>`<tr><td>${e.date}</td><td>${e.name}</td><td>${e.amount.toLocaleString()} ج.م</td><td><button onclick="deleteExpense(${e.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div>
    `;
}

function openExpModal() {
    document.getElementById('modalBody').innerHTML = `<h3>➕ مصروف جديد</h3><input id="expName" placeholder="البيان"><input id="expAmount" type="number" placeholder="المبلغ"><button class="btn btn-d" style="width:100%" onclick="addExpense()">حفظ</button>`;
    document.getElementById('modal').classList.add('show');
}

function addExpense() {
    let name = document.getElementById('expName').value;
    let amount = parseFloat(document.getElementById('expAmount').value);
    if(!name) { alert('❌ اكتب البيان'); return; }
    db.expenses.push({id:Date.now(), date:new Date().toLocaleDateString('ar-EG'), name:name, amount:amount});
    saveData();
    closeModal();
    renderExpenses();
}
function deleteExpense(id) {
    db.expenses = db.expenses.filter(e=>e.id!==id);
    saveData();
    renderExpenses();
}

// ========== العملاء ==========
function renderClients() {
    document.getElementById('pageContent').innerHTML = `
        <div style="display:flex;justify-content:space-between"><h2>👥 العملاء</h2><button class="btn btn-p" onclick="openClientModal()">+ عميل</button></div>
        <div class="card"><table><thead><td><th>الاسم</th><th>الهاتف</th><th></th></tr></thead>
        <tbody>${db.clients.map(c=>`<tr><td>${c.name}</td><td>${c.phone}</td><td><button onclick="deleteClient(${c.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div>
    `;
}
function openClientModal() {
    document.getElementById('modalBody').innerHTML = `<h3>➕ عميل جديد</h3><input id="clientName" placeholder="الاسم"><input id="clientPhone" placeholder="الهاتف"><button class="btn btn-s" style="width:100%" onclick="addClient()">حفظ</button>`;
    document.getElementById('modal').classList.add('show');
}
function addClient() {
    let name = document.getElementById('clientName').value;
    if(!name) { alert('❌ اكتب الاسم'); return; }
    db.clients.push({id:Date.now(), name:name, phone:document.getElementById('clientPhone').value || '-'});
    saveData();
    closeModal();
    renderClients();
}
function deleteClient(id) {
    db.clients = db.clients.filter(c=>c.id!==id);
    saveData();
    renderClients();
}

// ========== أدوات ==========
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// بدء التشغيل
if(db.products.length > 0 && localStorage.getItem('semo_logged') === 'true') {
    renderDashboard();
}
</script>
</body>
</html>
