<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEMO ERP | بوابة الدخول</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://cloudflare.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --main: #0f172a; --accent: #2563eb; --success: #10b981; }
        body { background: var(--main); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .card { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .iti { width: 100%; text-align: left; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; background: var(--accent); color: white; margin-top: 10px; }
        .hidden { display: none; }
        #msg { color: red; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card" id="auth-container">
        <h2>SEMO ERP</h2>
        <div id="login-view">
            <input type="email" id="email" placeholder="الإيميل">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول آمن</button>
            <p onclick="switchView('signup-view')" style="cursor:pointer; color:var(--accent); font-size:0.8rem; margin-top:15px;">إنشاء حساب جديد</p>
            <p onclick="switchView('phone-view')" style="cursor:pointer; color:var(--accent); font-size:0.8rem;">الدخول برقم الهاتف (SMS)</p>
        </div>
        <div id="signup-view" class="hidden">
            <input type="email" id="s-email" placeholder="الإيميل">
            <input type="password" id="s-pass" placeholder="كلمة المرور">
            <button class="btn" style="background:var(--success)" onclick="signup()">تسجيل الحساب</button>
            <p onclick="switchView('login-view')" style="cursor:pointer; margin-top:15px;">العودة للدخول</p>
        </div>
        <div id="phone-view" class="hidden">
            <input type="tel" id="phone">
            <div id="recaptcha-container"></div>
            <button class="btn" onclick="sendSMS()">إرسال الكود 💬</button>
            <div id="otp-sec" class="hidden">
                <input type="text" id="otp" placeholder="الكود">
                <button class="btn" onclick="verifyOTP()">تحقق ودخول</button>
            </div>
            <p onclick="switchView('login-view')" style="cursor:pointer; margin-top:15px;">العودة</p>
        </div>
        <div id="msg"></div>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCRhkV4HLp26QMNorerA9nDeRAQSsD0mmU", authDomain: "://firebaseapp.com", projectId: "my-pos-system-33831" };
        firebase.initializeApp(firebaseConfig);
        const iti = window.intlTelInput(document.querySelector("#phone"), { initialCountry: "ly", preferredCountries: ["ly", "eg", "sa"], separateDialCode: true, utilsScript: "https://cloudflare.com" });
        function switchView(id) { document.querySelectorAll('#auth-container > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function login() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            firebase.auth().signInWithEmailAndPassword(e, p).then(() => { window.location.replace("dashboard.html"); }).catch(err => alert(err.message));
        }
        function signup() {
            const e = document.getElementById('s-email').value, p = document.getElementById('s-pass').value;
            firebase.auth().createUserWithEmailAndPassword(e, p).then(res => { res.user.sendEmailVerification(); alert("تم التسجيل! فعل حسابك من الإيميل ✅"); switchView('login-view'); }).catch(err => alert(err.message));
        }
        function sendSMS() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
            firebase.auth().signInWithPhoneNumber(iti.getNumber(), window.recaptchaVerifier).then(res => { window.conf = res; document.getElementById('otp-sec').classList.remove('hidden'); alert("وصلك كود 📱"); }).catch(err => alert(err.message));
        }
        function verifyOTP() { conf.confirm(document.getElementById('otp').value).then(() => window.location.replace("dashboard.html")).catch(() => alert("خطأ")); }
    </script>
</body>
</html>
