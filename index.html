<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN ERP V16 | PRO EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        [data-theme="dark"] { --primary: #f8fafc; --accent: #60a5fa; --bg: #020617; --card: #1e293b; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .auth-screen { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .auth-box input, .auth-box select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .app-grid { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background: #0f172a; color: white; padding: 20px; position: sticky; top: 0; height: 100vh; }
        .nav-link { padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); }
        .content { padding: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-p { background: var(--accent); } .btn-d { background: var(--danger); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        #aiBot { position: fixed; bottom: 80px; left: 20px; width: 320px; height: 450px; background: var(--card); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; flex-direction: column; border: 2px solid var(--accent); z-index: 5000; }
    </style>
</head>
<body>

<div id="authLayer" class="auth-screen">
    <div class="auth-box">
        <h2 style="color:var(--accent)">GOLDEN ERP V16</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <select id="role"><option value="admin">مدير</option><option value="user">موظف</option></select>
        <button class="btn btn-p" style="width:100%" onclick="app.auth()">دخول</button>
        <p onclick="app.isNew=!app.isNew; this.innerText=app.isNew?'دخول؟':'إنشاء حساب؟'" style="cursor:pointer; margin-top:15px; font-size:14px;">إنشاء حساب جديد؟</p>
    </div>
</div>

<div id="mainApp" class="app-grid" style="display:none">
    <aside class="sidebar">
        <h3 style="color:var(--accent); margin-bottom:20px;">القائمة الرئيسية</h3>
        <div class="nav-link active" onclick="app.view('pos', this)"><i class="fas fa-cash-register"></i> الكاشير</div>
        <div class="nav-link" onclick="app.view('stock', this)"><i class="fas fa-boxes"></i> المخزن</div>
        <div class="nav-link" onclick="app.view('expenses', this)"><i class="fas fa-wallet"></i> المصاريف</div>
        <div class="nav-link" onclick="app.view('returns', this)"><i class="fas fa-undo"></i> المرتجعات</div>
        <div class="nav-link" onclick="app.view('reports', this)"><i class="fas fa-chart-line"></i> التقارير</div>
        <div class="nav-link" onclick="app.view('audit', this)"><i class="fas fa-history"></i> سجل العمليات</div>
        <div style="margin-top:auto">
            <div class="nav-link" onclick="app.logout()"><i class="fas fa-sign-out-alt"></i> خروج</div>
        </div>
    </aside>
    <main class="content" id="viewArea"></main>
</div>

<button onclick="app.toggleAI()" style="position:fixed; bottom:20px; left:20px; width:55px; height:55px; border-radius:50%; background:var(--accent); color:white; border:none; cursor:pointer; z-index:5001;"><i class="fas fa-robot"></i></button>
<div id="aiBot">
    <div style="background:var(--accent); color:white; padding:15px; border-radius:18px 18px 0 0;">المساعد الذكي V16</div>
    <div id="aiChat" style="flex:1; padding:15px; overflow-y:auto; font-size:13px;">كيف أساعدك اليوم؟</div>
    <div style="padding:10px; display:flex;"><input type="text" id="aiIn" style="flex:1; border:1px solid #ddd; padding:8px; border-radius:5px;"><button onclick="app.askAI()" class="btn btn-p">إرسال</button></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
    authDomain: "my-pos-system-11dee.firebaseapp.com",
    databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
    projectId: "my-pos-system-11dee",
    storageBucket: "my-pos-system-11dee.firebasestorage.app",
    messagingSenderId: "565195477080",
    appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.database();

const app = {
    user: null, isNew: false, data: { products: [], sales: [], expenses: [], returns: [], logs: [] }, cart: [],
    init() {
        auth.onAuthStateChanged(u => {
            if(u) { this.user = u; this.sync(); document.getElementById('authLayer').style.display='none'; document.getElementById('mainApp').style.display='grid'; }
            else { document.getElementById('authLayer').style.display='flex'; document.getElementById('mainApp').style.display='none'; }
        });
    },
    async auth() {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        try { if(this.isNew) await auth.createUserWithEmailAndPassword(e,p); else await auth.signInWithEmailAndPassword(e,p); }
        catch(err) { alert(err.message); }
    },
    sync() {
        db.ref(`v16/${this.user.uid}`).on('value', s => { this.data = s.val() || this.data; this.view('pos'); });
    },
    save() { db.ref(`v16/${this.user.uid}`).set(this.data); },
    log(action) { this.data.logs.unshift({ date: new Date().toLocaleString(), user: this.user.email, action }); this.save(); },
    
    view(v, el) {
        if(el) { document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active')); el.classList.add('active'); }
        const area = document.getElementById('viewArea');
        if(v === 'pos') area.innerHTML = this.uiPOS();
        if(v === 'stock') area.innerHTML = this.uiStock();
        if(v === 'expenses') area.innerHTML = this.uiExpenses();
        if(v === 'returns') area.innerHTML = this.uiReturns();
        if(v === 'reports') area.innerHTML = this.uiReports();
        if(v === 'audit') area.innerHTML = this.uiAudit();
    },

    uiPOS() {
        return `<div style="display:grid; grid-template-columns: 1fr 350px; gap:20px;">
            <div class="card"><h3>المنتجات</h3><div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:10px;">
                ${this.data.products.map(p => `<div class="card" style="text-align:center; cursor:pointer;" onclick="app.addToCart(${p.id})"><b>${p.name}</b><br>${p.price} ج.م<br><small>مخزن: ${p.qty}</small></div>`).join('')}
            </div></div>
            <div class="card"><h3>الفاتورة</h3><div id="cart"></div><button class="btn btn-p" style="width:100%" onclick="app.checkout()">تأكيد ودفع</button></div>
        </div>`;
    },

    addToCart(id) {
        const p = this.data.products.find(x=>x.id===id);
        if(p && p.qty > 0) { this.cart.push({...p}); this.upCart(); } else alert("نفدت الكمية!");
    },
    upCart() {
        const c = document.getElementById('cart');
        let total = this.cart.reduce((s,i)=>s+parseFloat(i.price),0);
        c.innerHTML = this.cart.map(i=>`<div>${i.name} - ${i.price}</div>`).join('') + `<hr><h4>الإجمالي: ${total}</h4>`;
    },
    checkout() {
        if(!this.cart.length) return;
        const total = this.cart.reduce((s,i)=>s+parseFloat(i.price),0);
        const sale = { id: Date.now(), date: new Date().toLocaleString(), total, items: [...this.cart] };
        this.cart.forEach(i => this.data.products.find(p=>p.id===i.id).qty--);
        this.data.sales.unshift(sale);
        this.log(`بيع فاتورة بقيمة ${total}`);
        this.print(sale);
        this.cart = []; this.save();
    },
    print(s) {
        const w = window.open('', '_blank');
        w.document.write(`<html><body style="text-align:center; font-family:Cairo;"><h2>فاتورة GOLDEN</h2><p>${s.date}</p><hr>
            ${s.items.map(i=>`<p>${i.name}: ${i.price}</p>`).join('')}<hr><h3>Total: ${s.total}</h3>
            <script>window.print(); setTimeout(()=>window.close(), 500);<\/script></body></html>`);
    },
    uiStock() {
        return `<div class="card"><h3>إضافة منتج</h3><input id="pn" placeholder="الاسم"> <input id="pp" placeholder="السعر"> <input id="pq" placeholder="الكمية"> <button class="btn btn-p" onclick="app.addP()">حفظ</button></div>
            <div class="card"><table><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>حذف</th></tr>
            ${this.data.products.map(p=>`<tr><td>${p.name}</td><td>${p.price}</td><td>${p.qty}</td><td><i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="app.delP(${p.id})"></i></td></tr>`).join('')}</table></div>`;
    },
    addP() {
        const n=document.getElementById('pn').value, p=document.getElementById('pp').value, q=document.getElementById('pq').value;
        if(n&&p) { this.data.products.push({id:Date.now(), name:n, price:p, qty:q}); this.log(`إضافة منتج ${n}`); this.save(); }
    },
    delP(id) { this.data.products = this.data.products.filter(p=>p.id!==id); this.log(`حذف منتج`); this.save(); },
    uiExpenses() {
        return `<div class="card"><h3>تسجيل مصروف</h3><input id="exn" placeholder="البيان"> <input id="exv" placeholder="المبلغ"> <button class="btn btn-p" onclick="app.addEx()">حفظ</button></div>`;
    },
    addEx() {
        const n=document.getElementById('exn').value, v=document.getElementById('exv').value;
        if(n&&v) { this.data.expenses.push({date: new Date().toLocaleDateString(), name:n, val:v}); this.log(`صرف مبلغ ${v} لـ ${n}`); this.save(); }
    },
    uiReports() {
        const sales = this.data.sales.reduce((s,i)=>s+i.total,0);
        const ex = this.data.expenses.reduce((s,i)=>s+parseFloat(i.val),0);
        return `<div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px;">
            <div class="card"><h4>المبيعات</h4><h2>${sales}</h2></div>
            <div class="card"><h4>المصاريف</h4><h2>${ex}</h2></div>
            <div class="card" style="background:var(--success); color:white;"><h4>الربح الصافي</h4><h2>${sales - ex}</h2></div>
        </div>`;
    },
    uiAudit() {
        return `<div class="card"><h3>سجل العمليات 🛡️</h3>${this.data.logs.map(l=>`<div style="font-size:12px; border-bottom:1px solid #eee; padding:5px;">${l.date} - ${l.action} (${l.user})</div>`).join('')}</div>`;
    },
    toggleAI() { const b=document.getElementById('aiBot'); b.style.display=b.style.display==='flex'?'none':'flex'; },
    askAI() {
        const q=document.getElementById('aiIn').value, chat=document.getElementById('aiChat');
        let res = "لم أفهم السؤال.";
        if(q.includes('ربح')) {
            const s=this.data.sales.reduce((a,b)=>a+b.total,0), e=this.data.expenses.reduce((a,b)=>a+parseFloat(b.val),0);
            res = `صافي الربح حالياً هو ${s - e} ج.م.`;
        }
        chat.innerHTML += `<p><b>أنت:</b> ${q}</p><p style="color:var(--accent)"><b>AI:</b> ${res}</p>`;
    },
    logout() { auth.signOut(); }
};
app.init();
</script>
</body>
</html>
