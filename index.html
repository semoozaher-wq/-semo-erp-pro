<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN ERP V23 | النسخة الاحترافية الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        [data-theme="dark"] { --primary: #f8fafc; --accent: #60a5fa; --bg: #020617; --card: #1e293b; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; }
        .wrapper { display: flex; }
        .sidebar { width: 260px; background: var(--primary); color: white; position: fixed; right: 0; height: 100vh; padding: 20px; z-index: 1000; }
        .main { flex: 1; margin-right: 260px; padding: 25px; min-height: 100vh; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; }
        .nav-item.active, .nav-item:hover { background: var(--accent); color: white; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-d { background: var(--danger); color: white; }
        .btn-s { background: var(--success); color: white; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .admin-only { display: block; } /* سيتم التحكم بها بالجافا سكريبت */
        @media (max-width: 768px) { .sidebar { width: 0; padding: 0; overflow: hidden; } .main { margin-right: 0; } }
    </style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:var(--primary); z-index:9999; display:flex; align-items:center; justify-content:center; color:white;">
    <div class="card" style="width:90%; max-width:400px; text-align:center;">
        <h2 style="color:var(--accent)">تسجيل الدخول V23</h2>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <select id="role"><option value="admin">مدير</option><option value="staff">موظف</option></select>
        <button class="btn btn-p" style="width:100%; margin-top:15px; justify-content:center;" onclick="app.login()">دخول النظام</button>
    </div>
</div>

<div class="wrapper" id="appUI" style="display:none;">
    <aside class="sidebar">
        <h2 style="text-align:center; margin-bottom:30px; color:var(--accent);">GOLDEN V23</h2>
        <nav>
            <div class="nav-item active" onclick="app.route('dash', this)"><i class="fas fa-th-large"></i> الرئيسية</div>
            <div class="nav-item" onclick="app.route('pos', this)"><i class="fas fa-cash-register"></i> نقطة البيع</div>
            <div class="nav-item admin-only" onclick="app.route('stock', this)"><i class="fas fa-boxes"></i> المخزن</div>
            <div class="nav-item admin-only" onclick="app.route('ledger', this)"><i class="fas fa-user-tie"></i> الحسابات</div>
            <div class="nav-item" onclick="app.toggleTheme()"><i class="fas fa-moon"></i> الوضع الليلي</div>
            <div class="nav-item" onclick="location.reload()" style="color:var(--danger); margin-top:50px;"><i class="fas fa-sign-out-alt"></i> خروج</div>
        </nav>
    </aside>

    <main class="main" id="view"></main>
</div>

<div id="modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center;">
    <div class="modal-content" id="m-body" style="background:var(--bg); padding:25px; border-radius:15px; width:90%; max-width:600px;"></div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const app = {
    role: 'staff',
    data: { products: [], sales: [], contacts: [], cart: [] },

    init() {
        db.ref('v23_final').on('value', s => {
            this.data = s.val() || { products: [], sales: [], contacts: [] };
            if(document.getElementById('appUI').style.display === 'flex') this.route('dash');
        });
    },

    login() {
        this.role = document.getElementById('role').value;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appUI').style.display = 'flex';
        if(this.role === 'staff') document.querySelectorAll('.admin-only').forEach(el => el.style.display='none');
        this.route('dash');
    },

    save() { db.ref('v23_final').set(this.data); },

    route(p, el) {
        if(el) { document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
        const v = document.getElementById('view');
        if(p==='dash') v.innerHTML = this.drawDash();
        if(p==='pos') v.innerHTML = this.drawPOS();
        if(p==='stock') v.innerHTML = this.drawStock();
        if(p==='ledger') v.innerHTML = this.drawLedger();
    },

    drawDash() {
        const s = this.data.sales?.reduce((a,b)=>a+Number(b.total), 0) || 0;
        return `
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px;">
                <div class="card" style="background:var(--accent); color:white;"><h4>إجمالي المبيعات</h4><h2>${s} ج.م</h2></div>
                <div class="card" style="background:var(--success); color:white;"><h4>عدد العمليات</h4><h2>${this.data.sales?.length || 0}</h2></div>
            </div>
            <div class="card" style="margin-top:20px;"><h3>📊 آخر الفواتير</h3><table><thead><tr><th>رقم الفاتورة</th><th>التاريخ</th><th>المبلغ</th></tr></thead><tbody>${this.data.sales?.slice(0,5).map(x=>`<tr><td>${x.id}</td><td>${x.date}</td><td>${x.total} ج.م</td></tr>`).join('') || ''}</tbody></table></div>
        `;
    },

    drawPOS() {
        return `
            <div style="display:grid; grid-template-columns: 1fr 350px; gap:20px;">
                <div class="card">
                    <h3>🛒 اختر المنتجات</h3>
                    <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:10px; margin-top:15px;">
                        ${this.data.products?.filter(p=>p.qty>0).map(p=>`<div class="card" style="text-align:center; padding:10px; cursor:pointer; border:1px solid #eee;" onclick="app.addToCart('${p.id}')"><b>${p.name}</b><br><small>متاح: ${p.qty}</small><br><span style="color:var(--accent)">${p.price} ج.م</span></div>`).join('') || 'المخزن فارغ'}
                    </div>
                </div>
                <div class="card">
                    <h3>الفاتورة الحالية</h3>
                    <div id="cartArea" style="min-height:200px; margin-top:10px; border-bottom:1px dashed #ccc;"></div>
                    <div style="padding:15px 0;"><b>الإجمالي: </b><span id="cartTotal">0</span> ج.م</div>
                    <button class="btn btn-p" style="width:100%;" onclick="app.checkout()">إتمام البيع وخصم المخزن ✅</button>
                </div>
            </div>
        `;
    },

    cart: [],
    addToCart(id) {
        const p = this.data.products.find(x=>x.id==id);
        const inCart = this.cart.find(x=>x.id==id);
        if(inCart) { if(inCart.count < p.qty) inCart.count++; } 
        else { this.cart.push({...p, count: 1}); }
        this.updateCartUI();
    },

    updateCartUI() {
        const area = document.getElementById('cartArea');
        area.innerHTML = this.cart.map((item, i)=>`<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${item.name} (x${item.count})</span><b>${item.price * item.count} <i class="fas fa-trash" onclick="app.cart.splice(${i},1); app.updateCartUI();" style="color:red; cursor:pointer;"></i></b></div>`).join('');
        document.getElementById('cartTotal').innerText = this.cart.reduce((a,b)=>a+(b.price*b.count),0);
    },

    checkout() {
        if(this.cart.length === 0) return;
        const total = this.cart.reduce((a,b)=>a+(b.price*b.count),0);
        // تحديث المخزن
        this.cart.forEach(item => {
            const p = this.data.products.find(x=>x.id == item.id);
            p.qty -= item.count;
        });
        this.data.sales.unshift({ id: Date.now(), total, date: new Date().toLocaleString(), items: [...this.cart] });
        this.save();
        alert("تمت العملية بنجاح وتحديث المخزن!");
        this.cart = []; this.updateCartUI();
    },

    drawStock() {
        return `
            <div class="card">
                <h3>📦 إدارة الأصناف</h3>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input id="pn" placeholder="اسم المنتج">
                    <input id="pp" type="number" placeholder="السعر">
                    <input id="pq" type="number" placeholder="الكمية">
                    <button class="btn btn-p" onclick="app.addP()">إضافة</button>
                </div>
            </div>
            <div class="card">
                <table><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>إجراء</th></tr></thead>
                <tbody>${this.data.products?.map(p=>`<tr><td>${p.name}</td><td>${p.price}</td><td>${p.qty}</td><td>
                    <button class="btn btn-d" onclick="app.delP('${p.id}')"><i class="fas fa-trash"></i></button>
                </td></tr>`).join('') || ''}</tbody></table>
            </div>
        `;
    },

    addP() {
        const n=document.getElementById('pn').value, p=document.getElementById('pp').value, q=document.getElementById('pq').value;
        if(n&&p&&q){ this.data.products.push({id:Date.now(), name:n, price:p, qty:q}); this.save(); }
    },

    delP(id) { if(confirm('حذف الصنف؟')){ this.data.products = this.data.products.filter(x=>x.id!=id); this.save(); } },
    
    toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
};

app.init();
</script>
</body>
</html>
