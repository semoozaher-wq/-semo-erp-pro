<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفتر الذهبي - نظام إدارة متكامل</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Styles هنا */
    </style>
</head>
<body>
    <div id="notification" class="notification"></div>

    <!-- Login/Register Section -->
    <div id="authSection" class="auth-container">
        <h1 class="auth-title">💰 الدفتر الذهبي</h1>
        <p class="auth-subtitle">نظام إدارة متكامل للمبيعات والمخزون</p>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuthTab('register')">إنشاء حساب</button>
        </div>

        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="loginEmail" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary w-full">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
            <div id="loginError" style="color:var(--danger);margin-top:10px;text-align:center;display:none;"></div>
        </form>

        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="registerName" required placeholder="محمد أحمد">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="registerEmail" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="registerPassword" required placeholder="••••••••" minlength="6">
            </div>
            <button type="submit" class="btn-success w-full">
                <i class="fas fa-user-plus"></i> إنشاء حساب
            </button>
            <div id="registerError" style="color:var(--danger);margin-top:10px;text-align:center;display:none;"></div>
        </form>
    </div>

    <!-- Main App Section -->
    <div id="appSection" style="display:none;">
        <header>
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">💰</div>
                    <span>الدفتر الذهبي</span>
                </div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <span id="userName">المستخدم</span>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()"></button>
                <button class="btn-logout" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> خروج
                </button>
            </div>
        </header>

        <div class="container">
            <nav>
                <button class="nav-btn active" onclick="showSection('dashboard')">
                    <i class="fas fa-home"></i><br>الرئيسية
                </button>
                <button class="nav-btn" onclick="showSection('pos')">
                    <i class="fas fa-shopping-cart"></i><br> نقطة البيع
                </button>
                <button class="nav-btn" onclick="showSection('products')">
                    <i class="fas fa-box"></i><br>المنتجات
                </button>
                <button class="nav-btn" onclick="showSection('customers')">
                    <i class="fas fa-users"></i><br>العملاء
                </button>
                <button class="nav-btn" onclick="showSection('suppliers')">
                    <i class="fas fa-truck"></i><br>الموردين
                </button>
                <button class="nav-btn" onclick="showSection('sales')">
                    <i class="fas fa-chart-line"></i><br>المبيعات
                </button>
                <button class="nav-btn" onclick="showSection('expenses')">
                    <i class="fas fa-wallet"></i><br>المصروفات
                </button>
                <button class="nav-btn" onclick="showSection('returns')">
                    <i class="fas fa-undo"></i><br>المرتجعات
                </button>
                <button class="nav-btn" onclick="showSection('reports')">
                    <i class="fas fa-file-alt"></i><br>التقارير
                </button>
            </nav>

            <!-- Dashboard Section -->
            <div id="dashboardSection" class="content active">
                <div class="card">
                    <div class="card-title">
                        <i class="fas fa-chart-pie"></i> لوحة التحكم
                    </div>
                    <div class="grid">
                        <div class="stat-card">
                            <div class="stat-icon" style="color:var(--success);">💵</div>
                            <div class="stat-value" id="todaySales">0</div>
                            <div class="stat-label">مبيعات اليوم</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="color:var(--danger);">💸</div>
                            <div class="stat-value" id="todayExpenses">0</div>
                            <div class="stat-label">مصروفات اليوم</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="color:var(--info);">📊</div>
                            <div class="stat-value" id="todayProfit">0</div>
                            <div class="stat-label">ربح اليوم</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon" style="color:var(--warning);">📦</div>
                            <div class="stat-value" id="lowStock">0</div>
                            <div class="stat-label">منتجات منخفضة المخزون</div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>

                <div class="grid">
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-clock"></i> آخر المبيعات
                        </div>
                        <div id="recentSalesList" class="table-responsive">
                            <p class="text-center empty-state">لا توجد مبيعات</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-exclamation-triangle"></i> تنبيهات المخزون
                        </div>
                        <div id="lowStockList" class="table-responsive">
                            <p class="text-center empty-state">لا توجد تنبيهات</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- باقي أقسام التطبيق -->
            <!-- POS Section, Products Section, Customers Section, Suppliers Section, Sales Section, Expenses Section, Returns Section, Reports Section -->
            <!-- يمكنك إضافة الكود الخاص بكل قسم هنا -->
        </div>

        <div class="quick-actions">
            <button class="quick-action" style="background:var(--primary-light);color:#fff;" onclick="showSection('pos')">
                <i class="fas fa-plus"></i>
            </button>
            <button class="quick-action" style="background:var(--info);color:#fff;" onclick="openModal('addCustomerModal')">
                <i class="fas fa-user-plus"></i>
            </button>
        </div>
    </div>

    <!-- Modals (Add Product, Add Customer, etc.) -->
    <!-- يمكنك إضافة الأكواد الخاصة بالنوافذ المنبثقة هنا -->

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDemoKey-1234567890",
            authDomain: "golden-ledger.firebaseapp.com",
            databaseURL: "https://golden-ledger-default-rtdb.firebaseio.com",
            projectId: "golden-ledger",
            storageBucket: "golden-ledger.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        // Initialize Firebase
        let app, auth, db;
        let firebaseInitialized = false;

        // Global Variables
        let currentUser = null;
        let cart = [];
        let selectedCustomer = null;
        let settings = { companyName: 'الدفتر الذهبي', companyPhone: '', currency: 'EGP' };
        let sales = [];
        let products = [];
        let customers = [];
        let suppliers = [];
        let expenses = [];
        let returns = [];
        let salesChart = null;
        let expenseFilterType = 'all';

        // Initialize App
        document.addEventListener('DOMContentLoaded', function() {
            initializeFirebase();
            loadFromLocalStorage();
            checkAuthState();
        });

        function initializeFirebase() {
            try {
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.database();
                firebaseInitialized = true;
                auth.onAuthStateChanged(handleAuthStateChange);
            } catch (error) {
                console.log('Firebase init failed, using localStorage');
                firebaseInitialized = false;
            }
        }

        function loadFromLocalStorage() {
            const storedSettings = localStorage.getItem('settings');
            if (storedSettings) settings = JSON.parse(storedSettings);

            const storedProducts = localStorage.getItem('products');
            if (storedProducts) products = JSON.parse(storedProducts);

            const storedCustomers = localStorage.getItem('customers');
            if (storedCustomers) customers = JSON.parse(storedCustomers);

            const storedSuppliers = localStorage.getItem('suppliers');
            if (storedSuppliers) suppliers = JSON.parse(storedSuppliers);

            const storedSales = localStorage.getItem('sales');
            if (storedSales) sales = JSON.parse(storedSales);

            const storedExpenses = localStorage.getItem('expenses');
            if (storedExpenses) expenses = JSON.parse(storedExpenses);

            const storedReturns = localStorage.getItem('returns');
            if (storedReturns) returns = JSON.parse(storedReturns);

            // Load dark mode preference
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('settings', JSON.stringify(settings));
            localStorage.setItem('products', JSON.stringify(products));
            localStorage.setItem('customers', JSON.stringify(customers));
            localStorage.setItem('suppliers', JSON.stringify(suppliers));
            localStorage.setItem('sales', JSON.stringify(sales));
            localStorage.setItem('expenses', JSON.stringify(expenses));
            localStorage.setItem('returns', JSON.stringify(returns));
        }

        function checkAuthState() {
            const storedUser = localStorage.getItem('currentUser');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                showApp();
            }
        }

        function handleAuthStateChange(user) {
            currentUser = user;
            if (user) {
                showApp();
                syncWithFirebase();
            } else {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('appSection').style.display = 'none';
        }

        function showApp() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('userName').textContent = currentUser?.displayName || currentUser?.email || 'المستخدم';
            renderAll();
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.querySelector(`[onclick="switchAuthTab('${tab}')"]`).classList.add('active');
            document.getElementById(`${tab}Form`).classList.add('active');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                if (firebaseInitialized) {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    // Demo login
                    currentUser = { email, displayName: email.split('@')[0] };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showApp();
                }
                errorDiv.style.display = 'none';
            } catch (error) {
                errorDiv.textContent = error.message || 'خطأ في تسجيل الدخول';
                errorDiv.style.display = 'block';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const errorDiv = document.getElementById('registerError');

            try {
                if (firebaseInitialized) {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    await userCredential.user.updateProfile({ displayName: name });
                } else {
                    // Demo registration
                    currentUser = { email, displayName: name };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showApp();
                }
                errorDiv.style.display = 'none';
                showNotification('تم إنشاء الحساب بنجاح!');
            } catch (error) {
                errorDiv.textContent = error.message || 'خطأ في إنشاء الحساب';
                errorDiv.style.display = 'block';
            }
        }

        async function handleLogout() {
            try {
                if (firebaseInitialized) {
                    await auth.signOut();
                }
                localStorage.removeItem('currentUser');
                cart = [];
                showAuth();
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        function showSection(section) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${section}Section`).classList.add('active');
            document.querySelector(`[onclick="showSection('${section}')"]`).classList.add('active');

            if (section === 'pos') {
                renderPosProducts();
                updateCartUI();
            } else if (section === 'dashboard') {
                updateDashboardStats();
            }
        }

        function renderAll() {
            renderPosProducts();
            renderProducts();
            renderCustomers();
            renderSuppliers();
            renderExpenses();
            renderReturns();
            renderSalesList();
            updateDashboardStats();
            renderCategoryFilters();
            populateReturnProducts();
        }

        // Product Functions
        function addProduct(e) {
            e.preventDefault();
            const product = {
                id: Date.now(),
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                cost: parseFloat(document.getElementById('productCost').value),
                price: parseFloat(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                barcode: document.getElementById('productBarcode').value || ''
            };
            products.push(product);
            saveToLocalStorage();
            syncToFirebase('products', products);
            closeModal('addProductModal');
            e.target.reset();
            renderProducts();
            renderPosProducts();
            showNotification('تمت إضافة المنتج بنجاح');
        }

        function renderProducts() {
            const search = document.getElementById('productSearch').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            const tbody = document.getElementById('productsList');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">لا توجد منتجات</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map((p, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${p.name}</td>
                    <td>${getCategoryName(p.category)}</td>
                    <td>${p.price.toFixed(2)} ${getCurrencySymbol()}</td>
                    <td>
                        ${p.stock <= 5 ? `<span class="badge badge-danger">${p.stock}</span>` : p.stock}
                    </td>
                    <td>
                        <button class="btn-danger btn-small" onclick="deleteProduct(${p.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteProduct(id) {
            if (confirm('هل تريد حذف هذا المنتج؟')) {
                products = products.filter(p => p.id !== id);
                saveToLocalStorage();
                syncToFirebase('products', products);
                renderProducts();
                renderPosProducts();
                showNotification('تم حذف المنتج');
            }
        }

        function renderPosProducts() {
            const container = document.getElementById('posProducts');
            const searchTerm = document.getElementById('posSearch')?.value?.toLowerCase() || '';

            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm);
                const matchesCategory = window.posCategoryFilter === 'all' || p.category === window.posCategoryFilter;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-center empty-state">لا توجد منتجات</p>';
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price.toFixed(2)} ${getCurrencySymbol()}</div>
                    <div class="product-stock">
                        ${p.stock <= 5 ? `<span style="color:var(--danger);">⚠️ ${p.stock}</span>` : `📦 ${p.stock}`}
                    </div>
                </div>
            `).join('');
        }

        function filterPosProducts(filterType) {
            window.posCategoryFilter = filterType;

            document.querySelectorAll('.category-filter').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            renderPosProducts();
        }

        function renderCategoryFilters() {
            const container = document.getElementById('categoryFilters');
            const categories = [...new Set(products.map(p => p.category))];

            let html = '<button class="category-filter active" onclick="filterPosProducts(\'all\')">الكل</button>';
            categories.forEach(cat => {
                html += `<button class="category-filter" onclick="filterPosProducts('${cat}')">${getCategoryName(cat)}</button>`;
            });

            container.innerHTML = html;
            window.posCategoryFilter = 'all';
        }

        // Cart Functions
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    cost: product.cost,
                    quantity: 1
                });
            }

            updateCartUI();
            showNotification(`تم إضافة ${product.name} للسلة`);
        }

        function updateCartQuantity(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const emptyCart = document.getElementById('emptyCart');
            const cartTotal = document.getElementById('cartTotal');
            const totalAmount = document.getElementById('totalAmount');

            if (cart.length === 0) {
                cartItems.innerHTML = '';
                emptyCart.style.display = 'block';
                cartTotal.style.display = 'none';
                return;
            }

            emptyCart.style.display = 'none';
            cartTotal.style.display = 'block';

            cartItems.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${item.price.toFixed(2)} ${getCurrencySymbol()}</div>
                    </div>
                    <div class="cart-item-qty">
                        <button onclick="updateCartQuantity(${i}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="updateCartQuantity(${i}, 1)">+</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            totalAmount.textContent = total.toFixed(2) + ' ' + getCurrencySymbol();
        }

        async function completeSale() {
            if (cart.length === 0) {
                showNotification('السلة فارغة!', true);
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const profit = cart.reduce((sum, item) => sum + ((item.price - item.cost) * item.quantity), 0);

            const sale = {
                id: Date.now(),
                date: new Date().toISOString(),
                items: [...cart],
                total: total,
                profit: profit,
                customer: selectedCustomer
            };

            sales.push(sale);

            // Update stock
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    product.stock -= item.quantity;
                }
            });

            saveToLocalStorage();
            syncToFirebase('sales', sales);
            syncToFirebase('products', products);

            // Show receipt
            showReceipt(sale);

            cart = [];
            updateCartUI();
            renderPosProducts();
            renderProducts();

            showNotification('تم إتمام البيع بنجاح!');
        }

        function showReceipt(sale) {
            const content = document.getElementById('receiptContent');
            content.innerHTML = `
                <h2 style="margin-bottom:10px;">${settings.companyName}</h2>
                <p style="color:var(--gray);margin-bottom:15px;">${new Date(sale.date).toLocaleDateString('ar-SA')}</p>
                <hr style="margin:15px 0;">
                ${sale.items.map(item => `
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--light-border);">
                        <span>${item.name} x${item.quantity}</span>
                        <span>${(item.price * item.quantity).toFixed(2)}</span>
                    </div>
                `).join('')}
                <hr style="margin:15px 0;">
                <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:bold;">
                    <span>الإجمالي:</span>
                    <span>${sale.total.toFixed(2)} ${getCurrencySymbol()}</span>
                </div>
            `;

            openModal('receiptModal');
        }

        function printReceipt() {
            const content = document.getElementById('receiptContent').innerHTML;
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>فاتورة</title>
                    <style>body{direction:rtl;font-family:Arial,sans-serif;padding:20px;}</style>
                </head>
                <body>${content}</body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        // Customer Functions
        function addCustomer(e) {
            e.preventDefault();
            const customer = {
                id: Date.now(),
                name: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                email: document.getElementById('customerEmail').value || '',
                address: document.getElementById('customerAddress').value || '',
                totalPurchases: 0,
                balance: 0
            };
            customers.push(customer);
            saveToLocalStorage();
            syncToFirebase('customers', customers);
            closeModal('addCustomerModal');
            e.target.reset();
            renderCustomers();
            showNotification('تمت إضافة العميل بنجاح');
        }

        function renderCustomers() {
            const search = document.getElementById('customerSearch').value.toLowerCase();
            const filtered = customers.filter(c => c.name.toLowerCase().includes(search) || c.phone.includes(search));
            const tbody = document.getElementById('customersList');

            if (filtered.length === 0) {

        // Dashboard Functions
        function updateDashboardStats() {
            const today = new Date().toDateString();
            const todaySalesList = sales.filter(s => new Date(s.date).toDateString() === today);
            const todayExpensesList = expenses.filter(e => new Date(e.createdAt).toDateString() === today);

            const todaySalesTotal = todaySalesList.reduce((sum, s) => sum + s.total, 0);
            const todayExpensesTotal = todayExpensesList.reduce((sum, e) => sum + e.amount, 0);
            const todayProfit = todaySalesList.reduce((sum, s) => sum + s.profit, 0);
            const lowStockCount = products.filter(p => p.stock <= 5).length;

            document.getElementById('todaySales').textContent = todaySalesTotal.toFixed(2) + ' ' + getCurrencySymbol();
            document.getElementById('todayExpenses').textContent = todayExpensesTotal.toFixed(2) + ' ' + getCurrencySymbol();
            document.getElementById('todayProfit').textContent = todayProfit.toFixed(2) + ' ' + getCurrencySymbol();
            document.getElementById('lowStock').textContent = lowStockCount;

            // Recent Sales
            const recentSalesList = document.getElementById('recentSalesList');
            if (todaySalesList.length === 0) {
                recentSalesList.innerHTML = '<p class="text-center empty-state">لا توجد مبيعات اليوم</p>';
            } else {
                recentSalesList.innerHTML = todaySalesList.slice(-5).reverse().map(s => `
                    <div style="display:flex;justify-content:space-between;padding:10px;background:var(--light-border);border-radius:8px;margin-bottom:8px;">
                        <span>${new Date(s.date).toLocaleTimeString('ar-SA')}</span>
                        <span>${s.items.length} منتجات</span>
                        <span style="color:var(--success);font-weight:bold;">${s.total.toFixed(2)}</span>
                    </div>
                `).join('');
            }

            // Low Stock List
            const lowStockList = document.getElementById('lowStockList');
            const lowStockProducts = products.filter(p => p.stock <= 5);
            if (lowStockProducts.length === 0) {
                lowStockList.innerHTML = '<p class="text-center empty-state">لا توجد منتجات منخفضة المخزون</p>';
            } else {
                lowStockList.innerHTML = lowStockProducts.map(p => `
                    <div style="display:flex;justify-content:space-between;padding:10px;background:#fee2e2;border-radius:8px;margin-bottom:8px;">
                        <span>${p.name}</span>
                        <span class="badge badge-danger">${p.stock} متبقي</span>
                    </div>
                `).join('');
            }

            // Sales Chart
            renderSalesChart();
        }

        function renderSalesChart() {
            const ctx = document.getElementById('salesChart').getContext('2d');

            if (salesChart) {
                salesChart.destroy();
            }

            const last7Days = [];
            const salesData = [];
            const labels = [];

            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                last7Days.push(date.toDateString());
                labels.push(date.toLocaleDateString('ar-SA', { weekday: 'short' }));
            }

            last7Days.forEach(day => {
                const daySales = sales.filter(s => new Date(s.date).toDateString() === day);
                salesData.push(daySales.reduce((sum, s) => sum + s.total, 0));
            });

            salesChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'المبيعات',
                        data: salesData,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

            if (expenses.length > 0) {
                const ws4 = XLSX.utils.json_to_sheet(expenses.map((e, i) => ({
                    '#': i + 1, 'التاريخ': e.date, 'الفئة': getExpenseCategoryName(e.category),
                    'الوصف': e.description, 'المبلغ': e.amount
                })));
                XLSX.utils.book_append_sheet(wb, ws4, 'المصروفات');
            }

            XLSX.writeFile(wb, 'golden_ledger_export.xlsx');
            showNotification('تم تصدير جميع البيانات');
        }

        // Firebase Sync Functions
        async function syncToFirebase(path, data) {
            if (!firebaseInitialized || !currentUser) return;
            try {
                await db.ref(path + '/' + currentUser.uid).set(data);
            } catch (error) {
                console.error('Firebase sync error:', error);
            }
        }

        async function syncWithFirebase() {
            if (!firebaseInitialized || !currentUser) return;

            const paths = ['products', 'customers', 'suppliers', 'sales', 'expenses', 'returns'];
            paths.forEach(path => {
                db.ref(path + '/' + currentUser.uid).on('value', snapshot => {
                    const data = snapshot.val();
                    if (data) {
                        switch(path) {
                            case 'products': products = data; break;
                            case 'customers': customers = data; break;
                            case 'suppliers': suppliers = data; break;
                            case 'sales': sales = data; break;
                            case 'expenses': expenses = data; break;
                            case 'returns': returns = data; break;
                        }
                        saveToLocalStorage();
                        renderAll();
                    }
                });
            });
        }

        // Utility Functions
        function getCategoryName(category) {
            const categories = {
                'food': 'مواد غذائية',
                'drinks': 'مشروبات',
                'electronics': 'إلكترونيات',
                'clothes': 'ملابس',
                'other': 'أخرى'
            };
            return categories[category] || category;
        }

        function getExpenseCategoryName(category) {
            const categories = {
                'rent': 'إيجار',
                'utilities': 'مرافق',
                'salaries': 'رواتب',
                'supplies': 'مستلزمات',
                'marketing': 'تسويق',
                'other': 'أخرى'
            };
            return categories[category] || category;
        }

        function getCurrencySymbol() {
            const currencies = {
                'EGP': 'ج.م',
                'USD': '$',
                'SAR': 'ر.س',
                'AED': 'د.إ'
            };
            return currencies[settings.currency] || settings.currency;
        }

        function showNotification(message, isError = false) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification show' + (isError ? ' error' : '');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function closeModalOnOverlay(event, modalId) {
            if (event.target.id === modalId) {
                closeModal(modalId);
            }
        }
    </script>
</body>
</html>
