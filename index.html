<!-- تكملة الـ CSS و الـ HTML المقطوع -->
        <style>
            .badge-success { background: rgba(16,185,129,0.2); color: #34d399; }
            .badge-warning { background: rgba(245,158,11,0.2); color: #fbbf24; }
            .badge-danger { background: rgba(239,68,68,0.2); color: #f87171; }
            
            @media (max-width: 992px) {
                .sidebar { transform: translateX(100%); }
                .sidebar.open { transform: translateX(0); }
                .main { margin-right: 0; width: 100%; }
            }
        </style>
    </head>
    <body>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="login-page">
        <div class="login-card">
            <h1 style="color:var(--p); margin-bottom:10px;">SEMO CLOUD</h1>
            <p style="font-size:12px; margin-bottom:20px; opacity:0.7">نظام المحاسبة السحابي المتكامل</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button id="authBtn" onclick="handleAuth()">دخول للنظام</button>
            <p class="toggle-auth" onclick="toggleAuthMode()" id="toggleText">ليس لديك حساب؟ إنشاء حساب جديد</p>
        </div>
    </div>

    <!-- واجهة النظام -->
    <div id="appSystem" style="display:none;">
        <aside class="sidebar">
            <div class="user-card">
                <div style="width:45px; height:45px; background:var(--p); border-radius:12px; display:flex; align-items:center; justify-content:center;">👤</div>
                <div>
                    <h4 id="displayUser">مستخدم</h4>
                    <p style="font-size:10px; opacity:0.7">متصل سحابياً ✅</p>
                </div>
            </div>

            <div class="menu-title">الرئيسية</div>
            <div class="menu-item active" onclick="sp('dash', this)">🏠 الرئيسية</div>
            
            <div class="menu-title">العمليات</div>
            <div class="menu-item" onclick="sp('inv', this)">📦 المخزون</div>
            <div class="menu-item" onclick="sp('sales', this)">🛒 المبيعات</div>
            <div class="menu-item" onclick="sp('pur', this)">🚚 المشتريات</div>
            
            <div class="menu-title">المالية</div>
            <div class="menu-item" onclick="sp('exp', this)">💸 المصروفات</div>
            <div class="menu-item" onclick="sp('debt', this)">⏳ الديون</div>
            
            <div class="menu-title">أدوات</div>
            <div class="menu-item" onclick="logout()" style="color:var(--d)">🚪 تسجيل الخروج</div>
        </aside>

        <main class="main">
            <div id="pageContent"></div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal" onclick="if(event.target===this)cm()">
        <div class="modal-content" id="mBody"></div>
    </div>

    <script>
        // --- متغيرات الحالة ---
        let authMode = 'login';
        let currentUserId = null;
        let dbData = { inv: [], sales: [], exp: [], cli: [], sup: [] };

        // --- نظام الـ Authentication ---
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                if(authMode === 'login') {
                    const res = await window.signInWithEmailAndPassword(window.auth, email, password);
                    startSystem(res.user);
                } else {
                    const res = await window.createUserWithEmailAndPassword(window.auth, email, password);
                    await window.set(window.ref(window.db, 'users/' + res.user.uid), { email: email, created: Date.now() });
                    startSystem(res.user);
                }
            } catch (err) { alert("خطأ: " + err.message); }
        }

        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'signup' : 'login';
            document.getElementById('authBtn').innerText = authMode === 'login' ? 'دخول للنظام' : 'إنشاء حساب جديد';
            document.getElementById('toggleText').innerText = authMode === 'login' ? 'ليس لديك حساب؟ إنشاء حساب جديد' : 'لديك حساب بالفعل؟ سجل دخولك';
        }

        // --- تشغيل النظام السحابي ---
        function startSystem(user) {
            currentUserId = user.uid;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appSystem').style.display = 'flex';
            document.getElementById('displayUser').innerText = user.email.split('@')[0];
            
            // ربط البيانات حياً (Real-time) من Firebase
            const userDbRef = window.ref(window.db, 'data/' + currentUserId);
            window.onValue(userDbRef, (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    dbData = {
                        inv: data.inv ? Object.values(data.inv) : [],
                        sales: data.sales ? Object.values(data.sales) : [],
                        exp: data.exp ? Object.values(data.exp) : []
                    };
                    renderDash(); // تحديث الواجهة فوراً عند تغير البيانات
                }
            });
        }

        // --- وظائف الحفظ السحابي ---
        function cloudPush(path, data) {
            const listRef = window.ref(window.db, `data/${currentUserId}/${path}`);
            const newRef = window.push(listRef);
            data.id = newRef.key;
            window.set(newRef, data);
        }

        // --- إدارة الصفحات ---
        function sp(p, el) {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            if(el) el.classList.add('active');
            if(p === 'dash') renderDash();
            if(p === 'inv') renderInv();
            if(p === 'sales') renderSales();
            if(p === 'exp') renderExp();
        }

        // 1. الرئيسية
        function renderDash() {
            let sTot = dbData.sales.reduce((a,b)=>a+b.tot, 0);
            let eTot = dbData.exp.reduce((a,b)=>a+b.amt, 0);
            
            document.getElementById('pageContent').innerHTML = `
                <h1 style="margin-bottom:25px;">لوحة التحكم السحابية</h1>
                <div class="stats-grid">
                    <div class="stat-card"><h3>إجمالي المبيعات</h3><div class="stat-value">${sTot}</div></div>
                    <div class="stat-card" style="border-color:var(--s)"><h3>صافي الربح</h3><div class="stat-value" style="color:var(--s)">${sTot - eTot}</div></div>
                    <div class="stat-card" style="border-color:var(--d)"><h3>المصروفات</h3><div class="stat-value">${eTot}</div></div>
                </div>
                <div class="card"><h3>آخر العمليات</h3><table><thead><tr><th>التاريخ</th><th>البيان</th><th>المبلغ</th></tr></thead><tbody id="recentTable"></tbody></table></div>
            `;
        }

        // 2. المخزون
        function renderInv() {
            document.getElementById('pageContent').innerHTML = `
                <div class="card-header"><h2>📦 المخزون السحابي</h2><button class="btn btn-primary" onclick="openInvM()">+ صنف جديد</button></div>
                <div class="card"><table><thead><tr><th>الصنف</th><th>السعر</th><th>الكمية</th></tr></thead>
                <tbody>${dbData.inv.map(i=>`<tr><td>${i.n}</td><td>${i.p}</td><td>${i.q}</td></tr>`).join('')}</tbody></table></div>
            `;
        }

        function openInvM() {
            document.getElementById('mBody').innerHTML = `<h3>إضافة صنف</h3><input id="in" placeholder="الاسم"><input id="ip" type="number" placeholder="السعر"><input id="iq" type="number" placeholder="الكمية"><button class="btn btn-success" style="width:100%" onclick="saveInv()">حفظ سحابياً</button>`;
            document.getElementById('modal').classList.add('show');
        }

        function saveInv() {
            const data = { n: document.getElementById('in').value, p: parseFloat(document.getElementById('ip').value), q: parseInt(document.getElementById('iq').value) };
            cloudPush('inv', data);
            document.getElementById('modal').classList.remove('show');
        }

        // --- أدوات ---
        function logout() { window.auth.signOut(); location.reload(); }
        function cm() { document.getElementById('modal').classList.remove('show'); }
    </script>
    </body>
    </html>
