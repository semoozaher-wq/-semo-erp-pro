<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN ERP | V15 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Sidebar & Layout */
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--primary); color: white; padding: 20px; position: fixed; right: 0; height: 100vh; transition: 0.3s; z-index: 1000; display: flex; flex-direction: column; }
        .main { flex: 1; margin-right: 280px; padding: 25px; transition: 0.3s; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; padding: 10px; }
            .sidebar span, .sidebar h2 { display: none; }
            .main { margin-right: 80px; }
        }

        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }

        /* UI Elements */
        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-radius: 15px; color: white; position: relative; overflow: hidden; }
        
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; font-size: 14px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-s { background: var(--success); color: white; }
        .btn-d { background: var(--danger); color: white; }

        input, select { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; width: 100%; transition: 0.3s; margin-top: 5px; }
        input:focus { border-color: var(--accent); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: right; padding: 15px; background: #f8fafc; color: #64748b; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        /* Auth Screen */
        .auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 30px; width: 400px; text-align: center; }

        /* POS Style */
        .pos-grid { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        .product-item { background: white; border: 2px solid #f1f5f9; border-radius: 15px; padding: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .product-item:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        #toast { position: fixed; bottom: 20px; left: 20px; padding: 15px 25px; border-radius: 10px; color: white; z-index: 10000; display: none; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--accent); font-weight:900; margin-bottom:10px;">GOLDEN V15</h1>
        <p style="color:#64748b; margin-bottom:25px;">نظام المحاسبة السحابي الاحترافي</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <select id="role">
            <option value="admin">مدير النظام (كامل الصلاحيات)</option>
            <option value="user">كاشير (صلاحيات محدودة)</option>
        </select>
        <button class="btn btn-p" style="width:100%; margin-top:20px; height:50px;" onclick="app.handleAuth()">دخول / إنشاء حساب</button>
    </div>
</div>

<div id="appWrap" class="wrapper" style="display:none;">
    <aside class="sidebar">
        <h2 style="text-align:center; margin-bottom:30px;">GOLDEN PRO</h2>
        <nav>
            <div class="nav-item active" onclick="app.route('dash', this)"><i class="fas fa-chart-pie"></i> <span>لوحة التحكم</span></div>
            <div class="nav-item" onclick="app.route('pos', this)"><i class="fas fa-cash-register"></i> <span>نقطة البيع</span></div>
            <div class="nav-item is-admin" onclick="app.route('stock', this)"><i class="fas fa-boxes"></i> <span>المخزن</span></div>
            <div class="nav-item is-admin" onclick="app.route('expenses', this)"><i class="fas fa-wallet"></i> <span>المصاريف</span></div>
            <div class="nav-item" onclick="app.logout()" style="margin-top:auto; color:var(--danger);"><i class="fas fa-sign-out-alt"></i> <span>تسجيل الخروج</span></div>
        </nav>
    </aside>

    <main class="main" id="view"></main>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
    authDomain: "my-pos-system-11dee.firebaseapp.com",
    databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
    projectId: "my-pos-system-11dee",
    storageBucket: "my-pos-system-11dee.firebasestorage.app",
    messagingSenderId: "565195477080",
    appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.database();

const app = {
    user: null, role: 'user',
    data: { products: [], sales: [], expenses: [] },
    cart: [],

    init() {
        auth.onAuthStateChanged(u => {
            if(u) {
                this.user = u;
                db.ref(`roles/${u.uid}`).once('value', s => {
                    this.role = s.val() || 'user';
                    this.sync();
                });
            } else {
                document.getElementById('authScreen').style.display='flex';
                document.getElementById('appWrap').style.display='none';
            }
        });
    },

    async handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value, r = document.getElementById('role').value;
        if(!e || !p) return this.notify("يرجى ملء الحقول", "danger");
        try {
            const res = await auth.signInWithEmailAndPassword(e,p).catch(()=>auth.createUserWithEmailAndPassword(e,p));
            await db.ref(`roles/${res.user.uid}`).set(r);
        } catch(err) { this.notify(err.message, "danger"); }
    },

    sync() {
        // الحفاظ على ميزة Realtime Listener (المزامنة الفورية)
        db.ref(`data/${this.user.uid}`).on('value', snap => {
            this.data = snap.val() || { products: [], sales: [], expenses: [] };
            if(!this.data.products) this.data.products = [];
            if(!this.data.sales) this.data.sales = [];
            if(!this.data.expenses) this.data.expenses = [];
            
            document.getElementById('authScreen').style.display='none';
            document.getElementById('appWrap').style.display='flex';
            if(this.role !== 'admin') document.querySelectorAll('.is-admin').forEach(el => el.remove());
            
            this.route('dash');
        });
    },

    route(v, el) {
        if(el) { document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
        const view = document.getElementById('view');
        if(v === 'dash') view.innerHTML = this.viewDash();
        if(v === 'pos') view.innerHTML = this.viewPOS();
        if(v === 'stock') view.innerHTML = this.viewStock();
        if(v === 'expenses') view.innerHTML = this.viewExpenses();
        if(v === 'dash') this.renderChart();
    },

    // Dash مع صافي الأرباح والمصاريف
    viewDash() {
        const totalSales = this.data.sales.reduce((a,b)=> a + Number(b.total), 0);
        const totalExp = this.data.expenses.reduce((a,b)=> a + Number(b.amount), 0);
        const netProfit = totalSales - totalExp;

        return `
            <div class="grid-stats">
                <div class="stat-card" style="background:var(--accent)">
                    <p>إجمالي المبيعات</p>
                    <h2>${totalSales.toLocaleString()} ج.م</h2>
                </div>
                <div class="stat-card" style="background:var(--danger)">
                    <p>إجمالي المصاريف</p>
                    <h2>${totalExp.toLocaleString()} ج.م</h2>
                </div>
                <div class="stat-card" style="background:var(--success)">
                    <p>صافي الأرباح</p>
                    <h2>${netProfit.toLocaleString()} ج.م</h2>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
                <div class="card"><h3>الرسم البياني للمبيعات</h3><canvas id="mainChart" height="150"></canvas></div>
                <div class="card" style="background:#fff4e5; border:none;">
                    <h3><i class="fas fa-robot"></i> تحليل الذكاء الاصطناعي</h3>
                    <div id="aiHint" style="margin-top:15px; font-size:14px;">${this.aiAnalysis(totalSales, netProfit)}</div>
                </div>
            </div>
        `;
    },

    viewPOS() {
        return `
            <div class="pos-grid">
                <div class="card">
                    <input type="text" placeholder="بحث عن منتج..." oninput="app.filterPOS(this.value)">
                    <div id="posItems" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:15px; margin-top:15px;">
                        ${this.data.products.map(p => `
                            <div class="product-item" onclick="app.addToCart('${p.id}')">
                                <strong>${p.name}</strong><br>
                                <span style="color:var(--accent);">${p.price} ج.م</span><br>
                                <small>المخزن: ${p.qty}</small>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="card">
                    <h3>السلة</h3>
                    <div id="cartArea" style="min-height:300px; margin-top:20px; border-bottom:1px dashed #eee;"></div>
                    <div id="total" style="font-size:24px; font-weight:900; padding:15px 0;">0.00 ج.م</div>
                    <button class="btn btn-s" style="width:100%; height:55px;" onclick="app.checkout()">تأكيد العملية وطباعة</button>
                    <button class="btn btn-d" style="width:100%; margin-top:10px; background:#64748b;" onclick="app.clearCart()">مسح السلة</button>
                </div>
            </div>
        `;
    },

    viewStock() {
        return `
            <div class="card">
                <h3>إدارة المخزن (تعديل وحذف)</h3>
                <div style="display:grid; grid-template-columns: 2fr 1fr 1fr auto; gap:10px; margin-top:15px;">
                    <input id="pn" placeholder="اسم المنتج">
                    <input id="pp" type="number" placeholder="السعر">
                    <input id="pq" type="number" placeholder="الكمية">
                    <button class="btn btn-p" onclick="app.saveP()">حفظ</button>
                </div>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>إجراء</th></tr></thead>
                    <tbody>${this.data.products.map(p => `
                        <tr>
                            <td>${p.name}</td><td>${p.price}</td><td>${p.qty}</td>
                            <td><i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="app.delP('${p.id}')"></i></td>
                        </tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    },

    viewExpenses() {
        return `
            <div class="card">
                <h3>إضافة مصروف (رواتب، إيجار...)</h3>
                <div style="display:grid; grid-template-columns: 2fr 1fr auto; gap:10px; margin-top:15px;">
                    <input id="en" placeholder="بيان المصروف">
                    <input id="ea" type="number" placeholder="المبلغ">
                    <button class="btn btn-d" onclick="app.saveEx()">تسجيل</button>
                </div>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>البيان</th><th>المبلغ</th><th>التاريخ</th></tr></thead>
                    <tbody>${this.data.expenses.map(ex => `<tr><td>${ex.note}</td><td style="color:red">-${ex.amount}</td><td>${ex.date}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    },

    // Logic
    addToCart(id) {
        const p = this.data.products.find(x => x.id === id);
        if(p.qty <= 0) return this.notify("نفذت الكمية!", "danger");
        this.cart.push({...p});
        this.renderCart();
    },

    renderCart() {
        const area = document.getElementById('cartArea');
        let total = 0;
        area.innerHTML = this.cart.map((item, idx) => {
            total += Number(item.price);
            return `<div style="display:flex; justify-content:space-between; padding:8px; background:#f8fafc; border-radius:8px; margin-bottom:5px;">
                <span>${item.name}</span><strong>${item.price} <i class="fas fa-times" style="color:red; cursor:pointer;" onclick="app.removeFromCart(${idx})"></i></strong>
            </div>`;
        }).join('');
        document.getElementById('total').innerText = total.toFixed(2) + " ج.م";
    },

    checkout() {
        if(!this.cart.length) return;
        const total = this.cart.reduce((a,b)=> a + Number(b.price), 0);
        this.cart.forEach(item => {
            const p = this.data.products.find(x => x.id === item.id);
            if(p) p.qty = Number(p.qty) - 1;
        });
        const sale = { id: Date.now(), items: [...this.cart], total, date: new Date().toLocaleString() };
        this.data.sales.unshift(sale);
        this.save();
        this.print(sale);
        this.cart = []; this.renderCart();
        this.notify("تمت العملية بنجاح", "success");
    },

    saveP() {
        const n=document.getElementById('pn').value, p=document.getElementById('pp').value, q=document.getElementById('pq').value;
        if(!n || !p) return;
        this.data.products.push({ id: Date.now().toString(), name: n, price: p, qty: q });
        this.save();
    },

    saveEx() {
        const n=document.getElementById('en').value, a=document.getElementById('ea').value;
        if(!n || !a) return;
        this.data.expenses.unshift({ note: n, amount: a, date: new Date().toLocaleDateString() });
        this.save();
    },

    save() { db.ref(`data/${this.user.uid}`).set(this.data); },

    print(sale) {
        const w = window.open('', '_blank');
        w.document.write(`<html><body style="text-align:center; font-family:Cairo;">
            <h1>فاتورة GOLDEN</h1><hr>
            <p>التاريخ: ${sale.date}</p>
            <h2>الإجمالي: ${sale.total} ج.م</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${sale.id}">
            <script>window.print(); setTimeout(()=>window.close(), 500);<\/script>
        </body></html>`);
    },

    aiAnalysis(sales, profit) {
        if(sales === 0) return "بانتظار العمليات لتحليل البيانات...";
        return profit < 0 ? "⚠️ المصاريف عالية جداً! الربح الصافي بالسالب." : `✅ أداء ممتاز! صافي الربح يمثل ${((profit/sales)*100).toFixed(1)}% من المبيعات.`;
    },

    renderChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: this.data.sales.slice(0,7).map(s => s.date.split(',')[0]).reverse(),
                datasets: [{ label: 'المبيعات', data: this.data.sales.slice(0,7).map(s => s.total).reverse(), borderColor: '#3b82f6', fill: true }]
            }
        });
    },

    notify(m, t) {
        const toast = document.getElementById('toast');
        toast.innerText = m;
        toast.style.background = t === 'danger' ? 'var(--danger)' : 'var(--success)';
        toast.style.display = 'block';
        setTimeout(()=> toast.style.display='none', 3000);
    },

    logout() { auth.signOut(); }
};

app.init();
</script>
</body>
</html>
