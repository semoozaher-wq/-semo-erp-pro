<!-- الكود السابق (HTML/CSS) كما هو، وسنكمل الجزء الخاص بـ JavaScript -->
<script>
// --- قاعدة البيانات والتحقق من الدخول ---
const users = [
    { username: "admin", password: "admin123", name: "مدير النظام", role: "مدير عام" },
    { username: "user", password: "user123", name: "محاسب", role: "محاسب" }
];

let currentUser = JSON.parse(localStorage.getItem('semo_user')) || null;

let db = {
    inv: JSON.parse(localStorage.getItem('se_inv')) || [],
    sales: JSON.parse(localStorage.getItem('se_sales')) || [],
    pur: JSON.parse(localStorage.getItem('se_pur')) || [],
    exp: JSON.parse(localStorage.getItem('se_exp')) || [],
    cli: JSON.parse(localStorage.getItem('se_cli')) || [],
    sup: JSON.parse(localStorage.getItem('se_sup')) || []
};

// --- وظيفة تسجيل الدخول ---
function doLogin() {
    let uName = document.getElementById('loginUsername').value;
    let uPass = document.getElementById('loginPassword').value;
    let errorDiv = document.getElementById('loginError');
    
    let user = users.find(u => u.username === uName && u.password === uPass);
    
    if(user) {
        localStorage.setItem('semo_user', JSON.stringify(user));
        localStorage.setItem('semo_logged_in', 'true');
        initApp(user);
    } else {
        errorDiv.style.display = 'block';
        errorDiv.innerText = "⚠️ خطأ في اسم المستخدم أو كلمة المرور";
    }
}

// --- تهيئة التطبيق بعد الدخول ---
function initApp(user) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appSystem').style.display = 'block';
    document.getElementById('userName').innerText = user.name;
    document.getElementById('userRole').innerText = user.role;
    renderDash();
}

function logout() {
    localStorage.removeItem('semo_logged_in');
    localStorage.removeItem('semo_user');
    location.reload();
}

// --- المحرك المحاسبي الأساسي ---
const save = () => Object.keys(db).forEach(k => localStorage.setItem('se_'+k, JSON.stringify(db[k])));
const v = (id) => document.getElementById(id).value;
const f = (id) => parseFloat(document.getElementById(id).value) || 0;
const om = () => document.getElementById('modal').classList.add('show');
const cm = () => document.getElementById('modal').classList.remove('show');
const toggleTheme = () => document.body.classList.toggle('light');

function sp(p, el) {
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
    if(el) el.classList.add('active');
    
    if(p === 'dash') renderDash();
    else if(p === 'inv') renderInv();
    else if(p === 'sales') renderSales();
    else if(p === 'pur') renderPur();
    else if(p === 'exp') renderExp();
    else if(p === 'debt') renderDebt();
    else if(p === 'cli') renderPeople('cli', 'العملاء');
    else if(p === 'sup') renderPeople('sup', 'الموردين');
}

// 1. الرئيسية
function renderDash() {
    let sVal = db.sales.reduce((a,b)=>a+b.tot, 0);
    let pVal = db.sales.reduce((a,b)=>a+b.prof, 0);
    let eVal = db.exp.reduce((a,b)=>a+b.amt, 0);
    let low = db.inv.filter(i=>i.q <= 5).length;

    document.getElementById('content').innerHTML = `
        <h2 style="margin-bottom:20px">👋 أهلاً بك، ${JSON.parse(localStorage.getItem('semo_user')).name}</h2>
        <div class="grid">
            <div class="stat"><h3>إجمالي المبيعات</h3><div style="font-size:24px;font-weight:800">${sVal}</div></div>
            <div class="stat" style="border-color:var(--s)"><h3>صافي الربح</h3><div style="font-size:24px;font-weight:800;color:var(--s)">${pVal - eVal}</div></div>
            <div class="stat" style="border-color:var(--d)"><h3>المصروفات</h3><div style="font-size:24px;font-weight:800">${eVal}</div></div>
            <div class="stat" style="border-color:var(--w)"><h3>نواقص المخزن</h3><div style="font-size:24px;font-weight:800">${low}</div></div>
        </div>
        <div class="card"><h3>حركة المبيعات والربح</h3><canvas id="chart" height="100"></canvas></div>`;
    
    new Chart(document.getElementById('chart'), {
        type: 'line', 
        data: { 
            labels: db.sales.map(s=>s.d).slice(-7), 
            datasets:[{label:'مبيعات', data:db.sales.map(s=>s.tot).slice(-7), borderColor:'#3b82f6'}]
        }
    });
}

// 2. المخزون
function renderInv() {
    document.getElementById('content').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h2>📦 المخزون</h2><button class="btn btn-p" onclick="openInvM()">+ صنف جديد</button></div>
        <div class="card"><input type="text" placeholder="بحث سريع..." onkeyup="filterT(this, 'tInv')">
        <table id="tInv"><thead><tr><th>الصنف</th><th>التكلفة</th><th>البيع</th><th>الكمية</th><th>تحكم</th></tr></thead>
        <tbody>${db.inv.map(i => `<tr><td>${i.n}</td><td>${i.c}</td><td>${i.p}</td><td><span class="${i.q<=5?'badge badge-w':''}">${i.q}</span></td><td><button class="btn btn-p" style="padding:5px" onclick="openInvM(${i.id})">✏️</button><button class="btn btn-d" style="padding:5px" onclick="del('inv', ${i.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div>`;
}
function openInvM(id=null) {
    let i = id ? db.inv.find(x=>x.id==id) : {n:'', c:'', p:'', q:''};
    document.getElementById('mBody').innerHTML = `<h3>${id?'تعديل':'إضافة'} منتج</h3><input id="in" value="${i.n}" placeholder="الاسم"><input id="ic" type="number" value="${i.c}" placeholder="التكلفة"><input id="ip" type="number" value="${i.p}" placeholder="البيع"><input id="iq" type="number" value="${i.q}" placeholder="الكمية"><button class="btn btn-s" style="width:100%" onclick="saveInv(${id})">حفظ</button>`;
    om();
}
function saveInv(id) { let d={id:id||Date.now(), n:v('in'), c:f('ic'), p:f('ip'), q:f('iq')}; if(id) db.inv=db.inv.map(x=>x.id==id?d:x); else db.inv.push(d); save(); cm(); renderInv(); }

// 3. المبيعات (مع خصم المخزن والربح)
function renderSales() {
    document.getElementById('content').innerHTML = `<h2>🛒 المبيعات</h2><div class="card no-print"><select id="si">${db.inv.map(i=>`<option value="${i.id}">${i.n} (متوفر: ${i.q})</option>`)}</select><select id="sc">${db.cli.map(c=>`<option value="${c.n}">${c.n}</option>`)}<option value="زبون نقدي">زبون نقدي</option></select><input id="sq" type="number" value="1"><select id="st"><option value="مدفوع">مدفوع</option><option value="آجل">آجل</option></select><button class="btn btn-s" style="width:100%" onclick="doS()">إتمام الفاتورة</button></div><div id="invArea"></div>`;
}
function doS() {
    let i=db.inv.find(x=>x.id==v('si')), q=f('sq');
    if(i && i.q >= q) {
        i.q-=q; let s={id:Date.now(), d:new Date().toLocaleDateString(), item:i.n, cli:v('sc'), q:q, tot:q*i.p, prof:q*(i.p-i.c), st:v('st')};
        db.sales.push(s); save(); renderSales(); showInvoice(s);
    } else alert('الكمية غير كافية!');
}
function showInvoice(s) {
    document.getElementById('invArea').innerHTML = `<div class="card" style="border:2px dashed var(--p); text-align:center"><h2>فاتورة # ${s.id}</h2><p>التاريخ: ${s.d} | العميل: ${s.cli}</p><hr><table><tr><th>البيان</th><th>الكمية</th><th>الإجمالي</th></tr><tr><td>${s.item}</td><td>${s.q}</td><td>${s.tot} ج.م</td></tr></table><h3>المطلوب: ${s.tot} ج.م (${s.st})</h3><button class="btn btn-p no-print" onclick="window.print()">🖨️ طباعة</button></div>`;
}

// 4. المشتريات
function renderPur() {
    document.getElementById('content').innerHTML = `<h2>🚚 المشتريات</h2><div class="card"><select id="pi">${db.inv.map(i=>`<option value="${i.id}">${i.n}</option>`)}</select><select id="ps">${db.sup.map(s=>`<option value="${s.n}">${s.n}</option>`)}</select><input id="pq" type="number" placeholder="الكمية المشتراة"><button class="btn btn-p" style="width:100%" onclick="doP()">تحديث المخزن</button></div>`;
}
function doP() { let i=db.inv.find(x=>x.id==v('pi')), q=f('pq'); if(i){ i.q+=q; db.pur.push({d:new Date().toLocaleDateString(), n:i.n, q:q, s:v('ps')}); save(); alert('تم التوريد'); sp('inv'); } }

// 5. المصروفات والديون
function renderExp() {
    document.getElementById('content').innerHTML = `<h2>💸 المصروفات</h2><div class="card"><input id="en" placeholder="البيان"><input id="ea" type="number" placeholder="المبلغ"><button class="btn btn-d" onclick="addE()">حفظ</button><table><thead><tr><th>البيان</th><th>المبلغ</th></tr></thead><tbody>${db.exp.map(e=>`<tr><td>${e.n}</td><td>${e.amt}</td></tr>`).join('')}</tbody></table></div>`;
}
function addE() { db.exp.push({d:new Date().toLocaleDateString(), n:v('en'), amt:f('ea')}); save(); renderExp(); }

function renderDebt() {
    let d = db.sales.filter(s=>s.st==='آجل');
    document.getElementById('content').innerHTML = `<h2>⏳ الديون</h2><div class="card"><table><thead><tr><th>العميل</th><th>المبلغ</th></tr></thead><tbody>${d.map(x=>`<tr><td>${x.cli}</td><td>${x.tot}</td></tr>`).join('')}</tbody></table></div>`;
}

// 6. الأشخاص
function renderPeople(t, title) {
    document.getElementById('content').innerHTML = `<h2>${title}</h2><div class="card"><input id="pn" placeholder="الاسم"><input id="pp" placeholder="الهاتف"><button class="btn btn-p" onclick="addP('${t}')">إضافة</button><table><thead><tr><th>الاسم</th><th>الهاتف</th></tr></thead><tbody>${db[t].map(x=>`<tr><td>${x.n}</td><td>${x.p}</td></tr>`).join('')}</tbody></table></div>`;
}
function addP(t) { db[t].push({id:Date.now(), n:v('pn'), p:v('pp')}); save(); sp(t); }

// أدوات إضافية
function del(t,id) { if(confirm('متأكد؟')){ db[t]=db[t].filter(x=>x.id!=id); save(); sp(t); }}
function filterT(inp, tid) {
    let f=inp.value.toLowerCase(), rows=document.querySelectorAll(`#${tid} tbody tr`);
    rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(f) ? '' : 'none');
}
function exportData() {
    let dStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
    let a = document.createElement('a'); a.href = dStr; a.download = "ERP_Backup.json"; a.click();
}

// عند تشغيل الصفحة
window.onload = () => {
    let loggedIn = localStorage.getItem('semo_logged_in');
    let user = JSON.parse(localStorage.getItem('semo_user'));
    if(loggedIn === 'true' && user) {
        initApp(user);
    } else {
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('appSystem').style.display = 'none';
    }
};
</script>
</body>
</html>
