<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO ERP | تسجيل الدخول</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #1e293b;
            border-radius: 30px;
            padding: 40px 35px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .logo { width: 70px; height: 70px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 28px; font-weight: bold; color: white; }
        h1 { color: #6366f1; margin-bottom: 10px; }
        .demo-box {
            background: rgba(99,102,241,0.15);
            border: 1px solid #6366f1;
            border-radius: 15px;
            padding: 15px;
            margin: 20px 0;
            text-align: right;
        }
        .demo-box p { color: #6366f1; font-weight: bold; margin-bottom: 8px; }
        .demo-box span { color: #94a3b8; display: block; font-size: 13px; margin: 5px 0; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 40px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
        }
        input:focus { border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-demo { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; margin-bottom: 15px; }
        .link { color: #94a3b8; cursor: pointer; font-size: 13px; display: block; margin-top: 15px; }
        .link:hover { color: #6366f1; }
        .divider { margin: 15px 0; color: #64748b; font-size: 13px; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            animation: slideDown 0.3s ease;
            font-size: 14px;
            font-weight: bold;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .toast.success { background: #10b981; color: white; }
        .toast.error { background: #ef4444; color: white; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">S</div>
    <h1>SEMO ERP PRO V9</h1>
    <p style="color: #94a3b8;">النظام المتكامل لإدارة المؤسسات</p>

    <div class="demo-box">
        <p>🚀 حسابات تجريبية جاهزة</p>
        <span>📧 admin@system.com | 🔑 123456 (مدير)</span>
        <span>📧 user@system.com | 🔑 123456 (مستخدم)</span>
    </div>

    <button class="btn btn-demo" id="demoLoginBtn">🚀 دخول سريع – حساب تجريبي</button>

    <div class="divider">أو</div>

    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="off">
    <button class="btn btn-primary" id="loginBtn">🔐 تسجيل الدخول</button>
    <span class="link" id="signupBtn">➡️ إنشاء حساب جديد</span>
    <a href="#" class="link" id="forgotBtn">🔑 نسيت كلمة المرور؟</a>
</div>

<script type="module">
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
        authDomain: "my-pos-system-11dee.firebaseapp.com",
        databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
        projectId: "my-pos-system-11dee",
        storageBucket: "my-pos-system-11dee.firebasestorage.app",
        messagingSenderId: "565195477080",
        appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
    };

    // Import Firebase modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM Elements
    const loginBtn = document.getElementById('loginBtn');
    const demoBtn = document.getElementById('demoLoginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const forgotBtn = document.getElementById('forgotBtn');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');

    // Helper functions
    function showToast(msg, type = 'success') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtn.innerHTML = loading ? '<span class="spinner"></span> جاري...' : '🔐 تسجيل الدخول';
    }

    // Demo Login (Direct without Firebase)
    demoBtn.onclick = () => {
        localStorage.setItem('semo_user', JSON.stringify({
            uid: 'demo_' + Date.now(),
            email: 'demo@system.com',
            name: 'مدير تجريبي',
            role: 'admin',
            companyId: null,
            isActive: true
        }));
        showToast('✅ مرحباً بك! جاري التحويل...', 'success');
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1000);
    };

    // Normal Login with Firebase
    loginBtn.onclick = async () => {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();

        if (!email || !password) {
            showToast('⚠️ أدخل البريد وكلمة المرور', 'error');
            return;
        }

        setLoading(true);

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            if (!user.emailVerified) {
                showToast('⚠️ يرجى تفعيل بريدك الإلكتروني أولاً', 'error');
                await auth.signOut();
                setLoading(false);
                return;
            }

            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (!userDoc.exists()) {
                showToast('❌ لم يتم العثور على بيانات المستخدم', 'error');
                await auth.signOut();
                setLoading(false);
                return;
            }

            const userData = userDoc.data();
            if (!userData.isActive) {
                showToast('❌ تم تعطيل حسابك، تواصل مع المدير', 'error');
                await auth.signOut();
                setLoading(false);
                return;
            }

            localStorage.setItem('semo_user', JSON.stringify({
                uid: user.uid,
                email: user.email,
                name: userData.name,
                role: userData.role,
                companyId: userData.companyId
            }));

            showToast('✅ مرحباً بك! جاري التحويل...', 'success');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);

        } catch (error) {
            console.error(error);
            let msg = '❌ بيانات الدخول غير صحيحة';
            if (error.code === 'auth/user-not-found') msg = '❌ المستخدم غير موجود';
            if (error.code === 'auth/wrong-password') msg = '❌ كلمة المرور خاطئة';
            if (error.code === 'auth/invalid-email') msg = '❌ البريد الإلكتروني غير صحيح';
            showToast(msg, 'error');
        } finally {
            setLoading(false);
        }
    };

    // Signup
    signupBtn.onclick = async () => {
        const email = prompt('📧 أدخل البريد الإلكتروني:');
        if (!email) return;
        const password = prompt('🔑 أدخل كلمة المرور (6 أحرف على الأقل):');
        if (!password || password.length < 6) {
            showToast('⚠️ كلمة المرور 6 أحرف على الأقل', 'error');
            return;
        }
        const name = prompt('👤 اسم المستخدم:');
        if (!name) return;
        const role = confirm('👑 هل هذا المستخدم مدير؟ OK لمدير, Cancel لمستخدم') ? 'admin' : 'user';

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            await setDoc(doc(db, 'users', user.uid), {
                uid: user.uid,
                email: email,
                name: name,
                role: role,
                isActive: true,
                companyId: null,
                createdAt: new Date().toISOString()
            });

            await user.sendEmailVerification();
            showToast('✅ تم إنشاء الحساب! تحقق من بريدك ثم سجل الدخول', 'success');
        } catch (error) {
            console.error(error);
            let msg = '❌ خطأ في إنشاء الحساب';
            if (error.code === 'auth/email-already-in-use') msg = '❌ البريد مستخدم بالفعل';
            showToast(msg, 'error');
        }
    };

    // Forgot Password
    forgotBtn.onclick = async (e) => {
        e.preventDefault();
        const email = loginEmail.value.trim();
        if (!email) {
            showToast('⚠️ أدخل بريدك الإلكتروني أولاً', 'error');
            return;
        }
        try {
            await sendPasswordResetEmail(auth, email);
            showToast('📧 تم إرسال رابط إعادة التعيين إلى بريدك', 'success');
        } catch (error) {
            showToast('❌ ' + error.message, 'error');
        }
    };

    // Auto redirect if already logged in (but prevent loop)
    let checked = false;
    onAuthStateChanged(auth, (user) => {
        if (checked) return;
        checked = true;
        const localUser = localStorage.getItem('semo_user');
        if (user && user.emailVerified && localUser && !window.location.pathname.includes('dashboard.html')) {
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500);
        }
    });
</script>
</body>
</html>
