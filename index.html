<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP PRO - المحترف الكامل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#f1f5f9;--card:#fff;--pri:#0d9488;--prid:#0f766e;--pril:#ccfbf1;--ok:#10b981;--err:#ef4444;--wrn:#f59e0b;--inf:#3b82f6;--txt:#0f172a;--mut:#64748b;--brd:#e2e8f0;--rad:18px}
.dark{--bg:#0f172a;--card:#1e293b;--pri:#14b8a6;--prid:#0d9488;--pril:#042f2e;--ok:#34d399;--err:#f87171;--wrn:#fbbf24;--inf:#60a5fa;--txt:#f1f5f9;--mut:#94a3b8;--brd:#334155}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--txt);direction:rtl;min-height:100vh;transition:background .3s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--pri);border-radius:10px}
.lp{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0f172a,#134e4a);position:relative}
.lp::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(13,148,136,.2),transparent 70%);top:-100px;right:-100px;border-radius:50%}
.lb{background:rgba(255,255,255,.97);padding:40px;border-radius:28px;width:420px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.4);z-index:1}
.dark .lb{background:rgba(30,41,59,.97)}
.lb h2{font-size:1.7rem;margin-bottom:4px;background:linear-gradient(135deg,var(--pri),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lb .sub{color:var(--mut);margin-bottom:22px;font-size:13px}
.lb input{width:100%;padding:13px 16px;margin:8px 0;border:2px solid var(--brd);border-radius:12px;font-size:14px;transition:.3s;background:var(--card);color:var(--txt)}
.lb input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.bp{background:linear-gradient(135deg,var(--pri),var(--prid));color:#fff;border:none;padding:13px;border-radius:12px;width:100%;cursor:pointer;font-weight:700;font-size:15px;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(13,148,136,.3)}
.sa{margin-top:14px;cursor:pointer;font-size:13px;color:var(--mut)}
.app{display:none}
.th{background:var(--card);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100}
.logo{font-size:1.15rem;font-weight:900;background:linear-gradient(135deg,var(--pri),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hb{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.hb select,.hb button{padding:6px 10px;border-radius:10px;border:2px solid var(--brd);background:var(--card);color:var(--txt);cursor:pointer;font-size:11px;font-weight:600;transition:.3s}
.hb select:hover,.hb button:hover{border-color:var(--pri)}
.mb{display:flex;justify-content:center;background:var(--card);padding:5px 6px;flex-wrap:wrap;border-bottom:1px solid var(--brd);position:sticky;top:48px;z-index:99;overflow-x:auto}
.mi{text-align:center;cursor:pointer;padding:4px 6px;border-radius:12px;transition:.3s;min-width:46px;flex-shrink:0}
.mi:hover{background:var(--pril)}.mi.act{background:var(--pril)}
.mi i{width:34px;height:34px;background:linear-gradient(135deg,var(--pri),var(--prid));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;color:#fff;font-size:12px}
.mi.act i{box-shadow:0 3px 12px rgba(13,148,136,.3);transform:scale(1.05)}
.mi span{font-size:7.5px;color:var(--mut);font-weight:600;display:block}
.pg{padding:14px;max-width:1400px;margin:0 auto;padding-bottom:100px}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:768px){.sg{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1100px){.sg{grid-template-columns:repeat(6,1fr)}}
.sc{background:var(--card);border-radius:var(--rad);padding:14px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--brd);transition:.3s;position:relative;overflow:hidden;cursor:pointer}
.sc:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.1)}
.sc::after{content:'';position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 18px 18px 0}
.sc:nth-child(1)::after{background:var(--pri)}.sc:nth-child(2)::after{background:var(--ok)}.sc:nth-child(3)::after{background:var(--err)}.sc:nth-child(4)::after{background:var(--wrn)}.sc:nth-child(5)::after{background:#8b5cf6}.sc:nth-child(6)::after{background:#ec4899}
.si{font-size:24px;margin-bottom:4px}.sv{font-size:18px;font-weight:900}.sl{font-size:9px;color:var(--mut);font-weight:600}
.cb{background:var(--card);border-radius:var(--rad);padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--brd)}
.cb h3{font-size:.95rem;font-weight:700;margin-bottom:12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.b{padding:7px 14px;border-radius:30px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:5px;font-size:11px;transition:.3s}
.b:hover{transform:translateY(-1px)}
.b-s{background:var(--ok);color:#fff}.b-d{background:var(--err);color:#fff}.b-w{background:var(--wrn);color:#fff}.b-i{background:var(--inf);color:#fff}.b-p{background:var(--pri);color:#fff}
.tw{overflow-x:auto;border-radius:12px;border:1px solid var(--brd)}
.dt{width:100%;border-collapse:collapse}
.dt th,.dt td{padding:9px 10px;text-align:right;font-size:11px}
.dt th{background:var(--bg);color:var(--mut);font-weight:700;border-bottom:2px solid var(--brd);white-space:nowrap}
.dt td{border-bottom:1px solid var(--brd)}.dt tr:hover td{background:var(--bg)}
.bg{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;display:inline-block}
.bg-g{background:#d1fae5;color:#059669}.bg-y{background:#fed7aa;color:#c2410c}.bg-r{background:#fee2e2;color:#dc2626}.bg-b{background:#dbeafe;color:#1d4ed8}
.md{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center;padding:16px}
.md.show{display:flex}
.mc{background:var(--card);border-radius:var(--rad);max-width:820px;width:100%;padding:20px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2)}
.ib{background:var(--bg);padding:12px;border-radius:14px;margin:10px 0}
.sr{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px dashed var(--brd)}
.sb{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
input,select,textarea{width:100%;padding:9px 12px;border:2px solid var(--brd);border-radius:10px;font-size:12px;transition:.3s;background:var(--card);color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.fg{margin-bottom:12px}.fg label{display:block;margin-bottom:4px;font-weight:700;color:var(--mut);font-size:11px}
.sx{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.sx input{flex:1;min-width:160px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}@media(max-width:600px){.g2{grid-template-columns:1fr}}
.tg{color:var(--ok);font-weight:700}.tr{color:var(--err);font-weight:700}
.ph{cursor:pointer;direction:ltr;display:inline-block}
.tst{position:fixed;top:14px;left:14px;color:#fff;padding:10px 16px;border-radius:14px;z-index:2000;display:flex;align-items:center;gap:8px;animation:si .4s;box-shadow:0 8px 25px rgba(0,0,0,.2);max-width:360px;font-size:12px}
.tst.s{background:linear-gradient(135deg,#059669,#10b981)}.tst.e{background:linear-gradient(135deg,#dc2626,#ef4444)}.tst.w{background:linear-gradient(135deg,#d97706,#f59e0b)}
@keyframes si{from{transform:translateX(-120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes soo{from{transform:translateX(0);opacity:1}to{transform:translateX(-120%);opacity:0}}
.nb{position:relative;cursor:pointer}
.nc{position:absolute;top:-4px;right:-4px;background:var(--err);color:#fff;font-size:8px;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.npan{position:absolute;top:100%;left:0;background:var(--card);border:1px solid var(--brd);border-radius:12px;width:280px;box-shadow:0 15px 40px rgba(0,0,0,.15);z-index:200;display:none;max-height:280px;overflow-y:auto}
.npan.show{display:block}
.ni{padding:8px 12px;border-bottom:1px solid var(--brd);font-size:11px;cursor:pointer;transition:.2s}.ni:hover{background:var(--bg)}
</style>
</head>
<body>

<div id="lp" class="lp">
<div class="lb">
<h2>ERP PRO</h2>
<p class="sub">النظام المحاسبي المتكامل</p>
<div id="ld">
<input type="text" id="lu" placeholder="اسم المستخدم" value="admin">
<input type="password" id="lpa" placeholder="كلمة المرور" value="admin123">
<button class="bp" onclick="dL()"><i class="fas fa-sign-in-alt"></i> دخول</button>
<div class="sa" onclick="document.getElementById('ld').style.display='none';document.getElementById('rd').style.display='block'">ليس لديك حساب؟ <span style="color:var(--pri);font-weight:700">سجل الآن</span></div>
</div>
<div id="rd" style="display:none">
<input type="text" id="rn" placeholder="الاسم الكامل">
<input type="text" id="ru" placeholder="اسم المستخدم">
<input type="password" id="rp" placeholder="كلمة المرور">
<button class="bp" style="background:linear-gradient(135deg,#059669,#10b981)" onclick="dR()"><i class="fas fa-user-plus"></i> تسجيل</button>
<div class="sa" onclick="document.getElementById('rd').style.display='none';document.getElementById('ld').style.display='block'">لديك حساب؟ <span style="color:var(--pri);font-weight:700">دخول</span></div>
</div>
</div>
</div>

<div id="app" class="app">
<div class="th">
<div class="logo">ERP PRO</div>
<div class="hb">
<select id="curS" onchange="cCur()"><option value="SAR">ريال سعودي</option><option value="LYD">دينار ليبي</option><option value="USD">دولار</option><option value="EGP">جنيه مصري</option><option value="AED">درهم</option><option value="IQD">دينار عراقي</option></select>
<button onclick="tDark()" title="الوضع الداكن"><i class="fas fa-moon" id="dIco"></i></button>
<div class="nb" onclick="tNotif()"><i class="fas fa-bell"></i><span class="nc" id="nCnt" style="display:none">0</span><div class="npan" id="nPan"></div></div>
<span id="uNm" style="font-weight:700;font-size:12px"></span>
<span id="uRl" style="font-size:9px;color:var(--mut);background:var(--pril);padding:2px 7px;border-radius:12px"></span>
<button style="background:var(--err);border:none;padding:4px 12px;border-radius:20px;color:#fff;cursor:pointer;font-size:10px;font-weight:600" onclick="dO()"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
<div class="mb" id="mBar"></div>
<div class="pg" id="pg"></div>
</div>

<div id="md" class="md" onclick="if(event.target===this)cM()"><div class="mc" id="mIn"></div></div>

<script>
// ============================================================
// ERP PRO - الكود الكامل النهائي (نسخة واحدة)
// ============================================================

// ========== الثوابت والمتغيرات ==========
const MENUS = [
{id:'dashboard',icon:'fa-home',label:'الرئيسية'},
{id:'inventory',icon:'fa-boxes',label:'المخزون'},
{id:'suppliers',icon:'fa-truck',label:'الموردين'},
{id:'purchases',icon:'fa-shopping-cart',label:'المشتريات'},
{id:'sales',icon:'fa-tag',label:'المبيعات'},
{id:'clients',icon:'fa-users',label:'العملاء'},
{id:'pos',icon:'fa-cash-register',label:'نقطة البيع'},
{id:'expenses',icon:'fa-receipt',label:'المصروفات'},
{id:'reports',icon:'fa-chart-pie',label:'التقارير'},
{id:'settings',icon:'fa-cog',label:'الإعدادات'},
{id:'users',icon:'fa-user-shield',label:'المستخدمين'},
{id:'backup',icon:'fa-database',label:'النسخ الاحتياطي'}
];

const CURRENCIES = {SAR:{n:'ريال',s:'ر.س',r:1},LYD:{n:'دينار',s:'ل.د',r:0.78},USD:{n:'دولار',s:'$',r:3.75},EGP:{n:'جنيه',s:'ج.م',r:0.48},AED:{n:'درهم',s:'د.إ',r:1.02},IQD:{n:'دينار',s:'د.ع',r:0.0019}};
const CATEGORIES = ['أثاث','إلكترونيات','قرطاسية','أجهزة','أخرى'];
const EXPENSE_CATS = ['إيجار','رواتب','كهرباء','ماء','إنترنت','صيانة','نقل','تسويق','أخرى'];

let currentCurrency = localStorage.getItem('erp_cur') || 'LYD';
let currentUser = null;
let charts = [];
let cart = [];
let logs = [];
let currentPage = 'dashboard';
let darkMode = localStorage.getItem('erp_dark') === '1';
let visiblePhones = {};

// ========== قاعدة البيانات ==========
let db = {
inventory: [
{id:1,name:'مكتب خشبي فاخر',cat:'أثاث',qty:20,costPrice:1500,sellPrice:2500},
{id:2,name:'كرسي دوار مريح',cat:'أثاث',qty:35,costPrice:500,sellPrice:900},
{id:3,name:'طابعة HP LaserJet',cat:'إلكترونيات',qty:12,costPrice:2200,sellPrice:3500},
{id:4,name:'لابتوب Dell',cat:'إلكترونيات',qty:8,costPrice:3500,sellPrice:5500},
{id:5,name:'شاشة 24 بوصة',cat:'إلكترونيات',qty:15,costPrice:1200,sellPrice:2000},
{id:6,name:'ماوس لاسلكي',cat:'أجهزة',qty:40,costPrice:80,sellPrice:150},
{id:7,name:'ورق A4',cat:'قرطاسية',qty:200,costPrice:8,sellPrice:15}
],
sales: [
{id:1001,clientName:'شركة الأهرام',clientId:1,items:[{pid:1,name:'مكتب خشبي',qty:2,price:2500,total:5000}],subtotal:5000,tax:750,grand:5750,paid:5750,status:'مدفوع',date:new Date().toISOString().split('T')[0]},
{id:1002,clientName:'مؤسسة النور',clientId:2,items:[{pid:3,name:'طابعة HP',qty:1,price:3500,total:3500}],subtotal:3500,tax:525,grand:4025,paid:2000,status:'آجل',date:new Date().toISOString().split('T')[0]}
],
clients: [
{id:1,name:'شركة الأهرام',phone:'0512345678',address:'الرياض',balance:0},
{id:2,name:'مؤسسة النور',phone:'0587654321',address:'جدة',balance:2025},
{id:3,name:'مكتبة الفجر',phone:'0551122334',address:'الدمام',balance:0}
],
suppliers: [
{id:1,name:'العالمية للتوريدات',phone:'0555555555',address:'الرياض',category:'أثاث'},
{id:2,name:'مصنع التقنية',phone:'0566666666',address:'جدة',category:'إلكترونيات'}
],
purchases: [
{id:2001,supplierId:1,supplierName:'العالمية',productName:'مكتب خشبي',qty:10,price:1500,total:15000,paid:15000,status:'مدفوع',date:new Date().toISOString().split('T')[0]},
{id:2002,supplierId:2,supplierName:'مصنع التقنية',productName:'طابعة HP',qty:5,price:2200,total:11000,paid:6000,status:'آجل',date:new Date().toISOString().split('T')[0]}
],
expenses: [
{id:1,category:'إيجار',amount:5000,description:'إيجار المكتب',date:new Date().toISOString().split('T')[0]},
{id:2,category:'رواتب',amount:15000,description:'رواتب الموظفين',date:new Date().toISOString().split('T')[0]}
],
users: [
{id:1,name:'المدير العام',username:'admin',password:'admin123',role:'admin'}
],
returns: [], archive: []
};

// ========== دوال مساعدة ==========
function formatMoney(amount) {
const c = CURRENCIES[currentCurrency];
return (amount * c.r).toLocaleString('ar', {maximumFractionDigits:2}) + ' ' + c.s;
}

function today() {
const d = new Date();
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function generateld() { return Date.now() + Math.floor(Math.random()*10000); }

function escapeHtml(text) {
if(typeof text !== 'string') return '';
const div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

function showToast(msg, type='i') {
const icons = {s:'fa-check-circle', e:'fa-times-circle', w:'fa-exclamation-triangle', i:'fa-info-circle'};
const div = document.createElement('div');
div.className = `tst ${type}`;
div.innerHTML = `<i class="fas ${icons[type] || icons.i}"></i><span>${msg}</span>`;
document.body.appendChild(div);
setTimeout(() => {
div.style.animation = 'soo .4s forwards';
setTimeout(() => div.remove(), 400);
}, 3000);
}

function addLog(action, details) {
if(!currentUser) return;
logs.unshift({id:Date.now(), user:currentUser.name, action, details, date:new Date().toISOString()});
if(logs.length > 300) logs.length = 300;
localStorage.setItem('erp_logs', JSON.stringify(logs));
}

function saveAll() {
localStorage.setItem('erp_inventory', JSON.stringify(db.inventory));
localStorage.setItem('erp_sales', JSON.stringify(db.sales));
localStorage.setItem('erp_clients', JSON.stringify(db.clients));
localStorage.setItem('erp_suppliers', JSON.stringify(db.suppliers));
localStorage.setItem('erp_purchases', JSON.stringify(db.purchases));
localStorage.setItem('erp_expenses', JSON.stringify(db.expenses));
localStorage.setItem('erp_users', JSON.stringify(db.users));
localStorage.setItem('erp_returns', JSON.stringify(db.returns));
localStorage.setItem('erp_archive', JSON.stringify(db.archive));
addLog('حفظ', 'تم حفظ جميع البيانات');
}

function loadAll() {
const inv = localStorage.getItem('erp_inventory');
if(inv) db.inventory = JSON.parse(inv);
const sl = localStorage.getItem('erp_sales');
if(sl) db.sales = JSON.parse(sl);
const cl = localStorage.getItem('erp_clients');
if(cl) db.clients = JSON.parse(cl);
const sup = localStorage.getItem('erp_suppliers');
if(sup) db.suppliers = JSON.parse(sup);
const pur = localStorage.getItem('erp_purchases');
if(pur) db.purchases = JSON.parse(pur);
const exp = localStorage.getItem('erp_expenses');
if(exp) db.expenses = JSON.parse(exp);
const usr = localStorage.getItem('erp_users');
if(usr) db.users = JSON.parse(usr);
const ret = localStorage.getItem('erp_returns');
if(ret) db.returns = JSON.parse(ret);
const arc = localStorage.getItem('erp_archive');
if(arc) db.archive = JSON.parse(arc);
const logsData = localStorage.getItem('erp_logs');
if(logsData) logs = JSON.parse(logsData);
}

function isAdmin() { return currentUser && currentUser.role === 'admin'; }

function openModal(html) {
document.getElementById('mIn').innerHTML = html;
document.getElementById('md').classList.add('show');
}
function closeModal() { document.getElementById('md').classList.remove('show'); }

function destroyCharts() { charts.forEach(c => { try{c.destroy()}catch(e){} }); charts = []; }

// إحصائيات
function totalSales() { return db.sales.reduce((s,i) => s + i.grand, 0); }
function totalPurchases() { return db.purchases.reduce((s,i) => s + i.total, 0); }
function totalExpenses() { return db.expenses.reduce((s,i) => s + i.amount, 0); }
function netProfit() { return totalSales() - totalPurchases() - totalExpenses(); }
function inventoryValue() { return db.inventory.reduce((s,i) => s + (i.qty * i.costPrice), 0); }
function lowStockCount() { return db.inventory.filter(i => i.qty <= 5).length; }
function creditTotal() { return db.sales.filter(s => s.status === 'آجل').reduce((a,s) => a + (s.grand - s.paid), 0); }

// ========== تسجيل الدخول ==========
function dL() {
const username = document.getElementById('lu').value.trim();
const password = document.getElementById('lpa').value;
const found = db.users.find(u => u.username === username && u.password === password);
if(!found) { showToast('خطأ في بيانات الدخول', 'e'); return; }
currentUser = found;
loadAll();
document.getElementById('lp').style.display = 'none';
document.getElementById('app').style.display = 'block';
document.getElementById('uNm').innerText = found.name;
document.getElementById('uRl').innerText = found.role === 'admin' ? 'مدير النظام' : 'مستخدم';
document.getElementById('curS').value = currentCurrency;
applyDarkMode();
buildMenu();
addLog('دخول', `${found.name} سجل الدخول`);
showToast(`مرحباً ${found.name}`, 's');
showPage('dashboard');
setTimeout(updateNotifications, 300);
}

function dR() {
const name = document.getElementById('rn').value.trim();
const username = document.getElementById('ru').value.trim();
const password = document.getElementById('rp').value;

function updateNotifications() {
const notifs = [];
db.inventory.filter(i => i.qty <= 5 && i.qty > 0).forEach(i => notifs.push({text: `⚠️ "${i.name}" الكمية منخفضة (${i.qty})`}));
db.inventory.filter(i => i.qty <= 0).forEach(i => notifs.push({text: `❌ "${i.name}" نفد من المخزون`}));
db.sales.filter(s => s.status === 'آجل').forEach(s => notifs.push({text: `💰 فاتورة #${s.id} - متبقي ${formatMoney(s.grand - s.paid)}`}));
if(notifs.length === 0) notifs.push({text: '✅ كل شيء يسير بشكل جيد'});
document.getElementById('nCnt').style.display = notifs.length ? 'flex' : 'none';
if(notifs.length) document.getElementById('nCnt').innerText = notifs.length;
document.getElementById('nPan').innerHTML = notifs.map(n => `<div class="ni">${n.text}</div>`).join('');
}

// ========== عرض الصفحات ==========
function showPage(page) {
currentPage = page;
destroyCharts();
buildMenu();
updateNotifications();
const el = document.getElementById('pg');
switch(page) {
case 'dashboard': renderDashboard(el); break;
case 'inventory': renderInventory(el); break;
case 'suppliers': renderSuppliers(el); break;
case 'purchases': renderPurchases(el); break;
case 'sales': renderSales(el); break;
case 'clients': renderClients(el); break;
case 'pos': renderPOS(el); break;
case 'expenses': renderExpenses(el); break;
case 'reports': renderReports(el); break;
case 'settings': renderSettings(el); break;
case 'users': renderUsers(el); break;
case 'backup': renderBackup(el); break;
default: renderDashboard(el);
}
}

<div class="sg">

<div class="sc"><div class="si">🧾</div><div class="sv">${formatMoney(totalExpenses())}</div><div class="sl">المصروفات</div></div>
<div class="sc"><div class="si">⚠️</div><div class="sv tr">${lowStockCount()}</div><div class="sl">مخزون منخفض</div></div>
</div>
<div class="sg" style="margin-bottom:14px">
<div class="sc"><div class="si">👥</div><div class="sv">${db.clients.length}</div><div class="sl">العملاء</div></div>
<div class="sc"><div class="si">🚚</div><div class="sv">${db.suppliers.length}</div><div class="sl">الموردين</div></div>

<div class="sc"><div class="si">📅</div><div class="sv tg">${formatMoney(todaySales)}</div><div class="sl">مبيعات اليوم</div></div>
<div class="sc"><div class="si">📉</div><div class="sv ${todayProfit>=0?'tg':'tr'}">${formatMoney(todayProfit)}</div><div class="sl">ربح اليوم</div></div>
<div class="sc"><div class="si">🧾</div><div class="sv">${db.sales.length}</div><div class="sl">عدد الفواتير</div></div>

function renderInventoryRows(items) {
if(!items.length) return '<tr><td colspan="9" style="text-align:center;padding:25px">لا توجد منتجات</td></tr>';
return items.map((p,i) => {
const status = p.qty <= 0 ? '<span class="bg bg-r">نفد</span>' : p.qty <= 5 ? '<span class="bg bg-y">منخفض</span>' : '<span class="bg bg-g">متوفر</span>';
return `<tr><td>${i+1}</td><td style="font-weight:700">${escapeHtml(p.name)}</td><td><span class="bg bg-b">${escapeHtml(p.cat)}</span></td><td>${p.qty}</td><td>${formatMoney(p.costPrice)}</td><td>${formatMoney(p.sellPrice)}</td><td>${formatMoney(p.qty * p.costPrice)}</td><td>${status}</td><td><button class="b b-i" style="padding:3px 7px;font-size:9px" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button> <button class="b b-d" style="padding:3px 7px;font-size:9px" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button></td></tr>`;
}).join('');
}

function filterInventory() {
const q = document.getElementById('invSearch').value.toLowerCase();
const filtered = db.inventory.filter(p => p.name.toLowerCase().includes(q));
document.querySelector('#invTable tbody').innerHTML = renderInventoryRows(filtered);
}

const sup = db.suppliers.find(x => x.id === supId);
const prodName = document.getElementById('purProd').value.trim();
const qty = parseInt(document.getElementById('purQty').value) || 0;
const price = parseFloat(document.getElementById('purPrice').value) || 0;
const paid = parseFloat(document.getElementById('purPaid').value) || 0;
if(!prodName || qty <= 0 || price <= 0) { showToast('بيانات غير صحيحة','e'); return; }
const total = qty * price;
db.purchases.push({
id: generateld(),
supplierId: supId,
supplierName: sup.name,
productName: prodName,
qty: qty,
price: price,
total: total,
paid: paid,
status: paid >= total ? 'مدفوع' : 'آجل',
date: today()
});
const existing = db.inventory.find(p => p.name === prodName);
if(existing) {
const oldVal = existing.costPrice * existing.qty;
existing.qty += qty;
existing.costPrice = (oldVal + price * qty) / existing.qty;
if(existing.sellPrice <= existing.costPrice) existing.sellPrice = existing.costPrice * 1.3;
} else {
db.inventory.push({
id: generateld(),
name: prodName,
cat: 'أخرى',
qty: qty,
costPrice: price,
sellPrice: price * 1.3
});
}
saveAll();
addLog('فاتورة شراء', `${prodName} × ${qty} - ${formatMoney(total)}`);
showToast('تمت فاتورة الشراء', 's');
closeModal();
renderPurchases(document.getElementById('pg'));
}

function renderSalesRows(items) {
if(!items.length) return '<tr><td colspan="8" style="text-align:center;padding:25px">لا توجد فواتير</td></tr>';
return items.map(s => {
const prodNames = s.items.map(i => i.name).join('، ');
return `<tr><td>${s.id}</td><td>${s.date}</td><td style="cursor:pointer;color:var(--pri);font-weight:700" onclick="viewClientAccount(${s.clientId||0})">${escapeHtml(s.clientName)}</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(prodNames)}">${escapeHtml(prodNames)}</td><td><strong>${formatMoney(s.grand)}</strong></td><td>${formatMoney(s.paid)}</td><td><span class="bg ${s.status==='مدفوع'?'bg-g':'bg-y'}">${s.status}</span></td><td><button class="b b-i" style="padding:3px 7px;font-size:9px" onclick="viewInvoice(${s.id})"><i class="fas fa-eye"></i></button></td></tr>`;
}).join('');
}

function filterSales() {
const q = document.getElementById('slSearch').value.toLowerCase();
let filtered = db.sales;
if(saleFilter === 'paid') filtered = filtered.filter(s => s.status === 'مدفوع');
else if(saleFilter === 'credit') filtered = filtered.filter(s => s.status === 'آجل');
else if(saleFilter === 'today') filtered = filtered.filter(s => s.date === today());
filtered = filtered.filter(s => s.clientName.toLowerCase().includes(q) || s.items.some(i => i.name.toLowerCase().includes(q)));
document.querySelector('#slTable tbody').innerHTML = renderSalesRows(filtered);
}

function addSaleItem() {
const itemId = Date.now() + Math.random();
const options = db.inventory.filter(p => p.qty > 0).map(p => `<option value="${p.id}" data-price="${p.sellPrice}" data-qty="${p.qty}">${escapeHtml(p.name)} (${formatMoney(p.sellPrice)}) [${p.qty}]</option>`).join('');
const div = document.createElement('div');
div.className = 'ir';
div.id = `saleItem_${itemId}`;
div.innerHTML = `
<select style="flex:1" onchange="updateSaleTotals()">${options}</select>
<input type="number" id="qty_${itemId}" placeholder="الكمية" value="1" min="1" style="width:80px" onchange="updateSaleTotals()">
<button class="b b-d" style="padding:3px 6px" onclick="removeSaleItem('${itemId}')"><i class="fas fa-times"></i></button>
`;
document.getElementById('saleItemsContainer').appendChild(div);
updateSaleTotals();
}

function removeSaleItem(itemId) {
const el = document.getElementById(`saleItem_${itemId}`);
if(el) el.remove();
updateSaleTotals();
}

function updateSaleTotals() {
let subtotal = 0;
document.querySelectorAll('#saleItemsContainer .ir').forEach(row => {
const sel = row.querySelector('select');
const qty = row.querySelector('input[type=number]');
if(sel && sel.value && qty) {
const price = parseFloat(sel.selectedOptions[0]?.dataset.price) || 0;
const q = parseInt(qty.value) || 0;
subtotal += price * q;
}
});
const tax = subtotal * 0.15;
const grand = subtotal + tax;
document.getElementById('saleSubTotal').innerHTML = formatMoney(subtotal);
document.getElementById('saleTax').innerHTML = formatMoney(tax);
document.getElementById('saleGrandTotal').innerHTML = formatMoney(grand);
const paidInput = document.getElementById('salePaid');
if(paidInput && parseFloat(paidInput.value) === 0) paidInput.value = Math.round(grand);
}
