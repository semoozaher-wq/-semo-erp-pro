<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP - Full System</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://jsdelivr.net"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#3b82f6;--success:#10b981;--danger:#ef4444;--bg:#0f172a;--card:#1e293b}
        body{font-family:'Cairo',sans-serif;background:var(--bg);color:#fff;direction:rtl}
        .sidebar{width:260px;background:var(--card);position:fixed;right:0;top:0;height:100vh;padding:20px;overflow-y:auto}
        .main-content{margin-right:260px;padding:20px}
        .menu-item{padding:12px;margin:5px 0;border-radius:12px;cursor:pointer;display:flex;gap:10px}
        .menu-item:hover,.menu-item.active{background:var(--primary)}
        .btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:bold; transition: 0.3s}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-success{background:var(--success);color:#fff}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px}
        .stat-card{background:var(--card);border-radius:16px;padding:15px;cursor:pointer;border-right:3px solid var(--primary)}
        .card-box{background:var(--card);border-radius:16px;padding:20px;margin-bottom:20px}
        .data-table{width:100%;border-collapse:collapse}
        .data-table th,.data-table td{padding:12px;text-align:right;border-bottom:1px solid #334155}
        .badge{padding:4px 10px;border-radius:20px;font-size:12px}
        .badge-success{background:rgba(16,185,129,0.2);color:#34d399}
        .badge-warning{background:rgba(245,158,11,0.2);color:#fbbf24}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center}
        .modal.show{display:flex}
        .modal-content{background:var(--card);border-radius:20px;max-width:500px;width:90%;padding:20px}
        input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff;font-family:'Cairo'}
        @media(max-width:768px){.sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-right:0}}
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <h2 style="text-align:center; margin-bottom:20px; color:var(--primary)">SEMO ERP</h2>
    <div class="menu-item active" onclick="switchPage('dashboard', this)">🏠 الرئيسية</div>
    <div class="menu-item" onclick="switchPage('inventory', this)">📦 المخزون</div>
    <div class="menu-item" onclick="switchPage('sales', this)">🛒 المبيعات</div>
    <div class="menu-item" onclick="switchPage('clients', this)">👥 العملاء</div>
    <div class="menu-item" onclick="logout()">🚪 خروج</div>
</div>

<div class="main-content">
    <div id="pageContent"></div>
</div>

<div id="detailsModal" class="modal" onclick="if(event.target===this)closeModal('detailsModal')">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
// 1. قاعدة البيانات المحلية
let db = {
    inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
    sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
    clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
    expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
    revenues: JSON.parse(localStorage.getItem('semo_revenues')) || [],
    settings: JSON.parse(localStorage.getItem('semo_settings')) || {currencySymbol:'ج.م'}
};

// 2. وظائف الحفظ والتنسيق
function saveAll() {
    localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
    localStorage.setItem('semo_sales', JSON.stringify(db.sales));
    localStorage.setItem('semo_clients', JSON.stringify(db.clients));
    localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
    localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
}

function formatCurrency(a) { return (a || 0).toLocaleString() + ' ' + db.settings.currencySymbol; }

function showNotification(m, t) {
    let d = document.createElement('div');
    d.style.cssText = `position:fixed;bottom:20px;left:20px;padding:12px 20px;border-radius:30px;background:${t==='success'?'#10b981':'#ef4444'};color:#fff;z-index:1100`;
    d.innerHTML = m;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 3000);
}

function openModal(i) { document.getElementById(i).classList.add('show'); }
function closeModal(i) { document.getElementById(i).classList.remove('show'); }

// 3. محرك الصفحات
function switchPage(page, element) {
    if(element) {
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }
    
    if(page === 'dashboard') renderDashboard();
    else if(page === 'inventory') renderInventory();
    else {
        document.getElementById('pageContent').innerHTML = `<div class="card-box"><h2>صفحة ${page} قيد الإنشاء</h2></div>`;
    }
}

// 4. عرض لوحة التحكم (الرئيسية)
function renderDashboard() {
    let totalSales = db.sales.reduce((s, i) => s + (i.total || 0), 0);
    let lowStock = db.inventory.filter(i => (i.qty || 0) <= 5).length;

    document.getElementById('pageContent').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card" onclick="switchPage('sales')"><div style="font-size:24px;font-weight:bold">${formatCurrency(totalSales)}</div><div>💰 المبيعات</div></div>
            <div class="stat-card" onclick="switchPage('inventory')"><div style="font-size:24px;font-weight:bold">${db.inventory.length}</div><div>📦 المنتجات</div></div>
            <div class="stat-card" onclick="switchPage('inventory')"><div style="font-size:24px;font-weight:bold;color:${lowStock>0?'#fbbf24':'#34d399'}">${lowStock}</div><div>⚠️ نواقص</div></div>
        </div>
        <div class="card-box"><h3>📊 نظرة عامة</h3><canvas id="monthlyChart" height="100"></canvas></div>
    `;
    
    // رسم بياني بسيط
    new Chart(document.getElementById('monthlyChart'), {
        type: 'bar',
        data: { labels: ['يناير','فبراير','مارس','أبريل'], datasets: [{label: 'المبيعات', data: [1000, 2000, 1500, totalSales], backgroundColor: '#3b82f6'}]}
    });
}

// 5. إدارة المخزون
function renderInventory() {
    document.getElementById('pageContent').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2>📦 المخزون</h2>
            <button class="btn btn-success" onclick="openAddProductModal()">+ إضافة منتج</button>
        </div>
        <div class="card-box">
            <table class="data-table">
                <thead><tr><th>الاسم</th><th>الكمية</th><th>السعر</th><th>حذف</th></tr></thead>
                <tbody>
                    ${db.inventory.map(item => `
                        <tr>
                            <td>${item.name}</td>
                            <td><span class="badge ${item.qty <= 5 ? 'badge-warning' : 'badge-success'}">${item.qty}</span></td>
                            <td>${formatCurrency(item.price)}</td>
                            <td><button class="btn" style="background:#ef4444" onclick="deleteProduct(${item.id})">🗑️</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
}

function openAddProductModal() {
    document.getElementById('modalContent').innerHTML = `
        <h3>➕ منتج جديد</h3>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pQty" placeholder="الكمية">
        <input type="number" id="pPrice" placeholder="السعر">
        <button class="btn btn-success" style="width:100%" onclick="saveNewProduct()">حفظ</button>
    `;
    openModal('detailsModal');
}

function saveNewProduct() {
    let name = document.getElementById('pName').value;
    let qty = parseInt(document.getElementById('pQty').value);
    let price = parseFloat(document.getElementById('pPrice').value);
    if(name && qty >= 0) {
        db.inventory.push({id: Date.now(), name, qty, price});
        saveAll();
        closeModal('detailsModal');
        renderInventory();
        showNotification('تمت الإضافة', 'success');
    }
}

function deleteProduct(id) {
    if(confirm('حذف؟')) {
        db.inventory = db.inventory.filter(p => p.id !== id);
        saveAll();
        renderInventory();
    }
}

// تشغيل عند البداية
window.onload = () => {
    if(db.inventory.length === 0) {
        db.inventory = [{id:1, name:'عينة منتج', qty:10, price:100}];
        saveAll();
    }
    renderDashboard();
};

function logout(){ alert('تم الخروج'); }
</script>
</body>
</html>
