<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | دخول</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px 30px; border-radius: 24px; width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid #334155; }
        h1 { color: #3b82f6; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 12px; border: 1px solid #334155; outline: none; font-size: 16px; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: #3b82f6; border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SEMO ERP</h1>
        <input type="email" id="email" placeholder="الإيميل">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn" onclick="startLogin()">دخول مباشر</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";

        const firebaseConfig = {
          apiKey: "AIzaSyC2EVpNEG9XjcPEelUA8lkIUcUceN6Oh0k",
          authDomain: "://firebaseapp.com",
          projectId: "semo-erp-pro13",
          appId: "1:915256659491:web:eb9c8ef55450aedc7c6b96"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.startLogin = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            
            alert("بدء محاولة الدخول لـ: " + e); // للتأكد أن الزر يعمل

            try {
                await signInWithEmailAndPassword(auth, e, p);
                alert("✅ تم الدخول بنجاح!");
                window.location.href = "dashboard.html";
            } catch (error) {
                alert("❌ فشل الدخول بسبب: " + error.message);
                console.error(error);
            }
        };
    </script>
</body>
</html>
