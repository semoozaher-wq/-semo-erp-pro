<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP - النظام المحاسبي المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --p: #3b82f6;
            --s: #10b981;
            --d: #ef4444;
            --w: #f59e0b;
            --bg: #0f172a;
            --c: #1e293b;
            --t: #f8fafc;
            --b: #334155;
        }
        body {
            background: var(--bg);
            color: var(--t);
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            display: flex;
            min-height: 100vh;
        }
        
        /* الشريط الجانبي - على اليمين جنب مش فوق */
        .sidebar {
            width: 280px;
            background: var(--c);
            padding: 25px 20px;
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid var(--b);
            z-index: 100;
        }
        
        /* المحتوى الرئيسي - ياخد المسافة الباقية */
        .main {
            margin-right: 280px;
            padding: 30px;
            width: calc(100% - 280px);
        }
        
        /* البطاقات والإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--c);
            padding: 20px;
            border-radius: 20px;
            border-right: 4px solid var(--p);
            cursor: pointer;
            transition: 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card h3 {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }
        
        /* الكروت والجداول */
        .card {
            background: var(--c);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--b);
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--b);
        }
        th {
            color: var(--p);
        }
        
        /* الأزرار */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--p); color: #fff; }
        .btn-success { background: var(--s); color: #fff; }
        .btn-danger { background: var(--d); color: #fff; }
        
        /* المدخلات */
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--bg);
            border: 1px solid var(--b);
            color: #fff;
            border-radius: 10px;
        }
        
        /* القائمة الجانبية */
        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .menu-item:hover, .menu-item.active {
            background: var(--p);
        }
        .menu-title {
            font-size: 11px;
            color: var(--p);
            margin: 15px 0 5px;
            font-weight: bold;
        }
        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: var(--bg);
            border-radius: 16px;
            margin-bottom: 25px;
        }
        
        /* النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--c);
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
        }
        
        /* شاشة الدخول */
        .login-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        /* علامات */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }
        .badge-success { background: rgba(16,185,129,0.2); color: #34d399; }
        .badge-warning { background: rgba(245,158,11,0.2); color: #fbbf24; }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main {
                margin-right: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginPage" class="login-page">
    <div class="login-card">
        <div style="font-size: 60px;">📊</div>
        <h1 style="color: #3b82f6; margin: 20px 0;">SEMO ERP PRO</h1>
        <select id="currencySelect">
            <option value="EGP">🇪🇬 جنيه مصري (ج.م)</option>
            <option value="LYD">🇱🇾 دينار ليبي (د.ل)</option>
        </select>
        <input type="text" id="loginUser" placeholder="اسم المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button onclick="doLogin()">دخول</button>
        <div id="loginError" style="color: #f87171; margin-top: 15px; display: none;"></div>
        <div style="margin-top: 20px; font-size: 12px;">admin / admin123</div>
    </div>
</div>

<!-- التطبيق -->
<div id="app" style="display: none;">
    <div class="sidebar" id="sidebar">
        <h2 style="text-align:center; color:var(--p);">SEMO ERP</h2>
        <div class="user-card">
            <div class="user-avatar" style="font-size: 30px;">👑</div>
            <div class="user-info"><h4 id="userName">مدير النظام</h4><p id="userRole">مدير عام</p></div>
        </div>
        <div class="menu-title">الرئيسية</div>
        <div class="menu-item active" onclick="sp('dash', this)">🏠 لوحة التحكم</div>
        
        <div class="menu-title">المخازن</div>
        <div class="menu-item" onclick="sp('inv', this)">📦 المخزون</div>
        <div class="menu-item" onclick="sp('sales', this)">🛒 المبيعات</div>
        <div class="menu-item" onclick="sp('pur', this)">📥 المشتريات</div>
        
        <div class="menu-title">المالية</div>
        <div class="menu-item" onclick="sp('exp', this)">💸 المصروفات</div>
        <div class="menu-item" onclick="sp('rev', this)">💰 الإيرادات</div>
        <div class="menu-item" onclick="sp('debt', this)">⏳ الديون</div>
        
        <div class="menu-title">جهات الاتصال</div>
        <div class="menu-item" onclick="sp('cli', this)">👥 العملاء</div>
        <div class="menu-item" onclick="sp('sup', this)">🏭 الموردين</div>
        
        <div class="menu-title">النظام</div>
        <div class="menu-item" onclick="exportData()">💾 نسخة احتياطية</div>
        <div class="menu-item" onclick="logout()">🚪 تسجيل خروج</div>
    </div>
    
    <div class="main">
        <div id="content"></div>
    </div>
</div>

<div id="modal" class="modal" onclick="if(event.target===this)cm()">
    <div class="modal-content" id="mBody"></div>
</div>

<script>
// العملة
let currencySymbol = 'ج.م';

function formatMoney(amount) {
    return (amount || 0).toLocaleString() + ' ' + currencySymbol;
}

// قاعدة البيانات
let db = {
    inv: JSON.parse(localStorage.getItem('erp_inv')) || [],
    sales: JSON.parse(localStorage.getItem('erp_sales')) || [],
    pur: JSON.parse(localStorage.getItem('erp_pur')) || [],
    exp: JSON.parse(localStorage.getItem('erp_exp')) || [],
    rev: JSON.parse(localStorage.getItem('erp_rev')) || [],
    cli: JSON.parse(localStorage.getItem('erp_cli')) || [],
    sup: JSON.parse(localStorage.getItem('erp_sup')) || []
};

const save = () => {
    Object.keys(db).forEach(k => localStorage.setItem('erp_'+k, JSON.stringify(db[k])));
};

// بيانات تجريبية
if(db.inv.length === 0) {
    db.inv = [
        {id:1, n:'مكتب خشبي', c:500, p:800, q:15},
        {id:2, n:'كرسي دوار', c:300, p:550, q:25},
        {id:3, n:'طابعة HP', c:1200, p:1800, q:5},
        {id:4, n:'شاشة 24 بوصة', c:2000, p:3200, q:8}
    ];
    db.cli = [
        {id:101, n:'شركة الأهرام', p:'01001112223'},
        {id:102, n:'مؤسسة النور', p:'01002223334'}
    ];
    db.sup = [
        {id:201, n:'معرض القاهرة', p:'01555556667'},
        {id:202, n:'شركة التقنية', p:'01556667778'}
    ];
    db.exp = [
        {id:301, d:new Date().toLocaleDateString('ar-EG'), n:'إيجار المحل', amt:5000},
        {id:302, d:new Date().toLocaleDateString('ar-EG'), n:'كهرباء', amt:800},
        {id:303, d:new Date().toLocaleDateString('ar-EG'), n:'رواتب', amt:7500}
    ];
    db.rev = [
        {id:401, d:new Date().toLocaleDateString('ar-EG'), n:'خدمات', amt:2500}
    ];
    let d = new Date().toLocaleDateString('ar-EG');
    db.sales = [
        {id:501, d:d, item:'مكتب خشبي', cli:'شركة الأهرام', q:2, tot:1600, prof:600, st:'مدفوع', paid:1600},
        {id:502, d:d, item:'طابعة HP', cli:'مؤسسة النور', q:1, tot:1800, prof:600, st:'آجل', paid:0}
    ];
    save();
}

// تسجيل الدخول
function doLogin() {
    let user = document.getElementById('loginUser').value;
    let pass = document.getElementById('loginPass').value;
    let cur = document.getElementById('currencySelect').value;
    
    if(user === 'admin' && pass === 'admin123') {
        currencySymbol = cur === 'EGP' ? 'ج.م' : 'د.ل';
        localStorage.setItem('erp_logged', 'true');
        localStorage.setItem('erp_cur', currencySymbol);
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('userName').innerHTML = 'مدير النظام';
        renderDash();
    } else {
        let err = document.getElementById('loginError');
        err.style.display = 'block';
        err.innerHTML = 'خطأ في اسم المستخدم أو كلمة المرور';
    }
}

function logout() {
    localStorage.removeItem('erp_logged');
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
}

let savedCur = localStorage.getItem('erp_cur');
if(savedCur === 'ج.م' || savedCur === 'د.ل') currencySymbol = savedCur;

if(localStorage.getItem('erp_logged') === 'true') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('userName').innerHTML = 'مدير النظام';
    renderDash();
}

// التنقل
function sp(p, el) {
    document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
    if(el) el.classList.add('active');
    if(p === 'dash') renderDash();
    else if(p === 'inv') renderInv();
    else if(p === 'sales') renderSales();
    else if(p === 'pur') renderPur();
    else if(p === 'exp') renderExp();
    else if(p === 'rev') renderRev();
    else if(p === 'debt') renderDebt();
    else if(p === 'cli') renderPeople('cli', 'العملاء');
    else if(p === 'sup') renderPeople('sup', 'الموردين');
}

// 1. الرئيسية
function renderDash() {
    let sVal = db.sales.reduce((a,b)=>a+b.tot, 0);
    let eVal = db.exp.reduce((a,b)=>a+b.amt, 0);
    let rVal = db.rev.reduce((a,b)=>a+b.amt, 0);
    let profit = sVal - eVal + rVal;
    let low = db.inv.filter(i=>i.q <= 5).length;
    
    document.getElementById('content').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card" onclick="sp('sales')"><h3>💰 المبيعات</h3><div class="stat-value">${formatMoney(sVal)}</div></div>
            <div class="stat-card" onclick="sp('exp')" style="border-color:#ef4444"><h3>💸 المصروفات</h3><div class="stat-value">${formatMoney(eVal)}</div></div>
            <div class="stat-card" onclick="sp('rev')" style="border-color:#10b981"><h3>💰 الإيرادات</h3><div class="stat-value">${formatMoney(rVal)}</div></div>
            <div class="stat-card" onclick="sp('sales')" style="border-color:#10b981"><h3>📈 صافي الربح</h3><div class="stat-value" style="color:${profit>=0?'#10b981':'#ef4444'}">${formatMoney(profit)}</div></div>
            <div class="stat-card" onclick="sp('inv')"><h3>📦 المنتجات</h3><div class="stat-value">${db.inv.length}</div></div>
            <div class="stat-card" onclick="sp('inv')" style="border-color:#f59e0b"><h3>⚠️ منتجات منخفضة</h3><div class="stat-value">${low}</div></div>
            <div class="stat-card" onclick="sp('cli')"><h3>👥 العملاء</h3><div class="stat-value">${db.cli.length}</div></div>
        </div>
        <div class="card"><h3>📋 آخر المبيعات</h3><div class="table-wrapper"><table class="data-table"><thead><tr><th>التاريخ</th><th>المنتج</th><th>العميل</th><th>المبلغ</th></tr></thead>
        <tbody>${db.sales.slice().reverse().slice(0,5).map(s=>`<tr><td style="text-align:center">${s.d}</td><td style="text-align:center">${s.item}</td><td style="text-align:center">${s.cli}</td><td style="text-align:center">${formatMoney(s.tot)}<td style="text-align:center"><span class="badge ${s.st==='مدفوع'?'badge-success':'badge-warning'}">${s.st}</span></td></tr>`).join('')}</tbody></table></div></div>
    `;
}

// 2. المخزون
function renderInv() {
    document.getElementById('content').innerHTML = `
        <div class="card">
            <div class="card-header"><h2>📦 المخزون</h2><button class="btn btn-primary" onclick="openInvM()">+ منتج جديد</button></div>
            <input type="text" id="searchInv" placeholder="بحث..." class="search-input" style="width:100%;padding:10px;margin-bottom:15px" onkeyup="filterInv()">
            <table id="invTable"><thead><tr><th>#</th><th>المنتج</th><th>سعر الشراء</th><th>سعر البيع</th><th>الكمية</th><th>الحالة</th><th></th></tr></thead>
            <tbody id="invList"></tbody></table>
        </div>
    `;
    refreshInv();
}

function refreshInv() {
    let search = document.getElementById('searchInv')?.value.toLowerCase() || '';
    let filtered = db.inv.filter(i => i.n.toLowerCase().includes(search));
    document.getElementById('invList').innerHTML = filtered.map((i,idx)=>`
        <tr><td style="text-align:center">${idx+1}</td><td style="text-align:center"><strong>${i.n}</strong></td>
        <td style="text-align:center">${formatMoney(i.c)}</td><td style="text-align:center">${formatMoney(i.p)}</td>
        <td style="text-align:center" class="${i.q<=5?'badge-warning':''}">${i.q}</td>
        <td style="text-align:center">${i.q<=5?'⚠️ منخفض':'متوفر'}</td>
        <td style="text-align:center"><button class="btn btn-primary" style="padding:5px" onclick="editInv(${i.id})">✏️</button><button class="btn btn-danger" style="padding:5px" onclick="delInv(${i.id})">🗑️</button></td>
        </tr>`).join('');
}
function filterInv(){ refreshInv(); }
function openInvM(id=null){
    let i=id?db.inv.find(x=>x.id==id):{n:'',c:0,p:0,q:0};
    document.getElementById('mBody').innerHTML=`<h3>${id?'تعديل':'إضافة'} منتج</h3><input id="in" value="${i.n}" placeholder="الاسم"><input id="ic" type="number" value="${i.c}" placeholder="سعر الشراء"><input id="ip" type="number" value="${i.p}" placeholder="سعر البيع"><input id="iq" type="number" value="${i.q}" placeholder="الكمية"><button class="btn btn-success" style="width:100%" onclick="saveInv(${id})">حفظ</button>`;
    document.getElementById('modal').classList.add('show');
}
function saveInv(id){
    let d={id:id||Date.now(), n:document.getElementById('in').value, c:parseFloat(document.getElementById('ic').value)||0, p:parseFloat(document.getElementById('ip').value)||0, q:parseInt(document.getElementById('iq').value)||0};
    if(id) db.inv=db.inv.map(x=>x.id==id?d:x); else db.inv.push(d);
    save(); cm(); renderInv();
}
function editInv(id){ openInvM(id); }
function delInv(id){
    if(confirm('حذف؟')){ db.inv=db.inv.filter(x=>x.id!=id); save(); renderInv(); }
}

// 3. المبيعات
function renderSales(){
    document.getElementById('content').innerHTML=`<div class="card"><h2>🛒 فاتورة جديدة</h2><select id="si">${db.inv.map(i=>`<option value="${i.id}">${i.n} (${i.q})</option>`)}</select><select id="sc">${db.cli.map(c=>`<option value="${c.n}">${c.n}</option>`)}<option>زبون نقدي</option></select><input id="sq" type="number" value="1" placeholder="الكمية"><select id="st"><option value="مدفوع">مدفوع</option><option value="آجل">آجل</option></select><button class="btn btn-success" style="width:100%" onclick="doSale()">إتمام البيع</button></div><div class="card"><h3>سجل الفواتير</h3><div class="table-wrapper"><table class="data-table"><thead><tr><th>#</th><th>التاريخ</th><th>المنتج</th><th>العميل</th><th>الكمية</th><th>الإجمالي</th><th>الحالة</th></thead><tbody>${db.sales.slice().reverse().map((s,idx)=>`<tr><td style="text-align:center">${idx+1}</td><td style="text-align:center">${s.d}</td><td style="text-align:center">${s.item}</td><td style="text-align:center">${s.cli}</td><td style="text-align:center">${s.q}</td><td style="text-align:center">${formatMoney(s.tot)}</td><td style="text-align:center"><span class="badge ${s.st==='مدفوع'?'badge-success':'badge-warning'}">${s.st}</span></td></tr>`).join('')}</tbody></table></div></div>`;
}
function doSale(){
    let i=db.inv.find(x=>x.id==parseInt(document.getElementById('si').value)), q=parseInt(document.getElementById('sq').value);
    if(i && i.q>=q){
        i.q-=q;
        db.sales.push({id:Date.now(), d:new Date().toLocaleDateString('ar-EG'), item:i.n, cli:document.getElementById('sc').value, q:q, tot:q*i.p, prof:q*(i.p-i.c), st:document.getElementById('st').value, paid:document.getElementById('st').value==='مدفوع'?q*i.p:0});
        save(); renderSales(); alert('✅ تمت عملية البيع');
    } else alert('الكمية غير كافية');
}

// 4. المشتريات
function renderPur(){
    document.getElementById('content').innerHTML=`<div class="card"><h2>📥 مشتريات</h2><select id="pi">${db.inv.map(i=>`<option value="${i.id}">${i.n}</option>`)}</select><select id="ps">${db.sup.map(s=>`<option value="${s.n}">${s.n}</option>`)}</select><input id="pq" type="number" placeholder="الكمية"><button class="btn btn-primary" style="width:100%" onclick="doPur()">توريد للمخزن</button></div>`;
}
function doPur(){
    let i=db.inv.find(x=>x.id==parseInt(document.getElementById('pi').value)), q=parseInt(document.getElementById('pq').value);
    if(i && q>0){ i.q+=q; db.pur.push({d:new Date().toLocaleDateString(), n:i.n, q:q, s:document.getElementById('ps').value}); save(); alert('تم التوريد'); renderInv(); }
    else alert('أدخل كمية صحيحة');
}

// 5. المصروفات
function renderExp(){
    let total=db.exp.reduce((a,b)=>a+b.amt,0);
    document.getElementById('content').innerHTML=`<div class="card"><div class="card-header"><h2>💸 المصروفات (${formatMoney(total)})</h2><button class="btn btn-danger" onclick="openExpM()">+ إضافة</button></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>#</th><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th></th></tr></thead><tbody>${db.exp.map((e,idx)=>`<tr><td style="text-align:center">${idx+1}</td><td style="text-align:center">${e.d}</td><td style="text-align:center">${e.n}</td><td style="text-align:center">${formatMoney(e.amt)}</td><td style="text-align:center"><button class="btn btn-danger" style="padding:5px" onclick="delExp(${e.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div></div>`;
}
function openExpM(){
    document.getElementById('mBody').innerHTML=`<h3>مصروف جديد</h3><input id="en" placeholder="البيان"><input id="ea" type="number" placeholder="المبلغ"><button class="btn btn-danger" style="width:100%" onclick="addExp()">حفظ</button>`;
    document.getElementById('modal').classList.add('show');
}
function addExp(){
    let n=document.getElementById('en').value, a=parseFloat(document.getElementById('ea').value);
    if(n && a){ db.exp.push({id:Date.now(), d:new Date().toLocaleDateString(), n:n, amt:a}); save(); cm(); renderExp(); }
    else alert('املأ البيانات');
}
function delExp(id){
    if(confirm('حذف؟')){ db.exp=db.exp.filter(x=>x.id!=id); save(); renderExp(); }
}

// 6. الإيرادات
function renderRev(){
    let total=db.rev.reduce((a,b)=>a+b.amt,0);
    document.getElementById('content').innerHTML=`<div class="card"><div class="card-header"><h2>💰 الإيرادات (${formatMoney(total)})</h2><button class="btn btn-success" onclick="openRevM()">+ إضافة</button></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>#</th><th>التاريخ</th><th>البيان</th><th>المبلغ</th><th></th></tr></thead><tbody>${db.rev.map((r,idx)=>`<tr><td style="text-align:center">${idx+1}</td><td style="text-align:center">${r.d}</td><td style="text-align:center">${r.n}</td><td style="text-align:center">${formatMoney(r.amt)}</td><td style="text-align:center"><button class="btn btn-danger" style="padding:5px" onclick="delRev(${r.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div></div>`;
}
function openRevM(){
    document.getElementById('mBody').innerHTML=`<h3>إيراد جديد</h3><input id="rn" placeholder="البيان"><input id="ra" type="number" placeholder="المبلغ"><button class="btn btn-success" style="width:100%" onclick="addRev()">حفظ</button>`;
    document.getElementById('modal').classList.add('show');
}
function addRev(){
    let n=document.getElementById('rn').value, a=parseFloat(document.getElementById('ra').value);
    if(n && a){ db.rev.push({id:Date.now(), d:new Date().toLocaleDateString(), n:n, amt:a}); save(); cm(); renderRev(); }
    else alert('املأ البيانات');
}
function delRev(id){
    if(confirm('حذف؟')){ db.rev=db.rev.filter(x=>x.id!=id); save(); renderRev(); }
}

// 7. الديون
function renderDebt(){
    let debts=db.sales.filter(s=>s.st==='آجل');
    let total=debts.reduce((a,b)=>a+(b.tot-(b.paid||0)),0);
    document.getElementById('content').innerHTML=`<div class="card"><h2>⏳ الديون المستحقة (${formatMoney(total)})</h2><div class="table-wrapper"><table class="data-table"><thead><tr><th>#</th><th>التاريخ</th><th>العميل</th><th>المنتج</th><th>المبلغ</th><th>المدفوع</th><th>المتبقي</th><th>تحصيل</th></tr></thead><tbody>${debts.map((s,idx)=>`<tr><td style="text-align:center">${idx+1}</td><td style="text-align:center">${s.d}</td><td style="text-align:center">${s.cli}</td><td style="text-align:center">${s.item}</td><td style="text-align:center">${formatMoney(s.tot)}</td><td style="text-align:center">${formatMoney(s.paid||0)}</td><td style="text-align:center" style="color:#ef4444">${formatMoney(s.tot-(s.paid||0))}</td><td style="text-align:center"><button class="btn btn-success" style="padding:5px" onclick="collectDebt(${s.id})">💰 تحصيل</button></td></tr>`).join('')}</tbody></table></div></div>`;
}

function collectDebt(id){
    let s=db.sales.find(x=>x.id==id);
    if(s){
        let rem=s.tot-(s.paid||0);
        let amt=parseFloat(prompt(`المبلغ المراد تحصيله من ${s.cli}\nالمتبقي: ${formatMoney(rem)}`, rem));
        if(amt && amt>0){
            s.paid=(s.paid||0)+amt;
            if(s.paid>=s.tot) s.st='مدفوع';
            save(); renderDebt(); renderDash();
            alert(`✅ تم تحصيل ${formatMoney(amt)}`);
        }
    }
}

// 8. العملاء والموردين
function renderPeople(t, title){
    document.getElementById('content').innerHTML=`<div class="card"><div class="card-header"><h2>👥 ${title}</h2><button class="btn btn-primary" onclick="openPersonM('${t}')">+ إضافة</button></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th></th></tr></thead><tbody>${db[t].map((x,idx)=>`<tr><td style="text-align:center">${idx+1}</td><td style="text-align:center"><strong>${x.n}</strong></td><td style="text-align:center">${x.p||'-'}</td><td style="text-align:center"><button class="btn btn-danger" style="padding:5px" onclick="delPerson('${t}',${x.id})">🗑️</button></td></tr>`).join('')}</tbody></table></div></div>`;
}
function openPersonM(t){
    document.getElementById('mBody').innerHTML=`<h3>إضافة جديد</h3><input id="pn" placeholder="الاسم"><input id="pp" placeholder="الهاتف"><button class="btn btn-success" style="width:100%" onclick="addPerson('${t}')">حفظ</button>`;
    document.getElementById('modal').classList.add('show');
}
function addPerson(t){
    let n=document.getElementById('pn').value, p=document.getElementById('pp').value;
    if(n){ db[t].push({id:Date.now(), n:n, p:p||'-'}); save(); cm(); sp(t); }
    else alert('أدخل الاسم');
}
function delPerson(t,id){
    if(confirm('حذف؟')){ db[t]=db[t].filter(x=>x.id!=id); save(); sp(t); }
}

// أدوات
function exportData(){
    let d={inv:db.inv, sales:db.sales, exp:db.exp, rev:db.rev, cli:db.cli, sup:db.sup, exportedAt:new Date().toLocaleString()};
    let a=document.createElement('a'); a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(d,null,2)); a.download=`SEMO_Backup_${new Date().toLocaleDateString().replace(/\//g,'-')}.json`; a.click(); alert('✅ تم التصدير');
}
function cm(){ document.getElementById('modal').classList.remove('show'); }
</script>
</body>
</html>
