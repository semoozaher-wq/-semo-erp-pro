<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO ERP PRO | النظام المتكامل السحابي</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', sans-serif; }
        :root { --bg: #0f172a; --card: #1e293b; --card-light: #334155; --text: #f8fafc; --text-muted: #94a3b8; --border: #334155; --primary: #3b82f6; --primary-hover: #2563eb; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --info: #8b5cf6; }
        body { background: var(--bg); color: var(--text); padding: 20px; transition: all 0.3s ease; }
        body.light-mode { --bg: #f1f5f9; --card: #ffffff; --card-light: #e2e8f0; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        body.privacy-mode .privacy-value, body.privacy-mode .stat-card .value, body.privacy-mode .data-table td:not(.no-privacy) { filter: blur(5px); transition: filter 0.3s; }
        body.privacy-mode .privacy-value:hover, body.privacy-mode .stat-card .value:hover, body.privacy-mode .data-table td:not(.no-privacy):hover { filter: blur(0); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px 25px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 45px; height: 45px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .header h1 { font-size: 1.3rem; color: var(--primary); }
        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 8px 18px; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-secondary { background: var(--card-light); color: var(--text); }
        .btn-secondary:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: #1e293b; }
        .btn-info { background: var(--info); color: white; }
        .btn-sm { padding: 4px 12px; font-size: 11px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; background: var(--card); padding: 10px 15px; border-radius: 60px; border: 1px solid var(--border); }
        .tab { padding: 8px 20px; border-radius: 40px; cursor: pointer; background: var(--card-light); color: var(--text-muted); transition: 0.2s; font-weight: bold; }
        .tab.active { background: var(--primary); color: white; }
        .tab:hover:not(.active) { background: var(--primary); opacity: 0.7; color: white; }
        .content { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); }
        .section { display: none; }
        .section.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-light); border-radius: 15px; padding: 15px; text-align: center; transition: 0.2s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card .value { font-size: 26px; font-weight: bold; color: var(--primary); }
        .stat-card .label { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg); padding: 12px; text-align: center; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 10px 12px; text-align: center; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--primary); opacity: 0.1; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        .toast { position: fixed; bottom: 20px; left: 20px; padding: 12px 24px; border-radius: 50px; z-index: 9999; animation: slideIn 0.3s ease; font-weight: bold; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); max-width: 650px; width: 90%; max-height: 85vh; overflow-y: auto; border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .view-toggle { display: flex; gap: 5px; background: var(--card-light); padding: 4px; border-radius: 40px; }
        .view-btn { padding: 6px 15px; border: none; border-radius: 30px; cursor: pointer; background: transparent; color: var(--text-muted); font-weight: bold; }
        .view-btn.active { background: var(--primary); color: white; }
        body.mobile-view .stats-grid { grid-template-columns: 1fr; }
        body.mobile-view .tabs { flex-wrap: wrap; }
        body.mobile-view .tab { flex: 1; text-align: center; font-size: 12px; padding: 6px 10px; }
        .company-logo { width: 80px; height: 80px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 15px; }
        .progress-bar { height: 4px; background: var(--card-light); border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        @media (max-width: 768px) { body { padding: 10px; } .tabs { border-radius: 15px; } }
        @media print { .sidebar, .tabs, .header, .btn, .top-bar, .no-print { display: none !important; } body { background: white; color: black; padding: 0; margin: 0; } }
        .loading-spinner { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border: 4px solid var(--card-light); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; z-index: 10001; display: none; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>
<div class="loading-spinner" id="loadingSpinner"></div>
<div class="container">
    <div class="header">
        <div class="logo-area"><div class="logo-icon" id="companyLogoDisplay">📊</div><div><h1 id="companyNameDisplay">SEMO ERP PRO</h1><small id="companyInfoDisplay" style="color:var(--text-muted);">النظام المحاسبي المتكامل السحابي</small></div></div>
        <div class="header-buttons">
            <div class="view-toggle"><button class="view-btn active" onclick="setView('desktop')">🖥️</button><button class="view-btn" onclick="setView('mobile')">📱</button></div>
            <button class="btn btn-secondary" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <button class="btn btn-secondary" onclick="togglePrivacyMode()" id="privacyBtn">🔒 خصوصية</button>
            <button class="btn btn-secondary" onclick="showSettings()">⚙️ إعدادات</button>
            <button class="btn btn-secondary" onclick="exportBackup()">💾 نسخة</button>
            <button class="btn btn-secondary" onclick="importBackup()">📂 استيراد</button>
            <button class="btn btn-primary" onclick="showAnalytics()">📈 تحليل ذكي</button>
            <button class="btn btn-secondary" onclick="showAuditLog()">📋 سجل</button>
            <button class="btn btn-danger" onclick="logout()">🚪 خروج</button>
        </div>
    </div>
    <div class="tabs" id="tabsContainer"></div>
    <div class="content" id="contentContainer"></div>
</div>

<!-- مودالات -->
<div id="settingsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>⚙️ إعدادات النظام</h3><button class="btn btn-secondary" onclick="closeModal('settingsModal')">✕</button></div><div class="company-logo" id="logoPreview">📊</div><div class="form-grid"><input type="text" id="companyName" placeholder="اسم الشركة"><input type="text" id="companyLogo" placeholder="رمز الشعار"><input type="text" id="companyPhone" placeholder="رقم الهاتف"><input type="email" id="companyEmail" placeholder="البريد"><input type="text" id="companyAddress" placeholder="العنوان"><input type="text" id="currencySymbol" placeholder="رمز العملة"><input type="text" id="taxRate" placeholder="نسبة الضريبة"><input type="text" id="whatsappNumber" placeholder="واتساب"></div><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:15px"><button class="btn btn-secondary" onclick="closeModal('settingsModal')">إلغاء</button><button class="btn btn-primary" onclick="saveSettings()">💾 حفظ</button></div></div></div>
<div id="reportsModal" class="modal"><div class="modal-content" style="max-width:800px"><div class="modal-header"><h3>📊 التقارير المتقدمة</h3><button class="btn btn-secondary" onclick="closeModal('reportsModal')">✕</button></div><div class="form-grid"><select id="reportType"><option value="monthly">📅 تقرير شهري</option><option value="yearly">📆 تقرير سنوي</option><option value="client">👤 حسب العميل</option><option value="product">📦 حسب المنتج</option></select><input type="month" id="reportMonth" value="2024-01"><input type="number" id="reportYear" value="2024"></div><div id="reportResult"></div><button class="btn btn-primary" onclick="exportReportExcel()">📥 تصدير Excel</button></div></div>
<div id="analyticsModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>📈 التحليل الذكي - AI</h3><button class="btn btn-secondary" onclick="closeModal('analyticsModal')">✕</button></div><div id="analyticsContent"></div></div></div>
<div id="auditModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>📋 سجل العمليات</h3><button class="btn btn-secondary" onclick="closeModal('auditModal')">✕</button></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>الوقت</th><th>المستخدم</th><th>الإجراء</th><th>التفاصيل</th></thead><tbody id="auditTableBody"></tbody></table></div></div></div>
<div id="usersModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>👑 إدارة المستخدمين</h3><button class="btn btn-secondary" onclick="closeModal('usersModal')">✕</button></div><div style="margin-bottom:15px"><button class="btn btn-success" onclick="showAddUser()">➕ مستخدم جديد</button></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>البريد</th><th>الاسم</th><th>الدور</th><th>الحالة</th><th>الإجراءات</th></thead><tbody id="usersTableBody"></tbody></tr></div></div></div>
<div id="dynamicModal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
// ==================== إعدادات Firebase ====================
const firebaseConfig = {
    apiKey: "AIzaSyCfVMHNoqbh86I0JJjnguGY6seA4vWJsSU",
    authDomain: "my-pos-system-11dee.firebaseapp.com",
    databaseURL: "https://my-pos-system-11dee-default-rtdb.firebaseio.com",
    projectId: "my-pos-system-11dee",
    storageBucket: "my-pos-system-11dee.firebasestorage.app",
    messagingSenderId: "565195477080",
    appId: "1:565195477080:web:1ffa21a34e28b47dddfa2d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ==================== متغيرات عامة ====================
let currentUser = null;
let currentUserRole = null;
let currentCompanyId = null;
let dbCache = { inventory: [], sales: [], purchases: [], clients: [], suppliers: [], expenses: [], revenues: [], users: [], auditLog: [] };
let settings = { companyName: 'SEMO ERP PRO', companyLogo: '📊', companyPhone: '', companyEmail: '', companyAddress: '', currencySymbol: 'ج.م', taxRate: 14, whatsappNumber: '' };

function showLoading(show) { document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none'; }
function showToast(msg, type = 'success') { const toast = document.createElement('div'); toast.className = 'toast'; toast.style.background = type === 'success' ? '#10b981' : type === 'danger' ? '#ef4444' : '#f59e0b'; toast.style.color = type === 'warning' ? '#1e293b' : 'white'; toast.innerHTML = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
function today() { return new Date().toLocaleDateString('ar-EG'); }
function currency(value) { return value.toLocaleString() + ' ' + (settings.currencySymbol || 'ج.م'); }
function formatDate(date) { return new Date(date).toLocaleDateString('ar-EG'); }

// ==================== مصادقة المستخدم ====================
auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    if (!user.emailVerified) { showToast('⚠️ يرجى تفعيل بريدك الإلكتروني أولاً', 'error'); auth.signOut(); setTimeout(() => window.location.href = 'index.html', 2000); return; }
    const userDoc = await db.collection('users').doc(user.uid).get();
    if (!userDoc.exists) { showToast('❌ لم يتم العثور على بيانات المستخدم', 'error'); auth.signOut(); setTimeout(() => window.location.href = 'index.html', 2000); return; }
    currentUser = userDoc.data();
    currentUserRole = currentUser.role;
    currentCompanyId = currentUser.companyId || null;
    document.getElementById('companyNameDisplay').innerText = settings.companyName;
    document.getElementById('companyLogoDisplay').innerHTML = settings.companyLogo;
    await loadAllData();
    renderTabs();
    bindSearchEvents();
});

// ==================== تحميل البيانات من Firebase ====================
async function loadAllData() {
    showLoading(true);
    try {
        const collections = ['inventory', 'sales', 'purchases', 'clients', 'suppliers', 'expenses', 'revenues'];
        for (const col of collections) {
            let query = db.collection(col);
            if (currentCompanyId && currentUserRole !== 'admin') query = query.where('companyId', '==', currentCompanyId);
            const snapshot = await query.get();
            dbCache[col] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        }
        if (currentUserRole === 'admin') {
            const usersSnap = await db.collection('users').get();
            dbCache.users = usersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        }
        const settingsDoc = await db.collection('settings').doc('main').get();
        if (settingsDoc.exists) settings = settingsDoc.data();
        applySettings();
    } catch (err) { console.error(err); showToast('❌ خطأ في تحميل البيانات', 'error'); }
    showLoading(false);
}

// ==================== الإعدادات ====================
function applySettings() {
    document.getElementById('companyNameDisplay').innerText = settings.companyName || 'SEMO ERP PRO';
    document.getElementById('companyLogoDisplay').innerHTML = settings.companyLogo || '📊';
    document.getElementById('companyInfoDisplay').innerHTML = `${settings.companyPhone || ''} ${settings.companyEmail ? '| ' + settings.companyEmail : ''}`;
    ['companyName', 'companyLogo', 'companyPhone', 'companyEmail', 'companyAddress', 'currencySymbol', 'taxRate', 'whatsappNumber'].forEach(f => { let el = document.getElementById(f); if (el) el.value = settings[f] || ''; });
    document.getElementById('logoPreview').innerHTML = settings.companyLogo || '📊';
}
async function saveSettings() {
    const newSettings = {};
    ['companyName', 'companyLogo', 'companyPhone', 'companyEmail', 'companyAddress', 'currencySymbol', 'whatsappNumber'].forEach(f => { newSettings[f] = document.getElementById(f).value; });
    newSettings.taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
    settings = newSettings;
    await db.collection('settings').doc('main').set(settings, { merge: true });
    applySettings();
    closeModal('settingsModal');
    addAuditLog('تحديث الإعدادات', 'تم تحديث إعدادات النظام');
    showToast('✅ تم حفظ الإعدادات');
}
function showSettings() { applySettings(); showModal('settingsModal'); }

// ==================== الوضعيات ====================
function togglePrivacyMode() { document.body.classList.toggle('privacy-mode'); document.getElementById('privacyBtn').textContent = document.body.classList.contains('privacy-mode') ? '🔓' : '🔒'; }
function toggleTheme() { document.body.classList.toggle('light-mode'); document.getElementById('themeBtn').textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙'; localStorage.setItem('semo_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); }
function loadTheme() { if (localStorage.getItem('semo_theme') === 'light') { document.body.classList.add('light-mode'); document.getElementById('themeBtn').textContent = '☀️'; } }
function setView(type) { if (type === 'mobile') { document.body.classList.add('mobile-view'); localStorage.setItem('semo_view', 'mobile'); } else { document.body.classList.remove('mobile-view'); localStorage.setItem('semo_view', 'desktop'); } document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active')); if (type === 'mobile') document.querySelectorAll('.view-btn')[1]?.classList.add('active'); else document.querySelectorAll('.view-btn')[0]?.classList.add('active'); }
function loadView() { if (localStorage.getItem('semo_view') === 'mobile') setView('mobile'); else setView('desktop'); }

// ==================== سجل العمليات ====================
async function addAuditLog(action, details) {
    await db.collection('auditLog').add({ userId: currentUser?.uid, userName: currentUser?.name, action, details, time: new Date().toISOString(), companyId: currentCompanyId });
    dbCache.auditLog.unshift({ time: new Date().toLocaleString('ar-EG'), user: currentUser?.name, action, details });
    if (dbCache.auditLog.length > 200) dbCache.auditLog.pop();
}
async function renderAuditLog() { const tbody = document.getElementById('auditTableBody'); if (!tbody) return; const snap = await db.collection('auditLog').where('companyId', '==', currentCompanyId).orderBy('time', 'desc').limit(100).get(); tbody.innerHTML = snap.docs.map(doc => `<tr><td>${new Date(doc.data().time).toLocaleString('ar-EG')}</td><td>${doc.data().userName}</td><td>${doc.data().action}</td><td>${doc.data().details}</td></tr>`).join(''); }
function showAuditLog() { renderAuditLog(); showModal('auditModal'); }

// ==================== النسخ والاستيراد ====================
function exportBackup() { const backup = JSON.stringify(dbCache); const blob = new Blob([backup], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_${today()}.json`; a.click(); addAuditLog('تصدير بيانات', 'تم تصدير نسخة احتياطية'); showToast('✅ تم التصدير'); }
function importBackup() { const input = document.createElement('input'); input.type = 'file'; input.accept = '.json'; input.onchange = async e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async ev => { try { const imported = JSON.parse(ev.target.result); for (const key of ['inventory','sales','purchases','clients','suppliers','expenses','revenues']) { for (const item of imported[key] || []) { item.companyId = currentCompanyId; await db.collection(key).add(item); } } addAuditLog('استيراد بيانات', 'تم استيراد نسخة احتياطية'); showToast('✅ تم الاستيراد'); setTimeout(() => location.reload(), 1500); } catch (err) { showToast('❌ ملف غير صالح', 'danger'); } }; reader.readAsText(file); }; input.click(); }
function exportReportExcel() { const ws = XLSX.utils.json_to_sheet(dbCache.sales.map(s => ({ التاريخ: s.date, العميل: s.clientName, المنتج: s.product || '-', الكمية: s.qty || 1, الإجمالي: s.total, الحالة: s.status }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'المبيعات'); XLSX.writeFile(wb, `semo_sales_${today()}.xlsx`); addAuditLog('تصدير Excel', 'تم تصدير تقرير المبيعات'); showToast('✅ تم التصدير'); }

// ======================== إدارة المستخدمين ========================
async function renderUsers() { if (currentUserRole !== 'admin') { document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="5">غير مصرح به - فقط المدير يمكنه الوصول</td></tr>'; return; } const snap = await db.collection('users').get(); const tbody = document.getElementById('usersTableBody'); tbody.innerHTML = snap.docs.map(u => `<tr><td>${u.data().email}</td><td>${u.data().name}</td><td>${u.data().role === 'admin' ? '👑 مدير' : '👤 مستخدم'}</td><td><span style="background:${u.data().isActive ? '#10b981' : '#ef4444'};padding:2px 10px;border-radius:20px;color:white">${u.data().isActive ? 'نشط' : 'معطل'}</span></td><td><button class="btn btn-warning btn-sm" onclick="toggleUserActive('${u.id}')">🔁</button> <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">🗑️</button></td></tr>`).join(''); }
async function showAddUser() { const email = prompt('البريد الإلكتروني:'); if (!email) return; const name = prompt('الاسم:'); if (!name) return; const password = prompt('كلمة المرور:', '123456'); if (!password) return; const role = confirm('مدير؟ OK لمدير, Cancel لمستخدم') ? 'admin' : 'user'; try { const cred = await auth.createUserWithEmailAndPassword(email, password); await db.collection('users').doc(cred.user.uid).set({ uid: cred.user.uid, email, name, role, isActive: true, companyId: currentCompanyId, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); await cred.user.sendEmailVerification(); showToast('✅ تمت إضافة المستخدم'); renderUsers(); addAuditLog('إضافة مستخدم', email); } catch (err) { showToast('❌ ' + err.message, 'error'); } }
async function toggleUserActive(id) { const userRef = db.collection('users').doc(id); const doc = await userRef.get(); await userRef.update({ isActive: !doc.data().isActive }); renderUsers(); }
async function deleteUser(id) { if (confirm('حذف المستخدم نهائياً؟')) { await db.collection('users').doc(id).delete(); renderUsers(); } }

// ======================== التقارير المتقدمة ========================
function showReports() { const type = document.getElementById('reportType').value; const month = document.getElementById('reportMonth').value; const year = document.getElementById('reportYear').value; let filtered = dbCache.sales.filter(s => s.status === 'مدفوع'); if (type === 'monthly' && month) filtered = filtered.filter(s => s.date?.startsWith(month)); else if (type === 'yearly' && year) filtered = filtered.filter(s => s.date?.startsWith(year)); else if (type === 'client') { const clients = {}; filtered.forEach(s => { clients[s.clientName] = (clients[s.clientName] || 0) + s.total; }); document.getElementById('reportResult').innerHTML = `<div class="stats-grid">${Object.entries(clients).map(([name, total]) => `<div class="stat-card"><div class="value">${currency(total)}</div><div class="label">${name}</div></div>`).join('')}</div>`; return; } else if (type === 'product') { const products = {}; filtered.forEach(s => { products[s.product || 'منتج'] = (products[s.product || 'منتج'] || 0) + s.total; }); document.getElementById('reportResult').innerHTML = `<div class="stats-grid">${Object.entries(products).map(([name, total]) => `<div class="stat-card"><div class="value">${currency(total)}</div><div class="label">${name}</div></div>`).join('')}</div>`; return; } const total = filtered.reduce((s, i) => s + i.total, 0); document.getElementById('reportResult').innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="value">${currency(total)}</div><div class="label">إجمالي المبيعات</div></div><div class="stat-card"><div class="value">${filtered.length}</div><div class="label">عدد الفواتير</div></div></div>`; }
function showReportsModal() { showReports(); showModal('reportsModal'); }

// ======================== التحليل الذكي المتقدم ========================
function showAnalytics() {
    const totalSales = dbCache.sales.reduce((s, i) => s + (i.total || 0), 0);
    const totalPurchases = dbCache.purchases.reduce((s, i) => s + (i.total || 0), 0);
    const totalExpenses = dbCache.expenses.reduce((s, i) => s + (i.amount || 0), 0);
    const totalRevenues = dbCache.revenues.reduce((s, i) => s + (i.amount || 0), 0);
    const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
    const clientTotals = {};
    dbCache.sales.forEach(s => { clientTotals[s.clientName] = (clientTotals[s.clientName] || 0) + s.total; });
    const sortedClients = Object.entries(clientTotals).sort((a, b) => b[1] - a[1]);
    const totalClientsSales = sortedClients.reduce((s, c) => s + c[1], 0);
    let cumulative = 0;
    const abcClients = sortedClients.map(([name, amount]) => { cumulative += amount; const percent = (cumulative / totalClientsSales) * 100; let classType = percent <= 70 ? '🥇 ذهبي' : percent <= 90 ? '🥈 فضي' : '🥉 برونزي'; return { name, amount, class: classType }; });
    const productPairs = {};
    dbCache.sales.forEach(sale => { if (sale.product) productPairs[sale.product] = (productPairs[sale.product] || 0) + 1; });
    const topProducts = Object.entries(productPairs).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const recommendations = topProducts.map(([p, c]) => `📦 ${p} (${c} مبيعات)`).join('<br>') || 'لا توجد بيانات كافية';
    const monthlySales = Array(12).fill(0);
    dbCache.sales.forEach(s => { const d = new Date(s.date); if (!isNaN(d)) monthlySales[d.getMonth()] += s.total || 0; });
    const last3Months = monthlySales.slice(-3);
    const nextMonthForecast = last3Months.reduce((a, b) => a + b, 0) / 3;
    const avgSale = totalSales / (dbCache.sales.length || 1);
    const anomalies = dbCache.sales.filter(s => s.total > avgSale * 2);
    document.getElementById('analyticsContent').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><div class="value">${currency(totalSales)}</div><div class="label">إجمالي المبيعات</div></div>
            <div class="stat-card"><div class="value" style="color:${profit >= 0 ? '#10b981' : '#ef4444'}">${currency(profit)}</div><div class="label">صافي الربح</div></div>
            <div class="stat-card"><div class="value">${dbCache.clients.length}</div><div class="label">العملاء</div></div>
            <div class="stat-card"><div class="value">${dbCache.suppliers.length}</div><div class="label">الموردين</div></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="value" style="font-size:18px">🔮 ${currency(nextMonthForecast)}</div><div class="label">توقعات الشهر القادم</div></div>
            <div class="stat-card"><div class="value" style="font-size:18px">⚠️ ${anomalies.length}</div><div class="label">فواتير غير طبيعية</div></div>
        </div>
        <h3 style="margin-top:15px">🏆 تحليل ABC للعملاء</h3>
        <div class="stats-grid">${abcClients.slice(0, 5).map(c => `<div class="stat-card"><div class="value" style="font-size:14px">${c.name}</div><div class="label">${c.class} - ${currency(c.amount)}</div></div>`).join('')}</div>
        <h3>🛒 توصيات المنتجات</h3>
        <div class="stat-card">${recommendations}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min((totalSales / (totalSales + 1)) / 100, 100)}%"></div></div>
        <p style="margin-top:15px;color:var(--text-muted)">📈 الذكاء الاصطناعي: تم تحليل ${dbCache.sales.length} فاتورة لتقديم هذه التوصيات</p>
    `;
    showModal('analyticsModal');
}

async function showAddInventory() { const name = prompt('اسم المنتج:'); if (!name) return; const qty = parseInt(prompt('الكمية:', '0')); const buyPrice = parseFloat(prompt('سعر الشراء:', '0')); const sellPrice = parseFloat(prompt('سعر البيع:', '0')); if (isNaN(qty) || isNaN(buyPrice) || isNaN(sellPrice)) return; await db.collection('inventory').add({ name, qty, buyPrice, sellPrice, category: 'عام', companyId: currentCompanyId, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); await loadAllData(); renderInventory(); updateDashboard(); addAuditLog('إضافة منتج', name); showToast('✅ تمت الإضافة'); }
async function editInventory(id) { const item = dbCache.inventory.find(i => i.id === id); if (!item) return; const newName = prompt('اسم المنتج الجديد:', item.name); if (newName) item.name = newName; const newQty = parseInt(prompt('الكمية الجديدة:', item.qty)); if (!isNaN(newQty)) item.qty = newQty; const newBuy = parseFloat(prompt('سعر الشراء الجديد:', item.buyPrice)); if (!isNaN(newBuy)) item.buyPrice = newBuy; const newSell = parseFloat(prompt('سعر البيع الجديد:', item.sellPrice)); if (!isNaN(newSell)) item.sellPrice = newSell; await db.collection('inventory').doc(id).update({ name: item.name, qty: item.qty, buyPrice: item.buyPrice, sellPrice: item.sellPrice }); await loadAllData(); renderInventory(); updateDashboard(); addAuditLog('تعديل منتج', item.name); showToast('✅ تم التعديل'); }

async function updateDashboard() {
    const totalSales = dbCache.sales.reduce((s, i) => s + (i.total || 0), 0);
    const totalPurchases = dbCache.purchases.reduce((s, i) => s + (i.total || 0), 0);
    const totalExpenses = dbCache.expenses.reduce((s, i) => s + (i.amount || 0), 0);
    const totalRevenues = dbCache.revenues.reduce((s, i) => s + (i.amount || 0), 0);
    const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
    const lowStock = dbCache.inventory.filter(i => (i.qty || 0) <= 5).length;
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="value privacy-value">${currency(totalSales)}</div><div class="label">إجمالي المبيعات</div></div>
        <div class="stat-card"><div class="value privacy-value">${currency(totalPurchases)}</div><div class="label">إجمالي المشتريات</div></div>
        <div class="stat-card"><div class="value privacy-value">${currency(totalExpenses)}</div><div class="label">المصروفات</div></div>
        <div class="stat-card"><div class="value privacy-value">${currency(totalRevenues)}</div><div class="label">الإيرادات</div></div>
        <div class="stat-card"><div class="value privacy-value" style="color:${profit >= 0 ? '#10b981' : '#ef4444'}">${currency(profit)}</div><div class="label">صافي الربح</div></div>
        <div class="stat-card"><div class="value">${dbCache.inventory.length}</div><div class="label">المنتجات</div></div>
        <div class="stat-card"><div class="value">${lowStock}</div><div class="label">منتجات منخفضة</div></div>
        <div class="stat-card"><div class="value">${dbCache.clients.length}</div><div class="label">العملاء</div></div>
    `;
    document.getElementById('lowStockAlert').innerHTML = lowStock > 0 ? `<div class="stat-card" style="background:var(--warning);color:#1e293b"><div class="value">⚠️ تنبيه</div><div class="label">${lowStock} منتج بحاجة لإعادة تخزين</div><button class="btn btn-sm" onclick="showLowStockReport()">📦 عرض</button></div>` : '';
    drawCharts();
}
function drawCharts() {
    document.getElementById('chartsGrid').innerHTML = `<div style="background:var(--card-light);border-radius:15px;padding:15px;"><canvas id="monthlyChart" height="200"></canvas></div><div style="background:var(--card-light);border-radius:15px;padding:15px;"><canvas id="categoryChart" height="200"></canvas></div>`;
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    let monthly = Array(12).fill(0);
    dbCache.sales.forEach(s => { const d = new Date(s.date); if (!isNaN(d)) monthly[d.getMonth()] += s.total || 0; });
    new Chart(document.getElementById('monthlyChart'), { type: 'bar', data: { labels: months, datasets: [{ label: 'المبيعات', data: monthly, backgroundColor: '#3b82f6' }] }, options: { responsive: true } });
    let categories = {};
    dbCache.inventory.forEach(i => { const c = i.category || 'عام'; categories[c] = (categories[c] || 0) + (i.qty || 0) * (i.sellPrice || 0); });
    new Chart(document.getElementById('categoryChart'), { type: 'doughnut', data: { labels: Object.keys(categories), datasets: [{ data: Object.values(categories), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'] }] }, options: { responsive: true } });
}
async function renderReports() {
    const totalSales = dbCache.sales.reduce((s, i) => s + (i.total || 0), 0);
    const totalPurchases = dbCache.purchases.reduce((s, i) => s + (i.total || 0), 0);
    const totalExpenses = dbCache.expenses.reduce((s, i) => s + (i.amount || 0), 0);
    const totalRevenues = dbCache.revenues.reduce((s, i) => s + (i.amount || 0), 0);
    const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
    document.getElementById('reportSummary').innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="value">${currency(totalSales)}</div><div class="label">المبيعات</div></div><div class="stat-card"><div class="value">${currency(totalPurchases)}</div><div class="label">المشتريات</div></div><div class="stat-card"><div class="value">${currency(totalExpenses)}</div><div class="label">المصروفات</div></div><div class="stat-card"><div class="value">${currency(totalRevenues)}</div><div class="label">الإيرادات</div></div><div class="stat-card"><div class="value" style="color:${profit >= 0 ? '#10b981' : '#ef4444'}">${currency(profit)}</div><div class="label">صافي الربح</div></div></div>`;
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    let monthly = Array(12).fill(0);
    dbCache.sales.forEach(s => { const d = new Date(s.date); if (!isNaN(d)) monthly[d.getMonth()] += s.total || 0; });
    new Chart(document.getElementById('reportChart'), { type: 'line', data: { labels: months, datasets: [{ label: 'المبيعات الشهرية', data: monthly, borderColor: '#3b82f6', tension: 0.4, fill: true }] }, options: { responsive: true } });
}
