<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | لوحة التحكم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; direction: rtl; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 1.4rem; color: #38bdf8; }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 13px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: #1e293b; }
        .btn-secondary { background: #334155; color: white; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        
        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            background: #1e293b;
            padding: 10px;
            border-radius: 60px;
            border: 1px solid #334155;
        }
        .tab {
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            background: #334155;
            color: #cbd5e1;
            transition: 0.2s;
            font-weight: bold;
        }
        .tab.active { background: #3b82f6; color: white; }
        
        /* Content */
        .content { background: #1e293b; border-radius: 20px; padding: 20px; border: 1px solid #334155; }
        .section { display: none; }
        .section.active { display: block; }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #0f172a;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #38bdf8; }
        .stat-card .label { font-size: 13px; color: #94a3b8; }
        
        /* Tables */
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0f172a; padding: 12px; text-align: center; color: #94a3b8; border-bottom: 1px solid #334155; }
        td { padding: 10px 12px; text-align: center; border-bottom: 1px solid #334155; }
        tr:hover td { background: #334155; }
        
        .card-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .card-header {
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1e293b;
            max-width: 500px;
            width: 90%;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #334155;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .tabs { border-radius: 15px; }
            .tab { padding: 5px 12px; font-size: 12px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 SEMO ERP | النظام المحاسبي المتكامل</h1>
        <div>
            <button class="btn btn-secondary" onclick="exportBackup()">💾 نسخة احتياطية</button>
            <button class="btn btn-secondary" onclick="showSettings()">⚙️ إعدادات</button>
            <button class="btn btn-danger" onclick="logout()">🚪 خروج</button>
        </div>
    </div>
    
    <div class="tabs" id="tabsContainer"></div>
    <div class="content" id="contentContainer"></div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>⚙️ إعدادات</h3><button onclick="closeModal('settingsModal')" style="background:none;border:none;color:white;font-size:20px">✕</button></div>
        <input type="text" id="companyName" placeholder="اسم الشركة">
        <input type="text" id="companyPhone" placeholder="الهاتف">
        <input type="email" id="companyEmail" placeholder="البريد">
        <div class="modal-footer"><button class="btn btn-primary" onclick="saveSettings()">حفظ</button><button class="btn btn-secondary" onclick="closeModal('settingsModal')">إلغاء</button></div>
    </div>
</div>

<script>
// ==================== DATA ====================
let db = {
    inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
    sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
    purchases: JSON.parse(localStorage.getItem('semo_purchases')) || [],
    clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
    suppliers: JSON.parse(localStorage.getItem('semo_suppliers')) || [],
    expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
    revenues: JSON.parse(localStorage.getItem('semo_revenues')) || [],
    settings: JSON.parse(localStorage.getItem('semo_settings')) || {}
};

// بيانات تجريبية أول مرة
if(db.inventory.length === 0){
    db.inventory = [
        {id:1, name:'منتج 1', qty:50, price:100, category:'الكترونيات'},
        {id:2, name:'منتج 2', qty:30, price:200, category:'ملابس'}
    ];
    db.clients = [
        {id:1, name:'شركة الأمل', phone:'0111111111', totalPurchases:0, debt:0},
        {id:2, name:'مؤسسة النور', phone:'0222222222', totalPurchases:0, debt:0}
    ];
    db.suppliers = [{id:1, name:'مورد 1', phone:'0333333333', product:'منتج 1', totalPurchases:0}];
    saveAll();
}

function saveAll(){
    localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
    localStorage.setItem('semo_sales', JSON.stringify(db.sales));
    localStorage.setItem('semo_purchases', JSON.stringify(db.purchases));
    localStorage.setItem('semo_clients', JSON.stringify(db.clients));
    localStorage.setItem('semo_suppliers', JSON.stringify(db.suppliers));
    localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
    localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
    localStorage.setItem('semo_settings', JSON.stringify(db.settings));
}

function today(){ return new Date().toLocaleDateString('ar-EG'); }

function notify(msg, type='success'){
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = type === 'success' ? '#10b981' : type === 'danger' ? '#ef4444' : '#f59e0b';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(), 3000);
}

// ==================== TABS ====================
const sections = ['dashboard','inventory','sales','purchases','clients','suppliers','expenses','revenues','reports'];
const titles = {
    dashboard: '🏠 الرئيسية', inventory: '📦 المخزون', sales: '🛒 المبيعات',
    purchases: '📥 المشتريات', clients: '👥 العملاء', suppliers: '🏭 الموردين',
    expenses: '💸 المصروفات', revenues: '💰 الإيرادات', reports: '📊 التقارير'
};

function renderTabs(){
    const tabsDiv = document.getElementById('tabsContainer');
    tabsDiv.innerHTML = sections.map(s => `<div class="tab" data-tab="${s}">${titles[s]}</div>`).join('');
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            tab.classList.add('active');
            switchSection(tab.dataset.tab);
        };
    });
    document.querySelector('.tab')?.classList.add('active');
    switchSection('dashboard');
}

function switchSection(section){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    let secDiv = document.getElementById(`section-${section}`);
    if(!secDiv) generateSection(section);
    secDiv = document.getElementById(`section-${section}`);
    if(secDiv) secDiv.classList.add('active');
    if(section === 'dashboard') renderDashboard();
    if(section === 'inventory') renderInventory();
    if(section === 'sales') renderSales();
    if(section === 'purchases') renderPurchases();
    if(section === 'clients') renderClients();
    if(section === 'suppliers') renderSuppliers();
    if(section === 'expenses') renderExpenses();
    if(section === 'revenues') renderRevenues();
    if(section === 'reports') renderReports();
}

function generateSection(section){
    const container = document.getElementById('contentContainer');
    let html = '';
    if(section === 'dashboard') html = `<div class="stats-grid" id="statsGrid"></div><div id="chartsGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:25px"></div><div class="card-box"><div class="card-header">📋 آخر الفواتير</div><div class="table-wrapper"><table id="recentSalesTable"><thead><tr><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th></tr></thead><tbody></tbody></table></div></div>`;
    else if(section === 'inventory') html = `<div class="card-box"><div class="card-header"><span>📦 المنتجات</span><button class="btn btn-success btn-sm" onclick="showAddInventory()">➕ منتج جديد</button></div><div class="table-wrapper"><table id="inventoryTable"><thead><tr><th>#</th><th>المنتج</th><th>الفئة</th><th>الكمية</th><th>السعر</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div></div>`;
    else if(section === 'sales') html = `<div class="card-box"><div class="card-header"><span>🛒 المبيعات</span><button class="btn btn-success btn-sm" onclick="showAddSale()">➕ فاتورة جديدة</button></div><div class="table-wrapper"><table id="salesTable"><thead><tr><th>#</th><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div></div>`;
    else if(section === 'purchases') html = `<div class="card-box"><div class="card-header"><span>📥 المشتريات</span><button class="btn btn-success btn-sm" onclick="showAddPurchase()">➕ أمر شراء</button></div><div class="table-wrapper"><table id="purchasesTable"><thead><tr><th>#</th><th>التاريخ</th><th>المورد</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div></div>`;
    else if(section === 'clients') html = `<div class="card-box"><div class="card-header"><span>👥 العملاء</span><button class="btn btn-success btn-sm" onclick="showAddClient()">➕ عميل جديد</button></div><div class="table-wrapper"><table id="clientsTable"><thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>إجمالي المشتريات</th><th>الدين</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div></div>`;
    else if(section === 'suppliers') html = `<div class="card-box"><div class="card-header"><span>🏭 الموردين</span><button class="btn btn-success btn-sm" onclick="showAddSupplier()">➕ مورد جديد</button></div><div class="table-wrapper"><table id="suppliersTable"><thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المنتج</th><th>إجمالي المشتريات</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div></div>`;
    else if(section === 'expenses') html = `<div class="card-box"><div class="card-header"><span>💸 المصروفات</span><button class="btn btn-success btn-sm" onclick="showAddExpense()">➕ مصروف جديد</button></div><div class="table-wrapper"><table id="expensesTable"><thead><tr><th>#</th><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div></div>`;
    else if(section === 'revenues') html = `<div class="card-box"><div class="card-header"><span>💰 الإيرادات</span><button class="btn btn-success btn-sm" onclick="showAddRevenue()">➕ إيراد جديد</button></div><div class="table-wrapper"><table id="revenuesTable"><thead><tr><th>#</th><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>الإجراءات</th></tr></thead><tbody></tbody></table></div></div>`;
    else if(section === 'reports') html = `<div class="stats-grid" id="reportStats"></div><div class="card-box"><div class="card-header">📊 تقرير المبيعات</div><div class="table-wrapper"><table id="reportTable"><thead><tr><th>العميل</th><th>المبلغ</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody></tbody></table></div></div>`;
    container.innerHTML += `<div id="section-${section}" class="section">${html}</div>`;
}

// ==================== RENDER FUNCTIONS ====================
function renderDashboard(){
    const totalSales = db.sales.reduce((s,i)=>s+(i.total||0),0);
    const totalPurchases = db.purchases.reduce((s,i)=>s+(i.total||0),0);
    const totalExpenses = db.expenses.reduce((s,i)=>s+(i.amount||0),0);
    const totalRevenues = db.revenues.reduce((s,i)=>s+(i.amount||0),0);
    const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
    const lowStock = db.inventory.filter(i=>i.qty<=5).length;
    
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="value">${totalSales.toLocaleString()} ج</div><div class="label">إجمالي المبيعات</div></div>
        <div class="stat-card"><div class="value">${totalPurchases.toLocaleString()} ج</div><div class="label">إجمالي المشتريات</div></div>
        <div class="stat-card"><div class="value">${totalExpenses.toLocaleString()} ج</div><div class="label">المصروفات</div></div>
        <div class="stat-card"><div class="value">${totalRevenues.toLocaleString()} ج</div><div class="label">الإيرادات</div></div>
        <div class="stat-card"><div class="value" style="color:${profit>=0?'#10b981':'#ef4444'}">${profit.toLocaleString()} ج</div><div class="label">صافي الربح</div></div>
        <div class="stat-card"><div class="value">${db.inventory.length}</div><div class="label">المنتجات</div></div>
        <div class="stat-card"><div class="value">${lowStock}</div><div class="label">منتجات منخفضة</div></div>
        <div class="stat-card"><div class="value">${db.clients.length}</div><div class="label">العملاء</div></div>
    `;
    
    document.getElementById('chartsGrid').innerHTML = `<div style="background:#0f172a;border-radius:15px;padding:15px"><canvas id="monthlyChart" height="200"></canvas></div><div style="background:#0f172a;border-radius:15px;padding:15px"><canvas id="categoryChart" height="200"></canvas></div>`;
    const months = ['يناير','فبراير','مارس','ابريل','مايو','يونيو'];
    let monthly = Array(6).fill(0);
    db.sales.forEach(s=>{ let d = new Date(s.date); if(!isNaN(d) && d.getMonth()<6) monthly[d.getMonth()] += s.total||0; });
    new Chart(document.getElementById('monthlyChart'), { type:'bar', data:{ labels:months, datasets:[{ label:'المبيعات', data:monthly, backgroundColor:'#3b82f6' }] }, options:{ responsive:true } });
    
    let categories = {};
    db.inventory.forEach(i=>{ let c = i.category||'عام'; categories[c] = (categories[c]||0) + (i.qty||0)*(i.price||0); });
    new Chart(document.getElementById('categoryChart'), { type:'doughnut', data:{ labels:Object.keys(categories), datasets:[{ data:Object.values(categories), backgroundColor:['#3b82f6','#10b981','#f59e0b','#ef4444'] }] }, options:{ responsive:true } });
    
    const tbody = document.querySelector('#recentSalesTable tbody');
    if(tbody) tbody.innerHTML = db.sales.slice(0,5).map(s=>`<tr><td>${s.date}</td><td>${s.clientName}</td><td>${s.total} ج</td><td><span style="background:${s.status==='مدفوع'?'#10b981':'#f59e0b'};padding:2px 12px;border-radius:20px">${s.status}</span></td></tr>`).join('');
}

function renderInventory(){
    const tbody = document.querySelector('#inventoryTable tbody');
    if(tbody) tbody.innerHTML = db.inventory.map((i,idx)=>`<tr><td>${idx+1}</td><td>${i.name}</td><td>${i.category||'-'}</td><td>${i.qty}</td><td>${i.price} ج</td><td><button class="btn btn-warning btn-sm" onclick="editInventory(${i.id})">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteInventory(${i.id})">🗑️</button></td></tr>`).join('');
}

function renderSales(){
    const tbody = document.querySelector('#salesTable tbody');
    if(tbody) tbody.innerHTML = db.sales.map((s,idx)=>`<tr><td>${idx+1}</td><td>${s.date}</td><td>${s.clientName}</td><td>${s.total} ج</td><td><span style="background:${s.status==='مدفوع'?'#10b981':'#f59e0b'};padding:2px 12px;border-radius:20px">${s.status}</span></td><td><button class="btn btn-danger btn-sm" onclick="deleteSale(${s.id})">🗑️</button></td></tr>`).join('');
}

function renderPurchases(){
    const tbody = document.querySelector('#purchasesTable tbody');
    if(tbody) tbody.innerHTML = db.purchases.map((p,idx)=>`<tr><td>${idx+1}</td><td>${p.date}</td><td>${p.supplier}</td><td>${p.product}</td><td>${p.qty}</td><td>${p.price} ج</td><td>${p.total} ج</td><td><button class="btn btn-danger btn-sm" onclick="deletePurchase(${p.id})">🗑️</button></td></tr>`).join('');
}

function renderClients(){
    const tbody = document.querySelector('#clientsTable tbody');
    if(tbody) tbody.innerHTML = db.clients.map((c,idx)=>`<tr><td>${idx+1}</td><td>${c.name}</td><td>${c.phone||'-'}</td><td>${(c.totalPurchases||0).toLocaleString()} ج</td><td style="color:${(c.debt||0)>0?'#ef4444':'#10b981'}">${(c.debt||0).toLocaleString()} ج</td><td><button class="btn btn-danger btn-sm" onclick="deleteClient(${c.id})">🗑️</button></td></tr>`).join('');
}

function renderSuppliers(){
    const tbody = document.querySelector('#suppliersTable tbody');
    if(tbody) tbody.innerHTML = db.suppliers.map((s,idx)=>`<tr><td>${idx+1}</td><td>${s.name}</td><td>${s.phone||'-'}</td><td>${s.product||'-'}</td><td>${(s.totalPurchases||0).toLocaleString()} ج</td><td><button class="btn btn-danger btn-sm" onclick="deleteSupplier(${s.id})">🗑️</button></td></tr>`).join('');
}

function renderExpenses(){
    const tbody = document.querySelector('#expensesTable tbody');
    if(tbody) tbody.innerHTML = db.expenses.map((e,idx)=>`<tr><td>${idx+1}</td><td>${e.date}</td><td>${e.type}</td><td>${e.amount} ج</td><td><button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">🗑️</button></td></tr>`).join('');
}

function renderRevenues(){
    const tbody = document.querySelector('#revenuesTable tbody');
    if(tbody) tbody.innerHTML = db.revenues.map((r,idx)=>`<tr><td>${idx+1}</td><td>${r.date}</td><td>${r.type}</td><td>${r.amount} ج</td><td><button class="btn btn-danger btn-sm" onclick="deleteRevenue(${r.id})">🗑️</button></td></tr>`).join('');
}

function renderReports(){
    const totalSales = db.sales.reduce((s,i)=>s+(i.total||0),0);
    const totalPurchases = db.purchases.reduce((s,i)=>s+(i.total||0),0);
    const totalExpenses = db.expenses.reduce((s,i)=>s+(i.amount||0),0);
    const totalRevenues = db.revenues.reduce((s,i)=>s+(i.amount||0),0);
    const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
    document.getElementById('reportStats').innerHTML = `
        <div class="stat-card"><div class="value">${totalSales.toLocaleString()} ج</div><div class="label">المبيعات</div></div>
        <div class="stat-card"><div class="value">${totalPurchases.toLocaleString()} ج</div><div class="label">المشتريات</div></div>
        <div class="stat-card"><div class="value">${totalExpenses.toLocaleString()} ج</div><div class="label">المصروفات</div></div>
        <div class="stat-card"><div class="value">${totalRevenues.toLocaleString()} ج</div><div class="label">الإيرادات</div></div>
        <div class="stat-card"><div class="value" style="color:${profit>=0?'#10b981':'#ef4444'}">${profit.toLocaleString()} ج</div><div class="label">صافي الربح</div></div>
    `;
    const tbody = document.querySelector('#reportTable tbody');
    if(tbody) tbody.innerHTML = db.sales.map(s=>`<tr><td>${s.clientName}</td><td>${s.total} ج</td><td><span style="background:${s.status==='مدفوع'?'#10b981':'#f59e0b'};padding:2px 12px;border-radius:20px">${s.status}</span></td><td>${s.date}</td></tr>`).join('');
}

// ==================== CRUD ====================
function showAddInventory(){
    let name = prompt('اسم المنتج:'); if(!name) return;
    let qty = parseInt(prompt('الكمية:',0)); let price = parseFloat(prompt('السعر:',0));
    if(isNaN(qty)||isNaN(price)) return;
    db.inventory.push({id:Date.now(), name, qty, price, category:'عام'});
    saveAll(); renderInventory(); notify('✅ تمت الإضافة');
}
function editInventory(id){
    let item = db.inventory.find(i=>i.id===id);
    if(!item) return;
    let newName = prompt('الاسم الجديد:',item.name); if(newName) item.name = newName;
    let newQty = parseInt(prompt('الكمية الجديدة:',item.qty)); if(!isNaN(newQty)) item.qty = newQty;
    let newPrice = parseFloat(prompt('السعر الجديد:',item.price)); if(!isNaN(newPrice)) item.price = newPrice;
    saveAll(); renderInventory(); notify('✅ تم التعديل');
}
function deleteInventory(id){
    if(confirm('حذف المنتج؟')){ db.inventory = db.inventory.filter(i=>i.id!==id); saveAll(); renderInventory(); notify('تم الحذف','danger'); }
}

function showAddSale(){
    let client = prompt('اسم العميل:'); if(!client) return;
    let total = parseFloat(prompt('المبلغ:',0)); if(isNaN(total)) return;
    let status = confirm('مدفوع؟ OK نعم') ? 'مدفوع' : 'آجل';
    db.sales.push({id:Date.now(), clientName:client, total, status, date:today()});
    let existing = db.clients.find(c=>c.name===client);
    if(existing){ existing.totalPurchases = (existing.totalPurchases||0)+total; if(status==='آجل') existing.debt = (existing.debt||0)+total; }
    else { db.clients.push({id:Date.now(), name:client, phone:'', totalPurchases:total, debt:status==='آجل'?total:0}); }
    saveAll(); renderSales(); notify('✅ تمت الإضافة');
}
function deleteSale(id){
    if(confirm('حذف البيع؟')){ db.sales = db.sales.filter(s=>s.id!==id); saveAll(); renderSales(); notify('تم الحذف','danger'); }
}

function showAddPurchase(){
    let supplier = prompt('اسم المورد:'); if(!supplier) return;
    let product = prompt('اسم المنتج:'); if(!product) return;
    let qty = parseInt(prompt('الكمية:',1)); let price = parseFloat(prompt('السعر:',0));
    if(isNaN(qty)||isNaN(price)) return;
    let total = qty*price;
    db.purchases.push({id:Date.now(), supplier, product, qty, price, total, date:today()});
    let existingProduct = db.inventory.find(i=>i.name===product);
    if(existingProduct) existingProduct.qty += qty;
    else db.inventory.push({id:Date.now(), name:product, qty, price, category:'مشتريات'});
    let existingSupplier = db.suppliers.find(s=>s.name===supplier);
    if(existingSupplier) existingSupplier.totalPurchases = (existingSupplier.totalPurchases||0)+total;
    else db.suppliers.push({id:Date.now(), name:supplier, phone:'', product:product, totalPurchases:total});
    saveAll(); renderPurchases(); renderInventory(); notify('✅ تمت الإضافة وتحديث المخزون');
}
function deletePurchase(id){
    if(confirm('حذف الشراء؟')){ db.purchases = db.purchases.filter(p=>p.id!==id); saveAll(); renderPurchases(); notify('تم الحذف','danger'); }
}

function showAddClient(){

function exportBackup(){
    const data = JSON.stringify(db);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `backup_${today()}.json`; a.click();
    notify('✅ تم التصدير');
}

function showSettings(){ document.getElementById('settingsModal').classList.add('show'); }
function saveSettings(){
    db.settings.companyName = document.getElementById('companyName').value;
    db.settings.companyPhone = document.getElementById('companyPhone').value;
    db.settings.companyEmail = document.getElementById('companyEmail').value;
    saveAll(); closeModal('settingsModal'); notify('✅ تم الحفظ');
}
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

function logout(){
    if(confirm('تسجيل الخروج؟')){ localStorage.removeItem('semo_user'); location.href = 'index.html'; }
}
