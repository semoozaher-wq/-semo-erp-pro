<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأعمال المتكامل</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* نفس الـ style الموجود في النسخة السابقة – يمكن وضعه في style.css أو هنا */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', Tahoma, sans-serif; }
        body { background: #f0f2f5; direction: rtl; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 1.8rem; margin: 0; }
        .header-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn {
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #ffc107; color: #1e3c72; }
        .btn-primary:hover { background: #ffca2c; transform: translateY(-2px); }
        .btn-success { background: #28a745; color: white; }
        .btn-danger  { background: #dc3545; color: white; }
        .btn-warning { background: #fd7e14; color: white; }
        .btn-info    { background: #17a2b8; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            background: white;
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tab {
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            background: #e9ecef;
            transition: 0.2s;
            font-weight: bold;
        }
        .tab.active { background: #1e3c72; color: white; }
        .content { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .section { display: none; }
        .section.active { display: block; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border-right: 4px solid #007bff;
        }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #1e3c72; }
        .stat-card .label { font-size: 13px; color: #6c757d; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #e9ecef; padding: 12px; text-align: center; font-weight: bold; }
        td { padding: 10px 12px; text-align: center; border-bottom: 1px solid #dee2e6; }
        tr:hover td { background: #f1f9ff; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-weight: bold; font-size: 13px; color: #495057; }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-family: inherit;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #28a745;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 20px;
            padding: 25px;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .tabs { border-radius: 15px; }
            .tab { padding: 5px 12px; font-size: 12px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 نظام إدارة الأعمال المتكامل</h1>
        <div class="header-buttons">
            <button class="btn btn-secondary" onclick="exportBackup()">💾 نسخة احتياطية</button>
            <button class="btn btn-secondary" onclick="importDB()">📂 استيراد بيانات</button>
            <button class="btn btn-danger" onclick="clearAllData()">🗑️ مسح الكل</button>
        </div>
    </div>
    <div class="tabs" id="tabsContainer"></div>
    <div class="content" id="contentContainer"></div>
</div>

<script src="main.js"></script>
<script>
    window.onload = () => {
        if (!localStorage.getItem('semo_user')) window.location.href = 'index.html';
        initApp();
    };
</script>
</body>
</html>
