<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMO ERP | النظام المحاسبي المتكامل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0f172a; color: #f8fafc; direction: rtl; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 1.5rem; color: #38bdf8; }
        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 13px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-secondary { background: #334155; color: white; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: #1e293b; }
        .btn-sm { padding: 4px 12px; font-size: 11px; }
        
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            background: #1e293b;
            padding: 10px;
            border-radius: 60px;
            border: 1px solid #334155;
        }
        .tab {
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            background: #334155;
            color: #cbd5e1;
            transition: 0.2s;
            font-weight: bold;
        }
        .tab.active { background: #3b82f6; color: white; }
        
        .content { background: #1e293b; border-radius: 20px; padding: 20px; border: 1px solid #334155; }
        .section { display: none; }
        .section.active { display: block; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #0f172a;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #38bdf8; }
        .stat-card .label { font-size: 13px; color: #94a3b8; }
        
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0f172a; padding: 12px; text-align: center; color: #94a3b8; border-bottom: 1px solid #334155; }
        td { padding: 10px 12px; text-align: center; border-bottom: 1px solid #334155; }
        tr:hover td { background: #334155; }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        input, select, textarea {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-family: inherit;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #1e293b;
            max-width: 600px;
            width: 90%;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #334155;
        }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .tabs { border-radius: 15px; }
            .tab { padding: 5px 12px; font-size: 12px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 النظام المحاسبي المتكامل | SEMO ERP PRO</h1>
        <div class="header-buttons">
            <button class="btn btn-secondary" onclick="showSettings()">⚙️ إعدادات</button>
            <button class="btn btn-secondary" onclick="exportBackup()">💾 نسخة احتياطية</button>
            <button class="btn btn-primary" onclick="showAnalytics()">📈 تحليل ذكي</button>
            <button class="btn btn-danger" onclick="logout()">🚪 خروج</button>
        </div>
    </div>
    
    <div class="tabs" id="tabsContainer"></div>
    <div class="content" id="contentContainer"></div>
</div>

<!-- Modals -->
<div id="settingsModal" class="modal"><div class="modal-content"><h3>⚙️ إعدادات النظام</h3><div class="form-grid"><input type="text" id="companyName" placeholder="اسم الشركة"><input type="text" id="companyPhone" placeholder="الهاتف"><input type="email" id="companyEmail" placeholder="البريد الإلكتروني"></div><button class="btn btn-primary" onclick="saveSettings()">💾 حفظ</button><button class="btn btn-secondary" onclick="closeModal('settingsModal')">إلغاء</button></div></div>
<div id="analyticsModal" class="modal"><div class="modal-content"><h3>📈 التحليل الذكي</h3><div id="analyticsContent"></div><button class="btn btn-secondary" onclick="closeModal('analyticsModal')">إغلاق</button></div></div>

<script>
// ==================== قاعدة البيانات ====================
let db = {
    inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
    sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
    purchases: JSON.parse(localStorage.getItem('semo_purchases')) || [],
    clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
    suppliers: JSON.parse(localStorage.getItem('semo_suppliers')) || [],
    expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
    revenues: JSON.parse(localStorage.getItem('semo_revenues')) || [],
    settings: JSON.parse(localStorage.getItem('semo_settings')) || {}
};

function saveAll() {
    localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
    localStorage.setItem('semo_sales', JSON.stringify(db.sales));
    localStorage.setItem('semo_purchases', JSON.stringify(db.purchases));
    localStorage.setItem('semo_clients', JSON.stringify(db.clients));
    localStorage.setItem('semo_suppliers', JSON.stringify(db.suppliers));
    localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
    localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
    localStorage.setItem('semo_settings', JSON.stringify(db.settings));
}

function today() { return new Date().toLocaleDateString('ar-EG'); }
function notify(msg, type='success') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = type === 'success' ? '#10b981' : type === 'danger' ? '#ef4444' : '#f59e0b';
    toast.style.color = type === 'warning' ? '#1e293b' : 'white';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ==================== تبويبات ====================
const sections = ['dashboard', 'inventory', 'sales', 'purchases', 'clients', 'suppliers', 'expenses', 'revenues', 'reports'];
const titles = {
    dashboard: '🏠 الرئيسية',
    inventory: '📦 المخزون',
    sales: '🛒 المبيعات',
    purchases: '📥 المشتريات',
    clients: '👥 العملاء',
    suppliers: '🏭 الموردين',
    expenses: '💸 المصروفات',
    revenues: '💰 الإيرادات',
    reports: '📊 التقارير'
};

function renderTabs() {
    const tabsDiv = document.getElementById('tabsContainer');
    tabsDiv.innerHTML = sections.map(s => `<div class="tab" data-tab="${s}">${titles[s]}</div>`).join('');
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            switchSection(tab.dataset.tab);
        });
    });
    if(document.querySelector('.tab')) document.querySelector('.tab').classList.add('active');
    switchSection('dashboard');
}

function switchSection(section) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    let secDiv = document.getElementById(`section-${section}`);
    if(!secDiv) generateSection(section);
    secDiv = document.getElementById(`section-${section}`);
    if(secDiv) secDiv.classList.add('active');
    if(section === 'dashboard') updateDashboard();
    if(section === 'inventory') renderInventory();
    if(section === 'sales') renderSales();
    if(section === 'purchases') renderPurchases();
    if(section === 'clients') renderClients();
    if(section === 'suppliers') renderSuppliers();
    if(section === 'expenses') renderExpenses();
    if(section === 'revenues') renderRevenues();
    if(section === 'reports') renderReports();
}

function generateSection(section) {
    const container = document.getElementById('contentContainer');
    let html = '';
    if(section === 'dashboard') html = `<div class="stats-grid" id="statsGrid"></div><div id="lowStockAlert"></div><div class="stats-grid" id="chartsGrid" style="grid-template-columns:1fr 1fr;"></div>`;
    else if(section === 'inventory') html = `<div><button class="btn btn-primary" onclick="showAddInventory()">➕ منتج جديد</button><input type="text" id="searchInv" placeholder="بحث..." style="width:200px;margin-top:10px"></div><div class="table-wrapper"><table><thead><tr><th>#</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجراءات</th></tr></thead><tbody id="invTable"></tbody></table></div>`;
    else if(section === 'sales') html = `<div><button class="btn btn-primary" onclick="showAddSale()">➕ فاتورة بيع</button><input type="text" id="searchSales" placeholder="بحث..." style="width:200px;margin-top:10px"></div><div class="table-wrapper"><tr><thead><tr><th>#</th><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="salesTable"></tbody></table></div>`;
    else if(section === 'purchases') html = `<div><button class="btn btn-primary" onclick="showAddPurchase()">➕ أمر شراء</button><input type="text" id="searchPurchases" placeholder="بحث..." style="width:200px;margin-top:10px"></div><div class="table-wrapper"><table><thead><tr><th>#</th><th>المورد</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجراءات</th></tr></thead><tbody id="purchasesTable"></tbody></table></div>`;
    else if(section === 'clients') html = `<div><button class="btn btn-primary" onclick="showAddClient()">➕ عميل جديد</button><input type="text" id="searchClients" placeholder="بحث..." style="width:200px;margin-top:10px"></div><div class="table-wrapper"><tr><thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>الرصيد</th><th>الإجراءات</th></tr></thead><tbody id="clientsTable"></tbody></table></div>`;
    else if(section === 'suppliers') html = `<div><button class="btn btn-primary" onclick="showAddSupplier()">➕ مورد جديد</button><input type="text" id="searchSuppliers" placeholder="بحث..." style="width:200px;margin-top:10px"></div><div class="table-wrapper"><table><thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المنتج</th><th>الإجراءات</th></tr></thead><tbody id="suppliersTable"></tbody></table></div>`;
    else if(section === 'expenses') html = `<div><button class="btn btn-primary" onclick="showAddExpense()">➕ مصروف جديد</button><input type="text" id="searchExpenses" placeholder="بحث..." style="width:200px;margin-top:10px"></div><div class="table-wrapper"><tr><thead><tr><th>#</th><th>النوع</th><th>المبلغ</th><th>التاريخ</th><th>الإجراءات</th></tr></thead><tbody id="expensesTable"></tbody></table></div>`;
    else if(section === 'revenues') html = `<div><button class="btn btn-primary" onclick="showAddRevenue()">➕ إيراد جديد</button><input type="text" id="searchRevenues" placeholder="بحث..." style="width:200px;margin-top:10px"></div><div class="table-wrapper"></table><thead><tr><th>#</th><th>النوع</th><th>المبلغ</th><th>التاريخ</th><th>الإجراءات</th></tr></thead><tbody id="revenuesTable"></tbody></table></div>`;
    else if(section === 'reports') html = `<div id="reportSummary"></div><canvas id="reportChart" height="200"></canvas>`;
    container.innerHTML += `<div id="section-${section}" class="section">${html}</div>`;
}

// ==================== لوحة التحكم ====================
function updateDashboard() {
    const totalSales = db.sales.reduce((s,i)=>s+(i.total||0),0);
    const totalPurchases = db.purchases.reduce((s,i)=>s+(i.total||0),0);
    const totalExpenses = db.expenses.reduce((s,i)=>s+(i.amount||0),0);
    const totalRevenues = db.revenues.reduce((s,i)=>s+(i.amount||0),0);
    const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
    const lowStock = db.inventory.filter(i => (i.qty||0) <= 5).length;
    
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="value">${totalSales.toLocaleString()} ج</div><div class="label">إجمالي المبيعات</div></div>
        <div class="stat-card"><div class="value">${totalPurchases.toLocaleString()} ج</div><div class="label">إجمالي المشتريات</div></div>
        <div class="stat-card"><div class="value">${totalExpenses.toLocaleString()} ج</div><div class="label">المصروفات</div></div>
        <div class="stat-card"><div class="value">${totalRevenues.toLocaleString()} ج</div><div class="label">الإيرادات</div></div>
        <div class="stat-card"><div class="value" style="color:${profit>=0?'#10b981':'#ef4444'}">${profit.toLocaleString()} ج</div><div class="label">صافي الربح</div></div>
        <div class="stat-card"><div class="value">${db.inventory.length}</div><div class="label">المنتجات</div></div>
        <div class="stat-card"><div class="value">${lowStock}</div><div class="label">منتجات منخفضة</div></div>
        <div class="stat-card"><div class="value">${db.clients.length}</div><div class="label">العملاء</div></div>
    `;
    
    document.getElementById('lowStockAlert').innerHTML = lowStock > 0 ? `<div class="stat-card" style="background:#f59e0b20;border-color:#f59e0b"><div class="value">⚠️ تنبيه</div><div class="label">${lowStock} منتج بحاجة لإعادة تخزين</div></div>` : '';
    
    drawCharts();
}

function drawCharts() {
    const chartsDiv = document.getElementById('chartsGrid');
    if(!chartsDiv) return;
    chartsDiv.innerHTML = `<div style="background:#0f172a;border-radius:15px;padding:15px;"><canvas id="monthlyChart" height="200"></canvas></div><div style="background:#0f172a;border-radius:15px;padding:15px;"><canvas id="categoryChart" height="200"></canvas></div>`;
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    let monthly = Array(12).fill(0);
    db.sales.forEach(s => { let d = new Date(s.date); if(!isNaN(d)) monthly[d.getMonth()] += s.total || 0; });
    new Chart(document.getElementById('monthlyChart'), { type:'bar', data:{ labels:months, datasets:[{ label:'المبيعات', data:monthly, backgroundColor:'#3b82f6' }] }, options:{ responsive:true } });
    
    let categories = {};
    db.inventory.forEach(i => { let c = i.category || 'عام'; categories[c] = (categories[c]||0) + (i.qty||0)*(i.price||0); });
    new Chart(document.getElementById('categoryChart'), { type:'doughnut', data:{ labels:Object.keys(categories), datasets:[{ data:Object.values(categories), backgroundColor:['#3b82f6','#10b981','#f59e0b','#ef4444'] }] }, options:{ responsive:true } });
}

// ==================== دوال المخزون ====================
function renderInventory() {
    const search = document.getElementById('searchInv')?.value.toLowerCase() || '';
    const filtered = db.inventory.filter(i => (i.name || '').toLowerCase().includes(search));
    const tbody = document.getElementById('invTable');
    if(tbody) tbody.innerHTML = filtered.map((i,idx)=>`<tr>
        <td>${idx+1}</td>
        <td>${i.name}</td>
        <td>${i.qty}</td>
        <td>${i.price} ج</td>
        <td><button class="btn btn-warning btn-sm" onclick="editInventory(${i.id})">✏️</button> <button class="btn btn-danger btn-sm" onclick="deleteInventory(${i.id})">🗑️</button></td>
     `).join('');
}

function showAddInventory() {
    let name = prompt('اسم المنتج:');
    if(!name) return;
    let qty = parseInt(prompt('الكمية:', '0'));
    let price = parseFloat(prompt('السعر:', '0'));
    if(isNaN(qty)||isNaN(price)) return;
    db.inventory.push({ id: Date.now(), name, qty, price, category: 'عام' });
    saveAll();
    renderInventory();
    updateDashboard();
    notify('✅ تمت الإضافة');
}

function editInventory(id){
    let item = db.inventory.find(i=>i.id===id);
    if(!item) return;
    let newName = prompt('اسم المنتج الجديد:', item.name);
    if(newName) item.name = newName;
    let newQty = parseInt(prompt('الكمية الجديدة:', item.qty));
    if(!isNaN(newQty)) item.qty = newQty;
    let newPrice = parseFloat(prompt('السعر الجديد:', item.price));
    if(!isNaN(newPrice)) item.price = newPrice;
    saveAll();
    renderInventory();
    updateDashboard();
    notify('✅ تم التعديل');
}

function deleteInventory(id){
    if(confirm('حذف المنتج؟')) { db.inventory = db.inventory.filter(i=>i.id!==id); saveAll(); renderInventory(); updateDashboard(); notify('تم الحذف','danger'); }
}

// ==================== المبيعات ====================
function renderSales() {
    const search = document.getElementById('searchSales')?.value.toLowerCase() || '';
    const filtered = db.sales.filter(s => (s.clientName || '').toLowerCase().includes(search));
    const tbody = document.getElementById('salesTable');
    if(tbody) tbody.innerHTML = filtered.map((s,idx)=>`<tr>
        <td>${idx+1}</td>
        <td>${s.date}</td>
        <td>${s.clientName}</td>
        <td>${s.total} ج</td>
        <td><span style="background:${s.status==='مدفوع'?'#10b981':'#f59e0b'};padding:2px 8px;border-radius:20px">${s.status}</span></td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteSale(${s.id})">🗑️</button></td>
     `).join('');
}

function showAddSale() {
    let client = prompt('اسم العميل:');
    if(!client) return;
    let total = parseFloat(prompt('المبلغ الإجمالي:', '0'));
    if(isNaN(total)) return;
    let status = confirm('مدفوع؟ اضغط OK للمدفوع، Cancel للآجل') ? 'مدفوع' : 'آجل';
    db.sales.push({ id: Date.now(), clientName: client, total, paid: status==='مدفوع'?total:0, status, date: today() });
    saveAll();
    renderSales();
    updateDashboard();
    notify('✅ تمت الإضافة');
}

function deleteSale(id){
    if(confirm('حذف البيع؟')) { db.sales = db.sales.filter(s=>s.id!==id); saveAll(); renderSales(); updateDashboard(); notify('تم الحذف','danger'); }
}

// ==================== المشتريات ====================
function renderPurchases() {
    const search = document.getElementById('searchPurchases')?.value.toLowerCase() || '';
    const filtered = db.purchases.filter(p => (p.supplier || '').toLowerCase().includes(search) || (p.product || '').toLowerCase().includes(search));
    const tbody = document.getElementById('purchasesTable');
    if(tbody) tbody.innerHTML = filtered.map((p,idx)=>`<tr>
        <td>${idx+1}</td>
        <td>${p.supplier}</td>
        <td>${p.product}</td>
        <td>${p.qty}</td>
        <td>${p.price} ج</td>
        <td><button class="btn btn-danger btn-sm" onclick="deletePurchase(${p.id})">🗑️</button></td>
     `).join('');
}

function showAddPurchase() {
    let supplier = prompt('اسم المورد:');
    if(!supplier) return;
    let product = prompt('اسم المنتج:');
    if(!product) return;
    let qty = parseInt(prompt('الكمية:', '1'));
    let price = parseFloat(prompt('السعر:', '0'));
    if(isNaN(qty)||isNaN(price)) return;
    db.purchases.push({ id: Date.now(), supplier, product, qty, price, total: qty*price, date: today() });
    let existingProduct = db.inventory.find(i=>i.name === product);
    if(existingProduct) existingProduct.qty = (existingProduct.qty||0) + qty;
    else db.inventory.push({ id: Date.now(), name: product, qty, price, category: 'مشتريات' });
    saveAll();
    renderPurchases();
    renderInventory();
    updateDashboard();
    notify('✅ تمت الإضافة وتحديث المخزون');
}

function deletePurchase(id){
    if(confirm('حذف الشراء؟')) { db.purchases = db.purchases.filter(p=>p.id!==id); saveAll(); renderPurchases(); updateDashboard(); notify('تم الحذف','danger'); }
}

// ==================== العملاء ====================
function renderClients() {
    const search = document.getElementById('searchClients')?.value.toLowerCase() || '';
    const filtered = db.clients.filter(c => (c.name || '').toLowerCase().includes(search));
    const tbody = document.getElementById('clientsTable');
    if(tbody) tbody.innerHTML = filtered.map((c,idx)=>`<tr>
        <td>${idx+1}</td>
        <td>${c.name}</td>
        <td>${c.phone||'-'}</td>
        <td>${(c.debt||0)} ج</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteClient(${c.id})">🗑️</button></td>
     `).join('');
}

function showAddClient() {
    let name = prompt('اسم العميل:');
    if(!name) return;
    let phone = prompt('رقم الهاتف (اختياري):', '');
    db.clients.push({ id: Date.now(), name, phone, debt: 0 });
    saveAll();
    renderClients();
    notify('✅ تمت الإضافة');
}

function deleteClient(id){
    if(confirm('حذف العميل؟')) { db.clients = db.clients.filter(c=>c.id!==id); saveAll(); renderClients(); notify('تم الحذف','danger'); }

// ==================== الموردين ====================
function renderSuppliers() {
    const search = document.getElementById('searchSuppliers')?.value.toLowerCase() || '';
    const filtered = db.suppliers.filter(s => (s.name || '').toLowerCase().includes(search));
    const tbody = document.getElementById('suppliersTable');
    if(tbody) tbody.innerHTML = filtered.map((s,idx)=>`<tr>
        <td>${idx+1}<tr>
        <td>${s.name}</td>
        <td>${s.phone||'-'}</td>
        <td>${s.product||'-'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteSupplier(${s.id})">🗑️</button></td>
     `).join('');
}

function showAddSupplier() {
    let name = prompt('اسم المورد:');
    if(!name) return;
    let phone = prompt('رقم الهاتف (اختياري):', '');
    let product = prompt('المنتج المورد (اختياري):', '');
    db.suppliers.push({ id: Date.now(), name, phone, product });

    renderSuppliers();
    notify('✅ تمت الإضافة');

function deleteSupplier(id){

// ==================== التقارير ====================
function renderReports() {
    const totalSales = db.sales.reduce((s,i)=>s+(i.total||0),0);
    const totalPurchases = db.purchases.reduce((s,i)=>s+(i.total||0),0);
    const totalExpenses = db.expenses.reduce((s,i)=>s+(i.amount||0),0);
    const totalRevenues = db.revenues.reduce((s,i)=>s+(i.amount||0),0);
    const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
    const summaryDiv = document.getElementById('reportSummary');
    if(summaryDiv) summaryDiv.innerHTML = `<div class="stats-grid">
        <div class="stat-card"><div class="value">${totalSales.toLocaleString()} ج</div><div class="label">المبيعات</div></div>
        <div class="stat-card"><div class="value">${totalPurchases.toLocaleString()} ج</div><div class="label">المشتريات</div></div>
        <div class="stat-card"><div class="value">${totalExpenses.toLocaleString()} ج</div><div class="label">المصروفات</div></div>
        <div class="stat-card"><div class="value">${totalRevenues.toLocaleString()} ج</div><div class="label">الإيرادات</div></div>
        <div class="stat-card"><div class="value" style="color:${profit>=0?'#10b981':'#ef4444'}">${profit.toLocaleString()} ج</div><div class="label">صافي الربح</div></div>
    </div>`;
    
    const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    let monthly = Array(12).fill(0);
    db.sales.forEach(s => { let d = new Date(s.date); if(!isNaN(d)) monthly[d.getMonth()] += s.total || 0; });
    const ctx = document.getElementById('reportChart');
    if(ctx) new Chart(ctx, { type:'line', data:{ labels:months, datasets:[{ label:'المبيعات الشهرية', data:monthly, borderColor:'#3b82f6' }] }, options:{ responsive:true } });
}

// ==================== وظائف عامة ====================
function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showSettings() { showModal('settingsModal'); }
function saveSettings() {
    db.settings.companyName = document.getElementById('companyName').value;
    db.settings.companyPhone = document.getElementById('companyPhone').value;
    db.settings.companyEmail = document.getElementById('companyEmail').value;
    saveAll();
    closeModal('settingsModal');
    notify('✅ تم حفظ الإعدادات');
}
function showAnalytics() {
    const totalSales = db.sales.reduce((s,i)=>s+(i.total||0),0);
    const profit = totalSales - db.purchases.reduce((s,i)=>s+(i.total||0),0) - db.expenses.reduce((s,i)=>s+(i.amount||0),0) + db.revenues.reduce((s,i)=>s+(i.amount||0),0);
    const contentDiv = document.getElementById('analyticsContent');
    if(contentDiv) contentDiv.innerHTML = `<div class="stats-grid">
        <div class="stat-card"><div class="value">${totalSales.toLocaleString()} ج</div><div class="label">إجمالي المبيعات</div></div>
        <div class="stat-card"><div class="value" style="color:${profit>=0?'#10b981':'#ef4444'}">${profit.toLocaleString()} ج</div><div class="label">صافي الربح</div></div>
        <div class="stat-card"><div class="value">${db.clients.length}</div><div class="label">العملاء</div></div>
        <div class="stat-card"><div class="value">${db.suppliers.length}</div><div class="label">الموردين</div></div>
    </div>`;
    showModal('analyticsModal');
}
function exportBackup() {
    const backup = JSON.stringify(db);
    const blob = new Blob([backup], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup_${today()}.json`;
    a.click();
    notify('✅ تم تصدير النسخة الاحتياطية');
}
function logout() {
    if(confirm('تسجيل الخروج؟')) {
        localStorage.removeItem('semo_user');
        window.location.href = 'index.html';
    }
}

// ==================== ربط أحداث البحث ====================
function bindSearchEvents() {
    const searchInv = document.getElementById('searchInv');
    if(searchInv) searchInv.addEventListener('input', renderInventory);
    const searchSales = document.getElementById('searchSales');
    if(searchSales) searchSales.addEventListener('input', renderSales);
    const searchPurchases = document.getElementById('searchPurchases');
    if(searchPurchases) searchPurchases.addEventListener('input', renderPurchases);
    const searchClients = document.getElementById('searchClients');
    if(searchClients) searchClients.addEventListener('input', renderClients);
    const searchSuppliers = document.getElementById('searchSuppliers');
    if(searchSuppliers) searchSuppliers.addEventListener('input', renderSuppliers);
    const searchExpenses = document.getElementById('searchExpenses');
    if(searchExpenses) searchExpenses.addEventListener('input', renderExpenses);
    const searchRevenues = document.getElementById('searchRevenues');
    if(searchRevenues) searchRevenues.addEventListener('input', renderRevenues);
}

// ==================== التهيئة ====================
function init() {
    if(db.inventory.length === 0) {
        db.inventory = [{ id: 1, name: 'منتج تجريبي', qty: 100, price: 50, category: 'عام' }];
        db.clients = [{ id: 1, name: 'عميل تجريبي', phone: '', debt: 0 }];
        db.suppliers = [{ id: 1, name: 'مورد تجريبي', phone: '', product: '' }];
        saveAll();
    }
    renderTabs();
    bindSearchEvents();
}

init();
