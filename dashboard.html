<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام إدارة الأعمال | AI الاحترافي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', Tahoma, sans-serif; }
        body { background: #f0f2f5; direction: rtl; padding: 15px; color: #333; transition: all 0.3s; }
        body.dark { background: #0f172a; color: #f8fafc; }
        body.dark .header, body.dark .tab, body.dark .content, body.dark .stat-card, body.dark .modal-content, body.dark .ai-card { background: #1e293b; color: #f8fafc; border-color: #334155; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { font-size: 1.5rem; }
        .header-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        .btn-primary { background: #ffc107; color: #1e3c72; }
        .btn-primary:hover { background: #ffca2c; transform: translateY(-2px); }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-ai { background: #8b5cf6; color: white; }
        .btn-ai:hover { background: #7c3aed; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            background: white;
            padding: 8px 12px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        body.dark .tabs { background: #1e293b; }
        .tab {
            padding: 6px 15px;
            border-radius: 40px;
            cursor: pointer;
            background: #e9ecef;
            transition: 0.2s;
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
        }
        .tab.active { background: #1e3c72; color: white; }
        body.dark .tab { background: #334155; color: #e2e8f0; }
        body.dark .tab.active { background: #8b5cf6; }
        .content { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .section { display: none; }
        .section.active { display: block; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border-right: 4px solid #007bff;
        }
        body.dark .stat-card { background: #0f172a; }
        .stat-card .value { font-size: 22px; font-weight: bold; color: #1e3c72; }
        .stat-card .label { font-size: 12px; color: #6c757d; }
        .ai-card {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .ai-card h3 { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .ai-insight {
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
        }
        .chat-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 15px;
        }
        .chat-user { background: #e9ecef; text-align: right; }
        .chat-bot { background: #8b5cf6; color: white; text-align: left; }
        body.dark .chat-container { background: #0f172a; }
        body.dark .chat-user { background: #334155; color: #f8fafc; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
        th { background: #e9ecef; padding: 10px; text-align: center; font-weight: bold; }
        td { padding: 8px 10px; text-align: center; border-bottom: 1px solid #dee2e6; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 8px 12px; border: 1px solid #ced4da; border-radius: 8px; }
        body.dark input, body.dark select { background: #0f172a; border-color: #475569; color: #f8fafc; }
        .toast { position: fixed; bottom: 20px; left: 20px; background: #28a745; color: white; padding: 10px 20px; border-radius: 50px; z-index: 9999; animation: slideIn 0.3s ease; font-size: 13px; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; border-radius: 20px; padding: 20px; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header h1 { font-size: 1.2rem; }
            .btn { padding: 6px 12px; font-size: 11px; }
            .stat-card .value { font-size: 18px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🤖 نظام إدارة الأعمال | AI الاحترافي</h1>
        <div class="header-buttons">
            <button class="btn btn-ai" onclick="showAIAnalysis()">🧠 تحليل ذكي</button>
            <button class="btn btn-secondary" onclick="exportBackup()">💾 نسخة احتياطية</button>
            <button class="btn btn-primary" onclick="showSettings()">⚙️ إعدادات</button>
        </div>
    </div>
    <div class="tabs" id="tabsContainer"></div>
    <div class="content" id="contentContainer"></div>
</div>

<script>
    // ==================== قاعدة البيانات ====================
    let db = {
        inventory: [],
        clients: [],
        suppliers: [],
        sales: [],
        purchases: [],
        expenses: [],
        revenues: [],
        settings: { currency: 'LD' }
    };
    let currencySymbol = 'LD';

    function formatMoney(amount) { return amount.toLocaleString() + ' ' + currencySymbol; }
    function save(key) { localStorage.setItem(`bms_${key}`, JSON.stringify(db[key])); }
    function loadDB() {
        ['inventory','clients','suppliers','sales','purchases','expenses','revenues','settings'].forEach(k => {
            try { let d = localStorage.getItem(`bms_${k}`); if(d) db[k] = JSON.parse(d); } catch(e){}
        });
        currencySymbol = db.settings?.currency || 'LD';
    }
    function today() { return new Date().toLocaleDateString('ar-EG'); }
    function notify(msg, type='success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = type === 'success' ? '#28a745' : type === 'danger' ? '#dc3545' : '#ffc107';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ==================== الذكاء الاصطناعي ====================
    function showAIAnalysis() {
        const totalSales = (db.sales || []).reduce((s,i)=>s+(i.total||0),0);
        const totalPurchases = (db.purchases || []).reduce((s,i)=>s+(i.total||0),0);
        const totalExpenses = (db.expenses || []).reduce((s,i)=>s+(i.amount||0),0);
        const netProfit = totalSales - totalPurchases - totalExpenses;
        
        // تحليل المنتجات الأكثر مبيعاً
        const productSales = {};
        (db.sales || []).forEach(s => { productSales[s.product] = (productSales[s.product] || 0) + (s.qty || 0); });
        const topProducts = Object.entries(productSales).sort((a,b)=>b[1]-a[1]).slice(0,5);
        
        // تحليل العملاء VIP (الأكثر شراءً)
        const clientSales = {};
        (db.sales || []).forEach(s => { clientSales[s.clientName] = (clientSales[s.clientName] || 0) + (s.total || 0); });
        const topClients = Object.entries(clientSales).sort((a,b)=>b[1]-a[1]).slice(0,5);
        
        // المنتجات منخفضة المخزون
        const lowStock = (db.inventory || []).filter(i => (i.qty||0) <= (i.minQty||5));
        
        // تنبؤ المبيعات للشهر القادم (بسيط: متوسط آخر 3 شهور)
        const now = new Date();
        const last3MonthsSales = (db.sales || []).filter(s => {
            let d = new Date(s.date);
            return d >= new Date(now.getFullYear(), now.getMonth()-3, 1);
        }).reduce((sum,s)=>sum+(s.total||0),0);
        const predictedSales = last3MonthsSales / 3;
        
        const html = `
            <div class="ai-card">
                <h3>🧠 تقرير الذكاء الاصطناعي</h3>
                <div class="ai-insight">📊 صافي الربح المتوقع الشهر القادم: ${formatMoney(predictedSales)}</div>
                <div class="ai-insight">🏆 أفضل 5 منتجات مبيعاً:<br>${topProducts.map(p=>`• ${p[0]}: ${p[1]} قطعة`).join('<br>') || 'لا توجد بيانات'}</div>
                <div class="ai-insight">⭐ أفضل 5 عملاء:<br>${topClients.map(c=>`• ${c[0]}: ${formatMoney(c[1])}`).join('<br>') || 'لا توجد بيانات'}</div>
                <div class="ai-insight">⚠️ منتجات بحاجة لإعادة تخزين: ${lowStock.map(i=>i.name).join(', ') || 'لا توجد'}</div>
                <div class="ai-insight">💡 توصية: ${lowStock.length > 0 ? 'قم بإعادة تخزين المنتجات المنخفضة فوراً' : 'المخزون جيد، استمر بنفس الوتيرة'}</div>
            </div>
            <div class="chat-container" id="chatContainer">
                <div class="chat-message chat-bot">🤖 مرحباً! أنا مساعدك الذكي. اسألني أي شيء عن النظام (مثال: كم مبيعات اليوم؟ أو أفضل منتج؟)</div>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px">
                <input type="text" id="chatInput" placeholder="اسأل المساعد الذكي..." style="flex:1">
                <button class="btn btn-ai" onclick="askAI()">إرسال</button>
            </div>
        `;
        document.getElementById('aiAnalysisModal').innerHTML = html;
        showModal('aiAnalysisModal');
    }
    
    function askAI() {
        const input = document.getElementById('chatInput')?.value.toLowerCase();
        if (!input) return;
        const chatContainer = document.getElementById('chatContainer');
        if (!chatContainer) return;
        
        // إضافة رسالة المستخدم
        chatContainer.innerHTML += `<div class="chat-message chat-user">👤 ${input}</div>`;
        
        // منطق الرد الذكي
        let reply = '';
        const totalSalesToday = (db.sales || []).filter(s => s.date === today()).reduce((s,i)=>s+(i.total||0),0);
        
        if (input.includes('مبيعات اليوم')) reply = `📊 إجمالي مبيعات اليوم: ${formatMoney(totalSalesToday)}`;
        else if (input.includes('أفضل منتج') || input.includes('المنتج الأكثر')) {
            const productSales = {};
            (db.sales || []).forEach(s => { productSales[s.product] = (productSales[s.product] || 0) + (s.qty || 0); });
            const top = Object.entries(productSales).sort((a,b)=>b[1]-a[1])[0];
            reply = top ? `🏆 أفضل منتج: ${top[0]} (${top[1]} قطعة)` : 'لا توجد بيانات كافية';
        }
        else if (input.includes('أفضل عميل') || input.includes('العميل الأكثر')) {
            const clientSales = {};
            (db.sales || []).forEach(s => { clientSales[s.clientName] = (clientSales[s.clientName] || 0) + (s.total || 0); });
            const top = Object.entries(clientSales).sort((a,b)=>b[1]-a[1])[0];
            reply = top ? `⭐ أفضل عميل: ${top[0]} (${formatMoney(top[1])})` : 'لا توجد بيانات كافية';
        }
        else if (input.includes('الربح')) {
            const totalSales = (db.sales || []).reduce((s,i)=>s+(i.total||0),0);
            const totalPurchases = (db.purchases || []).reduce((s,i)=>s+(i.total||0),0);
            reply = `💰 صافي الربح الإجمالي: ${formatMoney(totalSales - totalPurchases)}`;
        }
        else if (input.includes('المخزون المنخفض')) {
            const low = (db.inventory || []).filter(i => (i.qty||0) <= (i.minQty||5));
            reply = low.length ? `⚠️ المنتجات المنخفضة: ${low.map(i=>i.name).join(', ')}` : '✅ جميع المنتجات بمخزون جيد';
        }
        else if (input.includes('عدد العملاء')) reply = `👥 عدد العملاء المسجلين: ${(db.clients||[]).length}`;
        else if (input.includes('عدد المنتجات')) reply = `📦 عدد المنتجات في المخزون: ${(db.inventory||[]).length}`;
        else if (input.includes('توصية')) {
            const lowStock = (db.inventory || []).filter(i => (i.qty||0) <= (i.minQty||5));
            reply = lowStock.length ? `💡 أنصحك بإعادة تخزين: ${lowStock.map(i=>i.name).join(', ')}` : '💡 كل شيء على ما يرام، استمر بنفس الأداء';
        }
        else reply = `🤖 لم أفهم سؤالك تماماً. يمكنك سؤالي عن: مبيعات اليوم، أفضل منتج، أفضل عميل، الربح، المخزون المنخفض، عدد العملاء، عدد المنتجات، توصية.`;
        
        chatContainer.innerHTML += `<div class="chat-message chat-bot">🤖 ${reply}</div>`;
        chatContainer.scrollTop = chatContainer.scrollHeight;
        document.getElementById('chatInput').value = '';
    }

    // ==================== باقي دوال النظام (مختصرة) ====================
    const sections = ['dashboard','inventory','sales','purchases','clients','suppliers','expenses','revenues','reports','settings','ai'];
    const titles = {
        dashboard: '🏠 لوحة التحكم', inventory: '📦 المخزون', sales: '🛒 المبيعات',
        purchases: '📥 المشتريات', clients: '👥 العملاء', suppliers: '🏭 الموردين',
        expenses: '💸 المصروفات', revenues: '💰 الإيرادات', reports: '📊 التقارير', 
        settings: '⚙️ الإعدادات', ai: '🧠 الذكاء الاصطناعي'
    };

    function renderTabs() {
        const tabsDiv = document.getElementById('tabsContainer');
        tabsDiv.innerHTML = sections.map(s => `<div class="tab" data-tab="${s}">${titles[s]}</div>`).join('');
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                switchSection(tab.dataset.tab);
            });
        });
        document.querySelector('.tab')?.classList.add('active');
        switchSection('dashboard');
    }

    function switchSection(section) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        let secDiv = document.getElementById(`section-${section}`);
        if(!secDiv) generateSection(section);
        secDiv = document.getElementById(`section-${section}`);
        secDiv.classList.add('active');
        if(section === 'dashboard') updateDashboard();
        if(section === 'ai') renderAI();
    }

    function generateSection(section) {
        const container = document.getElementById('contentContainer');
        let html = '';
        if(section === 'dashboard') html = `<div class="stats-grid" id="statsGrid"></div><div class="stats-grid" id="chartsGrid" style="grid-template-columns:1fr 1fr;"></div>`;
        else if(section === 'ai') html = `<div id="aiContent"></div>`;
        else if(section === 'settings') html = `<div id="settingsContainer"><h3>⚙️ الإعدادات</h3><div class="form-grid"><select id="currencySelect"><option value="LD">دينار ليبي (LD)</option><option value="USD">دولار (USD)</option></select><button class="btn btn-secondary" onclick="toggleDarkMode()">🌙 وضع ليلي</button></div><div style="margin-top:30px"><button class="btn btn-danger" onclick="confirmClearAll()">🗑️ مسح كل البيانات</button></div></div>`;
        else html = `<div>جاري التحميل...</div>`;
        container.innerHTML += `<div id="section-${section}" class="section">${html}</div>`;
    }

    function renderAI() {
        document.getElementById('aiContent').innerHTML = `
            <div class="ai-card">
                <h3>🧠 الذكاء الاصطناعي - تحليل شامل</h3>
                <div class="ai-insight" id="aiSales">📊 جاري تحليل المبيعات...</div>
                <div class="ai-insight" id="aiTopProduct">🏆 جاري تحليل أفضل المنتجات...</div>
                <div class="ai-insight" id="aiLowStock">⚠️ جاري فحص المخزون...</div>
                <div class="ai-insight" id="aiRecommendation">💡 جاري إعداد التوصيات...</div>
            </div>
            <div class="chat-container" id="chatContainerAI">
                <div class="chat-message chat-bot">🤖 مرحباً! أنا مساعدك الذكي للتحليلات المتقدمة. اسألني أي شيء.</div>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px">
                <input type="text" id="chatInputAI" placeholder="اسأل المساعد الذكي..." style="flex:1">
                <button class="btn btn-ai" onclick="askAIAI()">إرسال</button>
            </div>
        `;
        // تحليل المبيعات
        const totalSales = (db.sales || []).reduce((s,i)=>s+(i.total||0),0);
        const totalPurchases = (db.purchases || []).reduce((s,i)=>s+(i.total||0),0);
        const profit = totalSales - totalPurchases;
        document.getElementById('aiSales').innerHTML = `💰 إجمالي المبيعات: ${formatMoney(totalSales)} | إجمالي المشتريات: ${formatMoney(totalPurchases)} | صافي الربح: ${formatMoney(profit)}`;
        
        const productSales = {};
        (db.sales || []).forEach(s => { productSales[s.product] = (productSales[s.product] || 0) + (s.qty || 0); });
        const top = Object.entries(productSales).sort((a,b)=>b[1]-a[1])[0];
        document.getElementById('aiTopProduct').innerHTML = top ? `🏆 أفضل منتج: ${top[0]} (${top[1]} قطعة)` : 'لا توجد بيانات';
        
        const low = (db.inventory || []).filter(i => (i.qty||0) <= (i.minQty||5));
        document.getElementById('aiLowStock').innerHTML = low.length ? `⚠️ منتجات منخفضة المخزون: ${low.map(i=>i.name).join(', ')}` : '✅ جميع المنتجات بمخزون جيد';
        
        document.getElementById('aiRecommendation').innerHTML = low.length ? `💡 أنصح بإعادة تخزين: ${low.map(i=>i.name).join(', ')}` : '💡 استمر بنفس الوتيرة، الأداء جيد';
    }
    
    function askAIAI() {
        const input = document.getElementById('chatInputAI')?.value.toLowerCase();
        if (!input) return;
        const container = document.getElementById('chatContainerAI');
        if (!container) return;
        container.innerHTML += `<div class="chat-message chat-user">👤 ${input}</div>`;
        let reply = '';
        if (input.includes('مبيعات اليوم')) {
            const todaySales = (db.sales || []).filter(s=>s.date===today()).reduce((s,i)=>s+(i.total||0),0);
            reply = `📊 مبيعات اليوم: ${formatMoney(todaySales)}`;
        } else if (input.includes('أفضل منتج')) {
            const ps = {};
            (db.sales || []).forEach(s=>{ ps[s.product]=(ps[s.product]||0)+ (s.qty||0); });
            const t = Object.entries(ps).sort((a,b)=>b[1]-a[1])[0];
            reply = t ? `🏆 أفضل منتج: ${t[0]} (${t[1]} قطعة)` : 'لا توجد بيانات';
        } else if (input.includes('أفضل عميل')) {
            const cs = {};
            (db.sales || []).forEach(s=>{ cs[s.clientName]=(cs[s.clientName]||0)+(s.total||0); });
            const t = Object.entries(cs).sort((a,b)=>b[1]-a[1])[0];
            reply = t ? `⭐ أفضل عميل: ${t[0]} (${formatMoney(t[1])})` : 'لا توجد بيانات';
        } else if (input.includes('المخزون المنخفض')) {
            const l = (db.inventory || []).filter(i=>(i.qty||0)<=(i.minQty||5));
            reply = l.length ? `⚠️ المنتجات المنخفضة: ${l.map(i=>i.name).join(', ')}` : '✅ المخزون جيد';
        } else reply = `🤖 يمكنك سؤالي: مبيعات اليوم، أفضل منتج، أفضل عميل، المخزون المنخفض.`;
        container.innerHTML += `<div class="chat-message chat-bot">🤖 ${reply}</div>`;
        container.scrollTop = container.scrollHeight;
        document.getElementById('chatInputAI').value = '';
    }

    function updateDashboard() {
        const totalSales = (db.sales || []).reduce((s,i)=>s+(i.total||0),0);
        const totalPurchases = (db.purchases || []).reduce((s,i)=>s+(i.total||0),0);
        const totalExpenses = (db.expenses || []).reduce((s,i)=>s+(i.amount||0),0);
        const netProfit = totalSales - totalPurchases - totalExpenses;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="value">${formatMoney(totalSales)}</div><div class="label">المبيعات</div></div>
            <div class="stat-card"><div class="value">${formatMoney(totalPurchases)}</div><div class="label">المشتريات</div></div>
            <div class="stat-card"><div class="value">${formatMoney(netProfit)}</div><div class="label">صافي الربح</div></div>
            <div class="stat-card"><div class="value">${(db.clients||[]).length}</div><div class="label">العملاء</div></div>
        `;
        drawCharts();
    }
    
    function drawCharts() {
        document.getElementById('chartsGrid').innerHTML = `<canvas id="simpleChart" height="200"></canvas>`;
        const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو'];
        let data = Array(6).fill(0);
        (db.sales || []).forEach(s => {
            let d = new Date(s.date);
            if(!isNaN(d) && d.getMonth()<6) data[d.getMonth()] += s.total||0;
        });
        new Chart(document.getElementById('simpleChart'), { type:'line', data:{ labels:months, datasets:[{ label:'المبيعات', data, borderColor:'#8b5cf6' }] }, options:{ responsive:true } });
    }

    // ==================== دوال مساعدة ====================
    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    function showSettings() { switchSection('settings'); }
    function toggleDarkMode() { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }
    function confirmClearAll() { if(confirm('مسح كل البيانات؟ تأكيد نهائي؟')) { ['inventory','clients','suppliers','sales','purchases','expenses','revenues'].forEach(k=>{ db[k]=[]; save(k); }); notify('تم مسح البيانات'); renderAll(); } }
    function exportBackup() { let data = JSON.stringify(db); let blob = new Blob([data],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`backup_${today()}.json`; a.click(); notify('تم التصدير'); }
    function renderAll() { updateDashboard(); renderAI(); }
    
    window.onload = () => {
        if (!localStorage.getItem('semo_user')) window.location.href = 'index.html';
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
        loadDB();
        renderTabs();
        renderAll();
        document.getElementById('currencySelect')?.addEventListener('change', (e) => { db.settings.currency = e.target.value; save('settings'); currencySymbol = db.settings.currency; renderAll(); notify('تم تغيير العملة'); });
    };
</script>

<div id="aiAnalysisModal" class="modal"><div class="modal-content"><button class="btn btn-secondary" onclick="closeModal('aiAnalysisModal')" style="float:left">✕</button><div id="aiAnalysisModal"></div></div></div>
</body>
</html>
