<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEMO ERP PRO | نظام إدارة المؤسسات المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.95);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #8b5cf6;
            --shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-primary: #f1f5f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--border);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            padding: 25px 20px;
            transition: var(--transition);
            z-index: 100;
            overflow-y: auto;
            box-shadow: -5px 0 30px rgba(0, 0, 0, 0.1);
        }

        .sidebar-logo {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: var(--bg-primary);
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .user-info h4 { font-size: 14px; margin-bottom: 4px; }
        .user-info p { font-size: 11px; color: var(--text-secondary); }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: var(--transition);
            font-weight: 500;
        }

        .menu-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(-5px);
        }

        .menu-item.active {
            background: linear-gradient(135deg, var(--primary), var(--info));
            color: white;
            box-shadow: 0 5px 15px rgba(59,130,246,0.3);
        }

        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 20px 30px;
            transition: var(--transition);
        }

        .top-bar {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .page-title h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .top-bar-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: #1e293b; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--info));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .stat-card .stat-icon { font-size: 32px; margin-bottom: 12px; }
        .stat-card .stat-value { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .stat-card .stat-label { font-size: 13px; color: var(--text-secondary); }

        .card-box {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .table-wrapper { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: right; padding: 15px 12px; color: var(--text-secondary); font-weight: 600; font-size: 13px; border-bottom: 1px solid var(--border); }
        .data-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .data-table tr:hover td { background: rgba(59, 130, 246, 0.05); }

        .badge { padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; }
        .badge-success { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-info { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            border: 1px solid var(--border);
            animation: fadeInUp 0.3s ease;
        }

        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 14px 24px;
            border-radius: 60px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        body.mobile-view .sidebar {
            transform: translateX(100%);
            position: fixed;
            z-index: 200;
        }
        body.mobile-view .sidebar.open { transform: translateX(0); }
        body.mobile-view .main-content { margin-right: 0; }
        body.mobile-view .stats-grid { grid-template-columns: 1fr; }

        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 150;
            background: var(--primary);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        body.mobile-view .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .main-content { margin-right: 0; padding: 15px; }
            .sidebar { transform: translateX(100%); width: 260px; }
            .sidebar.open { transform: translateX(0); }
        }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        input, select, textarea {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
    </style>
</head>
<body>

<button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon" id="companyLogoDisplay">📊</div>
            <h3 id="companyNameDisplay">SEMO ERP PRO</h3>
        </div>
        <div class="user-card">
            <div class="user-avatar" id="userAvatar">👑</div>
            <div class="user-info">
                <h4 id="userName">مدير النظام</h4>
                <p id="userRole">مدير عام</p>
            </div>
        </div>
        <div class="menu-item active" onclick="switchPage('dashboard')"><i>🏠</i> <span>الرئيسية</span></div>
        <div class="menu-item" onclick="switchPage('inventory')"><i>📦</i> <span>المخزون</span></div>
        <div class="menu-item" onclick="switchPage('sales')"><i>🛒</i> <span>المبيعات</span></div>
        <div class="menu-item" onclick="switchPage('purchases')"><i>📥</i> <span>المشتريات</span></div>
        <div class="menu-item" onclick="switchPage('clients')"><i>👥</i> <span>العملاء</span></div>
        <div class="menu-item" onclick="switchPage('suppliers')"><i>🏭</i> <span>الموردين</span></div>
        <div class="menu-item" onclick="switchPage('expenses')"><i>💸</i> <span>المصروفات</span></div>
        <div class="menu-item" onclick="switchPage('revenues')"><i>💰</i> <span>الإيرادات</span></div>
        <div class="menu-item" onclick="switchPage('reports')"><i>📊</i> <span>التقارير</span></div>
        <div class="menu-item" onclick="logout()"><i>🚪</i> <span>خروج</span></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h2 id="pageTitle">🏠 لوحة التحكم</h2><small id="dateDisplay"></small></div>
            <div class="top-bar-actions">
                <button class="btn btn-outline" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="btn btn-outline" onclick="toggleMobileView()">📱 وضع الجوال</button>
                <button class="btn btn-primary" onclick="exportData()">📥 تصدير تقرير</button>
            </div>
        </div>
        <div id="pageContent"></div>
    </div>
</div>

<script>
    // ==================== قاعدة البيانات ====================
    let db = {
        inventory: JSON.parse(localStorage.getItem('semo_inventory')) || [],
        sales: JSON.parse(localStorage.getItem('semo_sales')) || [],
        purchases: JSON.parse(localStorage.getItem('semo_purchases')) || [],
        clients: JSON.parse(localStorage.getItem('semo_clients')) || [],
        suppliers: JSON.parse(localStorage.getItem('semo_suppliers')) || [],
        expenses: JSON.parse(localStorage.getItem('semo_expenses')) || [],
        revenues: JSON.parse(localStorage.getItem('semo_revenues')) || [],
        settings: JSON.parse(localStorage.getItem('semo_settings')) || {
            companyName: 'SEMO ERP PRO',
            companyLogo: '📊',
            currencySymbol: 'ج.م'
        }
    };

    let currentUser = JSON.parse(localStorage.getItem('semo_user')) || { name: 'مدير النظام', role: 'admin', avatar: '👑' };
    let currentPage = 'dashboard';

    function saveAll() {
        localStorage.setItem('semo_inventory', JSON.stringify(db.inventory));
        localStorage.setItem('semo_sales', JSON.stringify(db.sales));
        localStorage.setItem('semo_purchases', JSON.stringify(db.purchases));
        localStorage.setItem('semo_clients', JSON.stringify(db.clients));
        localStorage.setItem('semo_suppliers', JSON.stringify(db.suppliers));
        localStorage.setItem('semo_expenses', JSON.stringify(db.expenses));
        localStorage.setItem('semo_revenues', JSON.stringify(db.revenues));
        localStorage.setItem('semo_settings', JSON.stringify(db.settings));
    }

    function today() { return new Date().toLocaleDateString('ar-EG'); }
    function formatCurrency(amount) { return amount.toLocaleString() + ' ' + (db.settings.currencySymbol || 'ج.م'); }
    
    function showNotification(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.background = type === 'success' ? '#10b981' : type === 'danger' ? '#ef4444' : '#f59e0b';
        toast.style.color = type === 'warning' ? '#1e293b' : 'white';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ==================== الإعدادات ====================
    function applySettings() {
        document.getElementById('companyLogoDisplay').innerHTML = db.settings.companyLogo || '📊';
        document.getElementById('companyNameDisplay').innerHTML = db.settings.companyName || 'SEMO ERP PRO';
    }

    // ==================== الوضع الليلي والجوال ====================
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        document.getElementById('themeBtn').textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        localStorage.setItem('semo_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    function loadTheme() {
        if (localStorage.getItem('semo_theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('themeBtn').textContent = '☀️';
        }
    }

    function toggleMobileView() {
        document.body.classList.toggle('mobile-view');
        localStorage.setItem('semo_mobile_view', document.body.classList.contains('mobile-view') ? 'true' : 'false');
        showNotification(document.body.classList.contains('mobile-view') ? '📱 وضع الجوال مفعل' : '🖥️ وضع سطح المكتب مفعل');
    }

    function toggleMobileMenu() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function loadMobileView() {
        if (localStorage.getItem('semo_mobile_view') === 'true') {
            document.body.classList.add('mobile-view');
        }
    }

    // ==================== دوال الصفحات ====================
    function switchPage(page) {
        currentPage = page;
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        event?.target?.closest('.menu-item')?.classList.add('active');
        
        const titles = {
            dashboard: '🏠 لوحة التحكم',
            inventory: '📦 إدارة المخزون',
            sales: '🛒 المبيعات والفواتير',
            purchases: '📥 المشتريات وأوامر الشراء',
            clients: '👥 العملاء',
            suppliers: '🏭 الموردين',
            expenses: '💸 المصروفات',
            revenues: '💰 الإيرادات',
            reports: '📊 التقارير والتحليلات'
        };
        document.getElementById('pageTitle').innerHTML = titles[page] || 'لوحة التحكم';
        
        if (page === 'dashboard') renderDashboard();
        else if (page === 'inventory') renderInventory();
        else if (page === 'sales') renderSales();
        else if (page === 'purchases') renderPurchases();
        else if (page === 'clients') renderClients();
        else if (page === 'suppliers') renderSuppliers();
        else if (page === 'expenses') renderExpenses();
        else if (page === 'revenues') renderRevenues();
        else if (page === 'reports') renderReports();
    }

    // ==================== لوحة التحكم المصححة ====================
    function renderDashboard() {
        const totalSales = db.sales.reduce((s, i) => s + (i.total || 0), 0);
        const totalPurchases = db.purchases.reduce((s, i) => s + (i.total || 0), 0);
        const totalExpenses = db.expenses.reduce((s, i) => s + (i.amount || 0), 0);
        const totalRevenues = db.revenues.reduce((s, i) => s + (i.amount || 0), 0);
        const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
        const lowStock = db.inventory.filter(i => (i.qty || 0) <= 5).length;
        
        const html = `
            <div class="stats-grid animate-in">
                <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">${formatCurrency(totalSales)}</div><div class="stat-label">إجمالي المبيعات</div></div>
                <div class="stat-card"><div class="stat-icon">📥</div><div class="stat-value">${formatCurrency(totalPurchases)}</div><div class="stat-label">إجمالي المشتريات</div></div>
                <div class="stat-card"><div class="stat-icon">💸</div><div class="stat-value">${formatCurrency(totalExpenses)}</div><div class="stat-label">المصروفات</div></div>
                <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">${formatCurrency(totalRevenues)}</div><div class="stat-label">الإيرادات</div></div>
                <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-value" style="color:${profit >= 0 ? '#34d399' : '#f87171'}">${formatCurrency(profit)}</div><div class="stat-label">صافي الربح</div></div>
                <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${db.inventory.length}</div><div class="stat-label">المنتجات</div></div>
                <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value" style="color:${lowStock > 0 ? '#fbbf24' : '#34d399'}">${lowStock}</div><div class="stat-label">منتجات منخفضة</div></div>
                <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${db.clients.length}</div><div class="stat-label">العملاء</div></div>
            </div>
            <div class="card-box"><canvas id="monthlyChart" height="250"></canvas></div>
            <div class="card-box">
                <div class="card-header"><h3>📋 آخر المبيعات</h3></div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead><tr><th>التاريخ</th><th>العميل</th><th>المبلغ</th><th>الحالة</th></tr></thead>
                        <tbody id="recentSalesTable"></tbody>
                    </table>
                </div>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
        
        // رسم الرسم البياني
        const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        let monthlyData = Array(12).fill(0);
        db.sales.forEach(s => { let d = new Date(s.date); if (!isNaN(d)) monthlyData[d.getMonth()] += s.total || 0; });
        
        new Chart(document.getElementById('monthlyChart'), { 
            type: 'bar', 
            data: { labels: months, datasets: [{ label: 'المبيعات الشهرية', data: monthlyData, backgroundColor: '#3b82f6', borderRadius: 8 }] }, 
            options: { responsive: true, maintainAspectRatio: true } 
        });
        
        // آخر المبيعات
        const recentSales = [...db.sales].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
        document.getElementById('recentSalesTable').innerHTML = recentSales.map(s => `
            <tr><td>${s.date}</td><td>${s.clientName}</td><td>${formatCurrency(s.total)}</td><td><span class="badge ${s.status === 'مدفوع' ? 'badge-success' : 'badge-warning'}">${s.status}</span></td></tr>
        `).join('');
    }

    // ==================== المخزون ====================
    function renderInventory() {
        const html = `
            <div class="card-box">
                <div class="card-header"><h3>📦 إدارة المخزون</h3><button class="btn btn-success" onclick="addProduct()">+ منتج جديد</button></div>
                <input type="text" id="searchInventory" placeholder="🔍 بحث..." style="width:100%; padding:12px; margin-bottom:15px; border-radius:12px;">
                <div class="table-wrapper"><table class="data-table"><thead><tr><th>#</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="inventoryTable"></tbody></table></div>
            </div>
        `;
        document.getElementById('pageContent').innerHTML = html;
        refreshInventory();
        document.getElementById('searchInventory')?.addEventListener('input', refreshInventory);
    }

    function refreshInventory() {
        const search = document.getElementById('searchInventory')?.value.toLowerCase() || '';
        const filtered = db.inventory.filter(i => i.name.toLowerCase().includes(search));
        document.getElementById('inventoryTable').innerHTML = filtered.map((i, idx) => `

        const newPrice = parseFloat(prompt('السعر الجديد:', item.price)); if (!isNaN(newPrice)) item.price = newPrice;
        saveAll();
        refreshInventory();
        showNotification('✅ تم التعديل');

    function refreshPurchases() {
        const search = document.getElementById('searchPurchases')?.value.toLowerCase() || '';
        const filtered = db.purchases.filter(p => p.supplier.toLowerCase().includes(search) || p.product.toLowerCase().includes(search));
        document.getElementById('purchasesTable').innerHTML = filtered.map((p, idx) => `
            <tr><td>${idx+1}</td><td>${p.date}</td><td>${p.supplier}</td><td>${p.product}</td><td>${p.qty}</td><td>${formatCurrency(p.price)}</td><td>${formatCurrency(p.total)}</td><td><button class="btn btn-danger btn-sm" onclick="deletePurchase(${p.id})">🗑️</button></td></tr>
        `).join('');
    }

    function addPurchase() {
        const supplier = prompt('المورد:'); if (!supplier) return;
        const product = prompt('المنتج:'); if (!product) return;
        const qty = parseInt(prompt('الكمية:', '1'));
        const price = parseFloat(prompt('السعر:', '0'));
        if (isNaN(qty) || isNaN(price)) return;
        const total = qty * price;
        db.purchases.push({ id: Date.now(), supplier, product, qty, price, total, date: today() });
        const existing = db.inventory.find(i => i.name === product);
        if (existing) existing.qty += qty;
        else db.inventory.push({ id: Date.now(), name: product, qty, price });
        saveAll();
        refreshPurchases();
        showNotification('✅ تمت إضافة أمر الشراء');
    }

    // ==================== التقارير ====================
    function renderReports() {
        const totalSales = db.sales.reduce((s, i) => s + (i.total || 0), 0);
        const totalPurchases = db.purchases.reduce((s, i) => s + (i.total || 0), 0);
        const totalExpenses = db.expenses.reduce((s, i) => s + (i.amount || 0), 0);
        const totalRevenues = db.revenues.reduce((s, i) => s + (i.amount || 0), 0);
        const profit = totalSales - totalPurchases - totalExpenses + totalRevenues;
        
        const productSales = {};
        db.sales.forEach(s => { productSales[s.product] = (productSales[s.product] || 0) + s.total; });
        const bestProduct = Object.entries(productSales).sort((a, b) => b[1] - a[1])[0];
        
        const html = `
            <div class="stats-grid animate-in">
                <div class="stat-card"><div class="stat-value">${formatCurrency(totalSales)}</div><div class="stat-label">المبيعات</div></div>
                <div class="stat-card"><div class="stat-value">${formatCurrency(totalPurchases)}</div><div class="stat-label">المشتريات</div></div>
                <div class="stat-card"><div class="stat-value">${formatCurrency(totalExpenses)}</div><div class="stat-label">المصروفات</div></div>
                <div class="stat-card"><div class="stat-value">${formatCurrency(totalRevenues)}</div><div class="stat-label">الإيرادات</div></div>
                <div class="stat-card"><div class="stat-value" style="color:${profit>=0?'#34d399':'#f87171'}">${formatCurrency(profit)}</div><div class="stat-label">صافي الربح</div></div>
                <div class="stat-card"><div class="stat-value">${bestProduct ? bestProduct[0] : '-'}</div><div class="stat-label">أفضل منتج</div></div>
                <div class="stat-card"><div class="stat-value">${db.sales.length}</div><div class="stat-label">عدد الفواتير</div></div>
                <div class="stat-card"><div class="stat-value">${db.clients.length}</div><div class="stat-label">العملاء</div></div>
            </div>
            <div class="card-box"><canvas id="reportChart" height="250"></canvas></div>
        `;
        document.getElementById('pageContent').innerHTML = html;
        
        const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        let monthlyData = Array(12).fill(0);
        db.sales.forEach(s => { let d = new Date(s.date); if (!isNaN(d)) monthlyData[d.getMonth()] += s.total || 0; });
        new Chart(document.getElementById('reportChart'), { type: 'line', data: { labels: months, datasets: [{ label: 'المبيعات الشهرية', data: monthlyData, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true } });
    }

    // ==================== تصدير البيانات ====================
    function exportData() {
        const exportData = {
            inventory: db.inventory, sales: db.sales, purchases: db.purchases,
            clients: db.clients, suppliers: db.suppliers, expenses: db.expenses, revenues: db.revenues,
            settings: db.settings, exportedAt: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `semo_erp_backup_${today().replace(/\//g, '-')}.json`;
        a.click();
        showNotification('✅ تم تصدير النسخة الاحتياطية');
    }
