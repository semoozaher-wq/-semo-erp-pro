<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المركز المالي | SEMO ERP</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://jsdelivr.net"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; margin: 0; }
        aside { width: 280px; background: var(--primary); color: white; display: flex; flex-direction: column; transition: 0.3s; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; border-right: 4px solid transparent; display: flex; align-items: center; gap: 12px; }
        .nav-item.active, .nav-item:hover { background: #1e293b; border-right-color: var(--accent); color: #60a5fa; }
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .val { font-size: 1.5rem; font-weight: 800; color: var(--primary); display: block; margin-top: 10px; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; width: 100%; margin: 8px 0; }
        .btn { padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; width: 100%; background: var(--accent); color: white; }
        @media (max-width: 768px) { aside { width: 75px; } aside span { display: none; } }
    </style>
</head>
<body>
    <aside>
        <div style="padding:30px; font-weight:900; font-size:1.5rem; color:var(--accent); text-align:center;">SEMO ERP</div>
        <nav>
            <div class="nav-item active"><i class="fas fa-chart-line"></i> <span>المركز المالي</span></div>
            <div class="nav-item" onclick="logout()"><i class="fas fa-power-off"></i> <span>خروج</span></div>
        </nav>
    </aside>
    <main>
        <div class="card">
            <h1>أهلاً بك في نظامك المحاسبي السحابي ☁️</h1>
            <p id="user-display">جاري التحقق من الجلسة...</p>
        </div>
        <div class="grid">
            <div class="card" style="border-right: 5px solid #2563eb;"><h4>ليبي (د.ل)</h4><span class="val" id="st-ly">0.00</span></div>
            <div class="card" style="border-right: 5px solid #10b981;"><h4>مصري (ج.م)</h4><span class="val" id="st-eg">0.00</span></div>
            <div class="card" style="border-right: 5px solid #f59e0b;"><h4>سعودي (ر.س)</h4><span class="val" id="st-sa">0.00</span></div>
        </div>
        <div class="card" style="max-width: 500px; margin-top: 20px;">
            <h3>فاتورة مبيعات سريعة</h3>
            <input type="text" id="cust" placeholder="اسم العميل">
            <select id="curr"><option value="د.ل">دينار ليبي</option><option value="ج.م">جنيه مصري</option><option value="ر.س">ريال سعودي</option></select>
            <input type="number" id="amt" placeholder="المبلغ">
            <button class="btn" onclick="save()">حفظ ومزامنة ☁️</button>
        </div>
    </main>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC2EVpNEG9XjcPEelUA8lkIUcUceN6Oh0k",
            authDomain: "semo-erp-pro13.firebaseapp.com",
            projectId: "semo-erp-pro13",
            databaseURL: "https://firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        let uID = null, erpChart = null;

        firebase.auth().onAuthStateChanged(user => {
            if (user && user.emailVerified) { uID = user.uid; sync(); }
            else { window.location.assign("index.html"); }
        });

        function save() {
            let n = document.getElementById('cust').value, a = parseFloat(document.getElementById('amt').value), c = document.getElementById('curr').value;
            if(n && a) {
                rtdb.ref('users/' + uID + '/sales').push({ n, a, c, date: new Date().toISOString() });
                alert("تم الترحيل للسحابة بنجاح ✅");
            }
        }

        function sync() {
            rtdb.ref('users/' + uID + '/sales').on('value', snap => {
                const sales = snap.val() ? Object.values(snap.val()) : [];
                const sum = (c) => sales.filter(s => s.c === c).reduce((acc, b) => acc + b.a, 0).toFixed(2);
                document.getElementById('st-ly').innerText = sum('د.ل');
                document.getElementById('st-eg').innerText = sum('ج.م');
                document.getElementById('st-sa').innerText = sum('ر.س');
            });
        }
        function logout() { firebase.auth().signOut(); }
    </script>
</body>
</html>
